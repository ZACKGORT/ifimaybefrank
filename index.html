      function closeWeightPanel(){ weightPanel.classList.remove('open'); }
      weightTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        weightPanel.classList.contains('open') ? closeWeightPanel() : openWeightPanel();
      });
      weightWrap.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeWeightPanel(); });

      weightWrap.append(weightTrigger, weightPanel);

      // italic toggle
      const italicBtn = document.createElement('button');
      italicBtn.type = 'button';
      italicBtn.className = 'ctrl italic-toggle' + (b.italic ? ' active' : '');
      italicBtn.textContent = 'i';
      italicBtn.setAttribute('aria-pressed', b.italic ? 'true' : 'false');
      italicBtn.addEventListener('click', () => {
        b.italic = !b.italic;
        italicBtn.classList.toggle('active', b.italic);
        italicBtn.setAttribute('aria-pressed', b.italic ? 'true' : 'false');
        refreshWeightSwatch();
        applyStyle(textarea,b); saveDraft();
      });

      // size slider
      const sizeCtrl = document.createElement('div');
      sizeCtrl.className = 'ctrl';
      const sizeLabel = document.createElement('span'); sizeLabel.className='ctrl-label'; sizeLabel.textContent='Size';
      const sizeTrack = document.createElement('div'); sizeTrack.className='range-track';
      const sizeRange = document.createElement('input');
      sizeRange.type='range'; sizeRange.min=10; sizeRange.max=200; sizeRange.value=b.size;
      const sizeVal = document.createElement('span'); sizeVal.className='ctrl-value'; sizeVal.textContent = b.size+'px';
      sizeRange.addEventListener('input', () => {
        b.size = parseInt(sizeRange.value,10);
        sizeVal.textContent = b.size+'px';
        applyStyle(textarea,b); saveDraft();
      });
      sizeTrack.appendChild(sizeRange);
      sizeCtrl.append(sizeLabel, sizeTrack, sizeVal);

      // letter spacing slider
      const trackCtrl = document.createElement('div');
      trackCtrl.className = 'ctrl';
      const trackLabel = document.createElement('span'); trackLabel.className='ctrl-label'; trackLabel.textContent='Letter spacing';
      const trackTrack = document.createElement('div'); trackTrack.className='range-track';
      const trackRange = document.createElement('input');
      trackRange.type='range'; trackRange.min=-30; trackRange.max=150; trackRange.value=b.tracking;
      trackRange.addEventListener('input', () => {
        b.tracking = parseInt(trackRange.value,10);
        applyStyle(textarea,b); saveDraft();
      });
      trackTrack.appendChild(trackRange);
      trackCtrl.append(trackLabel, trackTrack);

      // line height slider
      const leadCtrl = document.createElement('div');
      leadCtrl.className = 'ctrl';
      const leadLabel = document.createElement('span'); leadLabel.className='ctrl-label'; leadLabel.textContent='Line height';
      const leadTrack = document.createElement('div'); leadTrack.className='range-track';
      const leadRange = document.createElement('input');
      leadRange.type='range'; leadRange.min=95; leadRange.max=190; leadRange.value=b.leading;
      leadRange.addEventListener('input', () => {
        b.leading = parseInt(leadRange.value,10);
        applyStyle(textarea,b); saveDraft();
      });
      leadTrack.appendChild(leadRange);
      leadCtrl.append(leadLabel, leadTrack);

      // fill (monochrome grayscale — black through gray)
      const fillCtrl = document.createElement('div');
      fillCtrl.className = 'ctrl';
      const fillLabel = document.createElement('span'); fillLabel.className='ctrl-label'; fillLabel.textContent='Fill';
      const fillSwatch = document.createElement('span'); fillSwatch.className='fill-swatch';
      const fillTrack = document.createElement('div'); fillTrack.className='range-track';
      const fillRange = document.createElement('input');
      fillRange.type='range'; fillRange.min=0; fillRange.max=200; fillRange.value=b.fill;
      function paintSwatch(v){ fillSwatch.style.background = 'rgb(' + v + ',' + v + ',' + v + ')'; }
      paintSwatch(b.fill);
      fillRange.addEventListener('input', () => {
        b.fill = parseInt(fillRange.value,10);
        paintSwatch(b.fill);
        applyStyle(textarea,b); saveDraft();
      });
      fillTrack.appendChild(fillRange);
      fillCtrl.append(fillLabel, fillTrack, fillSwatch);

      // list type — bullet / numbered. Toggling reformats whatever text
      // is already there (adds or strips markers); Enter continues the
      // list automatically via the keydown handler above.
      const listGroup = document.createElement('div');
      listGroup.className = 'list-group';
      const listBtns = {};
      [
        { id:'bullet', label:'Bulleted list', glyph:'•' },
        { id:'number', label:'Numbered list', glyph:'1.' }
      ].forEach(cfg => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'list-btn' + (b.list === cfg.id ? ' active' : '');
        btn.setAttribute('aria-label', cfg.label);
        btn.setAttribute('aria-pressed', b.list === cfg.id ? 'true' : 'false');
        btn.textContent = cfg.glyph;
        btn.addEventListener('click', () => {
          const newType = b.list === cfg.id ? 'none' : cfg.id;
          textarea.textContent = applyListTransform(textarea.textContent, newType);
          b.text = textarea.textContent;
          b.list = newType;
          Object.values(listBtns).forEach(x => {
            x.classList.toggle('active', x === btn && newType !== 'none');
            x.setAttribute('aria-pressed', x === btn && newType !== 'none' ? 'true' : 'false');
          });
          // a list and a column split don't really work together — a
          // bulleted/numbered passage forces itself back to a single
          // column, and the layout toggle locks until the list is
          // turned back off
          if (newType !== 'none' && b.layout !== 'single'){
            b.layout = 'single';
            layoutGroup.querySelectorAll('.layout-btn').forEach(x => x.classList.toggle('active', x.dataset.layoutId === 'single'));
          }
          updateLayoutLock();
          applyStyle(textarea,b);
          saveDraft();
          textarea.focus();
        });
        listBtns[cfg.id] = btn;
        listGroup.appendChild(btn);
      });

      // layout — single passage, or spread across 2/3 real CSS columns
      const layoutGroup = document.createElement('div');
      layoutGroup.className = 'layout-group';
      [1,2,3].forEach(n => {
        const layoutId = n === 3 ? 'col3' : n === 2 ? 'col2' : 'single';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.layoutId = layoutId;
        btn.className = 'layout-btn' + ((b.layout || 'single') === layoutId ? ' active' : '');
        btn.setAttribute('aria-label', n === 1 ? 'Single column' : n + '-column layout');
        const icon = document.createElement('span');
        icon.className = 'layout-icon';
        for (let c=0; c<n; c++) icon.appendChild(document.createElement('span'));
        btn.appendChild(icon);
        btn.addEventListener('click', () => {
          b.layout = layoutId;
          layoutGroup.querySelectorAll('.layout-btn').forEach(x => x.classList.toggle('active', x === btn));
          // 'single' is always reachable, even mid-list — clicking it
          // doubles as the way out of a bulleted/numbered passage,
          // since the 2/3-column buttons are locked while a list is on
          if (layoutId === 'single' && b.list !== 'none'){
            textarea.textContent = applyListTransform(textarea.textContent, 'none');
            b.text = textarea.textContent;
            b.list = 'none';
            Object.values(listBtns).forEach(x => {
              x.classList.remove('active');
              x.setAttribute('aria-pressed', 'false');
            });
            updateLayoutLock();
          }
          applyStyle(textarea,b); saveDraft();
        });
        layoutGroup.appendChild(btn);
      });
      function updateLayoutLock(){
        const locked = b.list !== 'none';
        layoutGroup.querySelectorAll('.layout-btn').forEach(btn => {
          // 'single' never locks — it's the escape hatch
          if (btn.dataset.layoutId !== 'single') btn.classList.toggle('locked', locked);
        });
      }
      updateLayoutLock();

      // remove
      const removeBtn = document.createElement('button');
      removeBtn.type='button'; removeBtn.className='block-remove'; removeBtn.title='Remove this passage';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => {
        if (blocks.length <= 1) return;
        blocks.splice(i,1);
        renderStack();
        updateSealEnabled();
        saveDraft();
      });

      controls.append(fontWrap, weightWrap, italicBtn, sizeCtrl, trackCtrl, leadCtrl, fillCtrl, listGroup, layoutGroup, removeBtn);
      block.append(controls, textarea);
      blockStack.appendChild(block);

      // bloom the control row in only while focus is somewhere inside
      // this block (the textarea itself, or one of its own controls);
      // collapse it the moment focus moves elsewhere.
      block.addEventListener('focusin', () => block.classList.add('active'));
      block.addEventListener('focusout', () => {
        requestAnimationFrame(() => {
          if (!block.contains(document.activeElement)) block.classList.remove('active');
        });
      });
    });
    schedulePageBreakUpdate();
  }

  // single delegated listener closes any open font-picker panel when a
  // click lands outside it — avoids stacking a new listener per block
  // on every re-render
  document.addEventListener('click', (e) => {
    document.querySelectorAll('.font-picker-panel.open').forEach(panel => {
      const wrap = panel.closest('.font-picker');
      if (wrap && !wrap.contains(e.target)) panel.classList.remove('open');
    });
  });

  addBlockBtn.addEventListener('click', () => {
    blocks.push(defaultBlock());
    renderStack();
    const last = blockStack.querySelector('.block:last-child .block-editable');
    if (last) last.focus();
    saveDraft();
  });

  // ── VIEW SWITCHING ──
  // Write is a direct action, not a toggle showing whatever's currently
  // loaded: every click starts a brand-new blank note. Archive just
  // switches to the archive view.
  navWrite.addEventListener('click', () => {
    resetCompose();
    showView('compose');
  });
  tabs.forEach(t => {
    if (t === navWrite) return; // handled above
    t.addEventListener('click', () => showView(t.dataset.view));
  });
  function showView(name){
    tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
    viewCompose.classList.toggle('active', name === 'compose');
    viewArchive.classList.toggle('active', name === 'archive');
    // the HUD (New/Print/Save/Delete) is compose-only — showing it while
    // browsing the archive would be misleading (Print, in particular,
    // would otherwise print the live draft instead of whatever you're
    // actually looking at)
    const composeOnly = name === 'compose';
    composeHud.style.display = composeOnly ? '' : 'none';
    // Delete is further scoped to only when there's an actual filed
    // letter currently loaded for editing, not a fresh blank one
    btnDelete.style.display = (composeOnly && editingEntryId) ? '' : 'none';
    btnSealMain.textContent = editingEntryId ? 'Update' : 'Seal';
    if (name === 'archive') renderArchive();
    // entering compose (fresh, resumed, or opened from the archive)
    // always drops focus straight into the writing surface — the
    // element isn't laid out/visible until the .active class above
    // takes effect, so wait a frame before focusing it
    if (composeOnly) focusComposeSurface();
  }

  function focusComposeSurface(){
    requestAnimationFrame(() => {
      const last = blockStack.querySelector('.block:last-child .block-editable');
      if (last) last.focus({ preventScroll: true });
      window.scrollTo(0, 0);
    });
  }

  // ── RESILIENT STORAGE (best-effort persistence; never load-bearing) ──
  const persist = {
    failCount:0, disabled:false, limit:3,
    async trySet(key, value){
      if (this.disabled || !window.storage) return false;
      try{
        await window.storage.set(key, value, false);
        this.failCount = 0; setSaveStatus('saved'); return true;
      }catch(err){
        this.failCount++;
        if (this.failCount >= this.limit){ this.disabled = true; setSaveStatus('local-only'); }
        else setSaveStatus('retry');
        return false;
      }
    },
    async tryGet(key){
      if (!window.storage) return null;
      try{ return await window.storage.get(key,false); }catch(e){ return null; }
    },
    async tryList(prefix){
      if (!window.storage) return [];
      try{ const r = await window.storage.list(prefix,false); return (r&&r.keys)?r.keys:[]; }catch(e){ return []; }
    },
    tryDelete(key){
      if (!window.storage || this.disabled) return;
      window.storage.delete(key,false).catch(()=>{});
    }
  };
  const saveToastEl = document.getElementById('saveToast');
  let saveToastTimer = null;
  function showSaveToast(message){
    saveToastEl.textContent = message;
    saveToastEl.classList.add('show');
    clearTimeout(saveToastTimer);
    saveToastTimer = setTimeout(() => saveToastEl.classList.remove('show'), 1800);
  }

  function setSaveStatus(state){
    if (state === 'saved'){
      saveStatusEl.textContent = '';
      showSaveToast('Saved');
      return;
    }
    const labels = { saving:'Saving…', retry:'Retrying…', 'local-only':'Saved on this page only' };
    saveStatusEl.textContent = labels[state] || '';
  }

  let draftTimer = null;
  function saveDraft(){
    schedulePageBreakUpdate();
    clearTimeout(draftTimer);
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    if (!hasContent){
      setSaveStatus('');
      persist.tryDelete('draft:current');
      return;
    }
    setSaveStatus('saving');
    draftTimer = setTimeout(() => {
      persist.trySet('draft:current', JSON.stringify({ blocks, editingEntryId }));
    }, 900);
  }

  function resetCompose(){
    blocks = [ openingBlock() ];
    editingEntryId = null;
    renderStack();
    updateSealEnabled();
    setSaveStatus('');
    persist.tryDelete('draft:current');
  }

  // ── ARCHIVE ──
  const entriesCache = [];
  let editingEntryId = null; // set while editing a previously-sealed letter

  async function sealCurrentLetter(){
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    if (!hasContent) return;

    if (editingEntryId){
      // update the existing entry in place, rather than filing a duplicate
      const existing = entriesCache.find(e => e.id === editingEntryId);
      if (existing){
        existing.blocks = JSON.parse(JSON.stringify(blocks));
        persist.trySet('entries:' + existing.id, JSON.stringify(existing));
      }
    } else {
      const entry = {
        id:'entry_' + Date.now(),
        blocks: JSON.parse(JSON.stringify(blocks)),
        createdAt: new Date().toISOString()
      };
      entriesCache.unshift(entry);
      persist.trySet('entries:' + entry.id, JSON.stringify(entry));
    }

    persist.tryDelete('draft:current');
    resetCompose();
    showView('archive');
  }
  btnSeal.addEventListener('click', sealCurrentLetter);
  btnPrint.addEventListener('click', () => { printBlocks(blocks); });

  function fmtDate(iso){
    try{ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
    catch(e){ return ''; }
  }

  async function loadEntriesFromStorage(){
    const keys = await persist.tryList('entries:');
    for (const k of keys){
      const res = await persist.tryGet(k);
      if (res && res.value){
        try{ entriesCache.push(JSON.parse(res.value)); }catch(e){ /* skip corrupt entry */ }
      }
    }
    entriesCache.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    // seed the full-feature demo letter once, so the archive isn't empty
    // the first time someone opens it — never re-seeded once a person
    // has actually filed or deleted anything of their own
    const seeded = await persist.tryGet('meta:demoSeeded');
    if (!seeded && entriesCache.length === 0){
      const demoEntry = {
        id: 'entry_demo_' + Date.now(),
        blocks: fullDemoBlocks(),
        createdAt: new Date().toISOString()
      };
      entriesCache.unshift(demoEntry);
      persist.trySet('entries:' + demoEntry.id, JSON.stringify(demoEntry));
    }
    persist.trySet('meta:demoSeeded', 'true');

    // the Odyssey essay — a real piece written while testing — is kept
    // as a permanent example, and kept in sync with edits to the
    // canonical copy in source. It's identified by its opening line
    // rather than by id (older sessions seeded it under a different,
    // timestamp-suffixed id), and only auto-refreshed while it's still
    // pristine — if it's been edited further since it was seeded, that
    // edit is left alone rather than silently overwritten.
    const isOdysseyEntry = e => e && e.blocks && e.blocks[0] &&
      typeof e.blocks[0].text === 'string' &&
      e.blocks[0].text.indexOf("Nolan's 'The Odyssey'") !== -1;

    const odysseySeedBlocks = odysseyDemoBlocks();
    const odysseySeedJSON = JSON.stringify(odysseySeedBlocks);
    const priorSeedRaw = await persist.tryGet('meta:odysseySeed');
    let priorSeedJSON = null;
    if (priorSeedRaw && priorSeedRaw.value){
      try{ priorSeedJSON = JSON.parse(priorSeedRaw.value).blocksJSON || null; }catch(e){ /* ignore corrupt */ }
    }

    const existingIdx = entriesCache.findIndex(isOdysseyEntry);
    if (existingIdx === -1){
      const odysseyEntry = {
        id: 'entry_odyssey_' + Date.now(),
        blocks: odysseySeedBlocks,
        createdAt: new Date().toISOString()
      };
      entriesCache.unshift(odysseyEntry);
      persist.trySet('entries:' + odysseyEntry.id, JSON.stringify(odysseyEntry));
    } else {
      const existing = entriesCache[existingIdx];
      const existingJSON = JSON.stringify(existing.blocks);
      const pristine = priorSeedJSON === null || priorSeedJSON === existingJSON;
      if (pristine && existingJSON !== odysseySeedJSON){
        existing.blocks = odysseySeedBlocks;
        persist.trySet('entries:' + existing.id, JSON.stringify(existing));
      }
    }
    persist.trySet('meta:odysseySeed', JSON.stringify({ blocksJSON: odysseySeedJSON }));
  }

  // ── VIEW MODE (grid / list) ──
  function setArchiveViewMode(mode){
    shelf.classList.toggle('list-mode', mode === 'list');
    btnGridView.classList.toggle('active', mode === 'grid');
    btnListView.classList.toggle('active', mode === 'list');
  }
  btnGridView.addEventListener('click', () => setArchiveViewMode('grid'));
  btnListView.addEventListener('click', () => setArchiveViewMode('list'));

  // pulls just the first sentence out of a block of text — used for the
  // archive card's description line, mirroring "preview of the first
  // sentence" rather than dumping the whole rest of the letter in
  function firstSentence(text){
    const trimmed = text.trim();
    const match = trimmed.match(/^[^.!?]*[.!?]/);
    if (match) return match[0].trim();
    return trimmed.length > 140 ? trimmed.slice(0,140).trim() + '…' : trimmed;
  }

  function renderArchive(){
    if (entriesCache.length === 0){
      shelf.innerHTML = '';
      archiveEmpty.style.display = 'block';
      return;
    }
    archiveEmpty.style.display = 'none';
    shelf.innerHTML = '';
    entriesCache.forEach((entry, i) => {
      const firstWithText = entry.blocks.find(b => b.text.trim().length > 0) || entry.blocks[0];
      const restText = entry.blocks
        .filter(b => b !== firstWithText)
        .map(b => b.text.trim()).filter(Boolean).join(' ');
      const descText = restText ? firstSentence(restText) : 'No further passages.';
      const passageCount = entry.blocks.filter(b => b.text.trim().length > 0).length;

      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'letter-card';

      const num = document.createElement('div');
      num.className = 'lc-num';
      num.textContent = String(i + 1).padStart(2, '0');

      const arrow = document.createElement('div');
      arrow.className = 'lc-arrow';
      arrow.textContent = '→';

      const body = document.createElement('div');
      body.className = 'lc-body';

      const head = document.createElement('div');
      head.className = 'lc-head';
      const cappedSize = Math.min(firstWithText.size, 42);
      head.style.fontFamily = fontFamilyFor(firstWithText.font);
      head.style.fontWeight = firstWithText.weight;
      head.style.fontStyle = firstWithText.italic ? 'italic' : 'normal';
      head.style.fontSize = cappedSize + 'px';
      head.style.lineHeight = (firstWithText.leading/100);
      const hv = typeof firstWithText.fill === 'number' ? firstWithText.fill : 0;
      head.style.color = 'rgb(' + hv + ',' + hv + ',' + hv + ')';
      head.textContent = firstWithText.text.trim() || '(untitled)';

      const desc = document.createElement('div');
      desc.className = 'lc-desc';
      desc.textContent = descText;

      body.append(head, desc);

      const meta = document.createElement('div');
      meta.className = 'lc-meta';
      const metaType = document.createElement('span');
      metaType.className = 'lc-meta-type';
      metaType.textContent = passageCount + (passageCount === 1 ? ' passage' : ' passages');
      const metaYear = document.createElement('span');
      metaYear.className = 'lc-meta-year';
      metaYear.textContent = fmtDate(entry.createdAt);
      meta.append(metaType, metaYear);

      card.append(num, arrow, body, meta);
      card.addEventListener('click', () => openForEditing(entry));
      shelf.appendChild(card);
    });
  }

  // clicking a letter opens it straight into edit — Print (already in
  // the nav) and Delete work directly against whatever's loaded, since
  // editing an archived letter just loads its real blocks into compose
  function openForEditing(entry){
    blocks = JSON.parse(JSON.stringify(entry.blocks));
    editingEntryId = entry.id;
    renderStack();
    updateSealEnabled();
    showView('compose');
  }

  let deleteConfirming = false;
  btnDelete.addEventListener('click', () => {
    if (!deleteConfirming){
      deleteConfirming = true;
      btnDelete.textContent = 'Confirm delete?';
      btnDelete.classList.add('confirm');
      setTimeout(() => {
        if (deleteConfirming){
          deleteConfirming = false;
          btnDelete.textContent = 'Delete';
          btnDelete.classList.remove('confirm');
        }
      }, 3000);
      return;
    }
    deleteConfirming = false;
    btnDelete.textContent = 'Delete';
    btnDelete.classList.remove('confirm');
    const idx = entriesCache.findIndex(e => e.id === editingEntryId);
    if (idx !== -1){
      persist.tryDelete('entries:' + entriesCache[idx].id);
      entriesCache.splice(idx, 1);
    }
    resetCompose();
    showView('archive');
  });

  // ── "frankly" kinetic wordmark ── adapted from the text-pressure
  // technique: each letter's variable-font weight/width/italic axes
  // respond to distance from the cursor, anywhere on the page. Scaled
  // down to a small corner signature rather than the original's
  // full-bleed black-canvas demo, and reactive to the whole window
  // rather than a fixed-height container.
  (function initFranklyMark(){
    const franklyRoot = document.getElementById('franklyMark');
    if (!franklyRoot) return;

    const h1 = document.createElement('h1');
    franklyRoot.appendChild(h1);

    const franklyChars = 'frankly'.split('');
    const franklySpans = franklyChars.map(ch => {
      const span = document.createElement('span');
      span.dataset.char = ch;
      span.textContent = ch;
      h1.appendChild(span);
      return span;
    });

    const franklyMouse = { x: -9999, y: -9999 };
    const franklyCursor = { x: -9999, y: -9999 };

    function franklyDist(a, b){
      const dx = b.x - a.x, dy = b.y - a.y;
      return Math.sqrt(dx*dx + dy*dy);
    }
    function franklyAttr(distance, maxDist, minVal, maxVal){
      const val = maxVal - Math.abs((maxVal * distance) / maxDist);
      return Math.max(minVal, val + minVal);
    }

    window.addEventListener('mousemove', (e) => { franklyCursor.x = e.clientX; franklyCursor.y = e.clientY; });
    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (t){ franklyCursor.x = t.clientX; franklyCursor.y = t.clientY; }
    }, { passive:true });

    function franklyAnimate(){
      franklyMouse.x += (franklyCursor.x - franklyMouse.x) / 15;
      franklyMouse.y += (franklyCursor.y - franklyMouse.y) / 15;

      const titleRect = h1.getBoundingClientRect();
      const maxDist = Math.max(titleRect.width / 2, 40);

      franklySpans.forEach(span => {
        const rect = span.getBoundingClientRect();
        const center = { x: rect.x + rect.width/2, y: rect.y + rect.height/2 };
        const d = franklyDist(franklyMouse, center);

        const wdth = Math.floor(franklyAttr(d, maxDist, 70, 130));
        const wght = Math.floor(franklyAttr(d, maxDist, 100, 700));
        const ital = franklyAttr(d, maxDist, 0, 1).toFixed(2);

        const settings = "'wght' " + wght + ", 'wdth' " + wdth + ", 'ital' " + ital;
        if (span.style.fontVariationSettings !== settings){
          span.style.fontVariationSettings = settings;
        }
      });

      requestAnimationFrame(franklyAnimate);
    }
    requestAnimationFrame(franklyAnimate);
  })();

  // ── INIT ──
  // Priority for what compose opens with: (1) a genuine in-progress
  // draft — unsaved work always wins; (2) otherwise, the most recently
  // filed letter, so returning to the page continues where you left
  // off rather than greeting you with a blank page or the demo; (3)
  // only a brand-new session with nothing filed yet sees the demo.
  async function initApp(){
    await loadEntriesFromStorage();
    renderArchive();

    const draftRes = await persist.tryGet('draft:current');
    let resumed = false;
    if (draftRes && draftRes.value){
      try{
        const parsed = JSON.parse(draftRes.value);
        // backward-compatible with the older draft shape (a bare array)
        const draftBlocks = Array.isArray(parsed) ? parsed : parsed.blocks;
        const draftEditingId = Array.isArray(parsed) ? null : (parsed.editingEntryId || null);
        if (Array.isArray(draftBlocks) && draftBlocks.length){
          blocks = draftBlocks;
          editingEntryId = draftEditingId;
          resumed = true;
        }
      }catch(e){ /* ignore corrupt draft */ }
    }

    if (!resumed && entriesCache.length){
      const latest = entriesCache[0];
      blocks = JSON.parse(JSON.stringify(latest.blocks));
      editingEntryId = latest.id;
    }

    renderStack();
    updateSealEnabled();
    showView('compose');
  }
  initApp();
})();
</script>
</body>
