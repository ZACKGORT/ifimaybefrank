<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-size='72' text-anchor='middle' font-family='Georgia,serif'%3E%F0%9D%92%BE%3C/text%3E%3C/svg%3E">
<title>Open Letter — weighted writing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Bricolage+Grotesque:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Big+Shoulders+Display:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,100..1000&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --ink:#111111;
  --ink-rgb:17,17,17;
  --rule:#e6e6e4;
  --rule-soft:#f0f0ee;
  --muted:#8a8a86;
  --chrome-font:'Plus Jakarta Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--chrome-font);-webkit-font-smoothing:antialiased}

/* ── MINIMAL CHROME ──
   No bar, no background block — just a small floating mark and a
   quiet cluster of controls, both dimmed until you actually need
   them, so the page reads as a blank canvas rather than an app. */
.brand-mark{
  position:fixed;bottom:22px;left:26px;z-index:60;
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:14px;
  color:var(--muted);opacity:.32;transition:opacity .2s ease;pointer-events:none;
}

/* ── the "frankly" mark — a tiny kinetic wordmark clamped to the
   opposite corner from Open Letter. Each letter's weight/width/italic
   responds to cursor proximity via Roboto Flex's variable axes (the
   text-pressure technique), just scaled way down and recolored for a
   light page instead of the original's full-bleed black canvas. */
.frankly-mark{
  position:fixed;bottom:20px;right:26px;z-index:60;
  pointer-events:none;line-height:1;
}
.frankly-mark h1{
  margin:0;font-family:'Roboto Flex',sans-serif;text-transform:lowercase;
  font-weight:100;font-size:clamp(13px,1.6vw,16px);color:var(--muted);
  white-space:nowrap;letter-spacing:0;
}
.frankly-mark span{display:inline-block}

@media(max-width:640px){
  .frankly-mark{bottom:14px;right:16px}
  .frankly-mark h1{font-size:12px}
}

.chrome{
  position:fixed;top:22px;right:26px;z-index:60;
  display:flex;align-items:center;gap:16px;
  font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
}
.chrome-sep{color:#5a5a57;user-select:none}
.chrome-emdash{text-decoration:none;transition:color .15s;cursor:pointer}
.chrome-emdash:hover{color:var(--ink)}
.chrome-status{color:#5a5a57;letter-spacing:.06em;display:inline-block;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
.chrome-link{
  font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
  background:none;border:none;color:var(--ink);cursor:pointer;padding:2px 0;
  border-bottom:1px solid transparent;transition:border-color .15s,opacity .15s;
}
.chrome-link.active{border-bottom-color:var(--ink)}
.chrome-link:disabled{opacity:.3;cursor:default;pointer-events:none}
.chrome-link.primary{font-weight:600}
.chrome-link.confirm{color:#7A3324;border-bottom-color:#7A3324}

/* ── Write — a single direct action now, no attached menu: clicking
   it always starts a brand-new blank note (see resetCompose() in the
   nav-switching JS below) rather than showing whatever's currently
   loaded. Compose itself doubles as the homepage — it's what the
   page opens on and what Write always returns you to. */

/* ── HUD — a separate floating cluster from the nav above, opposite
   corner, for the compose actions themselves (New/Print/Save/Delete)
   rather than view navigation. The bordered pill gives it a distinct
   "instrument panel" feel instead of reading as more nav links.
   Both this and the nav render at full opacity — a low-opacity resting
   state (as this used to have) blends even pure black text down to
   roughly mid-gray against white, well under WCAG AA's 4.5:1 minimum
   for normal-sized text. "Quiet until needed" now comes from small
   size and restrained color choices instead of transparency, so it
   never trades away legibility to get there. */
.hud{
  position:fixed;top:22px;left:26px;z-index:60;
  display:flex;align-items:center;gap:14px;
  font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
  background:rgba(var(--ink-rgb),.05);border:1px solid var(--rule);border-radius:22px;
  padding:8px 16px;transition:background .2s ease;
}
.hud:hover,.hud:focus-within{background:rgba(var(--ink-rgb),.07)}

/* ── save toast — "Saved" is a one-time confirmation, not an ongoing
   state, so it gets a brief top-center toast rather than sitting in
   the HUD indefinitely. "Saving…" / "Retrying…" / the local-only
   fallback stay in the HUD, since those describe an ongoing condition
   worth having visible the whole time it applies. */
.save-toast{
  position:fixed;top:22px;left:50%;z-index:90;
  transform:translateX(-50%) translateY(-10px);
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease,transform .25s ease;
}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .brand-mark{bottom:14px;left:16px;font-size:12px}
  /* nav moves below the HUD rather than sharing its row — two fixed,
     independently-sized elements racing for the same horizontal band
     will eventually collide no matter how tight the HUD's content is
     trimmed; stacking them removes the collision by construction */
  .hud{top:14px;left:16px;gap:8px;font-size:10px;padding:6px 11px}
  .chrome{top:54px;right:16px;gap:11px;font-size:10px}
  /* "Update & file" / "Seal & file" → just "Update" / "Seal" — the
     worst-case HUD (mid-edit, with Delete showing, saving in
     progress) is otherwise five items fighting for room on a
     320–375px screen; every character here is real width budget */
  .hud-suffix{display:none}
  .chrome-status{max-width:70px}
}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════
   COMPOSE
══════════════════════════════════════════ */
/* top clearance uses max() so a short/narrow window never lets the
   giant headline scroll up under the fixed chrome */
.compose-wrap{max-width:1680px;margin:0 auto;min-height:100vh;padding:max(120px,16vh) 5vw 40vh}
.compose-tagline{
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  margin-bottom:40px;max-width:52ch;
  transition:opacity .3s ease;
}
.compose-tagline.settled{opacity:0}

/* the live page-break preview — purely informational, never blocks
   or asks for acknowledgment, just shows where a printed page would
   currently end */
.page-break-rule{
  display:flex;align-items:center;gap:14px;margin:6px 0;user-select:none;
}
.page-break-rule::before,.page-break-rule::after{
  content:'';flex:1;height:1px;background:repeating-linear-gradient(to right,var(--rule) 0 6px,transparent 6px 11px);
}
.page-break-rule span{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  white-space:nowrap;
}

/* off-screen clone of the stack, rendered at actual printed page
   width, used only to measure how tall each passage would be on
   paper — screen width and print width rarely agree, so the on-screen
   layout can't tell us this on its own */
#printPhantom{
  position:absolute;left:-9999px;top:0;width:6.5in;visibility:hidden;pointer-events:none;
}

.stack{display:flex;flex-direction:column}
.block{padding:28px 0;border-bottom:1px solid var(--rule)}
.block:first-child{padding-top:0}

.block-editable{
  display:block;width:100%;outline:none;
  background:transparent;color:var(--ink);
  min-height:1.2em;text-align:left;
}
.block-editable:empty:before{content:attr(data-placeholder);color:inherit;font-style:italic;white-space:pre-line;opacity:1;transition:opacity .2s ease}
/* once you're actually focused into the block (text-focus), the
   placeholder recedes to a faint hint rather than sitting at full
   ink strength competing with your cursor */
.block.active .block-editable:empty:before{opacity:.28}

/* columns respond to viewport width live — 3-up steps down to 2 on a
   tablet-width window, and everything collapses to a single column
   once the window is phone-width, where multiple columns just aren't
   workable regardless of what the passage is set to */
.block-editable[data-layout="col2"]{column-count:2;column-gap:2.6em}
.block-editable[data-layout="col3"]{column-count:3;column-gap:2.6em}
@media(max-width:899px){
  .block-editable[data-layout="col3"]{column-count:2;column-gap:1.8em}
}
@media(max-width:639px){
  .block-editable[data-layout="col2"],
  .block-editable[data-layout="col3"]{column-count:1;column-gap:normal}
}

/* a 3-up column doesn't fit a 6.5in printed page column comfortably,
   so print (and the hidden measurement phantom that predicts print
   pagination, via this same class) downgrades it to 2 — independent
   of the screen breakpoints above, which key off viewport width, not
   the fixed physical page width */
.print-simulate .block-editable[data-layout="col3"]{column-count:2;column-gap:1.8em}

/* ── PRINT ──
   Fill is a screen-only expressive layer; on paper every passage is
   solid black, full stop. Printing always renders from #printTarget —
   a hidden container populated right before window.print() is called,
   with either the live compose blocks or an archived letter's blocks.
   Routing both through the same hidden target means printing an
   archived letter never touches or disturbs whatever's currently
   being drafted on the Write screen. */
#printTarget{display:none}
@page{ size: letter; margin: 1in; }
@media print{
  body{background:#fff}
  .brand-mark, .chrome, .hud, .frankly-mark, .save-toast, .view, .skip-link{ display:none !important; }
  #printTarget{ display:block !important; }
  #printTarget .block{ border-bottom:none; break-inside:avoid; }
  #printTarget .block-editable, #printTarget .block-editable *{ color:#000 !important; }
  #printTarget .block-editable[data-layout="col3"]{ column-count:2; column-gap:1.8em; }
}

/* ── control row (mirrors the Fort-style spec bar) ──
   Collapsed by default; blooms open only while this block is the
   active one (focus is somewhere inside it), so a page of several
   passages doesn't show every control row at once. Sits above the
   passage (not below), and while open, clamps to the top of the
   viewport as you scroll through a long passage — so it stays
   reachable rather than scrolling out of view with the text. */
.block-controls{
  display:flex;align-items:center;flex-wrap:wrap;gap:22px;
  margin-bottom:0;padding-bottom:0;max-height:0;opacity:0;overflow:hidden;
  transform:translateY(-6px) scaleY(.94);transform-origin:top left;
  pointer-events:none;
  transition:max-height .38s cubic-bezier(.22,1,.36,1), opacity .22s ease,
             transform .3s cubic-bezier(.22,1,.36,1), margin-bottom .3s ease, padding-bottom .3s ease;
}
.block.active .block-controls{
  margin-bottom:22px;padding-bottom:14px;max-height:120px;opacity:1;
  transform:translateY(0) scaleY(1);pointer-events:auto;overflow:visible;
  position:sticky;top:60px;z-index:30;
  background:var(--bg);border-bottom:1px solid var(--rule);
}
.block{transition:border-color .25s ease}
.block.active{border-color:#d5d5d1}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:12.5px;color:var(--muted);white-space:nowrap}

.select-wrap{position:relative;display:inline-flex;align-items:center}
.select-wrap::after{
  content:'⌄';position:absolute;right:-2px;top:50%;transform:translateY(-52%);
  font-size:13px;color:var(--muted);pointer-events:none;
}
.ctrl-select{
  appearance:none;-webkit-appearance:none;background:transparent;border:none;outline:none;
  font-family:var(--chrome-font);font-size:13px;font-weight:600;color:var(--ink);
  padding-right:16px;cursor:pointer;
}

.font-picker{position:relative}
.font-picker-trigger{
  display:flex;align-items:center;gap:9px;background:transparent;
  border:1px solid var(--rule);border-radius:7px;outline:none;
  padding:4px 11px 4px 5px;cursor:pointer;transition:border-color .15s;
}
.font-picker-trigger:hover{border-color:#c7c7c3}
.font-swatch{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:30px;height:26px;font-size:15px;line-height:1;
  color:var(--ink);background:var(--rule-soft);border-radius:5px;padding:0 4px;
}
.font-picker-label{font-family:var(--chrome-font);font-size:13px;font-weight:600;color:var(--ink)}
.font-picker-trigger .dd-chevron{font-size:11px;color:var(--muted)}

/* the panel itself: a small foundry-style specimen board — every
   typeface previewed live, in both a regular and a heavy weight, so
   you're choosing by how it looks rather than by its name alone */
.font-picker-panel{
  position:absolute;top:calc(100% + 10px);left:0;z-index:70;
  width:min(420px, calc(100vw - 60px));max-height:60vh;overflow-y:auto;
  background:#fff;border:1px solid var(--rule);border-radius:12px;
  box-shadow:0 16px 40px rgba(0,0,0,.13);
  padding:8px;display:none;flex-direction:column;gap:2px;
}
.font-picker-panel.open{display:flex}
.font-picker-card{
  display:block;width:100%;text-align:left;background:transparent;border:none;
  padding:14px 16px;border-radius:8px;cursor:pointer;transition:background .12s;
}
.font-picker-card:hover{background:var(--rule-soft)}
.font-picker-card.selected{background:var(--ink)}
.font-picker-card.selected .fp-name,
.font-picker-card.selected .fp-sample{color:#fff}
.fp-name{
  font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;
}
.fp-sample{font-size:19px;line-height:1.3;color:var(--ink);word-break:break-word}
.fp-sample + .fp-sample{margin-top:2px}

.italic-toggle{
  font-family:'Fraunces',serif;font-style:italic;font-size:13px;font-weight:600;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--rule);border-radius:4px;cursor:pointer;color:var(--muted);
}
.italic-toggle.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.range-track{position:relative;width:110px;height:16px;display:flex;align-items:center}
.range-track input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:16px;background:transparent;margin:0;cursor:pointer;
}
.range-track input[type=range]::-webkit-slider-runnable-track{height:1px;background:var(--rule)}
.range-track input[type=range]::-moz-range-track{height:1px;background:var(--rule)}
.range-track input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:#fff;border:1.5px solid var(--ink);margin-top:-6px;
}
.range-track input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;background:#fff;border:1.5px solid var(--ink);
}
.ctrl-value{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:34px}
.fill-swatch{width:11px;height:11px;border-radius:50%;border:1px solid var(--rule);flex:none;display:inline-block}

.list-group{display:flex;gap:3px;margin-left:auto}
.list-btn{
  width:26px;height:24px;display:flex;align-items:center;justify-content:center;
  font-family:var(--chrome-font);font-size:13px;font-weight:600;color:var(--muted);
  background:transparent;border:1px solid var(--rule);border-radius:5px;cursor:pointer;
  transition:color .15s,border-color .15s,background .15s;
}
.list-btn:hover{border-color:#c7c7c3}
.list-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.layout-group{display:flex;gap:6px}
.layout-btn.locked{opacity:.25;pointer-events:none}
.layout-btn{background:transparent;border:none;cursor:pointer;padding:4px;color:var(--rule)}
.layout-btn.active{color:var(--ink)}
.layout-icon{width:19px;height:14px;border:1.4px solid currentColor;border-radius:2px;display:flex}
.layout-icon span{flex:1}
.layout-icon span:not(:last-child){border-right:1.4px solid currentColor}

.block-remove{
  font-family:var(--chrome-font);font-size:16px;color:var(--muted);background:transparent;border:none;
  cursor:pointer;line-height:1;padding:2px 4px;margin-left:6px;
}
.block-remove:hover{color:var(--ink)}

.add-block-row{margin-top:8px}
.add-block-btn{
  font-family:var(--chrome-font);font-size:14px;font-weight:600;color:var(--muted);
  background:transparent;border:1px dashed var(--rule);border-radius:6px;
  padding:14px 20px;width:100%;text-align:left;cursor:pointer;transition:color .15s,border-color .15s;
}
.add-block-btn:hover{color:var(--ink);border-color:#c7c7c3}

@media(max-width:640px){
  .compose-wrap{padding:max(90px,12vh) 18px 200px}
  .block-controls{gap:14px}
  .range-track{width:88px}
  .layout-group{margin-left:0;order:99}
}

/* ══════════════════════════════════════════
   ARCHIVE
══════════════════════════════════════════ */
.archive-wrap{max-width:1280px;margin:0 auto;padding:56px 32px 100px}
.archive-head-row{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:40px}
.archive-title{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin-bottom:6px}
.archive-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

.view-toggle{display:flex;gap:6px;flex:none}
.view-toggle-btn{
  width:30px;height:26px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--rule);border-radius:6px;color:var(--muted);cursor:pointer;
  transition:color .15s,border-color .15s,background .15s;
}
.view-toggle-btn:hover{border-color:#c7c7c3}
.view-toggle-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.archive-empty{border:1px dashed var(--rule);padding:60px 24px;text-align:center;color:var(--muted);font-size:15px}

/* ── shared card internals (grid + list both use these) ── */
.letter-card{
  background:transparent;cursor:pointer;text-align:left;border:none;width:100%;
  font:inherit;color:inherit;position:relative;transition:background .18s;
}
.letter-card:hover{background:rgba(var(--ink-rgb),.03)}
.lc-num{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);font-variant-numeric:tabular-nums}
.lc-arrow{font-size:14px;color:var(--muted);transition:color .15s,transform .15s}
.letter-card:hover .lc-arrow{color:var(--ink);transform:translateX(3px)}
.lc-head{
  color:var(--ink);line-height:1.08;word-break:break-word;
  overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;
}
.lc-desc{font-size:13px;font-weight:400;line-height:1.5;color:var(--muted);overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical}
.lc-meta-type{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.lc-meta-year{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--muted)}

/* ── GRID (default) — numbered tiles, 4-up, matching the reference:
   number + corner arrow at top, headline + description filling the
   middle, a ruled meta row pinned to the bottom of every tile ── */
.shelf{display:grid;grid-template-columns:repeat(4,1fr);border-left:1px solid var(--rule)}
.shelf .letter-card{
  display:flex;flex-direction:column;justify-content:space-between;
  padding:20px 20px 18px;min-height:220px;
  border-top:1px solid var(--rule);border-right:1px solid var(--rule);
}
.shelf .letter-card:nth-last-child(-n+4){border-bottom:1px solid var(--rule)}
.shelf .lc-num{margin-bottom:12px}
.shelf .lc-arrow{position:absolute;top:16px;right:16px}
.shelf .lc-body{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0}
.shelf .lc-head{-webkit-line-clamp:6;font-size:clamp(15px,1.6vw,22px) !important}
.shelf .lc-desc{-webkit-line-clamp:3;margin-top:auto;padding-top:12px}
.shelf .lc-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);
}
@media(max-width:900px){
  .shelf{grid-template-columns:repeat(2,1fr)}
  .shelf .letter-card:nth-last-child(-n+4){border-bottom:none}
  .shelf .letter-card:nth-last-child(-n+2){border-bottom:1px solid var(--rule)}
}

/* ── LIST — full-width rows: num | headline+description | meta | arrow,
   matching the base (non-grid) work-row column layout ── */
.shelf.list-mode{display:block;border-left:none}
.shelf.list-mode .letter-card{
  display:grid;grid-template-columns:36px minmax(0,1fr) auto auto;align-items:center;gap:20px;
  padding:26px 20px;min-height:0;border-top:1px solid var(--rule);border-right:none;
}
.shelf.list-mode .letter-card:first-child{border-top:none}
.shelf.list-mode .letter-card:nth-last-child(-n+4){border-bottom:none}
.shelf.list-mode .lc-num{align-self:start;padding-top:4px}
.shelf.list-mode .lc-body{display:flex;flex-direction:column;gap:8px;min-width:0}
.shelf.list-mode .lc-head{-webkit-line-clamp:2;font-size:clamp(18px,2.2vw,28px) !important;margin-bottom:0}
.shelf.list-mode .lc-desc{-webkit-line-clamp:2;margin-top:0;padding-top:0}
.shelf.list-mode .lc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:0;padding-top:0;border-top:none}
.shelf.list-mode .lc-arrow{position:static;margin-left:4px}

@media(max-width:640px){
  .shelf.list-mode .letter-card{grid-template-columns:28px 1fr auto;padding:18px 16px}
  .shelf.list-mode .lc-meta{display:none}
}

.skip-link{position:fixed;top:-100px;left:12px;z-index:999;background:var(--ink);color:#fff;padding:10px 16px;font-size:13px;text-decoration:none;transition:top .15s}
.skip-link:focus-visible{top:12px}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
/* the writing surface itself opts back out — the passage border
   already shifts to signal focus (see .block.active), so a second,
   heavier keyboard-focus ring around the text just boxes in the
   words you're trying to write */
.block-editable:focus-visible{outline:none}
</style>
</head>
<body>

<a class="skip-link" href="#blockStack">Skip to writing surface</a>

<div class="brand-mark">Open Letter</div>
<div class="frankly-mark" id="franklyMark"></div>
<nav class="chrome" aria-label="Navigation">
  <button class="chrome-link active" data-view="compose" id="navWrite">Write</button>
  <a class="chrome-sep chrome-emdash" href="https://emdash.click" target="_blank" rel="noopener" title="emdash.click">—</a>
  <button class="chrome-link" data-view="archive">Archive</button>
</nav>

<div class="hud" id="composeHud" aria-label="Writing actions">
  <span class="chrome-status" id="saveStatus"></span>
  <button class="chrome-link" id="btnPrint">Print</button>
  <button class="chrome-link" id="btnDelete" style="display:none">Delete</button>
  <button class="chrome-link primary" id="btnSeal" disabled><span id="btnSealMain">Seal</span><span class="hud-suffix"> &amp; file</span></button>
</div>

<div class="save-toast" id="saveToast" role="status" aria-live="polite"></div>

<!-- ══════════════════ COMPOSE ══════════════════ -->
<main class="view active" id="view-compose">
  <div class="compose-wrap">
    <p class="compose-tagline" id="composeTagline">Give each passage the weight it deserves — set its size, spacing, rhythm, and fill as you write it.</p>
    <div class="stack" id="blockStack"></div>
    <div class="add-block-row">
      <button class="add-block-btn" id="addBlockBtn">+ Start a new passage, with its own weight</button>
    </div>
  </div>
  <div id="printPhantom" aria-hidden="true"></div>
</main>

<!-- ══════════════════ ARCHIVE ══════════════════ -->
<section class="view" id="view-archive">
  <div class="archive-wrap">
    <div class="archive-head-row">
      <div>
        <div class="archive-title">The archive</div>
        <div class="archive-sub">Every letter, filed as it was weighted</div>
      </div>
      <div class="view-toggle" role="group" aria-label="Archive view">
        <button class="view-toggle-btn" id="btnListView" aria-label="List view" title="List view">
          <svg viewBox="0 0 14 10" width="14" height="10" fill="currentColor"><rect x="0" y="0" width="14" height="1.4"/><rect x="0" y="4.3" width="14" height="1.4"/><rect x="0" y="8.6" width="14" height="1.4"/></svg>
        </button>
        <button class="view-toggle-btn active" id="btnGridView" aria-label="Grid view" title="Grid view">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="currentColor"><rect x="0" y="0" width="5" height="5"/><rect x="7" y="0" width="5" height="5"/><rect x="0" y="7" width="5" height="5"/><rect x="7" y="7" width="5" height="5"/></svg>
        </button>
      </div>
    </div>
    <div class="archive-empty" id="archiveEmpty" style="display:none">No letters filed yet. Whatever you write first will start the shelf.</div>
    <div class="shelf" id="shelf"></div>
  </div>
</section>

<!-- hidden print source — populated right before window.print() with
     either the live draft or an archived letter, so printing never
     touches whichever one you weren't printing -->
<div id="printTarget" aria-hidden="true"></div>

<script>

(function(){
  'use strict';

  const FONTS = [
    { id:'jakarta',    label:'Jakarta Sans',   family:"'Plus Jakarta Sans', sans-serif" },
    { id:'fraunces',   label:'Fraunces',       family:"'Fraunces', serif" },
    { id:'grotesk',    label:'Space Grotesk',  family:"'Space Grotesk', sans-serif" },
    { id:'bricolage',  label:'Bricolage',      family:"'Bricolage Grotesque', sans-serif" },
    { id:'newsreader', label:'Newsreader',     family:"'Newsreader', serif" },
    { id:'shoulders',  label:'Big Shoulders',  family:"'Big Shoulders Display', sans-serif" },
    { id:'mono',       label:'Plex Mono',      family:"'IBM Plex Mono', monospace" }
  ];
  const WEIGHTS = [
    { v:200, label:'Thin' },
    { v:300, label:'Light' },
    { v:400, label:'Regular' },
    { v:500, label:'Medium' },
    { v:600, label:'Semibold' },
    { v:700, label:'Bold' },
    { v:800, label:'Black' }
  ];

  // Baseline is bold/black text throughout — hierarchy for now comes from
  // a monochrome fill (black through gray) rather than from dialing
  // weight down, so nothing defaults to Thin or Regular.
  function defaultBlock(overrides){
    return Object.assign({
      text:'', font:'jakarta', weight:700, italic:false,
      size:20, tracking:0, leading:130, fill:0, layout:'single', list:'none'
    }, overrides || {});
  }
  function openingBlock(){
    // the first passage of a fresh letter starts heaviest and largest —
    // the writer's opening thought gets top billing until they decide
    // otherwise.
    return defaultBlock({ weight:800, size:84, leading:100 });
  }

  function demoBlocks(){
    // a working demo, structured like the original specimen example:
    // a bold headline, a quieter explainer, a black sub-heading, a
    // bold-italic instruction, then body copy — hierarchy carried by
    // fill (ink darkness) rather than by lightening the weight.
    return [
      { text:'Every passage carries its own weight.', font:'jakarta', weight:800, italic:false, size:92, tracking:-12, leading:98, fill:0, layout:'single', list:'none' },
      { text:'Which stands to reason — whatever a thought is carrying, the words holding it should bear a comparable load.', font:'fraunces', weight:700, italic:false, size:34, tracking:0, leading:130, fill:95, layout:'col2', list:'none' },
      { text:'Now, try adjusting one:', font:'jakarta', weight:800, italic:false, size:62, tracking:-6, leading:104, fill:0, layout:'single', list:'none' },
      { text:'As you write, you can tune the size, spacing, rhythm, fill, columns, and list style of this particular passage.', font:'bricolage', weight:700, italic:true, size:38, tracking:0, leading:128, fill:35, layout:'single', list:'none' },
      { text:'• Set it small, set it faint, and let it hold the room until you are ready to bring it forward.\n• Or let it take the whole page the moment it arrives.\n• Either way, it is still carrying real weight.', font:'jakarta', weight:700, italic:false, size:19, tracking:0, leading:150, fill:110, layout:'single', list:'bullet' }
    ];
  }

  let blocks = demoBlocks();

  // ── THE FULL DEMO LETTER ──────────────────────────────────────────────
  // Seeded into the archive (once, on first run) so there's something
  // substantial to open in the new full-view overlay. It's written to
  // describe, in order, every control this tool has — each passage
  // demonstrates the thing it's talking about.
  function fullDemoBlocks(){
    return [
      { text:'This letter is its own instruction manual.', font:'jakarta', weight:800, italic:false, size:80, tracking:-14, leading:98, fill:0, layout:'single', list:'none' },
      { text:'Every passage below demonstrates one thing this page can do, while telling you what that thing is. Read it as an explanation. Read it as a specimen. It is meant to be both at once.', font:'fraunces', weight:600, italic:false, size:26, tracking:0, leading:145, fill:70, layout:'single', list:'none' },

      { text:'Seven typefaces live here. This passage is set in Jakarta Sans — geometric, even-tempered, built to carry an ordinary sentence without asking to be noticed.', font:'jakarta', weight:600, italic:false, size:28, tracking:0, leading:140, fill:10, layout:'single', list:'none' },
      { text:'This one is Fraunces — a serif with a little swagger in its curves, better suited to a sentence that wants to be noticed.', font:'fraunces', weight:600, italic:false, size:28, tracking:0, leading:140, fill:10, layout:'single', list:'none' },
      { text:'Space Grotesk sits here — a grotesk with slightly eccentric proportions, at home in something more technical than literary.', font:'grotesk', weight:500, italic:false, size:28, tracking:0, leading:140, fill:10, layout:'single', list:'none' },
      { text:'Bricolage Grotesque, leaning italic — a newer face, a little unruly, built for a voice that has not entirely settled on how formal it wants to be.', font:'bricolage', weight:600, italic:true, size:28, tracking:0, leading:140, fill:10, layout:'single', list:'none' },
      { text:'Newsreader, doing exactly what its name suggests — long-form, undemonstrative, meant to be read for a while rather than glanced at.', font:'newsreader', weight:500, italic:false, size:28, tracking:0, leading:140, fill:10, layout:'single', list:'none' },
      { text:'Big Shoulders Display — condensed, upright, built for a headline that needs to fit into a column narrower than it would like.', font:'shoulders', weight:700, italic:false, size:30, tracking:0, leading:120, fill:10, layout:'single', list:'none' },
      { text:'And Plex Mono, for the one line that wants to look like it was typed on a machine, not written by a hand.', font:'mono', weight:500, italic:false, size:22, tracking:0, leading:140, fill:10, layout:'single', list:'none' },

      { text:'At two hundred, weight nearly disappears — a whisper of a thought, easy to skim past, which is sometimes exactly the point.', font:'jakarta', weight:200, italic:false, size:36, tracking:0, leading:130, fill:0, layout:'single', list:'none' },
      { text:'At eight hundred, the same kind of sentence refuses to be skimmed.', font:'jakarta', weight:800, italic:false, size:36, tracking:0, leading:110, fill:0, layout:'single', list:'none' },
      { text:'Tilt it, and nothing else has to change — italic alone is enough to make a sentence read like an aside, a second voice stepping in for a moment.', font:'fraunces', weight:500, italic:true, size:27, tracking:0, leading:145, fill:15, layout:'single', list:'none' },

      { text:'Spaced out like this, even an ordinary word starts to feel like it belongs on a sign rather than a page.', font:'jakarta', weight:600, italic:false, size:24, tracking:90, leading:150, fill:5, layout:'single', list:'none' },
      { text:'Pulled in tight, letters start to lean on each other, until the gaps between them nearly close up.', font:'jakarta', weight:600, italic:false, size:24, tracking:-28, leading:150, fill:5, layout:'single', list:'none' },

      { text:'Give a paragraph room to breathe between its own lines, and it starts to feel unhurried — like it has nowhere else it needs to be.', font:'newsreader', weight:400, italic:false, size:22, tracking:0, leading:185, fill:20, layout:'single', list:'none' },
      { text:'Pull that same space back down, and the lines start to press against each other — urgent, almost impatient to reach the next one.', font:'newsreader', weight:400, italic:false, size:22, tracking:0, leading:98, fill:20, layout:'single', list:'none' },

      { text:'Some things need to be enormous.', font:'jakarta', weight:800, italic:false, size:118, tracking:-14, leading:100, fill:0, layout:'single', list:'none' },
      { text:'and some things only need to be noted, quietly, in passing.', font:'jakarta', weight:600, italic:false, size:14, tracking:0, leading:150, fill:60, layout:'single', list:'none' },

      { text:'In black, a sentence carries its full authority.', font:'jakarta', weight:700, italic:false, size:26, tracking:0, leading:140, fill:0, layout:'single', list:'none' },
      { text:'Fade it partway to gray, and it starts to feel like a second thought — present, but no longer insisting on itself.', font:'jakarta', weight:700, italic:false, size:26, tracking:0, leading:140, fill:110, layout:'single', list:'none' },
      { text:'Fade it further still and it all but recedes into the page — though only here, on screen. Printed, every one of these lines returns to solid black, because paper does not deal in gradients of confidence.', font:'jakarta', weight:700, italic:false, size:26, tracking:0, leading:140, fill:175, layout:'single', list:'none' },

      { text:'Set two thoughts side by side instead of one after another, and a reader\u2019s eye starts moving down instead of just across — the way a newspaper, or a type specimen sheet, has always asked to be read: in short vertical measures, rather than one long line stretching the width of everything in front of it. It changes the pace of reading almost as much as it changes the shape of the page.', font:'fraunces', weight:500, italic:false, size:19, tracking:0, leading:150, fill:30, layout:'col2', list:'none' },
      { text:'Add a third column and the measure gets shorter still — good for a dense passage that would otherwise stretch too wide to read comfortably, less good the moment a sentence runs long enough to need room to turn around. Like most of the choices on this page, three columns is not automatically correct; it is just available, the way a font or a weight is available, waiting on a passage that actually needs it rather than one that merely tolerates it.', font:'jakarta', weight:500, italic:false, size:17, tracking:0, leading:148, fill:40, layout:'col3', list:'none' },

      { text:'\u2022 A bulleted list cancels its own column setting on the spot — a list item split across two columns stops being one item.\n\u2022 Turning a list on reformats whatever text is already there; turning it back off cleans the markers out again.\n\u2022 Pressing Enter mid-list keeps the pattern going without being asked twice.', font:'jakarta', weight:700, italic:false, size:20, tracking:0, leading:155, fill:15, layout:'single', list:'bullet' },
      { text:'1. A typeface chooses the letterforms.\n2. Weight and italic choose how firmly they are said.\n3. Size, tracking, and leading choose how much room they take up.\n4. Fill chooses how loud they are — on screen only.\n5. Layout and list style choose the shape the paragraph takes on the page.', font:'jakarta', weight:700, italic:false, size:20, tracking:0, leading:155, fill:15, layout:'single', list:'number' },

      { text:'Every one of those is still just a sentence, waiting to be written.', font:'jakarta', weight:800, italic:false, size:70, tracking:-10, leading:102, fill:0, layout:'single', list:'none' }
    ];
  }

  function odysseyDemoBlocks(){
    // an actual piece written in the tool during testing — kept as a
    // real example of the weight controls doing rhetorical work rather
    // than just demonstrating themselves
    return [
      { text:"I have an opinion on Nolan's 'The Odyssey'.", font:'jakarta', weight:800, italic:false, size:86, tracking:-12, leading:100, fill:0, layout:'single', list:'none' },
      { text:'& to preface this: I have no comment regarding the casting, the set pieces, the dialogue, or the overwhelming underutilization of bespoke imax technology in capturing the essence of the mediterranean.', font:'jakarta', weight:800, italic:false, size:40, tracking:-6, leading:108, fill:0, layout:'single', list:'none' },
      { text:"humbly, I offer just one change from Homer's original poem that would improve upon what Nolan was already setting the audience up for.", font:'fraunces', weight:600, italic:true, size:26, tracking:0, leading:145, fill:20, layout:'single', list:'none' },
      { text:"Instead of 11 ships getting destroyed at the beginning, let most of the ships survive before they meet Polyphemus.   Cut time given to final fight and give that to Polyphemus / Cerci /  / Laestrygonians (the cannibal giants)", font:'mono', weight:500, italic:false, size:13, tracking:0, leading:155, fill:90, layout:'single', list:'none' },
      { text:'Imagine, you as Odysseus now have ~1000 men to guide home. Real responsibility, real stakes at scale.', font:'newsreader', weight:500, italic:false, size:54, tracking:0, leading:112, fill:0, layout:'single', list:'none' },
      { text:'The encounter with Polyphemus could adapt Homer\'s original layout to show something visually more impressive.  More men.  More ships. More stakes. Adapt the encounter with Polyphemus such that logically, it stands to reason that discovering a trove of food from a giant would be sufficient to feed the 1000 soldiers.  Give screentime to creative liberty in how the protagonist and his men cleverly enjoy success before a critical failure causes the giant to become a threat (same logistical workings as the horse out of sand introduction). Perhaps here, we lose a just one or two boats.', font:'jakarta', weight:400, italic:false, size:15, tracking:0, leading:158, fill:75, layout:'single', list:'none' },
      { text:"Or, imagine your are Cerci, and you adjust the story so that Odysseus' nine remaining boats are nine boats-worth of mouths to feed.", font:'newsreader', weight:500, italic:false, size:22, tracking:0, leading:145, fill:55, layout:'single', list:'none' },
      { text:'Or Scylia takes out six ships, not just six men.', font:'jakarta', weight:800, italic:false, size:22, tracking:0, leading:130, fill:0, layout:'single', list:'none' },
      { text:'Or, since the Laestrygonians decided to show up in their Sunday best (you know, the cannibal giants Homer wrote about; with Nolan\'s shiny new armor), well we can now have an actual battle, with real loss through terror and trajedy, rather than just Monthy Pythoning it "run away!"', font:'newsreader', weight:700, italic:false, size:24, tracking:0, leading:140, fill:0, layout:'single', list:'none' },
      { text:'Then, Matt Damon yells "Let\'s go!" as the camera pans with him, but revealing that he\'s now running alone in an super high resolution foggy field shot exclusively on IMAX.', font:'jakarta', weight:800, italic:false, size:24, tracking:0, leading:130, fill:0, layout:'single', list:'none' },
      { text:"Also, the audience get's some better rewatch material.", font:'mono', weight:600, italic:false, size:15, tracking:0, leading:140, fill:40, layout:'single', list:'none' }
    ];
  }

  const blockStack   = document.getElementById('blockStack');
  const printPhantom = document.getElementById('printPhantom');
  const btnPrint     = document.getElementById('btnPrint');
  const btnDelete    = document.getElementById('btnDelete');
  const addBlockBtn  = document.getElementById('addBlockBtn');
  const btnSeal      = document.getElementById('btnSeal');
  const btnSealMain  = document.getElementById('btnSealMain');
  const navWrite     = document.getElementById('navWrite');
  const tabs         = document.querySelectorAll('.chrome-link[data-view]');
  const viewCompose  = document.getElementById('view-compose');
  const viewArchive  = document.getElementById('view-archive');
  const shelf        = document.getElementById('shelf');
  const archiveEmpty = document.getElementById('archiveEmpty');
  const saveStatusEl = document.getElementById('saveStatus');
  const composeHud   = document.getElementById('composeHud');
  const composeTagline = document.getElementById('composeTagline');
  const btnListView  = document.getElementById('btnListView');
  const btnGridView  = document.getElementById('btnGridView');
  const printTarget  = document.getElementById('printTarget');

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fontFamilyFor(id){
    const f = FONTS.find(x => x.id === id);
    return f ? f.family : FONTS[0].family;
  }

  // shared by the font and weight specimen panels: preview cards show
  // whatever the passage actually says (truncated), not a fixed sample
  const PREVIEW_CHAR_LIMIT = 60;
  function previewTextFor(el){
    const raw = (el.textContent || '').trim();
    return raw.length
      ? (raw.length > PREVIEW_CHAR_LIMIT ? raw.slice(0, PREVIEW_CHAR_LIMIT).trim() + '…' : raw)
      : 'Aa Bb Cc — the weight of it';
  }

  function applyStyle(el, b){
    el.style.fontFamily     = fontFamilyFor(b.font);
    el.style.fontWeight     = b.weight;
    el.style.fontStyle      = b.italic ? 'italic' : 'normal';
    el.style.fontSize       = b.size + 'px';
    el.style.letterSpacing  = (b.tracking/1000) + 'em';
    el.style.lineHeight     = (b.leading/100);
    // column count itself is decided by CSS media queries (see
    // .block-editable[data-layout=...] rules) rather than a fixed
    // inline style, so a 3-column passage automatically steps down to
    // 2 on a tablet-width window and to 1 on a phone-width one — live,
    // as the window is resized, not just on initial load.
    el.dataset.layout = b.layout || 'single';
    const v = typeof b.fill === 'number' ? b.fill : 0;
    el.style.color = 'rgb(' + v + ',' + v + ',' + v + ')';
  }

  // strips any existing bullet/number markers from each line, then
  // reapplies the requested list type — so toggling a passage into a
  // list retroactively formats whatever's already written, and
  // toggling it off cleanly reverts to plain paragraphs
  function applyListTransform(currentText, newListType){
    const lines = currentText.split('\n');
    const stripped = lines.map(line => line.replace(/^\s*(?:[•\u2022]\s+|\d+\.\s+)/, ''));
    if (newListType === 'bullet'){
      return stripped.map(line => line.length ? ('• ' + line) : line).join('\n');
    }
    if (newListType === 'number'){
      let n = 1;
      return stripped.map(line => {
        if (!line.length) return line;
        const marker = n + '. ';
        n++;
        return marker + line;
      }).join('\n');
    }
    return stripped.join('\n');
  }

  function nextListMarker(text, listType){
    if (listType === 'bullet') return '• ';
    if (listType === 'number'){
      const matches = [...text.matchAll(/^\s*(\d+)\.\s/gm)].map(m => parseInt(m[1],10));
      const max = matches.length ? Math.max(...matches) : 0;
      return (max + 1) + '. ';
    }
    return '';
  }

  function updateSealEnabled(){
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    btnSeal.disabled = !hasContent;
    // the instructional tagline recedes once real writing is underway —
    // it's onboarding, not a persistent piece of chrome
    composeTagline.classList.toggle('settled', hasContent);
  }

  // ── LIVE PAGE-BREAK PREVIEW ──────────────────────────────────────────
  // The on-screen canvas can be almost any width, but a printed page is
  // a fixed physical size — the same text wraps to a completely
  // different height on paper than it does on screen. So we can't read
  // "where page 1 ends" off the visible layout at all; instead we
  // render an identical, hidden copy of the stack at the real printed
  // content width (US Letter, 1in margins → 6.5in × 9in usable) and
  // measure it there. Only block-level precision is needed — which
  // passage a break falls after — not pixel precision, so the rule
  // itself is drawn between the real, visible blocks, not on the
  // phantom (a very long single passage can still overflow a page on
  // its own; the browser's real print pagination handles that
  // correctly regardless of what this preview estimates). The same
  // measurement also groups a letter's blocks into actual pages, which
  // is what the archive's full-view overlay renders.
  const PAGE_HEIGHT_PX = 9 * 96; // 9in usable height at CSS's fixed 96px/in

  function paginateBlocks(blocksArr){
    printPhantom.innerHTML = '';
    let cumulative = 0;
    const pages = [[]];
    blocksArr.forEach(b => {
      const wrapper = document.createElement('div');
      wrapper.className = 'block';
      const clone = document.createElement('div');
      clone.className = 'block-editable';
      clone.textContent = b.text.trim().length ? b.text : ' ';
      applyStyle(clone, b);
      wrapper.appendChild(clone);
      printPhantom.appendChild(wrapper);
      const h = wrapper.offsetHeight;
      if (cumulative > 0 && cumulative + h > PAGE_HEIGHT_PX){
        pages.push([b]);
        cumulative = h;
      } else {
        pages[pages.length - 1].push(b);
        cumulative += h;
      }
    });
    return pages;
  }

  function measurePageBreaks(){
    const pages = paginateBlocks(blocks);
    const breaksAfterIndex = [];
    let running = -1;
    pages.forEach((page, pi) => {
      running += page.length;
      if (pi < pages.length - 1) breaksAfterIndex.push(running);
    });
    return breaksAfterIndex;
  }

  function renderPageBreakIndicators(breaksAfterIndex){
    blockStack.querySelectorAll(':scope > .page-break-rule').forEach(el => el.remove());
    const blockEls = blockStack.querySelectorAll(':scope > .block');
    breaksAfterIndex.forEach((idx, n) => {
      if (!blockEls[idx]) return;
      const rule = document.createElement('div');
      rule.className = 'page-break-rule';
      const label = document.createElement('span');
      label.textContent = 'Page ' + (n + 2);
      rule.appendChild(label);
      blockEls[idx].insertAdjacentElement('afterend', rule);
    });
  }

  let pageBreakTimer = null;
  function schedulePageBreakUpdate(){
    clearTimeout(pageBreakTimer);
    pageBreakTimer = setTimeout(() => {
      renderPageBreakIndicators(measurePageBreaks());
    }, 200);
  }

  // ── PRINT ── always routes through the hidden #printTarget, whether
  // it's the live draft (nav Print button) or an archived letter (the
  // overlay's Print action) — the live compose state is never touched
  // by printing something else.
  function buildPrintable(blocksArr){
    printTarget.innerHTML = '';
    blocksArr.forEach(b => {
      const wrapper = document.createElement('div');
      wrapper.className = 'block';
      const el = document.createElement('div');
      el.className = 'block-editable';
      el.textContent = b.text;
      applyStyle(el, b);
      wrapper.appendChild(el);
      printTarget.appendChild(wrapper);
    });
  }
  function printBlocks(blocksArr){
    buildPrintable(blocksArr);
    window.print();
  }

  function renderStack(){
    blockStack.innerHTML = '';
    blocks.forEach((b, i) => {
      const block = document.createElement('div');
      block.className = 'block';

      // a contenteditable div rather than a textarea — this is what
      // lets a passage actually render in real CSS columns (multi-
      // column text flow) instead of just wrapping in one long box.
      // Enter is handled manually, inserting a literal '\n' (and a
      // list marker when the passage is a bulleted/numbered list) so
      // the content stays a single plain-text node, not a nest of
      // browser-inserted <div>/<br> elements.
      const textarea = document.createElement('div');
      textarea.className = 'block-editable';
      textarea.contentEditable = 'true';
      textarea.spellcheck = true;
      textarea.dataset.placeholder = i === 0 ? 'shape your intent.' : 'Keep going — a new weight for a new turn…';
      textarea.textContent = b.text;
      textarea.style.whiteSpace = 'pre-wrap';
      applyStyle(textarea, b);
      textarea.addEventListener('input', () => {
        // contenteditable can leave a stray empty text node or <br>
        // behind after backspacing everything out, which is enough to
        // make :empty stop matching — normalize so the placeholder
        // reliably reappears the moment a passage is genuinely blank
        if (textarea.textContent.trim() === '' && textarea.childNodes.length > 0){
          textarea.textContent = '';
        }
        b.text = textarea.textContent;
        updateSealEnabled();
        saveDraft();
      });
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter'){
          e.preventDefault();
          const marker = nextListMarker(textarea.textContent, b.list);
          document.execCommand('insertText', false, '\n' + marker);
        } else if (e.key === 'Escape'){
          textarea.blur();
        }
      });

      // control row
      const controls = document.createElement('div');
      controls.className = 'block-controls';

      // font picker — a small foundry-style specimen panel rather than
      // a text dropdown: each face previews live, in two weights, so
      // you pick by how it looks. (Uses an 'open' class rather than the
      // hidden attribute — an unconditional `display:flex` in this same
      // stylesheet would otherwise outrank `[hidden]`'s display:none,
      // which is exactly why the old dropdown never actually closed.)
      const fontWrap = document.createElement('div');
      fontWrap.className = 'ctrl font-picker';

      const fontTrigger = document.createElement('button');
      fontTrigger.type = 'button';
      fontTrigger.className = 'font-picker-trigger';
      fontTrigger.title = 'Change typeface';
      const swatch = document.createElement('span');
      swatch.className = 'font-swatch';
      swatch.textContent = 'Aa';
      const fontLabel = document.createElement('span');
      fontLabel.className = 'font-picker-label';
      fontLabel.textContent = FONTS.find(f => f.id === b.font).label;
      const fontChevron = document.createElement('span');
      fontChevron.className = 'dd-chevron';
      fontChevron.textContent = '⌄';
      fontTrigger.append(swatch, fontLabel, fontChevron);

      function refreshSwatch(){
        swatch.style.fontFamily = fontFamilyFor(b.font);
        swatch.style.fontWeight = 700;
      }
      refreshSwatch();

      const fontPanel = document.createElement('div');
      fontPanel.className = 'font-picker-panel';
      const panelSamples = [];
      FONTS.forEach(f => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'font-picker-card' + (f.id === b.font ? ' selected' : '');

        const name = document.createElement('div');
        name.className = 'fp-name';
        name.textContent = f.label;

        // color comes only from the .fp-sample / .selected CSS rules,
        // never from the passage's own fill value — the specimen
        // preview always renders at a standard, fixed tone, since fill
        // (grayscale visual weight) is a separate, independent control
        const sampleRegular = document.createElement('div');
        sampleRegular.className = 'fp-sample';
        sampleRegular.style.fontFamily = f.family;
        sampleRegular.style.fontWeight = 400;

        const sampleBlack = document.createElement('div');
        sampleBlack.className = 'fp-sample';
        sampleBlack.style.fontFamily = f.family;
        sampleBlack.style.fontWeight = 800;

        panelSamples.push(sampleRegular, sampleBlack);

        card.append(name, sampleRegular, sampleBlack);
        card.addEventListener('click', () => {
          b.font = f.id;
          fontLabel.textContent = f.label;
          refreshSwatch();
          refreshWeightSwatch();
          fontPanel.querySelectorAll('.font-picker-card').forEach(c => c.classList.toggle('selected', c === card));
          closeFontPanel();
          applyStyle(textarea,b); saveDraft();
        });
        fontPanel.appendChild(card);
      });

      // pulls whatever the passage actually says right now (not a
      // snapshot from when the panel was built), so previews stay
      // current even after typing more
      function refreshPanelPreviewText(){
        const preview = previewTextFor(textarea);
        panelSamples.forEach(el => { el.textContent = preview; });
      }

      function openFontPanel(){
        refreshPanelPreviewText();
        document.querySelectorAll('.font-picker-panel.open').forEach(p => { if (p !== fontPanel) p.classList.remove('open'); });
        fontPanel.classList.add('open');

      function closeFontPanel(){ fontPanel.classList.remove('open'); }
      fontTrigger.addEventListener('click', (e) => {
        e.stopPropagation();

      fontWrap.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeFontPanel(); });

      fontWrap.append(fontTrigger, fontPanel);


      // weight picker — same interaction model as the font picker: a
      // swatch trigger opens a specimen panel, each option previewed
      // live in the passage's current typeface and actual text
      const weightWrap = document.createElement('div');
      weightWrap.className = 'ctrl font-picker';

      const weightTrigger = document.createElement('button');
      weightTrigger.type = 'button';
      weightTrigger.className = 'font-picker-trigger';
      weightTrigger.title = 'Change weight';
      const weightSwatch = document.createElement('span');
      weightSwatch.className = 'font-swatch';
      weightSwatch.textContent = 'Aa';
      const weightLabel = document.createElement('span');
      weightLabel.className = 'font-picker-label';
      weightLabel.textContent = WEIGHTS.find(w => w.v === b.weight).label;
      const weightChevron = document.createElement('span');
      weightChevron.className = 'dd-chevron';
      weightChevron.textContent = '⌄';
      weightTrigger.append(weightSwatch, weightLabel, weightChevron);

      function refreshWeightSwatch(){
        weightSwatch.style.fontFamily = fontFamilyFor(b.font);
        weightSwatch.style.fontWeight = b.weight;
        weightSwatch.style.fontStyle = b.italic ? 'italic' : 'normal';
      }
      refreshWeightSwatch();

      const weightPanel = document.createElement('div');
      weightPanel.className = 'font-picker-panel';
      const weightPanelSamples = [];
      WEIGHTS.forEach(w => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'font-picker-card' + (w.v === b.weight ? ' selected' : '');

        const name = document.createElement('div');
        name.className = 'fp-name';
        name.textContent = w.label + ' · ' + w.v;

        const sample = document.createElement('div');
        sample.className = 'fp-sample';
        sample.style.fontWeight = w.v;
        weightPanelSamples.push(sample);

        card.append(name, sample);
        card.addEventListener('click', () => {

      });

      function refreshWeightPanel(){
        const preview = previewTextFor(textarea);
        const family = fontFamilyFor(b.font);
        const style = b.italic ? 'italic' : 'normal';
        weightPanelSamples.forEach(el => {
          el.textContent = preview;
          el.style.fontFamily = family;
          el.style.fontStyle = style;
        });

      function openWeightPanel(){
        refreshWeightPanel();
        document.querySelectorAll('.font-picker-panel.open').forEach(p => { if (p !== weightPanel) p.classList.remove('open'); });
        weightPanel.classList.add('open');
