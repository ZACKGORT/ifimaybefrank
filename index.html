let emitterShape=null;

function resolveCollisions(){
  for(let a=0;a<shapes.length;a++)for(let b=a+1;b<shapes.length;b++){
    const sa=shapes[a],sb=shapes[b];
    const dx=sb.pos.x-sa.pos.x,dy=sb.pos.y-sa.pos.y,dist=Math.sqrt(dx*dx+dy*dy),minD=sa.radius+sb.radius;
    if(dist>0.001&&dist<minD){
      const pen=minD-dist,nx=dx/dist,ny=dy/dist,wa=sa.dragging?0:0.5,wb=sb.dragging?0:0.5;
      sa.pos.x-=nx*pen*wa;sa.pos.y-=ny*pen*wa;sb.pos.x+=nx*pen*wb;sb.pos.y+=ny*pen*wb;
      const dvx=sb.vel.x-sa.vel.x,dvy=sb.vel.y-sa.vel.y,dot=dvx*nx+dvy*ny;
      if(dot<0){const j=(1+0.5)*dot*0.5;if(!sa.dragging){sa.vel.x+=j*nx;sa.vel.y+=j*ny;}if(!sb.dragging){sb.vel.x-=j*nx;sb.vel.y-=j*ny;}}
    }
  }

  // ── Zen orb ↔ Project orb bumper collisions ───────────────────────────────
  if(lvl===5&&_projectOrbs.length){
    const zenArr=attractors.filter(a=>a._bouncingBH);
    const orbAtts=attractors.filter(a=>a._isProjectOrb);
    for(const zen of zenArr){
      const zenScale=Math.sqrt(zen.pullStrength/57.0);
      const zenR=zen.radius*zenScale*1.1;
      for(const orb of orbAtts){
        if(orb.dragging)continue;
        const dx=orb.pos.x-zen.pos.x,dy=orb.pos.y-zen.pos.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||0.001;
        const minD=zenR+orb.radius;
        if(dist<minD){
          const nx=dx/dist,ny=dy/dist;
          const pen=minD-dist;
          zen.pos.x-=nx*pen*0.5;zen.pos.y-=ny*pen*0.5;
          orb.pos.x+=nx*pen*0.5;orb.pos.y+=ny*pen*0.5;
          const RESTITUTION=0.75;
          const relDot=zen.vel.x*(-nx)+zen.vel.y*(-ny);
          if(relDot>0){
            zen.vel.x+=nx*relDot*(1+RESTITUTION);
            zen.vel.y+=ny*relDot*(1+RESTITUTION);
          }
          // Kick the orb — it's a free NS so it bounces naturally
          const kickStr=2.2+Math.sqrt(zen.vel.x**2+zen.vel.y**2)*0.18;
          orb.vel.x+=nx*kickStr;orb.vel.y+=ny*kickStr;
          _zenGravSpike=Math.max(_zenGravSpike,14.0);
        }
      }
    }
  }
  
  for(let a of attractors) {
    for(let sh of shapes) {
      const basePull = a.type === 'neutronstar' ? 38.0 : 28.0;
      const scale = Math.sqrt(a.pullStrength / basePull);
      const rScaled = a.radius * scale;

      const dx=sh.pos.x-a.pos.x,dy=sh.pos.y-a.pos.y;
      const dist=Math.sqrt(dx*dx+dy*dy),minD=rScaled+sh.radius;
      if(dist>0.001&&dist<minD){
        const pen=minD-dist,nx=dx/dist,ny=dy/dist;
        const wa=a.dragging?0:0.5,wb=sh.dragging?0:0.5;
        a.pos.x-=nx*pen*wa;a.pos.y-=ny*pen*wa;
        sh.pos.x+=nx*pen*wb;sh.pos.y+=ny*pen*wb;
        const dvx=sh.vel.x-a.vel.x,dvy=sh.vel.y-a.vel.y,dot=dvx*nx+dvy*ny;
        if(dot<0){const j=(1+0.5)*dot*0.5;if(!a.dragging){a.vel.x+=j*nx;a.vel.y+=j*ny;}if(!sh.dragging){sh.vel.x-=j*nx;sh.vel.y-=j*ny;}}
      }
    }
  }

  // ── NS-NS mutual gravity: strong pull — neutron stars strongly attract each other ─
  if (lvl === 4) {
  const NS_MUTUAL_G = 0.065;   // strong — NS want to clump and orbit each other
  const NS_MUTUAL_MAX_DIST = 30.0; // very wide — they feel each other from across the screen
  const nsArr = attractors.filter(a => a.type === 'neutronstar' && !a.dragging);
  for (let i = 0; i < nsArr.length; i++) {
    for (let j = i + 1; j < nsArr.length; j++) {
      const a = nsArr[i], b = nsArr[j];
      const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.001 || dist > NS_MUTUAL_MAX_DIST) continue;
      // Inverse-square but capped so they never slam into each other
      const f = NS_MUTUAL_G / Math.max(dist * dist, 2.5);
      const nx = dx / dist, ny = dy / dist;
      // Add tangential component to encourage co-orbiting rather than straight-line collapse
      const tx = -ny, ty = nx; // perpendicular
      const tanBias = 0.45;
      a.vel.x += (nx + tx * tanBias) * f;
      a.vel.y += (ny + ty * tanBias) * f;
      b.vel.x -= (nx - tx * tanBias) * f;
      b.vel.y -= (ny - ty * tanBias) * f;
    }
  }
  } // end lvl === 4 NS-NS gravity

  // ── BH-NS collision: bounce + temporary capture + release ────────────────────
  // Level 6 only — on level 5, NS are spring-anchored and BH doesn't affect their position
  if (lvl === 4) {
    const bhArr = attractors.filter(a => a.type === 'blackhole');
    const nsArr2 = attractors.filter(a => a.type === 'neutronstar');
    for (const bh of bhArr) {
      const bhScale = Math.sqrt(bh.pullStrength / 57.0);
      const bhR = bh.radius * bhScale * 1.4; // collision radius with some margin
      for (const ns of nsArr2) {
        if (ns.dragging || bh.dragging) continue;
        const nsScale = Math.sqrt(ns.pullStrength / 38.0);
        const nsR = ns.radius * nsScale;
        const dx = ns.pos.x - bh.pos.x, dy = ns.pos.y - bh.pos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = bhR + nsR;

        // ── Approach zone: BH gravity snatches NS into orbit ─────────────────
        const captureZone = bhR * 3.0;
        if (!ns._bhCapture && dist < captureZone && dist > minDist) {
          // Pull NS toward BH — gentler than before
          const pullF = 0.07 / Math.max(dist * dist * 0.08, 0.5);
          const nx = dx / dist, ny = dy / dist;
          const tx = -ny, ty = nx; // tangent for orbit
          ns.vel.x -= (nx * 0.4 - tx * 0.45) * pullF;
          ns.vel.y -= (ny * 0.4 - ty * 0.45) * pullF;
        }

        // ── Hard collision: bounce + enter capture state ──────────────────────
        if (dist < minDist && dist > 0.001) {
          const nx = dx / dist, ny = dy / dist;
          // Separate
          const pen = minDist - dist;
          ns.pos.x += nx * pen * 0.8;
          ns.pos.y += ny * pen * 0.8;
          bh.pos.x -= nx * pen * 0.2;
          bh.pos.y -= ny * pen * 0.2;

          // Elastic-ish bounce
          const relVx = ns.vel.x - bh.vel.x, relVy = ns.vel.y - bh.vel.y;
          const dot = relVx * nx + relVy * ny;
          const RESTITUTION = 0.62;
          if (dot < 0) {
            const j = -(1 + RESTITUTION) * dot * 0.5;
            ns.vel.x += j * nx;
            ns.vel.y += j * ny;
            bh.vel.x -= j * nx * 0.15; // BH barely moves — it's massive
            bh.vel.y -= j * ny * 0.15;
          }

          // Begin capture: BH grabs the NS into a temporary orbit
          if (!ns._bhCapture) {
            ns._bhCapture = bh;
            ns._bhCaptureTimer = 2.2 + Math.random() * 1.8; // hold 2–4 sec
            // Give NS a tangential nudge to kick off the orbit arc
            const targetOrbitSpd = Math.sqrt(bh.pullStrength * 0.12 / Math.max(dist, bhR * 1.5));
            ns.vel.x = -ny * targetOrbitSpd * (Math.random() < 0.5 ? 1 : -1);
            ns.vel.y =  nx * targetOrbitSpd * (Math.random() < 0.5 ? 1 : -1);
            // Count as hit for win condition
            ns._bhHitCount = (ns._bhHitCount || 0) + 1;
          }
        }

        // ── While captured: steer NS into orbit around BH ────────────────────
        if (ns._bhCapture === bh && !ns.dragging) {
          ns._bhCaptureTimer -= 1/60; // approx dt
          const rx = ns.pos.x - bh.pos.x, ry = ns.pos.y - bh.pos.y;
          const r = Math.sqrt(rx*rx + ry*ry) + 0.001;
          const txO = -ry / r, tyO = rx / r;
          const vTan = ns.vel.x * txO + ns.vel.y * tyO;
          const vCirc = Math.sqrt(bh.pullStrength * 0.12 / r);
          const nudge = (vCirc - vTan) * 0.04;
          ns.vel.x += txO * nudge;
          ns.vel.y += tyO * nudge;
          // Slight pull inward to maintain orbit altitude — gentler
          const radialPull = 0.02;
          ns.vel.x -= (rx / r) * radialPull;
          ns.vel.y -= (ry / r) * radialPull;

          // Release: timer expired or NS dragged away
          if (ns._bhCaptureTimer <= 0) {
            ns._bhCapture = null;
            ns._bhCaptureTimer = 0;
            // Fling tangentially on release — exits on a clean arc
            const exitSpd = Math.sqrt(ns.vel.x**2 + ns.vel.y**2) * 1.3;
            ns.vel.x = txO * exitSpd;
            ns.vel.y = tyO * exitSpd;
          }
        }
        // Clear capture if NS was dragged
        if (ns._bhCapture === bh && ns.dragging) {
          ns._bhCapture = null;
          ns._bhCaptureTimer = 0;
        }
      }
    }
  }
}

const MP=BASE_COUNT,pp=new Float32Array(MP*3),pv=new Float32Array(MP*3),ps=new Float32Array(MP),pa=new Float32Array(MP),pl=new Float32Array(MP),pal=new Uint8Array(MP);
// Fix perf: mobile default particle count 4000 (was 8000) — halves the physics loop
const P={count:BASE_COUNT,gravity:isMobile?3.3:4.2,spread:isMobile?0.65:1.25,bounce:0.36,size:isMobile?0.65:0.65,rain:false,waterfall:false};

// Derive bounce from count+size: more particles & larger size → more bounce
function derivedBounce(){
  const cNorm=(P.count-500)/(8000-500);       // 0→1
  const sNorm=(P.size-0.2)/(1.0-0.2);          // 0→1
  const intensity=(cNorm+sNorm)*0.5;            // combined 0→1
  return Math.round(Math.max(0.05,Math.min(1.0, 0.12+intensity*0.72))*100)/100;
}
function syncBounce(){

// Waterfall wave clock — drives the heavy→thin→heavy cycle

// Per-particle gravity tier — assigned at spawn, used in tick

function spawn(i){
  const b=i*3,sw=getSpout();
  if(P.waterfall){
    // Emit from hoop rim — applies on all levels including basketball
    if (_hoopGroup) {
      const angle2 = Math.random() * Math.PI * 2;
      const r2 = Math.random() * HOOP.rimR * 0.98;
      const emitX = HOOP.x + Math.cos(angle2) * r2;
      const emitZ = HOOP.z + Math.sin(angle2) * r2;
      const anchorX2 = HOOP.x + HOOP.rimR;
      const leverArm2 = anchorX2 - emitX;
      const tiltedY2 = HOOP.y + Math.sin(HOOP._rimTilt+HOOP._dbTilt) * leverArm2;
      pp[b]   = emitX;
      pp[b+1] = tiltedY2 + (Math.random()-0.5)*0.06;
      pp[b+2] = emitZ;
      const tier2 = Math.floor(Math.random()*3);
      const speedTiers = [2.4, 4.2, 7.8];
      const jitterTiers = [0.5, 1.0, 2.0];
      const spd2 = speedTiers[tier2] + Math.random()*jitterTiers[tier2];
      const radialOut = Math.random()*0.6;
      pv[b]   = Math.cos(angle2)*radialOut + (Math.random()-0.5)*0.35;
      pv[b+1] = -spd2;
      pv[b+2] = Math.sin(angle2)*radialOut + (Math.random()-0.5)*0.3;
      pGravTier[i] = tier2;
      ps[i]  = 0.10 + Math.random()*0.20;
      pl[i]  = 2.8 + Math.random()*4.5;
      pa[i]  = Math.random()*pl[i]*0.35;
      pal[i] = 1;
      return;
    }
    // Fallback waterfall (no hoop yet)
    pp[b]  = sw.x + (Math.random()-0.5)*P.spread;

// ── Throw velocity tracking for bouncing BH ───────────────────────────────────
// Ring buffer of recent world-space attractor positions while dragging
const _throwBuf = [];
const _THROW_BUF_LEN = 6; // sample last 6 frames (~100ms)
function _recordThrowPos(a) {
  if (!a || !a._bouncingBH) return;
  _throwBuf.push({ x: a.pos.x, y: a.pos.y, t: performance.now() });
  if (_throwBuf.length > _THROW_BUF_LEN) _throwBuf.shift();
}
function _applyThrow(a) {
  if (!a || !a._bouncingBH || _throwBuf.length < 2) return;
  // Weighted average of recent deltas — more weight to the most recent
  let vx = 0, vy = 0, totalW = 0;
  for (let i = 1; i < _throwBuf.length; i++) {
    const dt = (_throwBuf[i].t - _throwBuf[i-1].t) / 1000;
    if (dt < 0.001) continue;
    const w = i; // linear recency weight
    vx += ((_throwBuf[i].x - _throwBuf[i-1].x) / dt) * w;
    vy += ((_throwBuf[i].y - _throwBuf[i-1].y) / dt) * w;
    totalW += w;
  }
  if (totalW > 0) {
    const THROW_SCALE = 0.72; // tune feel: 1.0 = physically exact, >1 = exaggerated
    const MAX_THROW = 28;
    vx = Math.max(-MAX_THROW, Math.min(MAX_THROW, (vx / totalW) * THROW_SCALE));
    vy = Math.max(-MAX_THROW, Math.min(MAX_THROW, (vy / totalW) * THROW_SCALE));
    a.vel.x = vx;
    a.vel.y = vy;
  }
  _throwBuf.length = 0;
}

// ── SUPERNOVA IMPULSE ─────────────────────────────────────────────────────────
const SUPERNOVA_R = 7.0;
const SUPERNOVA_F = 18.0;
const SUPERNOVA_LIFT = 4.0;
function supernovaImpulse(wx, wy) {
  const N = Math.min(P.count, MP);
  for (let i = 0; i < N; i++) {
    if (!pal[i]) continue;
    const b = i * 3;
    const dx = pp[b] - wx, dy = pp[b+1] - wy, dz = pp[b+2];
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.001;
    if (dist > SUPERNOVA_R) continue;
    const t = 1 - dist / SUPERNOVA_R;
    const f = SUPERNOVA_F * t * t;
    pv[b]   += (dx / dist) * f;
    pv[b+1] += (dy / dist) * f + SUPERNOVA_LIFT * t;
    pv[b+2] += (dz / dist) * f;
  }

  // ── Level 5 & 6: supernova shockwave blasts attractors ──────────────
  if (lvl === 4 || lvl === 5) {
    const NOVA_ATTRACTOR_R = 14.0;  // shockwave reach in world units
    const NOVA_BH_F        = 10.0;  // kick on black hole (massive — resists but recoils)
    const NOVA_NS_F        = 24.0;  // kick on neutron star (lighter — flung hard)
    for (const a of attractors) {
      if (a.dragging) continue;
      const adx = a.pos.x - wx, ady = a.pos.y - wy;
      const adist = Math.sqrt(adx*adx + ady*ady) || 0.001;
      if (adist > NOVA_ATTRACTOR_R) continue;
      const tA = 1 - adist / NOVA_ATTRACTOR_R;
      const isBH = a.type === 'blackhole';
      const force = (isBH ? NOVA_BH_F : NOVA_NS_F) * tA * tA;
      // Radial blast away from epicentre
      a.vel.x += (adx / adist) * force;
      a.vel.y += (ady / adist) * force + (isBH ? 1.5 : 4.0) * tA;
      // NS: add a random tangential spin kick for extra chaos
      if (!isBH) {
        const tx = -ady / adist, ty = adx / adist;
        const spinDir = Math.random() < 0.5 ? 1 : -1;
        a.vel.x += tx * force * 0.35 * spinDir;
        a.vel.y += ty * force * 0.35 * spinDir;
        // Break active BH capture so it flies free
        a._bhCapture = null;
        a._bhCaptureTimer = 0;
      }
      // Mark for glow flare (drawn in overlay, decayed each frame)
      a._novaHitT = 0.6;
    }
  }

  // ── Basketball: supernova shockwave blasts the zen orb (ball) ───────────
  if (lvl === 6 && _bbBall && !_bbBall.dragging) {
    const bdx = _bbBall.pos.x - wx, bdy = _bbBall.pos.y - wy;
    const bdist = Math.sqrt(bdx*bdx + bdy*bdy) || 0.001;
    if (bdist < 16.0) {
      const tB = 1 - bdist / 16.0;
      const gravScale = (_bbBall._bbGravity || 17.0) / 17.0;
      // Click is below ball (bdy > 0) → lower hemisphere → stronger impulse
      // Click is above ball (bdy < 0) → upper hemisphere → softer touch
      const hemiScale = bdy > 0 ? 1.45 : 0.55;
      const fB = 11.0 * tB * tB * gravScale * hemiScale;
      _bbBall.vel.x += (bdx / bdist) * fB;
      _bbBall.vel.y += (bdy / bdist) * fB + 2.5 * tB * gravScale * hemiScale;
      const spd = Math.sqrt(_bbBall.vel.x**2 + _bbBall.vel.y**2);
      if (spd > _bbBall._bbMaxSpd) { const s = _bbBall._bbMaxSpd / spd; _bbBall.vel.x *= s; _bbBall.vel.y *= s; }
    }
  }

  // ── Project orbs: supernova shockwave blasts all project orbs ───────────────
  if (_projectOrbs.length) {
    const NOVA_ORB_R  = 18.0;  // shockwave radius in world units
    const NOVA_ORB_F  = 14.0;  // base impulse force
    const NOVA_ORB_UP =  2.5;  // upward lift component
    for (const orb of _projectOrbs) {
      if (orb._attractor && orb._attractor.dragging) continue;
      const odx = orb.pos.x - wx, ody = orb.pos.y - wy;
      const odist = Math.sqrt(odx*odx + ody*ody) || 0.001;
      if (odist > NOVA_ORB_R) continue;
      const tO = 1 - odist / NOVA_ORB_R;
      const fO = NOVA_ORB_F * tO * tO;
      orb.vel.x += (odx / odist) * fO;
      orb.vel.y += (ody / odist) * fO + NOVA_ORB_UP * tO;
      // Tangential spin kick for natural-feeling scatter
      const tx = -ody / odist, ty = odx / odist;
      const spinDir = Math.random() < 0.5 ? 1 : -1;
      orb.vel.x += tx * fO * 0.25 * spinDir;
      orb.vel.y += ty * fO * 0.25 * spinDir;
      // Visual flare on the underlying attractor
      if (orb._attractor) orb._attractor._novaHitT = 0.6;
    }
  }

  flashEl('flash-complete');
}

// ── SINGULARITY COLLAPSE (right-click hold / long-static-press) ───────────────
// Threshold in ms before delete fires. Release early cancels.
const COLLAPSE_THRESHOLD = 600;
const collapseRing = document.getElementById('collapse-ring');
let _collapseTimer = null;
let _collapseTarget = null; // { type: 'shape'|'attractor'|'portal', ref }
let _collapseStartSx = 0, _collapseStartSy = 0;
let _collapseStartT = 0;
let _collapseRAF = null;

function _collapseHitTest(cx, cy) {
  // Portal pair removal (Level 4)
  if (lvl === 4 && portalPairs.length > 0) {
    // Check via removePortalPairAt — we need the hit without removing
    // We'll store portal as special type and call removePortalPairAt on commit
    const hitPortal = (() => {
      for (const pp of portalPairs) {
        if (pp._sAx !== undefined) {
          const dA = Math.hypot(cx - pp._sAx, cy - pp._sAy);
          if (dA < Math.max(28, pp._sAr || 28)) return { type: 'portal', ref: pp, side: 'a' };
          const dB = Math.hypot(cx - pp._sBx, cy - pp._sBy);
          if (dB < Math.max(28, pp._sBr || 28)) return { type: 'portal', ref: pp, side: 'b' };
        }
      }
      return null;
    })();
    if (hitPortal) return hitPortal;
  }
  // Attractor hit-test
  ndc.set((cx/W)*2-1,-(cy/H)*2+1);
  ray.setFromCamera(ndc,camera);
  for (let i = 0; i < attractors.length; i++) {
    const a = attractors[i];
    if (ray.intersectObject(a.core, false).length) {
      return { type: 'attractor', ref: a };
    }
  }
  // Shape hit-test
  const hits = ray.intersectObjects(shapes.map(s=>s.mesh), true);
  if (hits.length) {
    const sh = shapes.find(s => s.mesh === hits[0].object || s.mesh.children.includes(hits[0].object));
    if (sh) return { type: 'shape', ref: sh };
  }
  return null;
}

function _collapseDrawRing(sx, sy, progress) {
  // progress 0→1; ring shrinks inward (singularity collapse)
  if (!collapseRing) return;
  const maxR = 36;
  const r = maxR * (1 - progress * 0.65); // shrinks but stays visible
  collapseRing.style.left = sx + 'px';
  collapseRing.style.top  = sy + 'px';
  collapseRing.style.width  = (r * 2) + 'px';
  collapseRing.style.height = (r * 2) + 'px';
  collapseRing.style.borderColor = `rgba(255,${Math.round(80 - progress*60)},${Math.round(60 - progress*60)},${0.4 + progress * 0.5})`;
  collapseRing.style.boxShadow = `0 0 ${4 + progress*14}px rgba(255,40,40,${progress*0.5})`;
}

function _collapseStart(cx, cy) {
  const hit = _collapseHitTest(cx, cy);
  if (!hit) return false;
  // Can't delete a black hole
  if (hit.type === 'attractor' && hit.ref.type === 'blackhole') {
    _wiggleAttractor(hit.ref);
    return true; // consumed event
  }
  _collapseTarget = hit;
  _collapseStartSx = cx;
  _collapseStartSy = cy;
  _collapseStartT = performance.now();
  if (collapseRing) collapseRing.classList.add('active');
  _collapseAnimFrame();
  return true;
}

function _collapseAnimFrame() {
  if (!_collapseTarget) return;
  const elapsed = performance.now() - _collapseStartT;
  const progress = Math.min(1, elapsed / COLLAPSE_THRESHOLD);

  // Project current position for the ring
  let sx = _collapseStartSx, sy = _collapseStartSy;
  if (_collapseTarget.type === 'attractor') {
    const sc = _collapseTarget.ref.pos.clone().project(camera);
    sx = (sc.x + 1) / 2 * W;
    sy = (-sc.y + 1) / 2 * H;
  } else if (_collapseTarget.type === 'shape') {
    const sc = _collapseTarget.ref.pos.clone().project(camera);
    sx = (sc.x + 1) / 2 * W;
    sy = (-sc.y + 1) / 2 * H;
  }
  _collapseDrawRing(sx, sy, progress);

  if (progress < 1) {
    _collapseRAF = requestAnimationFrame(_collapseAnimFrame);
  } else {
    _collapseCommit();
  }
}

function _collapseCommit() {
  if (!_collapseTarget) return;
  const hit = _collapseTarget;
  _collapseCancel(false); // clean up ring without nulling target yet
  if (hit.type === 'portal') {
    removePortalPairAt(_collapseStartSx, _collapseStartSy);
  } else if (hit.type === 'attractor') {
    const a = hit.ref;
    if (tAttractor === a) tAttractor = null;
    a.dispose();
    const idx = attractors.indexOf(a);
    if (idx >= 0) attractors.splice(idx, 1);
    flashEl('flash-delete');
  } else if (hit.type === 'shape') {
    const sh = hit.ref;
    if (dShape === sh) { dShape = null; prevWP = null; }
    delShape(sh);
  }
  _collapseTarget = null;
}

function _collapseCancel(clearTarget = true) {
  if (_collapseRAF) { cancelAnimationFrame(_collapseRAF); _collapseRAF = null; }
  if (collapseRing) {
    collapseRing.classList.remove('active');
    collapseRing.style.boxShadow = '';
  }
  if (clearTarget) _collapseTarget = null;
}

renderer.domElement.addEventListener('contextmenu', e => { e.preventDefault(); });

renderer.domElement.addEventListener('mousedown', e => {
  if (e.button !== 2) return; // right button only
  e.preventDefault();

window.addEventListener('wheel',e=>{
  e.preventDefault();
  const dir=e.deltaY>0?-1:1;
  const isBball=lvl===6&&LEVELS[6]&&LEVELS[6].basketball;

  // ── Basketball level: click-hold-scroll on ball = gravity, on hoop = rim size ──
  if(isBball&&_hoopDragging){
    // Hoop held: scroll scales rim radius
    const RIM_MIN=0.7,RIM_MAX=4.8,RIM_STEP=0.10;
    const prevR=HOOP.rimR;
    HOOP.rimR=Math.max(RIM_MIN,Math.min(RIM_MAX,HOOP.rimR+dir*RIM_STEP));
    // Scale rimTube proportionally so the tube-to-radius ratio stays constant
    HOOP.rimTube=0.075*(HOOP.rimR/1.85);
    // Reposition anchor-side point lights to match new radius
    if(_hoopPointLights.length){
      _hoopPointLights.forEach((light,i)=>{
        const angle=(i/_hoopPointLights.length)*Math.PI*2;
        light.position.set(Math.cos(angle)*HOOP.rimR,0,Math.sin(angle)*HOOP.rimR);
      });
    }
    return;
  }

  if(isBball&&tAttractor&&tAttractor===_bbBall){
    // Ball held: scroll scales gravity
    const GRAV_MIN=0.5,GRAV_MAX=28.0,GRAV_STEP=0.55;
    _bbBall._bbGravity=Math.max(GRAV_MIN,Math.min(GRAV_MAX,(_bbBall._bbGravity||17.0)+dir*GRAV_STEP));
    return;
  }

  if(tAttractor){
    if(tAttractor.type === 'blackhole') {
      const pullMin = 8.0, pullMax = 126.0;
      tAttractor.pullStrength = Math.max(pullMin, Math.min(pullMax, tAttractor.pullStrength + dir * 6.0));
    } else {
      const rMin = 2.0, rMax = 9.0;
      tAttractor.influenceR = Math.max(rMin, Math.min(rMax, (tAttractor.influenceR || 5.5) + dir * 0.5));
    }
  } else if(dShape&&dShape===emitterShape){
    // Hold + scroll: continuously wring/unwring — fine control over spread↔intensity
    const nm=Math.max(0,Math.min(1,(emitterShape._panelMorphVal||0)+dir*0.06));
    emitterShape.setMorph(nm);
  } else if(dShape){
    const SC_MIN=0.3,SC_MAX=3.5,SC_STEP=0.09;
    const ns=Math.max(SC_MIN,Math.min(SC_MAX,dShape.sc+dir*SC_STEP));

  } else {

    P.count=Math.max(500,Math.min(8000,P.count+dir*step));
    P.size=0.25+((P.count-500)/(8000-500))*0.75;

    document.getElementById('v-count').textContent=Math.round(P.count);
    document.getElementById('sl-size').value=P.size;
    document.getElementById('v-size').textContent=P.size.toFixed(2);
    syncBounce();
  }
},{passive:false});

          const moved=Math.sqrt((tAttractor.pos.x-tAttractor.rest.x)**2+(tAttractor.pos.y-tAttractor.rest.y)**2);

function updateSpillGraph() { /* no-op */ }


function countTgts(){
  const N=Math.min(P.count,MP),raw=tgts.map(()=>0);let tot=0,inTarget=0;
  for(let i=0;i<N;i++){if(!pal[i])continue;const b=i*3;if(pp[b+1]>-7.5)continue;tot++;let hit=false;for(let t=0;t<tgts.length;t++){const tg=tgts[t],dx=pp[b]-tg.x,dz=pp[b+2];if(dx*dx+dz*dz<tg.r*tg.r){raw[t]++;hit=true;}}if(hit)inTarget++;}
  if(tCounts.length!==tgts.length)tCounts=tgts.map(()=>0);
  for(let t=0;t<tgts.length;t++){tCounts[t]+=(raw[t]-tCounts[t])*FILL_A;const sh=tot>0?tCounts[t]/tot:0;tgts[t].fill=Math.min(sh/(1/Math.max(tgts.length,1))*0.7,1);tgts[t].met=tgts[t].fill>=lvlThresh();}
  // Spillage: particles on floor outside any target
  const rawSpill=tot>0?Math.max(0,tot-inTarget):0;
  spillCount+=(rawSpill-spillCount)*FILL_A;
  spillSmooth=tot>0?spillCount/tot:0;
  updateSpillGraph();
}

// ── TEXT CURSOR LAYER DRAW (cx.html port) ─────────────────────────────────────
let _textLayerWasClear = false;
function drawTextLayer(){
  // fade alpha first so early-exit is accurate
  lvlTextAlpha+=(lvlTextAlphaTgt-lvlTextAlpha)*0.04;
  // Fix perf: skip the expensive clearRect+draw pass when nothing is visible
  // On mobile: skip text-canvas entirely when no chars — cursor is CSS div, bloom is invisible at 4%
  const _textEmpty = textChars.length===0 && lvlTextAlpha<0.01;
  if(_textEmpty){
    if(!_textLayerWasClear){
      tctx.clearRect(0,0,W,H);_textLayerWasClear=true;
      // Remove from compositor entirely — display:none > opacity:0 for Chrome layer budget
      if(tc.style.display!=='none') tc.style.display='none';
    }
    return;
  }
  if(isMobile && textChars.length===0){
    if(!_textLayerWasClear){
      tctx.clearRect(0,0,W,H);_textLayerWasClear=true;
      if(tc.style.display!=='none') tc.style.display='none';
    }
    return;
  }
  _textLayerWasClear=false;
  // Restore to compositor when drawing
  if(tc.style.display==='none') tc.style.display='';
  tctx.clearRect(0,0,W,H);

  // blob cursor follow (smooth like cx.html)
  bX+=(mX-bX)*BLOB_LERP;bY+=(mY-bY)*BLOB_LERP;

  tctx.textBaseline='top';

  const globalAlpha=Math.min(1,lvlTextAlpha);
  if(globalAlpha<0.01)return;

  for(const p of textChars){
    // physics — repel from cursor blob (same as cx.html)
    const dx=p.x-bX,dy=p.y-bY,d=Math.sqrt(dx*dx+dy*dy);
    // spring home
    p.vx+=(p.restX-p.x)*TETHER_K;
    p.vy+=(p.restY-p.y)*TETHER_K;
    // repel
    if(d<REPEL_R&&d>0.5){
      const f=(1-d/REPEL_R);
      p.vx+=(dx/d)*f*f*14;
      p.vy+=(dy/d)*f*f*14;
    }
    p.vx*=DAMP;p.vy*=DAMP;
    p.x+=p.vx;p.y+=p.vy;

    // fade near cursor — keep a floor so text stays readable everywhere
    const fadeS=12,fadeE=38;
    const proximity=Math.min(1,Math.max(0,(d-fadeS)/(fadeE-fadeS)));
    const alpha=p.baseOp*globalAlpha*(0.35+proximity*0.65);
    if(alpha>0.01){
      const r=p.role==='headline'?TYPO.headline:TYPO.body;
      tctx.font=`${r.weight} ${r.size}px ${r.family}`;
      tctx.fillStyle=`rgba(255,255,248,${alpha.toFixed(3)})`;
      tctx.fillText(p.ch,p.x,p.y);
    }
  }

  // bloom circle under cursor — skip on mobile (cursor is CSS div; bloom is ~4% opacity, invisible)
  if(!isMobile){
    const grad=tctx.createRadialGradient(bX,bY,0,bX,bY,BLOOM_R);
    grad.addColorStop(0,'rgba(255,255,248,0.04)');
    grad.addColorStop(0.4,'rgba(255,255,248,0.015)');
    grad.addColorStop(1,'rgba(255,255,248,0)');
    tctx.fillStyle=grad;
    tctx.beginPath();tctx.arc(bX,bY,BLOOM_R,0,Math.PI*2);tctx.fill();
    // precise cursor dot (cx.html style) — desktop only (mobile has no cursor)
    tctx.fillStyle='rgba(255,255,248,0.35)';
    tctx.beginPath();tctx.arc(eX,eY,4,0,Math.PI*2);tctx.fill();
    tctx.fillStyle='rgba(255,255,248,0.9)';
    tctx.beginPath();tctx.arc(mX,mY,1.5,0,Math.PI*2);tctx.fill();
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clk.getDelta(),0.033);

  // cx.html cursor blob
  eVX=(mX-eX)*0.1;eVY=(mY-eY)*0.1;eX+=eVX;eY+=eVY;eVX*=0.68;eVY*=0.68;
  mVX*=0.6;mVY*=0.6;

  // shape cursor (original)
  cvx+=(mX-cX)*0.18;cvy+=(mY-cY)*0.18;cvx*=0.62;cvy*=0.62;cX+=cvx;cY+=cvy;
  const spd=Math.sqrt(cvx*cvx+cvy*cvy),ang=spd>0.5?Math.atan2(cvy,cvx)*180/Math.PI:0;
  const str=Math.min(spd*0.55,13),cw=18+str,ch=Math.max(6,11-str*0.28);
  // Fix #10: batch style writes, avoid per-frame forced recalc
  const _newTf=`translate(${(cX-cw/2).toFixed(1)}px,${(cY-ch/2).toFixed(1)}px) rotate(${ang.toFixed(1)}deg)`;
  if(curEl._tf!==_newTf){curEl.style.transform=_newTf;curEl._tf=_newTf;}
  const _cwR=cw.toFixed(1)+'px',_chR=ch.toFixed(1)+'px';
  if(curEl._cw!==_cwR){curEl.style.width=_cwR;curEl._cw=_cwR;}
  if(curEl._ch!==_chR){curEl.style.height=_chR;curEl._ch=_chR;}

  if(paused){
    drawTextLayer();
    drawOverlay();
    drawBlackHoleOverlay();
    ovTex.needsUpdate = true;
    renderer.clear();
    renderer.render(scene,camera);
    renderer.render(particleScene,camera);
    renderer.render(orthoScene,orthoCam);
    return;
  }

  resolveCollisions();
  // Decay zen-orb gravity spike exponentially back to 0
  if(_zenGravSpike>0.01) _zenGravSpike*=Math.pow(0.018,dt); else _zenGravSpike=0;
  shapes.forEach(s=>s.update(dt));
  if(emitterShape)emitterShape.update(dt);
  attractors.forEach(a=>a.update(dt));
  if(_projectOrbs.length) _projectOrbs.forEach(o=>o.update(dt));
  // Decay supernova hit flare
  if (lvl === 4 || lvl === 5) attractors.forEach(a=>{ if(a._novaHitT>0) a._novaHitT=Math.max(0,a._novaHitT-dt*1.8); });

  // Advance waterfall wave phase — one full cycle every ~3.5s
  if(P.waterfall) _wfPhase += dt * (Math.PI * 2 / 3.5);

  pMat.uniforms.uSz.value=P.size;
  const N=Math.min(P.count,MP);

  // Compute world-space viewport edges at z=0 for edge repulsion
  const edgeL=s2w(0,H/2).x,edgeR=s2w(W,H/2).x;
  const edgeT=s2w(W/2,0).y,edgeB=s2w(W/2,H).y;
  const EDGE_ZONE=1.8,EDGE_F=18.0; // repulsion band width & force strength

  for(let i=0;i<N;i++){
    const b=i*3;
    if(!pal[i]){spawn(i);continue;}
    pa[i]+=dt;if(pa[i]>pl[i]){
      if(P.waterfall){
        // Asymmetric wave: fast attack to max, long slow decay to near-zero, repeat
        // t = 0→1 over one cycle
        const pOffset = (i / N) * 0.18; // small phase spread for texture
        const t = ((_wfPhase + pOffset) % (Math.PI * 2)) / (Math.PI * 2); // 0→1
        // Shape: pow curve gives slow decay; the (1-t)^3 drops steeply near end
        // then wraps instantly back to 1 — fast attack, long tail
        const wave = Math.pow(1 - t, 2.2);
        const spawnThreshold = 0.04 + wave * 0.96;
        if(Math.random() < spawnThreshold){ spawn(i); } else { pa[i]=0; }
        continue;
      }
      spawn(i);continue;
    }
    
    if(applyAttractorForces(i,b,dt)) continue;

    // ── ZenOrb (basketball) influence on main particle stream ─────────────────
    // Applies only on the basketball level; pulls nearby stream particles toward
    // the ball with a short-range soft field — doesn't disturb the global flow.
    if (_bbBall && !_bbBall.dragging && lvl === 6) {
      const zdx = _bbBall.pos.x - pp[b], zdy = _bbBall.pos.y - pp[b+1], zdz = (_bbBall.pos.z||0) - pp[b+2];
      const zdist2 = zdx*zdx + zdy*zdy + zdz*zdz;
      const ZEN_MAIN_R = 4.0;
      if (zdist2 < ZEN_MAIN_R * ZEN_MAIN_R) {
        const zdist = Math.sqrt(zdist2) + 0.001;
        const falloff = 1.0 - zdist / ZEN_MAIN_R;
        const zf = 2.8 * falloff * falloff * dt / zdist;
        pv[b]   += zdx * zf;
        pv[b+1] += zdy * zf;
        pv[b+2] += zdz * zf * 0.4;
      }
    }
    
    // Waterfall: each tier has its own gravity multiplier so layers fall at different speeds
    const gravMult = P.waterfall ? (0.45 + pGravTier[i] * 0.55) : 1.0;
    pv[b+1]-=(P.gravity+_zenGravSpike)*gravMult*dt;
    if(P.rain){pv[b]-=pp[b]*0.4*dt;pv[b+2]-=pp[b+2]*0.3*dt;}

    // ── Freefall XY bias: damp z toward 0 while particle is airborne ──
    // In waterfall mode suppress z damping so the depth layers stay spread
    const airborne=pp[b+1]>-8.0;
    if(airborne && !P.waterfall){
      pp[b+2]*=0.88;
      pv[b+2]*=0.80;
    }

    pp[b]+=pv[b]*dt;pp[b+1]+=pv[b+1]*dt;pp[b+2]+=pv[b+2]*dt;

    // ── Viewport edge soft repulsion ──
    const dL=pp[b]-edgeL,dR=edgeR-pp[b];
    const dTop=edgeT-pp[b+1],dBot=pp[b+1]-edgeB;
    if(dL<EDGE_ZONE&&dL>-1.0){const t=1-(dL/EDGE_ZONE);pv[b]+=t*t*EDGE_F*dt;}
    if(dR<EDGE_ZONE&&dR>-1.0){const t=1-(dR/EDGE_ZONE);pv[b]-=t*t*EDGE_F*dt;}
    if(dTop<EDGE_ZONE&&dTop>-1.0){const t=1-(dTop/EDGE_ZONE);pv[b+1]-=t*t*EDGE_F*dt;}
    if(dBot<EDGE_ZONE&&dBot>-1.0){const t=1-(dBot/EDGE_ZONE);pv[b+1]+=t*t*EDGE_F*dt;}

    // ── Non-airborne (settled on ground): rolling resistance ──
    if(!airborne){
      // Rolling friction: stronger deceleration than air drag, mimics granular settling
      pv[b]*=0.91;pv[b+2]*=0.88;
      pp[b+2]*=0.97;
    }

    for(let s=0;s<shapes.length;s++){
      const sh=shapes[s],d=sh.sdf(pp[b],pp[b+1],pp[b+2]);
      if(d<PR){sdfN(sh,pp[b],pp[b+1],pp[b+2]);const pen=PR-d;pp[b]+=_n.x*pen;pp[b+1]+=_n.y*pen;pp[b+2]+=_n.z*pen;const dot=pv[b]*_n.x+pv[b+1]*_n.y+pv[b+2]*_n.z;if(dot<0){pv[b]-=dot*_n.x*0.08;pv[b+1]-=dot*_n.y*0.08;pv[b+2]-=dot*_n.z*0.08;pv[b]+=(Math.random()-0.5)*0.18;pv[b+2]+=(Math.random()-0.5)*0.07;}}
    }
    
    // ── Attractor Collision (Bounce) ──
    for (let a of attractors) {
      const bhd = a.sdf(pp[b], pp[b+1], pp[b+2]);
      if(bhd < PR) {
        const dx=pp[b]-a.pos.x,dy=pp[b+1]-a.pos.y,dz=pp[b+2]-(a.pos.z||0);
        const dn=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
        const nx=dx/dn,ny=dy/dn,nz=dz/dn;
        const pen=PR-bhd;
        pp[b]+=nx*pen;pp[b+1]+=ny*pen;pp[b+2]+=nz*pen;
        const dot=pv[b]*nx+pv[b+1]*ny+pv[b+2]*nz;
        if(dot<0){
          pv[b]-=dot*nx*0.06;pv[b+1]-=dot*ny*0.06;pv[b+2]-=dot*nz*0.06;
          pv[b]+=(Math.random()-0.5)*0.14;pv[b+2]+=(Math.random()-0.5)*0.06;
        }
      }
    }
    
    // ── Ground impact: realistic granular splash ──
    if(pp[b+1]<-8.9){
      pp[b+1]=-8.9;
      const vy=pv[b+1]; // negative (downward)
      const impactSpd=Math.abs(vy);
      const vx=pv[b], vz=pv[b+2];
      const lateralSpd=Math.sqrt(vx*vx+vz*vz);

      // Coefficient of restitution drops with impact speed (high-speed = more energy absorbed)
      // Real granulars: COR ~0.4 slow, ~0.15 fast, ~0 at terminal
      const COR=P.bounce*Math.max(0.05,1.0-impactSpd*0.09);
      pv[b+1]=impactSpd*COR; // rebound — always upward

      // Splash ejecta: particles spray at shallow angles (15°–40° from floor)
      // Energy available for lateral splash = incoming KE minus rebound KE
      const reboundFrac=COR*COR;
      const splatPool=impactSpd*(1.0-reboundFrac)*0.55;

      if(splatPool>0.05){
        // Preserve incoming horizontal momentum (inertia carries forward)
        const momentumBias=0.45; // fraction of lateral velocity that persists
        pv[b]  = vx*momentumBias;
        pv[b+2]= vz*momentumBias;

        // Add radial ejecta — biased in direction of travel, shallow angle
        // Ejecta angle from horizontal: 15°–38° (real wet/dry granulars)
        const ejectAng=(0.26+Math.random()*0.38); // radians from floor plane
        const ejectSpd=splatPool*(0.6+Math.random()*0.65);
        const ejectYaw=Math.random()*Math.PI*2; // random azimuth
        // Bias azimuth toward existing lateral travel direction
        const travelYaw=(lateralSpd>0.1)?Math.atan2(vz,vx):ejectYaw;
        const biasedYaw=travelYaw+( (Math.random()-0.5)*Math.PI*1.2 );
        pv[b]  +=Math.cos(biasedYaw)*Math.cos(ejectAng)*ejectSpd;
        pv[b+2]+=Math.sin(biasedYaw)*Math.cos(ejectAng)*ejectSpd;
        pv[b+1]+=Math.sin(ejectAng)*ejectSpd; // small upward component from ejecta

        // Rolling friction on lateral velocity after impact
        const rollingFriction=0.62+Math.random()*0.1;
        pv[b]*=rollingFriction;pv[b+2]*=rollingFriction;
      } else {
        // Very slow impact: just stop laterally (settle / stack)
        pv[b]*=0.28;pv[b+2]*=0.28;
      }
    }
    if(pp[b]<edgeL-1||pp[b]>edgeR+1)spawn(i);

    // ── Wormhole entrance: teleport to exit, unimpeded ──
    if(wormhole.active && pp[b+1] < -8.5) {
      const wdx = pp[b] - wormhole.entranceX, wdz = pp[b+2];
      if(wdx*wdx + wdz*wdz < wormhole.entranceR * wormhole.entranceR * 0.85) {
        // Preserve relative position within entrance, mapped 1:1 to exit
        const entryFracX = wdx / wormhole.entranceR;
        const entryFracZ = pp[b+2] / (wormhole.entranceR * 0.5);
        pp[b]   = wormhole.exitX + entryFracX * wormhole.exitR;
        pp[b+1] = wormhole.exitY;
        pp[b+2] = entryFracZ * wormhole.exitR * 0.5;
        // Exit at free-fall speed matching primary stream at this height
        // v = sqrt(2 * g * drop) where drop = emitter height - exitY
        const emitterY = emitterShape ? emitterShape.pos.y - (emitterShape._totalH||3.5)*0.5 : 10;
        const drop = Math.max(0, emitterY - wormhole.exitY);
        const exitSpd = Math.sqrt(2 * P.gravity * drop) + 0.5;
        pv[b]   = (Math.random()-0.5)*P.spread*0.3;
        pv[b+1] = -exitSpd;
        pv[b+2] = (Math.random()-0.5)*P.spread*0.3;
        pal[i] = 1;
      }
    }
    pv[b]*=0.997;
  }
  for(let i=N;i<MP;i++){if(pal[i]){pal[i]=0;pp[i*3+1]=-9999;}}
  pGeo.attributes.position.needsUpdate=true;

  // Fix perf: HUD DOM updates throttled on mobile (every 3rd frame vs every frame)
  if(!isMobile||_ovFrame%3===0){ countTgts();updateHUD();checkDone(); }
  // Fix #8+: overlay every 2nd frame desktop, every 3rd frame mobile
  _ovFrame++;
  const _ovStride = isMobile ? 3 : 2;
  if(_ovFrame%_ovStride===0){ drawOverlay(); drawBlackHoleOverlay(); ovTex.needsUpdate = true; }
  // else ovTex reuses prior frame — no GPU upload

  // text cursor layer drawn every frame (above 3js, below widgets)
  drawTextLayer();

  renderer.clear();
  renderer.render(scene,camera);
  renderer.render(particleScene,camera);
  // Fix perf: skip ortho overlay render on frames where texture wasn't updated
  if(ovTex.needsUpdate||_ovFrame===1) renderer.render(orthoScene,orthoCam);
}

// ── FRANK PHYSICS LOGO ───────────────────────────────────────────────────────
(function(){
  if(window.innerWidth<=600)return;
  const ids=['zl-z','zl-c','zl-k','zl-g','zl-k2','zl-g2','zl-g3'];
  const spans = ids.map(id=>document.getElementById(id)).filter(Boolean);
  if(!spans[0])return;

  // Each letter has rest position + physics state
  const letters = spans.map((el,i) => ({
    el,
    vx:0, vy:0,
    ox:0, oy:0, // offset from rest
  }));

  const K = 0.08;   // spring stiffness
  const DAMP = 0.72; // damping
  const REPEL = 60;  // repel radius
  const REPEL_STR = 2.2;

  function tickLogo(){
    const mx = mX, my = mY; // reuse main cursor coords
    // Get logo container position
    const container = document.getElementById('zckgrt-logo');
    if(!container) return;
    const cr = container.getBoundingClientRect();

    letters.forEach((lt,i) => {
      const el = lt.el;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top + r.height/2;

      // repel from cursor
      const dx = cx - mx, dy = cy - my;
      const dist = Math.sqrt(dx*dx+dy*dy);
      let fx=0, fy=0;
      if(dist < REPEL && dist > 0.5){
        const str = REPEL_STR * (1 - dist/REPEL);
        fx += (dx/dist)*str;
        fy += (dy/dist)*str;
      }

      // spring back to rest
      fx -= lt.ox * K;
      fy -= lt.oy * K;

      lt.vx = (lt.vx + fx) * DAMP;
      lt.vy = (lt.vy + fy) * DAMP;
      lt.ox += lt.vx;
      lt.oy += lt.vy;

      // clamp
      lt.ox = Math.max(-18, Math.min(18, lt.ox));
      lt.oy = Math.max(-18, Math.min(18, lt.oy));

      el.style.transform = `translate(${lt.ox.toFixed(2)}px,${lt.oy.toFixed(2)}px)`;
    });
    requestAnimationFrame(tickLogo);
  }
  tickLogo();
})();

// ═══════════════════════════════════════════════════════════════════════════════
// BASKETBALL LEVEL (index 6) — hoop, ball, rim ring, net, scoring, aim system
// (all vars hoisted at top of script near FLR declaration)
// ═══════════════════════════════════════════════════════════════════════════════

// Fix perf: mobile reduces hoop particle counts significantly
var RIM_RING_COUNT  = isMobile ? (isChrome ? 200 : 300)  : (isChrome ? 500  : 800);
var RIM_CLOUD_COUNT = isMobile ? (isChrome ? 250 : 400)  : (isChrome ? 700  : 1200);
var NET_COUNT       = isMobile ? (isChrome ? 900 : 1400) : (isChrome ? 2800 : 4200);

function _buildHoop() {
  if (_hoopGroup) {
    scene.remove(_hoopGroup);
    _hoopGroup.traverse(c => { if(c.geometry)c.geometry.dispose(); if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();} });
  }
  _hoopGroup = new THREE.Group();
  _hoopGroup.position.set(HOOP.x, HOOP.y, HOOP.z);
  scene.add(_hoopGroup);
  const rimLight = new THREE.PointLight(0xff4400, 3.5, 10);
  rimLight.position.set(0,0,0);
  _hoopGroup.add(rimLight);
  _buildRimRing();
}

function _buildRimRing() {
  if (_rimRingPoints) { scene.remove(_rimRingPoints); _rimRingGeo.dispose(); }
  if (_rimRingVels) { scene.remove(_rimRingVels._mesh); _rimRingVels._geo.dispose(); }
  if (_netPoints) { scene.remove(_netPoints); _netGeo.dispose(); }
  _hoopGlowMeshes.forEach(m=>_hoopGroup.remove(m)); _hoopPointLights.forEach(l=>_hoopGroup.remove(l));
  _hoopGlowMeshes=[]; _hoopPointLights=[];
  _hoopGroup.children.filter(c=>c.isLight).forEach(l=>_hoopGroup.remove(l));

  const lightCount = isChrome ? 0 : 4;
  for(let i=0;i<lightCount;i++){
    const angle=(i/lightCount)*Math.PI*2;
    const light=new THREE.PointLight(0xfff8e8,12.0,60);
    light.position.set(Math.cos(angle)*HOOP.rimR,0,Math.sin(angle)*HOOP.rimR);
    _hoopGroup.add(light); _hoopPointLights.push(light);
  }

  _rimRingPts=new Float32Array(RIM_RING_COUNT*3);
  _rimRingAngles=new Float32Array(RIM_RING_COUNT);
  for(let i=0;i<RIM_RING_COUNT;i++) _rimRingAngles[i]=(i/RIM_RING_COUNT)*Math.PI*2+Math.random()*0.04;
  _rimRingGeo=new THREE.BufferGeometry();
  _rimRingGeo.setAttribute('position',new THREE.BufferAttribute(_rimRingPts,3));
  const ringMat=new THREE.ShaderMaterial({
    uniforms:{uPulse:{value:1.0}},
    vertexShader:`uniform float uPulse;void main(){gl_PointSize=4.2*uPulse;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float core=exp(-d*22.0);float halo=exp(-d*7.0)*0.7;float bloom=smoothstep(0.5,0.0,d)*0.5;float a=(core*1.8+halo+bloom)*0.95;vec3 col=mix(vec3(1.0,0.92,0.72),vec3(1.0,0.98,0.95),core);gl_FragColor=vec4(col,a);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  _rimRingPoints=new THREE.Points(_rimRingGeo,ringMat);
  scene.add(_rimRingPoints);

  const TUBE_R=0.22;
  _rimCloudA=new Float32Array(RIM_CLOUD_COUNT); _rimCloudT=new Float32Array(RIM_CLOUD_COUNT);
  _rimCloudSA=new Float32Array(RIM_CLOUD_COUNT); _rimCloudST=new Float32Array(RIM_CLOUD_COUNT);
  const cloudPts=new Float32Array(RIM_CLOUD_COUNT*3);
  for(let i=0;i<RIM_CLOUD_COUNT;i++){
    _rimCloudA[i]=Math.random()*Math.PI*2; _rimCloudT[i]=Math.random()*Math.PI*2;
    _rimCloudSA[i]=(1.6+Math.random()*1.8)*(Math.random()>0.5?1:-1);
    _rimCloudST[i]=(3.0+Math.random()*4.0)*(Math.random()>0.5?1:-1);
    const a=_rimCloudA[i],t=_rimCloudT[i];
    const cx=HOOP.x+Math.cos(a)*HOOP.rimR,cz=HOOP.z+Math.sin(a)*HOOP.rimR;
    const r=TUBE_R*(0.3+Math.random()*0.7);
    cloudPts[i*3]=cx+Math.cos(a)*Math.cos(t)*r; cloudPts[i*3+1]=HOOP.y+Math.sin(t)*r; cloudPts[i*3+2]=cz+Math.sin(a)*Math.cos(t)*r;
  }
  const cloudGeo=new THREE.BufferGeometry();
  cloudGeo.setAttribute('position',new THREE.BufferAttribute(cloudPts,3));
  const cloudMat=new THREE.ShaderMaterial({
    vertexShader:`void main(){gl_PointSize=2.6;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float core=exp(-d*16.0);float halo=exp(-d*5.5)*0.5;float a=(core+halo)*0.78;vec3 col=mix(vec3(1.0,0.88,0.55),vec3(1.0,0.97,0.88),core);gl_FragColor=vec4(col,a);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  const cloudPoints=new THREE.Points(cloudGeo,cloudMat);
  scene.add(cloudPoints);
  _rimRingVels={_mesh:cloudPoints,_geo:cloudGeo,_pts:cloudPts,_TUBE_R:TUBE_R};

  // ── NET: particles fall from rim all the way to ground (FLR = -9.0) ────────
  _netPts=new Float32Array(NET_COUNT*3); _netVel=new Float32Array(NET_COUNT*3);
  _netAge=new Float32Array(NET_COUNT); _netLife=new Float32Array(NET_COUNT);
  for(let i=0;i<NET_COUNT;i++){ _spawnNetParticle(i); _netAge[i]=Math.random()*_netLife[i]; }
  _netGeo=new THREE.BufferGeometry();
  _netGeo.setAttribute('position',new THREE.BufferAttribute(_netPts,3));
  const netMat=new THREE.ShaderMaterial({
    vertexShader:`void main(){gl_PointSize=3.2;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float core=exp(-d*14.0);float halo=exp(-d*5.0)*0.55;float a=(core*1.6+halo)*0.88;vec3 col=mix(vec3(1.0,0.96,0.88),vec3(1.0,1.0,1.0),core);gl_FragColor=vec4(col,a);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  _netPoints=new THREE.Points(_netGeo,netMat);
  scene.add(_netPoints);
}

function _spawnNetParticle(i) {
  const b=i*3;
  const angle=Math.random()*Math.PI*2;
  const rFrac=0.25+Math.random()*0.75;
  const spawnR=HOOP.rimR*rFrac;
  const anchorX=HOOP.x+HOOP.rimR;
  const spawnX=HOOP.x+Math.cos(angle)*spawnR;
  const spawnZ=HOOP.z+Math.sin(angle)*spawnR;
  const leverArm=anchorX-spawnX;
  const spawnY=HOOP.y+Math.sin(HOOP._rimTilt+HOOP._dbTilt)*leverArm-0.04;
  _netPts[b]=spawnX; _netPts[b+1]=spawnY; _netPts[b+2]=spawnZ;
  const inwardFrac=rFrac*0.4;
  const inwardSpd=inwardFrac*(0.8+Math.random()*0.7);
  const tier=Math.floor(Math.random()*3);
  const tierSpeeds=[0.6,1.3,2.4];
  const downSpd=tierSpeeds[tier]+Math.random()*0.6;
  _netVel[b]=-Math.cos(angle)*inwardSpd+(Math.random()-0.5)*0.1;
  _netVel[b+1]=-downSpd;
  _netVel[b+2]=-Math.sin(angle)*inwardSpd+(Math.random()-0.5)*0.08;
  // Lifetime: long enough for particles to reach FLR (-9.0) from hoop (~3.8)
  // Drop = ~12.8 units, slowest tier speed ~0.6+grav — use ~4s max life
  const lifetimes=[3.8,2.2,1.0];
  _netLife[i]=lifetimes[tier]+Math.random()*1.2;
  _netAge[i]=0;
}

let _rimRingFrame=0;
function _tickRimRing(dt) {
  if(!_rimRingPts||!_rimRingPoints) return;
  _rimRingT+=dt;
  _rimRingFrame++;
  const ORBIT_SPEED=1.8;
  const pulse=1.0+Math.sin(_rimRingT*2.1)*0.08;
  if(_rimRingPoints.material.uniforms) _rimRingPoints.material.uniforms.uPulse.value=pulse;
  const anchorX=HOOP.x+HOOP.rimR;
  const combinedTiltVis=HOOP._rimTilt+HOOP._dbTilt;

  for(let i=0;i<RIM_RING_COUNT;i++){
    _rimRingAngles[i]+=ORBIT_SPEED*dt*(1.0+(i%11)*0.003);
    const angle=_rimRingAngles[i];
    const jR=Math.sin(_rimRingT*2.8+i*0.41)*0.04;
    const jY=Math.sin(_rimRingT*2.3+i*0.57)*0.04;
    const r=HOOP.rimR+jR;
    const rx=HOOP.x+Math.cos(angle)*r;
    const rz=HOOP.z+Math.sin(angle)*r;
    const leverArm=anchorX-rx;
    const tiltY=Math.sin(combinedTiltVis)*leverArm;
    _rimRingPts[i*3]=rx; _rimRingPts[i*3+1]=HOOP.y+tiltY+jY; _rimRingPts[i*3+2]=rz;
  }
  _rimRingGeo.attributes.position.needsUpdate=true;

  if(_rimRingVels&&_rimRingVels._pts){
    const cv=_rimRingVels, TUBE_R=cv._TUBE_R;
    for(let i=0;i<RIM_CLOUD_COUNT;i++){
      _rimCloudA[i]+=_rimCloudSA[i]*dt; _rimCloudT[i]+=_rimCloudST[i]*dt;
      const a=_rimCloudA[i],t=_rimCloudT[i];
      const cx=HOOP.x+Math.cos(a)*HOOP.rimR, cz=HOOP.z+Math.sin(a)*HOOP.rimR;
      const leverArm=anchorX-cx;
      const cy=HOOP.y+Math.sin(combinedTiltVis)*leverArm;
      const nr=Math.cos(t)*TUBE_R, ny=Math.sin(t)*TUBE_R;
      cv._pts[i*3]=cx+Math.cos(a)*nr; cv._pts[i*3+1]=cy+ny; cv._pts[i*3+2]=cz+Math.sin(a)*nr;
    }
    cv._geo.attributes.position.needsUpdate=true;
  }

  // ── Net: fall to ground, react with FLR, settle/splash ──────────────────────
  if(_netPts&&_netPoints){
    const NET_GRAV_BASE=8.0;
    const CONE_FORCE=3.8;
    const NET_DAMPEN=0.94;
    const NET_BOTTOM=FLR+0.05; // ground level — particles react here

    // ── Ball collision: push net particles away when ball enters hoop zone ──
    const ballCollR=_bbBall ? _bbBall.radius*1.6 : 0;
    const bpx=_bbBall ? _bbBall.pos.x : 0;
    const bpy=_bbBall ? _bbBall.pos.y : 0;
    const bpz=_bbBall ? (_bbBall.pos.z||0) : 0;
    // Only active when ball is within the net zone (below rim, above floor)
    const ballInNetZone=_bbBall &&
      bpy < HOOP.y+ballCollR &&
      bpy > NET_BOTTOM+ballCollR &&
      Math.sqrt((bpx-HOOP.x)**2+(bpz-HOOP.z)**2) < HOOP.rimR*1.3;

    // Fix perf: throttle net particle physics to every 2nd frame on mobile
    const _runNet = !isMobile || _rimRingFrame%2===0;
    for(let i=0;i<NET_COUNT;i++){
      if(!_runNet){ _netPts[i*3]+=_netVel[i*3]*dt; _netPts[i*3+1]+=_netVel[i*3+1]*dt; _netPts[i*3+2]+=_netVel[i*3+2]*dt; continue; }
      _netAge[i]+=dt;
      if(_netAge[i]>=_netLife[i]){ _spawnNetParticle(i); continue; }
      const b=i*3;
      const gravMults=[0.32,0.75,2.2];
      const tierIdx=i%3;
      _netVel[b+1]-=NET_GRAV_BASE*gravMults[tierIdx]*dt;

      // Inward cone force — tapers net shape, only applies above ground
      const depthBelow=HOOP.y-_netPts[b+1];
      if(depthBelow>0&&_netPts[b+1]>NET_BOTTOM){
        const NET_DEPTH=HOOP.y-FLR; // full floor-to-hoop distance
        const coneT=Math.min(1.0,depthBelow/NET_DEPTH);
        const toCX=HOOP.x-_netPts[b], toCZ=HOOP.z-_netPts[b+2];
        const toDist=Math.sqrt(toCX*toCX+toCZ*toCZ)+0.001;
        const inF=CONE_FORCE*coneT*coneT;
        _netVel[b]+=(toCX/toDist)*inF*dt;
        _netVel[b+2]+=(toCZ/toDist)*inF*dt;
      }

      // ── Ball proximity repulsion ──────────────────────────────────────────
      if(ballInNetZone){
        const ndx=_netPts[b]-bpx, ndy=_netPts[b+1]-bpy, ndz=_netPts[b+2]-bpz;
        const nd=Math.sqrt(ndx*ndx+ndy*ndy+ndz*ndz)+0.001;
        if(nd<ballCollR*2.2){
          // Soft repulsion: strongest at contact, fades to zero at 2.2r
          const overlap=1.0-(nd/(ballCollR*2.2));
          const force=22.0*overlap*overlap;
          // Bias downward slightly to simulate ball pushing net through
          _netVel[b]+=(ndx/nd)*force*dt;
          _netVel[b+1]+=(ndy/nd)*force*dt - 2.5*overlap*dt;
          _netVel[b+2]+=(ndz/nd)*force*dt;
        }
      }

      _netVel[b]*=NET_DAMPEN; _netVel[b+1]*=NET_DAMPEN; _netVel[b+2]*=NET_DAMPEN;
      _netPts[b]+=_netVel[b]*dt; _netPts[b+1]+=_netVel[b+1]*dt; _netPts[b+2]+=_netVel[b+2]*dt;

      // Ground reaction — bounce/settle like scene particles
      if(_netPts[b+1]<NET_BOTTOM){
        _netPts[b+1]=NET_BOTTOM;
        const vy=_netVel[b+1];
        const COR=P.bounce*Math.max(0.05,1.0-Math.abs(vy)*0.09);
        if(vy<0){ _netVel[b+1]=-vy*COR; }
        _netVel[b]*=0.55; _netVel[b+2]*=0.55;
      }
    }
    _netGeo.attributes.position.needsUpdate=true;

    // ── ZenOrb influence on net particles ────────────────────────────────────
    // Strong enough to visibly bend the falling stream toward the ball —
    // same character as the ground-particle interaction.
    if (_bbBall && !_bbBall.dragging) {
      const ZEN_NET_R = 7.0;   // wide radius — catches the whole stream column
      const ZEN_NET_STR = 28.0; // strong enough to visibly deflect falling particles
      const bx = _bbBall.pos.x, by = _bbBall.pos.y, bz = _bbBall.pos.z || 0;
      for (let i = 0; i < NET_COUNT; i++) {
        const b = i * 3;
        const dx = bx - _netPts[b], dy = by - _netPts[b+1], dz = bz - _netPts[b+2];
        const dist2 = dx*dx + dy*dy + dz*dz;
        if (dist2 > ZEN_NET_R * ZEN_NET_R) continue;
        const dist = Math.sqrt(dist2) + 0.001;
        const falloff = 1.0 - dist / ZEN_NET_R;
        const f = ZEN_NET_STR * falloff * falloff * dt / dist;
        _netVel[b]   += dx * f;
        _netVel[b+1] += dy * f;
        _netVel[b+2] += dz * f;
      }
    }
  }

  const lightCount=_hoopPointLights.length;
  _hoopPointLights.forEach((light,i)=>{
    const angle=_rimRingT*1.1+(i/lightCount)*Math.PI*2;
    light.position.set(Math.cos(angle)*HOOP.rimR,Math.sin(_rimRingT*0.7+i)*0.3,Math.sin(angle)*HOOP.rimR);
    light.intensity=1.0+pulse*5.0;
  });
}

const BALL_SPAWN={x:-4.5,y:-2.0,z:0};

function _spawnBall(){
  if(_bbBall){_bbBall.dispose();const _bi=attractors.indexOf(_bbBall);if(_bi>=0)attractors.splice(_bi,1);}
  const pos=new THREE.Vector3(BALL_SPAWN.x,BALL_SPAWN.y,0);
  const ball=new Attractor('blackhole',pos,true);
  ball._bouncingBH=true; ball._isBBall=true;
  ball.radius=0.72; ball.consumeRadius=0.001; ball.pullStrength=32.0;
  ball.vel.set(0,-0.4,0);
  ball._bbGravity=17.0; ball._bbRestitution=0.62; ball._bbFriction=0.985; ball._bbMaxSpd=36;
  attractors.push(ball); _bbBall=ball;
  HOOP._lastBallY=null; HOOP._passThroughArmed=false;
  HOOP._dbTilt=0; HOOP._dbVel=0;
}

function _tickBBall(dt, realDt){
  if(!_bbBall||_bbBall.dragging) return;
  // realDt: used for gravity so ball falls at consistent speed even in slowmo
  // dt (scaledDt): used for position/velocity integration to keep slowmo feel
  if(realDt===undefined) realDt=dt;
  const b=_bbBall;
  const GRAV=b._bbGravity||17.0;
  b.vel.y-=GRAV*realDt; b.pos.x+=b.vel.x*dt; b.pos.y+=b.vel.y*dt;

  // ── Primary rim spring (stiff, well-damped — keeps rim roughly level) ──────
  const rimTiltSpring=-HOOP._rimSpringK*HOOP._rimTilt;
  const rimTiltDamp=-HOOP._rimDamp*HOOP._rimTiltVel;
  HOOP._rimTiltVel+=(rimTiltSpring+rimTiltDamp)*dt;
  HOOP._rimTilt+=HOOP._rimTiltVel*dt;
  HOOP._rimTilt=Math.max(-0.32,Math.min(0.32,HOOP._rimTilt));

  // ── Diving-board secondary oscillator (soft spring, low damping = wobble) ──
  const dbSpring=-HOOP._dbSpringK*HOOP._dbTilt;
  const dbDamp=-HOOP._dbDamp*HOOP._dbVel;
  HOOP._dbVel+=(dbSpring+dbDamp)*dt;
  HOOP._dbTilt+=HOOP._dbVel*dt;
  HOOP._dbTilt=Math.max(-0.38,Math.min(0.38,HOOP._dbTilt));

  const rimCX=HOOP.x,rimCZ=HOOP.z;
  const rdx=b.pos.x-rimCX,rdz=(b.pos.z||0)-rimCZ;
  const radDist=Math.sqrt(rdx*rdx+rdz*rdz);
  const ballR=b.radius*Math.sqrt(b.pullStrength/57.0)*0.7;

  if(radDist>0.001){
    const closestRingX=rimCX+(rdx/radDist)*HOOP.rimR;
    const closestRingZ=rimCZ+(rdz/radDist)*HOOP.rimR;
    // contactDirX: signed X component of the radial hit direction (-1=left, +1=right)
    const contactDirX=rdx/radDist;
    // rimOffsetX: signed X offset of contact point from rim center
    const rimOffsetX=closestRingX-rimCX;
    // Combined tilt: primary + diving-board, applied along X for visual
    const combinedTilt=HOOP._rimTilt+HOOP._dbTilt;
    // Tilt displaces Y based on signed X offset from rim center
    const tiltedRingY=HOOP.y+Math.sin(combinedTilt)*rimOffsetX;
    const toX=b.pos.x-closestRingX,toY=b.pos.y-tiltedRingY,toZ=(b.pos.z||0)-closestRingZ;
    const toRimDist=Math.sqrt(toX*toX+toY*toY+toZ*toZ);
    const minDist=HOOP.rimTube+ballR;
    if(toRimDist<minDist&&toRimDist>0.001){
      const nx=toX/toRimDist,ny=toY/toRimDist,nz=toZ/toRimDist;
      const pen=minDist-toRimDist;
      b.pos.x+=nx*pen*1.1; b.pos.y+=ny*pen*1.1;
      if(b.pos.z!==undefined) b.pos.z+=nz*pen*1.1;
      const vDotN=b.vel.x*nx+b.vel.y*ny+(b.vel.z||0)*nz;
      if(vDotN<0){
        // edgeFrac: 0 at rim center, ramps to 1 in outer 40% of the rim ring
        const edgeFrac=Math.max(0,(Math.abs(contactDirX)-0.60)/0.40);
        const REST_RIM=0.55+edgeFrac*0.32;
        b.vel.x-=(1+REST_RIM)*vDotN*nx; b.vel.y-=(1+REST_RIM)*vDotN*ny;
        if(b.vel.z!==undefined) b.vel.z-=(1+REST_RIM)*vDotN*nz;
        b.vel.x*=0.85+edgeFrac*0.08; b.vel.y*=0.85+edgeFrac*0.08;
        const impactSpeed=Math.abs(vDotN);
        const downImpact=Math.max(0,-ny)*impactSpeed;

        // ── Symmetric diving-board response ──────────────────────────────────
        // contactDirX: +1 = right-side hit, -1 = left-side hit.
        // _dbTilt > 0 = right side low; _dbVel drives it in that direction.
        // So multiplying by contactDirX makes either side dip correctly.
        if(edgeFrac>0.02){
          HOOP._dbVel+=downImpact*edgeFrac*2.8*contactDirX;
          HOOP._rimTiltVel+=downImpact*edgeFrac*HOOP._rimImpulseScale*0.5*contactDirX;
        }

        HOOP.scoreFlash=Math.max(HOOP.scoreFlash,0.22+edgeFrac*0.18);
      }
    }
  }

  const edgeL2=s2w(0,H/2).x-1.5, edgeR2=s2w(W,H/2).x+1.5;
  const BY_FLOOR=FLR+ballR+0.05; // ball rests on FLR ground
  const BY_CEIL=s2w(W/2,-60).y; // ~60px above viewport top
  if(b.pos.y-ballR<BY_FLOOR){
    b.pos.y=BY_FLOOR+ballR;
    if(b.vel.y<0){ b.vel.y=-b.vel.y*(b._bbRestitution||0.62); b.vel.x*=b._bbFriction||0.985; }
  }
  if(b.pos.y+ballR>BY_CEIL){ b.pos.y=BY_CEIL-ballR; if(b.vel.y>0) b.vel.y=-b.vel.y*0.5; }
  if(b.pos.x-ballR<edgeL2){ b.pos.x=edgeL2+ballR; if(b.vel.x<0) b.vel.x=-b.vel.x*0.72; }
  if(b.pos.x+ballR>edgeR2){ b.pos.x=edgeR2-ballR; if(b.vel.x>0) b.vel.x=-b.vel.x*0.72; }

  const spd=Math.sqrt(b.vel.x**2+b.vel.y**2);
  if(spd>(b._bbMaxSpd||24)){const s=b._bbMaxSpd/spd;b.vel.x*=s;b.vel.y*=s;}

  const rimXZDist=Math.sqrt((b.pos.x-HOOP.x)**2+((b.pos.z||0)-HOOP.z)**2);
  const ballAboveRim=b.pos.y>HOOP.y+ballR+0.05;
  const ballInsideRim=rimXZDist<HOOP.rimR*0.88;
  const ballBelowRim=b.pos.y<HOOP.y-0.12;
  if(!HOOP._passThroughArmed&&ballAboveRim&&ballInsideRim) HOOP._passThroughArmed=true;
  if(HOOP._passThroughArmed&&ballBelowRim&&ballInsideRim&&b.vel.y<0){ HOOP._passThroughArmed=false; _registerScore(); }
  if(HOOP._passThroughArmed&&!ballInsideRim) HOOP._passThroughArmed=false;

  b.mesh.position.set(b.pos.x,b.pos.y,b.pos.z||0);
  b.mesh.updateMatrixWorld(true);
}

function _registerScore(){
  HOOP.totalScore++; HOOP.streak++; HOOP.scoreFlash=1.0; HOOP.scored=true;
  setTimeout(()=>{HOOP.scored=false;},2200);
  const sc=document.getElementById('bball-score'); if(sc) sc.textContent=HOOP.totalScore;
  // Bold lower-right score tracker
  const tr=document.getElementById('bb-score-tracker');
  if(tr){
    const n=HOOP.totalScore;
    tr.textContent=n<10?'0'+n:String(n);
    tr.classList.add('flash');
    setTimeout(()=>tr.classList.remove('flash'),400);
  }
  const st=document.getElementById('bball-streak');
  if(st){ if(HOOP.streak>=3) st.textContent=HOOP.streak+'x STREAK'; else if(HOOP.streak>=2) st.textContent='× '+HOOP.streak; else st.textContent=''; }
  // Score text on left side (replaces the good-shot float text)
  const msg=HOOP.streak>1?HOOP.streak+'x streak':'nice shot!';
  _buildFloatText([`+${HOOP.totalScore}`,msg],true);
  if(_hoopGroup){ const rimL=_hoopGroup.children.find(c=>c.isLight); if(rimL){rimL.intensity=6.0;setTimeout(()=>{rimL.intensity=1.2;},400);} }
  HOOP._rimTiltVel+=0.6*(Math.random()>0.5?1:-1);
  _scoreBurst();
}

function _scoreBurst(){
  const N=Math.min(P.count,MP); let count=0; const BURST=320;
  // Ball velocity direction at moment of score (for directional splash bias)
  const ballVx = _bbBall ? _bbBall.vel.x : 0;
  const ballVy = _bbBall ? _bbBall.vel.y : -1;
  const ballSpd = Math.sqrt(ballVx*ballVx + ballVy*ballVy) || 1;
  const bvnx = ballVx / ballSpd, bvny = ballVy / ballSpd;

  for(let i=0;i<N&&count<BURST;i++){
    if(!pal[i]||pa[i]>pl[i]*0.6){
      const b=i*3;
      const angle=Math.random()*Math.PI*2;
      const rimR=HOOP.rimR*(0.3+Math.random()*0.9);
      pp[b]=HOOP.x+Math.cos(angle)*rimR; pp[b+1]=HOOP.y+(Math.random()-0.1)*0.4; pp[b+2]=HOOP.z+Math.sin(angle)*rimR;

      // Splash velocity: radial outward from rim + bias in ball's travel direction
      // This creates a crown splash — particles arc away from the hoop plane
      const radialSpeed = 4.0 + Math.random()*9.0;
      const upBias = 0.4 + Math.random()*1.8;
      // Rim-plane outward component
      const rimOutX = Math.cos(angle) * (0.6 + Math.random()*0.8);
      const rimOutZ = Math.sin(angle) * (0.6 + Math.random()*0.8);
      // Ball-direction carry: ~30% bias so particles fan out like water through a hoop
      const carryFrac = 0.28 + Math.random()*0.22;
      pv[b]   = (rimOutX * radialSpeed) + bvnx * radialSpeed * carryFrac;
      pv[b+1] = upBias * radialSpeed * 0.55 + bvny * radialSpeed * carryFrac * 0.5;
      pv[b+2] = rimOutZ * radialSpeed;

      ps[i]=0.14+Math.random()*0.28; pl[i]=1.4+Math.random()*1.8; pa[i]=0; pal[i]=1; pGravTier[i]=Math.floor(Math.random()*3); count++;
    }
  }

  // Slow hoop-plane ring: lower-speed particles in the rim plane that get
  // visibly captured/deflected by the ZenOrb's boosted field
  const RING = 80;
  let ringCount = 0;
  for(let i=0;i<N&&ringCount<RING;i++){
    if(!pal[i]||pa[i]>pl[i]*0.45){
      const b=i*3;
      const angle=(ringCount/RING)*Math.PI*2 + Math.random()*0.18;
      pp[b]=HOOP.x+Math.cos(angle)*HOOP.rimR*1.05;
      pp[b+1]=HOOP.y + (Math.random()-0.5)*0.2;
      pp[b+2]=HOOP.z+Math.sin(angle)*HOOP.rimR*1.05;
      // Slow radial — ZenOrb can visibly bend/capture these
      const ringSpd = 1.2 + Math.random()*2.4;
      pv[b]   = Math.cos(angle)*ringSpd;
      pv[b+1] = (Math.random()-0.3)*ringSpd*0.4;
      pv[b+2] = Math.sin(angle)*ringSpd;
      ps[i]=0.18+Math.random()*0.22; pl[i]=1.8+Math.random()*2.2; pa[i]=0; pal[i]=1; pGravTier[i]=0; ringCount++;
    }
  }
}

// ── AIM & THROW SYSTEM ────────────────────────────────────────────────────────
// _aimDrag vars hoisted at top
let _aimCanvasEl = null; // cached on first use
function _getAimCanvas(){ if(!_aimCanvasEl) _aimCanvasEl=document.getElementById('aim-canvas'); return _aimCanvasEl; }

function _drawAim(){
  const ac=_getAimCanvas(); if(!ac) return;
  const dpr=Math.min(window.devicePixelRatio||1,isMobile?1.5:2.0);
  if(ac.width!==W*dpr){ac.width=W*dpr;ac.height=H*dpr;}
  const ctx=ac.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  if(lvl===6&&_bbBall&&_hoopGroup) _drawBballHUD(ctx,dpr);
  if(!_aimDrag||!_bbBall) return;
  _ovV3.copy(_bbBall.pos).project(camera);
  const bsx=(_ovV3.x+1)/2*W, bsy=(-_ovV3.y+1)/2*H;
  const dx=_aimStart.x-_aimCurrent.x, dy=_aimStart.y-_aimCurrent.y;
  const dist=Math.sqrt(dx*dx+dy*dy), maxDrag=200, power=Math.min(dist/maxDrag,1.0);
  const STEPS=48, vx0=dx/maxDrag*30, vy0=-dy/maxDrag*30, GRAV_SIM=7.2;
  ctx.save();
  ctx.strokeStyle=isMobile?`rgba(255,255,255,${0.05+power*0.07})`:`rgba(255,220,80,${0.22+power*0.55})`;
  ctx.lineWidth=isMobile?0.5:1.5;
  ctx.setLineDash(isMobile?[2,7]:[4,6]);
  ctx.beginPath();
  let px=_bbBall.pos.x,py=_bbBall.pos.y,pvx=vx0,pvy=vy0,first=true;
  for(let s=0;s<STEPS;s++){
    const simDt=0.075; pvy-=GRAV_SIM*simDt; px+=pvx*simDt; py+=pvy*simDt;
    _ovV3.set(px,py,0).project(camera);
    const psx=(_ovV3.x+1)/2*W, psy=(-_ovV3.y+1)/2*H;
    if(first){ctx.moveTo(psx,psy);first=false;}else ctx.lineTo(psx,psy);
  }
  ctx.stroke(); ctx.setLineDash([]);
  if(!isMobile){
    const powerR=10+power*22;
    ctx.beginPath(); ctx.arc(bsx,bsy,powerR,-Math.PI/2,-Math.PI/2+power*Math.PI*2);
    ctx.strokeStyle=`rgba(255,200,60,${0.4+power*0.5})`; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();
}

// ── BULLET TIME ───────────────────────────────────────────────────────────────
const _btArcV=new THREE.Vector3(); // Fix #5: reused across bullet-time arc frames
// Fix perf: pre-allocated arc points array — no per-frame object creation
const _BT_STEPS=60;
const _btArcPts=Array.from({length:_BT_STEPS},()=>({sx:0,sy:0,wx:0,wy:0}));
function _btComputeArc(){
  if(!_bulletTime||!_bbBall) return false;
  const GRAV_SIM=7.2, MAX_V=30;
  const mw=s2w(_bulletTimeMouse.x,_bulletTimeMouse.y);
  const dx=mw.x-_bbBall.pos.x, dy=mw.y-_bbBall.pos.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const tFlight=Math.max(0.4,Math.min(2.4,dist/8.0));
  let vx=dx/tFlight, vy=dy/tFlight+0.5*GRAV_SIM*tFlight;
  const mag=Math.sqrt(vx*vx+vy*vy);
  if(mag>MAX_V){vx*=MAX_V/mag;vy*=MAX_V/mag;}
  _btLaunchVx=vx; _btLaunchVy=vy;
  const simDt=tFlight/_BT_STEPS;
  let px=_bbBall.pos.x,py=_bbBall.pos.y,pvx=vx,pvy=vy,minHoopDist=Infinity;
  for(let s=0;s<_BT_STEPS;s++){
    pvy-=GRAV_SIM*simDt; px+=pvx*simDt; py+=pvy*simDt;
    _btArcV.set(px,py,0).project(camera);
    const pt=_btArcPts[s];
    pt.sx=(_btArcV.x+1)/2*W; pt.sy=(-_btArcV.y+1)/2*H; pt.wx=px; pt.wy=py;
    const hd=Math.sqrt((px-HOOP.x)**2+(py-HOOP.y)**2);
    if(hd<minHoopDist) minHoopDist=hd;
  }
  const targetLockOn=minHoopDist<HOOP.rimR*1.1?1.0:0.0;
  _btLockOn+=(targetLockOn-_btLockOn)*0.18;
  return{arcPts:_btArcPts,tFlight,vx,vy};
}

function _drawBulletTimeOverlay(){
  if(!_bulletTime||!_bbBall) return;
  const ac=_getAimCanvas(); if(!ac) return;
  const dpr=Math.min(window.devicePixelRatio||1,isMobile?1.5:2.0);
  if(ac.width!==W*dpr){ac.width=W*dpr;ac.height=H*dpr;}
  const ctx=ac.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  // Vignette — much fainter on mobile
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(0,0,0,${isMobile?0.10:0.28})`);
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  const arc=_btComputeArc(); if(!arc) return;
  const{arcPts,tFlight}=arc, n=arcPts.length;
  _ovV3.copy(_bbBall.pos).project(camera);
  const bsx=(_ovV3.x+1)/2*W,bsy=(-_ovV3.y+1)/2*H;
  _ovV3.set(HOOP.x,HOOP.y,HOOP.z).project(camera);
  const hsx=(_ovV3.x+1)/2*W,hsy=(-_ovV3.y+1)/2*H;
  if(!isFinite(bsx)||!isFinite(bsy)||!isFinite(hsx)||!isFinite(hsy)) return;
  const locked=_btLockOn;
  const arcR=255,arcG=Math.round(180+locked*75),arcB=Math.round(40+locked*160);
  ctx.save();
  if(isMobile){
    // Mobile: single hairline arc, no glow pass, no labels
    ctx.beginPath(); ctx.setLineDash([2,6]);
    ctx.lineDashOffset=-(Date.now()*0.03%8);
    for(let s=0;s<n;s++) s===0?ctx.moveTo(arcPts[s].sx,arcPts[s].sy):ctx.lineTo(arcPts[s].sx,arcPts[s].sy);
    ctx.strokeStyle=`rgba(255,255,255,${0.06+locked*0.07})`; ctx.lineWidth=0.5; ctx.stroke();
    ctx.setLineDash([]);
    // Tiny hoop dot
    ctx.beginPath(); ctx.arc(hsx,hsy,2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.12+locked*0.12})`; ctx.fill();
  } else {
    // Desktop: full treatment
    ctx.beginPath(); ctx.setLineDash([]); ctx.lineWidth=7+locked*5;
    ctx.strokeStyle=`rgba(${arcR},${arcG},${arcB},${0.08+locked*0.14})`;
    for(let s=0;s<n;s++) s===0?ctx.moveTo(arcPts[s].sx,arcPts[s].sy):ctx.lineTo(arcPts[s].sx,arcPts[s].sy);
    ctx.stroke();
    ctx.lineWidth=1.8+locked*0.8; ctx.setLineDash([6,5]); ctx.lineDashOffset=-(Date.now()*0.04%11);
    for(let s=1;s<n;s++){
      const alpha=(1-s/n)*(0.55+locked*0.45);
      ctx.beginPath(); ctx.strokeStyle=`rgba(${arcR},${arcG},${arcB},${alpha})`;
      ctx.moveTo(arcPts[s-1].sx,arcPts[s-1].sy); ctx.lineTo(arcPts[s].sx,arcPts[s].sy); ctx.stroke();
    }
    ctx.setLineDash([]);
    const last=arcPts[n-1];
    ctx.beginPath(); ctx.arc(last.sx,last.sy,5+locked*3,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${arcR},${arcG},${arcB},${0.55+locked*0.45})`; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(bsx,bsy,12+locked*4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,230,${0.3+locked*0.25})`; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(hsx,hsy,20-locked*4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${arcR},${arcG},${arcB},${(0.35+locked*0.55)*0.7})`; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(hsx,hsy,3+locked*3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${arcR},${arcG},${arcB},${0.35+locked*0.55})`; ctx.fill();
    ctx.font='600 9px "Helvetica Neue",Arial,sans-serif';
    ctx.fillStyle=`rgba(${arcR},${arcG},${arcB},${0.35+locked*0.3})`; ctx.textAlign='center';
    ctx.fillText(locked>0.6?'LOCKED · CLICK TO FIRE':'BULLET TIME · AIM WITH MOUSE · CLICK TO FIRE · RIGHT-CLICK TO EXIT',W/2,H-24);
  }
  ctx.restore();
  _drawBballHUD(ctx,dpr);
}

// ── HOOP HALO DOT + CURSOR HALO RING ─────────────────────────────────────────
var _bbHaloT=0, _bbHaloDt=0.016;
function _drawBballHUD(ctx,dpr){
  if(!_bbBall||!_hoopGroup) return;
  _bbHaloT+=_bbHaloDt;

  _ovV3.copy(_bbBall.pos).project(camera);
  const bsx=(_ovV3.x+1)/2*W, bsy=(-_ovV3.y+1)/2*H;
  if(!isFinite(bsx)||!isFinite(bsy)) return;
  const cx=_bulletTime?_bulletTimeMouse.x:mX;
  const cy=_bulletTime?_bulletTimeMouse.y:mY;

  const outerGlowR3d=_bbBall.radius*3.60;
  _ovV3.set(_bbBall.pos.x+outerGlowR3d,_bbBall.pos.y,_bbBall.pos.z||0).project(camera);
  const outerScreenR=Math.max(16,Math.abs((_ovV3.x+1)/2*W - bsx));

  // ── Halo dot tracking cursor (suppressed on mobile) ───────────────────────
  const toCursorA=Math.atan2(cy-bsy, cx-bsx);
  const cursorDistB=Math.sqrt((cx-bsx)**2+(cy-bsy)**2);
  const farFrac=Math.min(1.0,Math.max(0,(cursorDistB-outerScreenR*0.5)/(outerScreenR*1.3)));
  const idleAngle=_bbHaloT*0.55;
  const haloDotTarget=farFrac>0.05 ? toCursorA : idleAngle;
  let haloDotDelta=haloDotTarget-_bbHaloDotA;
  haloDotDelta=haloDotDelta-Math.round(haloDotDelta/(Math.PI*2))*Math.PI*2;
  _bbHaloDotA+=haloDotDelta*(farFrac>0.05 ? 0.14 : 0.07);
  const haloDotA=_bbHaloDotA;
  const hdx=Math.cos(haloDotA)*outerScreenR;
  const hdy=Math.sin(haloDotA)*outerScreenR;
  const hdPulse=0.8+Math.sin(_bbHaloT*3.1)*0.2;

  // ── Twirl mode: ghost tether line only ────────────────────────────────────
  if(_twirlActive){
    const fsx=_twirlFxScreen, fsy=_twirlFyScreen;
    _ovV3.copy(_bbBall.pos).project(camera);
    const ballSx=(_ovV3.x+1)/2*W, ballSy=(-_ovV3.y+1)/2*H;
    const spinGlow=Math.min(1,Math.abs(_twirlAngVel)/12);
    ctx.save();
    // Single hairline tether
    ctx.beginPath(); ctx.moveTo(fsx,fsy); ctx.lineTo(ballSx,ballSy);
    ctx.strokeStyle=`rgba(255,255,255,${0.04+spinGlow*0.06})`;
    ctx.lineWidth=0.5; ctx.setLineDash([2,6]);
    ctx.lineDashOffset=-((_bbHaloT*_twirlAngVel*30)%8);
    ctx.stroke(); ctx.setLineDash([]);
    // Pivot: single tiny dot
    ctx.beginPath(); ctx.arc(fsx,fsy,1.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.15+spinGlow*0.2})`; ctx.fill();
    ctx.restore();
    return;
  }

  // ── Halo dot (mobile: much smaller + fainter) ─────────────────────────────
  ctx.save();
  if(isMobile){
    ctx.beginPath(); ctx.arc(bsx+hdx,bsy+hdy,1.2*hdPulse,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(bsx+hdx,bsy+hdy,2.8*hdPulse,0,Math.PI*2);
    ctx.fillStyle='rgba(255,210,80,0.72)'; ctx.fill();
    ctx.beginPath(); ctx.arc(bsx+hdx,bsy+hdy,5.5*hdPulse,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,60,0.14)'; ctx.fill();
  }
  ctx.restore();

  // ── Cursor halo ring (desktop only) ──────────────────────────────────────
  if(isMobile) return;
  const CURSOR_R=18;
  const toBallA=Math.atan2(bsy-cy, bsx-cx);
  const ballDist=Math.sqrt((bsx-cx)**2+(bsy-cy)**2);
  const ballFarFrac=Math.min(1.0,Math.max(0,(ballDist-CURSOR_R*0.5)/(CURSOR_R*2.2)));
  const idleAngle2=_bbHaloT*(-0.7);
  if(typeof _bbCursorDotA==='undefined') _bbCursorDotA=idleAngle2;
  const targetA=ballFarFrac>0.05 ? toBallA : idleAngle2;
  let dA=targetA-_bbCursorDotA;
  dA=dA-Math.round(dA/(Math.PI*2))*Math.PI*2;
  _bbCursorDotA+=dA*(ballFarFrac>0.05 ? 0.18 : 0.08);
  const cursorDotA=_bbCursorDotA;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,CURSOR_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,230,0.09)'; ctx.lineWidth=1.0; ctx.stroke();
  const cdx=Math.cos(cursorDotA)*CURSOR_R, cdy=Math.sin(cursorDotA)*CURSOR_R;
  const cdPulse=0.8+Math.sin(_bbHaloT*2.7+1.4)*0.2;
  ctx.beginPath(); ctx.arc(cx+cdx,cy+cdy,2.4*cdPulse,0,Math.PI*2);
  ctx.fillStyle='rgba(255,240,180,0.68)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+cdx,cy+cdy,4.8*cdPulse,0,Math.PI*2);
  ctx.fillStyle='rgba(255,220,100,0.12)'; ctx.fill();
  ctx.restore();
}

function _drawScoreFlash(){
  if(HOOP.scoreFlash<=0) return;
