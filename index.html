<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
body{background:#0a0a0a;overflow:hidden;font-family:'Courier New',monospace;cursor:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;}
#cursor{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;width:18px;height:11px;border-radius:50%;background:rgba(255,255,248,0.92);box-shadow:0 0 8px rgba(255,255,255,0.4);will-change:transform;}
#snap-hint{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);pointer-events:none;z-index:299;opacity:0;transition:opacity 0.3s;}
#snap-hint.visible{opacity:1;}
/* text cursor canvas */
#text-canvas{position:fixed;inset:0;pointer-events:none;z-index:200; transition: opacity 0.3s ease;}
/* level text overlay */
#level-copy{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:199;}

#dispenser{position:fixed;z-index:300;top:18px;left:50%;transform:translateX(-50%);user-select:none;touch-action:none;}
#cta-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:#ffffff;color:#0a0a0a;border:none;padding:0 20px 0 18px;height:38px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:none;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,0.4);transition:box-shadow 0.15s,background 0.12s;white-space:nowrap;min-width:100px;}
#cta-btn:hover{box-shadow:0 4px 24px rgba(255,255,255,0.18);}
#cta-btn.paused{background:#0a0a0a;color:#ffffff;}

.widget{position:fixed;z-index:100;background:rgba(10,10,10,0.88);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(14px);border-radius:6px;user-select:none;transition:background 0.35s ease,border-color 0.35s ease,color 0.35s ease,box-shadow 0.35s ease;}
.widget-header{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:grab;}
.widget-title{font-size:9px;letter-spacing:0.3em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
.widget-sub{font-size:8px;color:rgba(255,255,255,0.1);letter-spacing:0.1em;}

/* ── UNIFORM WIDGET WIDTH ── */
.widget{width:200px!important;}

#shape-inserter{right:16px;top:80px;left:auto;}
#inserter-body{padding:8px 8px 10px;display:flex;flex-direction:column;gap:6px;}
/* Shape buttons: 3-across horizontal row */
#ins-btn-row{display:flex;gap:5px;}
.ins-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:8px 0 7px;cursor:none;color:#fff;flex:1;transition:background 0.12s;}
.ins-btn:hover{background:rgba(255,255,255,0.09);}
.ins-btn svg{width:22px;height:22px;}
.ins-btn-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.32); text-align:center;}
.ins-div{height:1px;background:rgba(255,255,255,0.04);}
.ins-clear{width:100%;background:transparent;border:1px solid rgba(255,60,60,0.15);color:rgba(255,80,80,0.38);font-family:'Courier New',monospace;font-size:8px;letter-spacing:0.1em;padding:5px 4px;cursor:none;text-transform:uppercase;border-radius:3px;transition:all 0.15s;}
.ins-clear:hover{border-color:rgba(255,60,60,0.4);color:rgba(255,80,80,0.75);}

#game-hud{right:16px;top:16px;left:auto;bottom:auto;}
#hud-inner{padding:10px 11px;display:flex;flex-direction:column;gap:0;}
.target-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tbar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.tbar-fill{height:100%;border-radius:2px;transition:width 0.15s;}
.tpct{font-size:8px;color:rgba(255,255,255,0.22);min-width:24px;text-align:right;}
.tchk{font-size:9px;opacity:0;transition:opacity 0.3s;}
.tchk.done{opacity:1;}

#panel{right:16px;top:90px;left:auto;bottom:auto;}
#panel-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:grab;}
#panel-title{font-size:9px;letter-spacing:0.3em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
#btn-pp{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.38);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;padding:3px 7px;cursor:none;text-transform:uppercase;transition:all 0.15s;border-radius:3px;}
#btn-pp:hover{color:#fff;}
#btn-pp.paused{color:rgba(255,180,80,0.85);}
#panel-body{padding:11px;display:flex;flex-direction:column;gap:9px;}
.ctrl-row{display:flex;flex-direction:column;gap:4px;}
.ctrl-lbl{display:flex;justify-content:space-between;align-items:baseline;}
.ctrl-nm{font-size:9px;letter-spacing:0.18em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
.ctrl-vl{font-size:9px;color:rgba(255,255,255,0.32);min-width:30px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:100%;height:1px;background:rgba(255,255,255,0.08);outline:none;cursor:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.55);cursor:none;}
.div{height:1px;background:rgba(255,255,255,0.04);margin:1px 0;}
.tog{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.22);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;padding:2px 7px;cursor:none;text-transform:uppercase;transition:all 0.15s;border-radius:3px;}
.tog.on{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.35);}
.chk-row{display:flex;align-items:center;justify-content:space-between;}

#flash-complete,#flash-delete{position:fixed;inset:0;pointer-events:none;z-index:600;transition:background 0.1s;background:transparent;}
#flash-complete.on{background:transparent;}
#flash-delete.on{background:transparent;}

#screenshot-btn {
  position: fixed;
  bottom: 24px;
  left: 16px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 10, 10, 0.88);
  border: 1px solid rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(14px);
  border-radius: 6px;
  color: rgba(255, 255, 255, 0.4);
  cursor: none;
  z-index: 500;
  transition: all 0.2s;
}
#screenshot-btn:hover {
  color: rgba(255, 255, 255, 0.9);
  border-color: rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 24px rgba(255, 255, 255, 0.1);
}

#next-btn{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:transparent;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);padding:7px 20px;border-radius:4px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:none;z-index:500;opacity:0;pointer-events:none;}
#next-btn.visible{opacity:1;pointer-events:auto;}

#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.22em;color:rgba(255,255,255,0.1);text-transform:uppercase;pointer-events:none;transition:opacity 1s;white-space:nowrap;z-index:10;}
#shape-count{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.12);text-transform:uppercase;pointer-events:none;}

/* ── AUTHOR'S NOTE WIDGET ── */
#author-note{left:16px;top:16px;right:auto;bottom:auto;}
#anote-body{padding:10px 12px 12px;}
#anote-eye{font-size:8px;letter-spacing:0.25em;color:rgba(255,255,255,0.18);text-transform:uppercase;margin-bottom:7px;}

#anote-sig{margin-top:9px;font-size:8px;color:rgba(255,255,255,0.13);letter-spacing:0.12em;font-style:italic;}
.widget-collapse{background:transparent;border:none;color:rgba(255,255,255,0.18);cursor:none;font-size:9px;padding:0 2px;line-height:1;transition:color 0.15s;}
.widget-collapse:hover{color:rgba(255,255,255,0.5);}
.widget-body{overflow:hidden;transition:max-height 0.25s ease,opacity 0.2s;}
.widget-body.collapsed{max-height:0!important;opacity:0;}
/* hide widget entirely — replaced by top-center toggle on desktop */
#author-note{display:none!important;}
@media (max-width:600px){#author-note{display:none!important;}}

/* ── DESKTOP TOP-CENTER FLAVOR TOGGLE ── */
#flavor-toggle{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:350;display:flex;align-items:center;gap:0;
  pointer-events:auto;
}
#flavor-toggle button{
  background:transparent;border:none;padding:0;
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-weight:900;font-size:13px;letter-spacing:0.1em;
  text-transform:none;cursor:none;
  transition:color 0.2s, opacity 0.2s;
  line-height:1;
}
#flavor-toggle .flv-sep{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-weight:900;font-size:13px;letter-spacing:0.1em;
  color:rgba(255,255,255,0.15);
  padding:0 6px;
  user-select:none;
}
#flv-sugar{color:rgba(255,255,255,1.0);}
#flv-salt{color:rgba(255,255,255,0.22);}
#flavor-toggle button.flv-active{color:rgba(255,255,255,1.0);}
#flavor-toggle button:not(.flv-active){color:rgba(255,255,255,0.22);}
#flavor-toggle button:not(.flv-active):hover{color:rgba(255,255,255,0.5);}
body.paper #flavor-toggle button.flv-active{color:rgba(0,0,0,0.85);}
body.paper #flavor-toggle button:not(.flv-active){color:rgba(0,0,0,0.22);}
body.paper #flavor-toggle .flv-sep{color:rgba(0,0,0,0.15);}
@media(max-width:600px){#flavor-toggle{display:none!important;}}
/* ── SPILL GRAPH WIDGET ── */
#spill-graph-widget{left:16px;bottom:16px;top:auto;right:auto;width:200px!important;}
#spill-graph-canvas{display:block;width:100%;height:64px;border-radius:3px;}
#spill-graph-readout{display:flex;justify-content:space-between;align-items:baseline;padding:5px 11px 7px;}
#spill-graph-pct{font-size:11px;color:rgba(255,100,80,0.65);font-family:'Courier New',monospace;letter-spacing:0.08em;font-weight:700;}
#spill-graph-label{font-size:8px;color:rgba(255,255,255,0.14);letter-spacing:0.18em;text-transform:uppercase;}
@media (max-width:600px){#spill-graph-widget{display:none!important;}}

/* author note links */
#anote-links{margin-top:9px;display:flex;gap:10px;flex-wrap:wrap;}
#anote-links a{font-size:8px;color:rgba(255,255,255,0.22);letter-spacing:0.12em;text-decoration:none;text-transform:lowercase;transition:color 0.15s;}
#anote-links a:hover{color:rgba(255,255,255,0.6);}
/* mobile author note modal links */
#mb-anote-links{margin-top:12px;display:flex;gap:14px;flex-wrap:wrap;}
#mb-anote-links a{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-decoration:none;padding:6px 0;}
#mb-anote-links a:hover{color:rgba(255,255,255,0.7);}

/* ── MOBILE FLAVOR TABS ── */
#mb-flavor-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);margin:-2px 0 12px;}
.mb-flv-tab{flex:1;padding:10px 0 9px;background:transparent;border:none;
  font-family:'Helvetica Neue',Arial,sans-serif;font-weight:900;font-size:11px;
  letter-spacing:0.1em;text-transform:none;color:rgba(255,255,255,0.25);

.mb-flv-tab.active{color:rgba(255,255,255,0.88);border-bottom-color:rgba(255,255,255,0.45);}
.mb-flv-panel{display:none;}
.mb-flv-panel.active{display:block;}
.widget:hover{
  background:rgba(22,20,18,0.94)!important;
  border-color:rgba(255,255,255,0.13)!important;
  box-shadow:0 4px 32px rgba(0,0,0,0.35);
}

/* ── THEME TOGGLE ── */
#theme-toggle{
  position:fixed;right:16px;bottom:24px;z-index:400;
  background:rgba(10,10,10,0.88);border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(14px);border-radius:6px;
  color:rgba(255,255,255,0.22);font-family:'Courier New',monospace;
  font-size:9px;letter-spacing:0.28em;text-transform:uppercase;
  padding:7px 12px;cursor:none;
  transition:color 0.2s,border-color 0.2s,background 0.3s;

}
#theme-toggle:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2);}
@media(max-width:600px){#theme-toggle{display:none!important;}}

/* ── LEVEL NAVIGATOR WIDGET ── */
#level-nav{
  position:fixed;left:16px;bottom:80px;z-index:300;
  background:rgba(10,10,10,0.88);border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(14px);border-radius:6px;
  padding:9px 10px 10px;user-select:none;width:200px;
}
#level-nav-title{font-size:8px;letter-spacing:0.3em;color:rgba(255,255,255,0.16);text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
#level-nav-sub{font-size:8px;color:rgba(255,255,255,0.1);letter-spacing:0.1em;}
#level-nav-btns{display:flex;gap:5px;}
.lvl-nav-btn{

}
.lvl-nav-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);}
.lvl-nav-btn.active{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.28);color:rgba(255,255,255,0.85);}
.lvl-nav-btn.done{border-color:rgba(100,255,140,0.22);color:rgba(100,255,140,0.55);}
.lvl-nav-btn.done.active{border-color:rgba(100,255,140,0.5);background:rgba(100,255,140,0.06);}
#level-nav-desc{margin-top:6px;font-size:7.5px;line-height:1.6;color:rgba(255,255,255,0.18);letter-spacing:0.04em;min-height:22px;}
body.paper #level-nav{background:rgba(255,252,246,0.72);border-color:rgba(0,0,0,0.08);}
body.paper .lvl-nav-btn{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.3);}
body.paper .lvl-nav-btn.active{background:rgba(0,0,0,0.07);border-color:rgba(0,0,0,0.3);color:rgba(0,0,0,0.7);}
body.paper #level-nav-title{color:rgba(0,0,0,0.25);}
body.paper #level-nav-desc{color:rgba(0,0,0,0.3);}
@media(max-width:600px){#level-nav{display:none!important;}}

/* ── FRANK LOGO ── */

}

  display:inline-block;

}
@media (max-width:600px){#zckgrt-logo{display:none!important;}}

@media (max-width:600px){

  #shape-inserter,#game-hud,#panel,#hint,#shape-count{display:none!important;}

  #cursor{display:none!important;}
  body{cursor:auto;}

  /* ── TOP BAR: Flow + Controls only ── */
  #mobile-bar{
    position:fixed;top:0;left:0;right:0;height:48px;
    display:flex;align-items:stretch;
    background:rgba(10,10,10,0.92);

    backdrop-filter:blur(14px);
    z-index:400;
  }
  .mb-btn{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-family:'Courier New',monospace;
    font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(255,255,255,0.45);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;

  }
  .mb-btn:last-child{border-right:none;}
  .mb-btn:active,.mb-btn.open{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85);}
  /* Hide Add from top bar on mobile — it lives in bottom rail */
  #mb-add-btn{display:none!important;}

  /* Panels drop down from top bar (note only) */
  .mb-panel{
    position:fixed;top:48px;left:0;right:0;
    background:rgba(10,10,10,0.94);
    border-bottom:1px solid rgba(255,255,255,0.07);
    backdrop-filter:blur(14px);
    z-index:399;
    display:none;
    max-height:55vh;
    overflow-y:auto;
  }
  .mb-panel.open{display:block;}
  /* Flow + ctrl panels open upward from bottom rail */
  #mb-flow-panel,#mb-ctrl-panel{
    top:auto!important;bottom:44px!important;
    border-bottom:none!important;
    border-top:1px solid rgba(255,255,255,0.07)!important;
    max-height:60vh;
  }

  /* panel rows inside mobile panel */
  .mb-ctrl-row{
    display:flex;align-items:center;gap:8px;
    padding:12px 20px;
    border-top:1px solid rgba(255,255,255,0.04);
  }
  .mb-ctrl-row:first-child{border-top:none;}
  .mb-ctrl-lbl{
    font-family:'Courier New',monospace;
    font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(255,255,255,0.3);flex:1;
  }
  .mb-ctrl-btn{
    background:transparent;border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.5);
    font-family:'Courier New',monospace;font-size:11px;
    padding:7px 14px;cursor:pointer;border-radius:3px;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.15s;
  }
  .mb-ctrl-btn:active{background:rgba(255,255,255,0.08);color:#fff;}
  .mb-lvl-sel-btn.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.9);}
  .mb-ctrl-val{
    font-family:'Courier New',monospace;font-size:9px;
    color:rgba(255,255,255,0.35);min-width:28px;text-align:center;
  }
  .mb-tog-btn{
    background:transparent;border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.3);
    font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;
    padding:6px 10px;cursor:pointer;border-radius:3px;text-transform:uppercase;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.15s;
  }
  .mb-tog-btn.on{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.35);}
  .mb-range{-webkit-appearance:none;flex:1;height:2px;background:rgba(255,255,255,0.1);outline:none;border-radius:1px;}
  .mb-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.6);cursor:pointer;}

  /* ── BOTTOM RAIL: Add shapes ── */
  #mobile-bottom-rail{
    position:fixed;bottom:0;left:0;right:0;height:44px;
    display:flex;align-items:stretch;
    background:rgba(10,10,10,0.92);
    border-top:1px solid rgba(255,255,255,0.07);
    backdrop-filter:blur(14px);
    z-index:400;
  }
  .mb-rail-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
    font-family:'Courier New',monospace;
    font-size:8px;letter-spacing:0.15em;text-transform:uppercase;
    color:rgba(255,255,255,0.4);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    border-right:1px solid rgba(255,255,255,0.06);
    transition:background 0.15s,color 0.15s;
  }
  .mb-rail-btn:last-child{border-right:none;}
  .mb-rail-btn:active,.mb-rail-btn.open{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.9);}
  .mb-rail-btn svg{width:14px;height:14px;flex-shrink:0;}

  /* dispenser shifts down, clears top bar */
  #dispenser{top:58px!important;}
  /* text, screenshot, next-btn — safe middle position to avoid overlapping UI */
  #screenshot-btn{bottom:60px!important;top:auto!important;left:12px!important;cursor:pointer;z-index:398!important; transition: transform 0.25s ease, bottom 0.25s ease;}
  #next-btn{bottom:auto!important;top:calc(40% + 54px)!important;cursor:pointer;}
  #shape-count{display:none!important;}

  /* ── SHAPE HUD: floating draggable widget ── */
  #mb-shape-hud{
    position:fixed;
    bottom:60px;left:50%;transform:translateX(-50%);
    width:auto;
    max-width: 96vw;
    display:flex;align-items:stretch;
    justify-content: flex-start;
    background:rgba(10,10,10,0.88);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;
    backdrop-filter:blur(16px);
    z-index:398;
    touch-action:none;
    user-select:none;
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    transition:transform 0.25s ease, bottom 0.25s ease;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mb-shape-btn{
    width:72px;height:64px;
    flex-shrink: 0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    font-family:'Courier New',monospace;
    font-size:8px;letter-spacing:0.14em;text-transform:uppercase;
    color:rgba(255,255,255,0.35);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    border-right:1px solid rgba(255,255,255,0.06);
    transition:background 0.12s,color 0.12s;
    border-radius:0;
  }
  .mb-shape-btn:first-child{border-radius:8px 0 0 8px;}
  .mb-shape-btn svg{opacity:0.55;transition:opacity 0.12s;}
  .mb-shape-btn:active{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.9);}
  .mb-shape-btn:active svg{opacity:0.9;}
  #mb-hud-clear{
    width:44px;height:64px;
    flex-shrink: 0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-family:'Courier New',monospace;
    font-size:7px;letter-spacing:0.1em;text-transform:uppercase;
    color:rgba(255,80,80,0.3);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    border-left:1px solid rgba(255,255,255,0.05);
    border-radius:0 8px 8px 0;
    transition:color 0.15s,background 0.12s;
  }
  #mb-hud-clear:active{color:rgba(255,80,80,0.8);background:rgba(255,40,40,0.06);}

}
@media (min-width:601px){#mobile-bar,.mb-panel,#mobile-bottom-rail,#mb-shape-hud{display:none!important;}}

/* ── THANK YOU TOAST ── */
#thank-you-toast{
  position:fixed;
  /* Desktop: bottom center */
  bottom:24px;left:50%;right:auto;top:auto;
  transform:translateX(-50%) scale(0.88);
  background:rgba(10,10,10,0.94);border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(20px);border-radius:8px;padding:20px 26px 18px;
  text-align:center;z-index:2000;pointer-events:none;
  opacity:0;transition:opacity 0.4s,transform 0.4s;
  box-shadow:0 8px 48px rgba(0,0,0,0.7);
  cursor:grab;min-width:220px;
  user-select:none;-webkit-user-select:none;
}
#thank-you-toast.visible{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto;}
#thank-you-toast.dragging{cursor:grabbing;transition:none;}
#thank-you-toast .tyt-title{font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:rgba(255,255,248,0.92);margin-bottom:6px;letter-spacing:0.02em;}
#thank-you-toast .tyt-body{font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.22em;color:rgba(255,255,255,0.35);text-transform:uppercase;}
#thank-you-toast .tyt-email{font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.08em;color:rgba(255,255,255,0.6);margin-top:5px;display:block;}
#thank-you-toast .tyt-links{display:flex;gap:14px;justify-content:center;margin-top:10px;}
#thank-you-toast .tyt-links a{font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.14em;color:rgba(255,255,255,0.3);text-decoration:none;text-transform:uppercase;transition:color 0.15s;}
#thank-you-toast .tyt-links a:hover{color:rgba(255,255,255,0.75);}
/* Mobile: bottom-clamped, full-width-ish, tap to dismiss */
@media(max-width:600px){
  #thank-you-toast{
    right:auto;bottom:0;left:0;width:100%;border-radius:12px 12px 0 0;
    padding:18px 24px 28px;text-align:center;cursor:pointer;
    transform:translateY(8px) scale(0.98);
    border-bottom:none;
  }
  #thank-you-toast.visible{transform:translateY(0) scale(1);}
  #thank-you-toast::after{
    content:'tap to dismiss';display:block;margin-top:12px;
    font-family:'Courier New',monospace;font-size:8px;letter-spacing:0.22em;
    color:rgba(255,255,255,0.18);text-transform:uppercase;
  }
}
body.paper #thank-you-toast{background:rgba(255,252,246,0.95);border-color:rgba(0,0,0,0.1);}
body.paper #thank-you-toast .tyt-title{color:rgba(10,8,6,0.88);}
body.paper #thank-you-toast .tyt-body{color:rgba(0,0,0,0.35);}
body.paper #thank-you-toast .tyt-email{color:rgba(0,0,0,0.6);}
body.paper #thank-you-toast .tyt-links a{color:rgba(0,0,0,0.3);}
body.paper #thank-you-toast .tyt-links a:hover{color:rgba(0,0,0,0.75);}
body.paper #thank-you-toast::after{color:rgba(0,0,0,0.2);}
</style>

function showThankYouToast() {

  // ── Mobile: tap anywhere on toast to dismiss ──────────────────────────────
  if (window.innerWidth <= 600) {
    t.addEventListener('click', () => {
      t.classList.remove('visible');
    }, { once: true });
    return;
  }

  // ── Desktop: draggable ────────────────────────────────────────────────────
  let _tDrag = false, _tOX = 0, _tOY = 0;
  // Reset to CSS default bottom-center position
  t.style.left = '50%'; t.style.bottom = '24px';
  t.style.right = 'auto'; t.style.top = 'auto';
  t.style.transform = 'translateX(-50%) scale(1)';

  function _tDown(e) {
    if (e.button !== 0) return;
    _tDrag = true;
    t.classList.add('dragging');
    const r = t.getBoundingClientRect();
    _tOX = e.clientX - r.left;
    _tOY = e.clientY - r.top;
    t.style.left = r.left + 'px'; t.style.top = r.top + 'px';
    t.style.bottom = 'auto';
    t.style.transform = 'none';
    e.preventDefault();
  }
  function _tMove(e) {
    if (!_tDrag) return;
    const nx = Math.max(0, Math.min(window.innerWidth - t.offsetWidth, e.clientX - _tOX));
    const ny = Math.max(0, Math.min(window.innerHeight - t.offsetHeight, e.clientY - _tOY));
    t.style.left = nx + 'px'; t.style.top = ny + 'px';
  }
  function _tUp() {
    if (!_tDrag) return;
    _tDrag = false;
    t.classList.remove('dragging');
  }
  t.addEventListener('mousedown', _tDown);
  window.addEventListener('mousemove', _tMove);
  window.addEventListener('mouseup', _tUp);
}

function _buildFloatText(lines, immediate) {
  if (immediate) {
    textChars = [];
    lvlTextAlphaTgt = 0;
  } else {
    lvlTextAlphaTgt = 0;
  }
  const delay = immediate ? 0 : 420;
  setTimeout(() => {
    textChars = [];
    getFontMetrics();
    const maxW = Math.min(W * COL_W_FRAC, W - PAD_X - 220);
    // Level 5 has no shapes panel obscuring the scene — allow wider text column
    const effectiveMaxW = (lvl === 4) ? Math.min(W * 0.55, W - PAD_X - 180) : maxW;

    // Expand any <br> tags into actual separate lines, preserving parent role
    const expandedLines = [];
    const expandedRoles = []; // 'headline' | 'body' for each expanded line
    const expandedIsBr  = []; // true if this line is a <br> continuation (no extra gap before next)
    lines.forEach((line, li) => {
      const parentRole = li === 0 ? 'headline' : 'body';
      const parts = line.split(/<br\s*\/?>/i);
      parts.forEach((p, pi) => {
        expandedLines.push(p);
        expandedRoles.push(parentRole);
        expandedIsBr.push(pi < parts.length - 1); // true for all but the last segment of a split
      });
    });
    lines = expandedLines;

    let totalH = 0;
    lines.forEach((line, li) => {
      const role = TYPO[expandedRoles[li]];
      const words = line.split(' ');
      let rowW = 0, rows = 1;
      words.forEach(w => {
        const sw = (w.length + 1) * role.charW;
        if (rowW + sw > effectiveMaxW && rowW > 0) { rows++; rowW = 0; }
        rowW += sw;
      });
      totalH += rows * role.lineH;
      if (li < lines.length - 1) totalH += expandedIsBr[li] ? 0 : role.lineH * 0.55;
    });
    const PAD_TOP = Math.max(72, (H - totalH) * 0.42);
    const allChars = [];
    let y = PAD_TOP;
    lines.forEach((line, li) => {
      const role = TYPO[expandedRoles[li]];
      const { charW, lineH } = role;
      const words = line.split(' ');
      let row = [], rowW = 0, rows = [];
      words.forEach(w => {
        const sw = (w.length + 1) * charW;
        if (rowW + sw > effectiveMaxW && row.length) { rows.push(row.join(' ')); row = []; rowW = 0; }
        row.push(w); rowW += sw;
      });
      if (row.length) rows.push(row.join(' '));
      rows.forEach(r => {
        let rx = PAD_X;
        for (let ci = 0; ci < r.length; ci++) {
          allChars.push({
            ch: r[ci],
            restX: rx + ci * charW, restY: y,

function s2w(sx,sy){
  const nx=(sx/W)*2-1,ny=-(sy/H)*2+1;

const WIDGETS=['game-hud','panel','spill-graph-widget'];

function getRect(id){const el=document.getElementById(id),r=el.getBoundingClientRect();return{id,el,x:r.left,y:r.top,w:r.width,h:r.height};}
function rectsOverlap(a,b){return a.x<b.x+b.w+PAD&&a.x+a.w+PAD>b.x&&a.y<b.y+b.h+PAD&&a.y+a.h+PAD>b.y;}
function resolveWidgetOverlaps(movedId){
  for(let pass=0;pass<8;pass++){
    let moved=false;
    const rects=WIDGETS.map(getRect);
    for(let i=0;i<rects.length;i++)for(let j=i+1;j<rects.length;j++){
      const a=rects[i],b=rects[j];
      if(!rectsOverlap(a,b))continue;
      const pushB=(a.id===movedId);
      const target=pushB?b:a,fixed=pushB?a:b;
      const ox=(fixed.x+fixed.w/2)-(target.x+target.w/2),oy=(fixed.y+fixed.h/2)-(target.y+target.h/2);
      const overlapX=(fixed.w/2+target.w/2+PAD)-Math.abs(ox),overlapY=(fixed.h/2+target.h/2+PAD)-Math.abs(oy);
      let nx=target.x,ny=target.y;
      if(overlapX<overlapY)nx+=ox>0?-overlapX:overlapX;else ny+=oy>0?-overlapY:overlapY;
      nx=Math.max(0,Math.min(W-target.w,nx));ny=Math.max(0,Math.min(H-target.h,ny));
      target.el.style.left=nx+'px';target.el.style.top=ny+'px';target.x=nx;target.y=ny;
      moved=true;
    }
    if(!moved)break;
  }
}
function makeDraggable(widget,header){

    if(e.button!==0)return;
    if(e.target.tagName==='BUTTON'||e.target.closest('button'))return;
    drag=true;header.setPointerCapture(e.pointerId);
    const r=widget.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    widget.style.transition='none';e.stopPropagation();
  });
  window.addEventListener('pointermove',e=>{
    if(!drag)return;
    let nx=Math.max(0,Math.min(W-widget.offsetWidth,e.clientX-ox));
    let ny=Math.max(0,Math.min(H-widget.offsetHeight,e.clientY-oy));
    widget.style.left=nx+'px';widget.style.top=ny+'px';widget.style.right='auto';widget.style.bottom='auto';
  });
  window.addEventListener('pointerup',()=>{if(drag){drag=false;resolveWidgetOverlaps(id);}});
}

function addPortalPair() {

function removePortalPairAt(screenX, screenY) {
  for (let i = portalPairs.length - 1; i >= 0; i--) {
    const p = portalPairs[i];
    const dA = Math.sqrt((screenX-p._sAx)**2 + (screenY-p._sAy)**2);
    const dB = Math.sqrt((screenX-p._sBx)**2 + (screenY-p._sBy)**2);
    if (dA < p._sAr + 14 || dB < p._sBr + 14) {
      portalPairs.splice(i, 1);

      return true;
    }
  }
  return false;
}

function hitTestPortal(screenX, screenY) {
  // Returns {pair, which:'a'|'b'} or null
  for (let i = portalPairs.length - 1; i >= 0; i--) {
    const p = portalPairs[i];
    const dA = Math.sqrt((screenX-p._sAx)**2 + (screenY-p._sAy)**2);
    const dB = Math.sqrt((screenX-p._sBx)**2 + (screenY-p._sBy)**2);
    if (dA < Math.max(p._sAr, 22)) return { pair: p, which: 'a' };
    if (dB < Math.max(p._sBr, 22)) return { pair: p, which: 'b' };
  }
  return null;
}

class Attractor {
  constructor(type, pos) {
    this.type = type;
    this.pos = pos.clone();
    this.rest = pos.clone();
    this.vel = new THREE.Vector3();
    this.dragging = false;
    this._pulseT = 0;
    this.pullStrength = type === 'neutronstar' ? 28.0 : 76.2;

  _build() {
    this.mesh = new THREE.Group();

    if (this.type === 'blackhole') {
      // Core — obsidian black sphere
      const coreGeo = new THREE.SphereGeometry(this.radius, 48, 32);

        { r: this.radius * 1.35, color: 0x5533ff, opacity: 0.18 },
        { r: this.radius * 1.65, color: 0x3311cc, opacity: 0.10 },
        { r: this.radius * 2.10, color: 0x220088, opacity: 0.05 },
      ];
      this.glowMeshes = glowLayers.map(({ r, color, opacity }) => {
        const g = new THREE.Mesh(
          new THREE.SphereGeometry(r, 32, 20),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide, depthWrite: false })
        );
        this.mesh.add(g);
        return g;
      });

      // Accretion disc — particle system orbiting the BH
      this._initAccretionDisc();

    } else {
      // Neutron Star
      const coreGeo = new THREE.SphereGeometry(this.radius, 48, 32);
      const coreMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff, emissive: 0x88ccff, emissiveIntensity: 0.9,
        roughness: 0.2, metalness: 0.8
      });
      this.core = new THREE.Mesh(coreGeo, coreMat);
      this.mesh.add(this.core);

      // Point Light
      this.light = new THREE.PointLight(0x88ccff, 1.4, 12);
      this.mesh.add(this.light);

      // Glow corona — tight rings, subtle
      const glowLayers = [
        { r: this.radius * 1.5, color: 0x88ccff, opacity: 0.18 },
        { r: this.radius * 2.0, color: 0x4488ff, opacity: 0.08 },
      ];
      this.glowMeshes = glowLayers.map(({ r, color, opacity }) => {
        const g = new THREE.Mesh(
          new THREE.SphereGeometry(r, 32, 20),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide, depthWrite: false })
        );
        this.mesh.add(g);
        return g;
      });
    }

    this.mesh.position.copy(this.pos);
    scene.add(this.mesh);
  }

  _initAccretionDisc() {
    const N = 480;
    this._adN = N;
    this._adPos = new Float32Array(N * 3);
    this._adVel = new Float32Array(N * 3);
    this._adLife = new Float32Array(N);
    this._adFlare = new Float32Array(N);
    this._adBand = new Uint8Array(N);
    for (let i = 0; i < N; i++) {
      this._adBand[i] = i < N * 0.6 ? 0 : 1;
      this._adSeed(i);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this._adPos, 3));
    const colors = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const t = i / N;
      colors[i*3] = 0.55 + t * 0.25; colors[i*3+1] = 0.35 + t * 0.10; colors[i*3+2] = 1.0;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    this._adMat = new THREE.PointsMaterial({
      size: 0.055, vertexColors: true, transparent: true, opacity: 0.82,
      depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
    });
    this._adPoints = new THREE.Points(geo, this._adMat);
    scene.add(this._adPoints);
    this._adStreamHits = 0;
  }

  _adSeed(i) {
    const b = i * 3;
    const isInner = this._adBand ? this._adBand[i] === 0 : true;
    const rMin = isInner ? this.radius * 1.1 : this.radius * 2.2;
    const rMax = isInner ? this.radius * 2.2 : this.radius * 4.0;
    const r = rMin + Math.pow(Math.random(), isInner ? 1.8 : 1.2) * (rMax - rMin);
    const angle = Math.random() * Math.PI * 2;
    const discZ = (Math.random() - 0.5) * (isInner ? 0.06 : 0.15) * r;
    this._adPos[b]   = this.pos.x + Math.cos(angle) * r;
    this._adPos[b+1] = this.pos.y + Math.sin(angle) * r * 0.28;
    this._adPos[b+2] = this.pos.z + discZ;
    const vOrbit = Math.sqrt(this.pullStrength / r) * (isInner ? 0.88 : 0.75);
    this._adVel[b]   = -Math.sin(angle) * vOrbit;
    this._adVel[b+1] =  Math.cos(angle) * vOrbit * 0.28;
    this._adVel[b+2] =  (Math.random() - 0.5) * 0.02;
    this._adLife[i] = Math.random();
    if (this._adFlare) this._adFlare[i] = 0;
  }

  _updateAccretionDisc(dt) {
    const geo = this._adPoints.geometry;
    const posAttr = geo.getAttribute('position');
    const colorAttr = geo.getAttribute('color');
    this._adStreamHits = Math.max(0, (this._adStreamHits || 0) - dt * 3.5);
    const globalFlare = Math.min(1, this._adStreamHits * 0.4);
    for (let i = 0; i < this._adN; i++) {
      const b = i * 3;
      const isInner = this._adBand ? this._adBand[i] === 0 : true;
      this._adLife[i] += dt * (isInner ? 0.025 : 0.018);
      if (this._adLife[i] > 1.0) { this._adSeed(i); this._adLife[i] = 0; continue; }
      const dx = this.pos.x - this._adPos[b];
      const dy = (this.pos.y - this._adPos[b+1]) / 0.28;
      const dz = this.pos.z - this._adPos[b+2];
      const dist = Math.sqrt(dx*dx + dy*dy*0.28*0.28 + dz*dz) + 0.001;
      const f = this.pullStrength * 1.8 * dt / (dist * dist + 0.08);
      this._adVel[b]   += dx / dist * f;
      this._adVel[b+1] += (this.pos.y - this._adPos[b+1]) / dist * f;
      this._adVel[b+2] += dz / dist * f;
      const rx = this._adPos[b] - this.pos.x;
      const ry = (this._adPos[b+1] - this.pos.y) / 0.28;
      const rDist = Math.sqrt(rx*rx + ry*ry) + 0.001;
      const vOrbit = Math.sqrt(this.pullStrength / rDist) * (isInner ? 0.88 : 0.75);
      const tx = -ry / rDist, ty = rx / rDist;
      const vTan = this._adVel[b] * tx + this._adVel[b+1] * ty * 0.28;
      const dv = (vOrbit - vTan) * (isInner ? 0.14 : 0.09);
      this._adVel[b]   += tx * dv;
      this._adVel[b+1] += ty * 0.28 * dv;
      const spd = Math.sqrt(this._adVel[b]**2 + this._adVel[b+1]**2);
      if (spd > vOrbit * 2.2) { this._adVel[b] *= vOrbit * 2.2 / spd; this._adVel[b+1] *= vOrbit * 2.2 / spd; }
      this._adPos[b]   += this._adVel[b]   * dt;
      this._adPos[b+1] += this._adVel[b+1] * dt;
      this._adPos[b+2] += this._adVel[b+2] * dt;
      const rdx = this._adPos[b] - this.pos.x, rdy = this._adPos[b+1] - this.pos.y;
      const rdist = Math.sqrt(rdx*rdx + rdy*rdy);
      const maxR = isInner ? this.radius * 4.2 : this.radius * 7.0;
      if (rdist < this.radius * 0.9 || rdist > maxR) { this._adSeed(i); this._adLife[i] = 0; continue; }
      if (this._adFlare) this._adFlare[i] = Math.max(0, this._adFlare[i] - dt * 4.0);
      const flare = (this._adFlare ? this._adFlare[i] : 0) + globalFlare * (isInner ? 0.9 : 0.5);
      const normR = Math.min(1, (rdist - this.radius) / (this.radius * (isInner ? 1.2 : 3.0)));
      const lifeFade = Math.sin(this._adLife[i] * Math.PI);
      const br = lifeFade * (1.0 - normR * (isInner ? 0.35 : 0.6)) * (1.0 + flare * 1.8);
      if (isInner) {
        colorAttr.array[b]   = (0.65 + normR * 0.25 + flare * 0.4) * br;
        colorAttr.array[b+1] = (0.5  - normR * 0.3  + flare * 0.2) * br;
        colorAttr.array[b+2] = br;
      } else {
        colorAttr.array[b]   = (0.35 + normR * 0.15 + flare * 0.35) * br * 0.7;
        colorAttr.array[b+1] = (0.15 + flare * 0.15) * br * 0.7;
        colorAttr.array[b+2] = (0.85 - normR * 0.3) * br * 0.7;
      }
      posAttr.array[b]   = this._adPos[b];
      posAttr.array[b+1] = this._adPos[b+1];
      posAttr.array[b+2] = this._adPos[b+2];
    }
    posAttr.needsUpdate = true;
    colorAttr.needsUpdate = true;
    this._adPoints.position.set(0, 0, 0);
  }

  notifyStreamParticle(px, py, pz) {
    if (!this._adFlare) return;
    const discR = this.radius * 4.0;
    const dx = px - this.pos.x, dy = py - this.pos.y;
    const dist2d = Math.sqrt(dx*dx + dy*dy);
    if (dist2d > discR || Math.abs(pz) > 0.8) return;
    this._adStreamHits = Math.min(4, (this._adStreamHits || 0) + 0.18);
    for (let i = 0; i < this._adN; i++) {
      const b = i * 3;
      const ddx = this._adPos[b] - px, ddy = this._adPos[b+1] - py;
      const proximity = 1.0 - Math.min(1, Math.sqrt(ddx*ddx+ddy*ddy) / (this.radius * 1.5));
      if (proximity > 0.2 && this._adFlare) this._adFlare[i] = Math.min(1.0, this._adFlare[i] + proximity * 0.65);
    }
  }

  update(dt) {
    this._pulseT += dt;
    // Tick portal cooldowns
    for (const pp of portalPairs) { if (pp.cooldown > 0) pp.cooldown -= dt; }

    if (this.type === 'blackhole') {
      const pulse = 0.5 + Math.sin(this._pulseT * 2.2) * 0.5;
      this.glowMeshes[0].material.opacity = 0.14 + pulse * 0.08;
      this.glowMeshes[1].material.opacity = 0.07 + pulse * 0.04;
      this.glowMeshes[2].material.opacity = 0.03 + pulse * 0.025;
      if (this._adPoints) this._updateAccretionDisc(dt);
    } else {
      const pulse = 0.5 + Math.sin(this._pulseT * 8.0) * 0.5;
      this.glowMeshes[0].material.opacity = 0.12 + pulse * 0.07;
      this.glowMeshes[1].material.opacity = 0.05 + pulse * 0.04;
    }

    // Dynamic Scale Based on Pull Strength
    const basePull = this.type === 'neutronstar' ? 38.0 : 57.0;
    const scale = Math.sqrt(this.pullStrength / basePull);
    this.mesh.scale.set(scale, scale, scale);

    if (!this.dragging) {
      if (this._bouncingBH) {
        // ── Rubber-ball bouncing black hole physics ──────────────────────────
        const BH_GRAV = 0.55; // near-zero — floats in perpetual motion
        this.vel.y -= BH_GRAV * dt;
        this.pos.x += this.vel.x * dt;
        this.pos.y += this.vel.y * dt;

        const basePullBH = 57.0;
        const scaleBH = Math.sqrt(this.pullStrength / basePullBH);
        const rEff = this.radius * scaleBH * 1.2;

        const RESTITUTION = 0.78;
        const FRICTION = 0.985;

        // Use actual viewport edges in world space for horizontal bounds
        const edgeLW = s2w(0, H / 2).x;
        const edgeRW = s2w(W, H / 2).x;
        const BY_FLOOR = -7.5, BY_CEIL = 12;

        // ── BH Wormhole teleportation — checked BEFORE wall bounce ───────────────
        let teleported = false;
        for (const pp of portalPairs) {
          if (pp.cooldown > 0) continue;
          const r = pp.r;

          // Distance from BH to portal A and B
          const dxA = this.pos.x - pp.a.x, dyA = this.pos.y - pp.a.y;
          const dxB = this.pos.x - pp.b.x, dyB = this.pos.y - pp.b.y;
          const distA = Math.sqrt(dxA*dxA + dyA*dyA);
          const distB = Math.sqrt(dxB*dxB + dyB*dyB);

          if (distA < r * 1.1 && !teleported) {
            // Enter A → exit B
            this.pos.x = pp.b.x; this.pos.y = pp.b.y;
            // Preserve speed, flip direction to exit away from B
            const spd2 = Math.sqrt(this.vel.x**2 + this.vel.y**2);
            const ex = dxA / (distA || 1), ey = dyA / (distA || 1);
            this.vel.x = ex * spd2 * 0.92; this.vel.y = ey * spd2 * 0.92;
            pp.cooldown = 0.8; teleported = true; break;
          }
          if (distB < r * 1.1 && !teleported) {
            // Enter B → exit A
            this.pos.x = pp.a.x; this.pos.y = pp.a.y;
            const spd2 = Math.sqrt(this.vel.x**2 + this.vel.y**2);
            const ex = dxB / (distB || 1), ey = dyB / (distB || 1);
            this.vel.x = ex * spd2 * 0.92; this.vel.y = ey * spd2 * 0.92;
            pp.cooldown = 0.8; teleported = true; break;
          }
        }

        // Wall bounces — only apply horizontal bounce if no wormhole teleport
        // Soft energy boost on collision: gentle persistent kick so BH never fully loses momentum
        const BH_WALL_BOOST = 0.18; // lateral nudge on side hits
        const BH_FLOOR_BOOST = 0.22; // vertical nudge on floor hit
        if (this.pos.y - rEff < BY_FLOOR) {
          this.pos.y = BY_FLOOR + rEff;
          if (this.vel.y < 0) {
            this.vel.y = -this.vel.y * RESTITUTION + BH_FLOOR_BOOST;
            this.vel.x *= FRICTION;
          }
        }
        if (this.pos.y + rEff > BY_CEIL) {
          this.pos.y = BY_CEIL - rEff;
          if (this.vel.y > 0) this.vel.y = -this.vel.y * RESTITUTION;
        }
        if (!teleported) {
          if (this.pos.x + rEff > edgeRW) {
            this.pos.x = edgeRW - rEff;
            if (this.vel.x > 0) this.vel.x = -this.vel.x * RESTITUTION - BH_WALL_BOOST;
          }
          if (this.pos.x - rEff < edgeLW) {
            this.pos.x = edgeLW + rEff;
            if (this.vel.x < 0) this.vel.x = -this.vel.x * RESTITUTION + BH_WALL_BOOST;
          }
        }

        const spd = Math.sqrt(this.vel.x**2 + this.vel.y**2);
        const MAX_SPD = 22;
        if (spd > MAX_SPD) { this.vel.x *= MAX_SPD / spd; this.vel.y *= MAX_SPD / spd; }

      } else if (this._bouncingNS) {
        // ── Neutron star: same bounce as BH, near-zero gravity — floats in perpetual motion
        // Skip normal physics if currently captured by a BH (BH-NS orbit managed in resolveCollisions)
        if (this._bhCapture && !this._bhCapture.dragging) {
          // Minimal gravity only — orbit steering handled elsewhere
          this.vel.y -= 0.05 * dt;
          this.pos.x += this.vel.x * dt;
          this.pos.y += this.vel.y * dt;
        } else {
          this._bhCapture = null; // ensure clean state if BH gone
          const NS_GRAV = 0.18; // almost nothing — stays in motion
        this.vel.y -= NS_GRAV * dt;
        this.pos.x += this.vel.x * dt;
        this.pos.y += this.vel.y * dt;

        const basePullNS = 57.0;
        const scaleNS = Math.sqrt(this.pullStrength / basePullNS);
        const rEffNS = this.radius * scaleNS * 1.2;

        const RESTITUTION = 0.78; // same as BH
        const FRICTION = 0.985;   // same as BH

        const edgeLW2 = s2w(0, H / 2).x;
        const edgeRW2 = s2w(W, H / 2).x;
        const BY_FLOOR = -7.5, BY_CEIL = 12;

        if (this.pos.y - rEffNS < BY_FLOOR) {
          this.pos.y = BY_FLOOR + rEffNS;
          if (this.vel.y < 0) { this.vel.y = -this.vel.y * RESTITUTION; this.vel.x *= FRICTION; }
        }
        if (this.pos.y + rEffNS > BY_CEIL) {
          this.pos.y = BY_CEIL - rEffNS;
          if (this.vel.y > 0) this.vel.y = -this.vel.y * RESTITUTION;
        }
        if (this.pos.x + rEffNS > edgeRW2) {
          this.pos.x = edgeRW2 - rEffNS;
          if (this.vel.x > 0) this.vel.x = -this.vel.x * RESTITUTION;
        }
        if (this.pos.x - rEffNS < edgeLW2) {
          this.pos.x = edgeLW2 + rEffNS;
          if (this.vel.x < 0) this.vel.x = -this.vel.x * RESTITUTION;
        }

        const nsSpd = Math.sqrt(this.vel.x**2 + this.vel.y**2);
        const NS_MAX_SPD = 22;
        if (nsSpd > NS_MAX_SPD) { this.vel.x *= NS_MAX_SPD / nsSpd; this.vel.y *= NS_MAX_SPD / nsSpd; }
        // Minimum drift — NS never truly stops
        if (nsSpd < 0.8 && !this.dragging) {
          const ang = Math.random() * Math.PI * 2;
          this.vel.x += Math.cos(ang) * 0.6; this.vel.y += Math.sin(ang) * 0.6;
        }
        } // end else (not captured)

      } else {
        const xe = this.pos.x - this.rest.x, ye = this.pos.y - this.rest.y;
        const dist = Math.sqrt(xe * xe + ye * ye);
        const magFactor = dist > 0.001 ? (1.0 + 0.8 / (dist + 0.3)) : 1.0;
        this.vel.x -= xe * BH_SPRING_K * magFactor * dt;
        this.vel.y -= ye * BH_SPRING_K * magFactor * dt;
        this.vel.x -= this.vel.x * BH_DAMPING * dt;
        this.vel.y -= this.vel.y * BH_DAMPING * dt;
        if (dist < 0.008 && Math.sqrt(this.vel.x ** 2 + this.vel.y ** 2) < 0.015) {
          this.pos.x = this.rest.x; this.pos.y = this.rest.y; this.vel.set(0, 0, 0);
        } else {
          this.pos.x += this.vel.x * dt * 60; this.pos.y += this.vel.y * dt * 60;
        }

        const rScaled2 = this.radius * scale;
        const BX = 13, BBY = -8.5 + rScaled2, BTY = 14;
        if (this.pos.x > BX) { this.pos.x = BX; this.vel.x *= -0.4; }
        if (this.pos.x < -BX) { this.pos.x = -BX; this.vel.x *= -0.4; }
        if (this.pos.y < BBY) { this.pos.y = BBY; this.vel.y *= -0.35; }
        if (this.pos.y > BTY) { this.pos.y = BTY; this.vel.y *= -0.3; }
      }
    }



    this.mesh.position.set(this.pos.x, this.pos.y, 0);
    this.mesh.updateMatrixWorld(true);
  }

  sdf(px, py, pz) {
    const basePull = this.type === 'neutronstar' ? 38.0 : 28.0;
    const scale = Math.sqrt(this.pullStrength / basePull);
    const rScaled = this.radius * scale;
    const dx = px - this.pos.x, dy = py - this.pos.y, dz = pz - this.pos.z;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - rScaled;
  }

  dispose() {
    scene.remove(this.mesh);
    this.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    if (this._adPoints) {
      scene.remove(this._adPoints);
      this._adPoints.geometry.dispose();
      this._adMat.dispose();
    }
  }
}

function destroyAttractors() {
  attractors.forEach(a => a.dispose());
  attractors = [];
}

function applyAttractorForces(i, b, dt) {
  for (let a of attractors) {
    const dx = a.pos.x - pp[b], dy = a.pos.y - pp[b+1], dz = (a.pos.z || 0) - (pp[b+2] || 0);
    const dist2 = dx*dx + dy*dy + dz*dz;
    const dist = Math.sqrt(dist2);
    if (dist < 0.001) continue;

    if (a.type === 'blackhole') {
      // Inverse-square pull — strong enough to capture and hold orbital paths
      const f = a.pullStrength * 2.8 * dt / (dist2 + 0.15);
      pv[b]   += dx / dist * f;
      pv[b+1] += dy / dist * f;
      pv[b+2] += dz / dist * f;

      // Orbital circularization: bleed off radial velocity, preserve tangential
      // This is what makes an accretion disc — particles settle into rings
      if (dist < a.radius * 12.0) {
        const rx = pp[b] - a.pos.x, ry = pp[b+1] - a.pos.y;
        const r = Math.sqrt(rx*rx + ry*ry) + 0.001;
        // tangent unit vector (perpendicular to radial, in orbital direction)
        const tx = -ry / r, ty = rx / r;
        // current tangential speed
        const vTan = pv[b] * tx + pv[b+1] * ty;
        // target circular orbital speed at this radius
        const vCirc = Math.sqrt(Math.max(0, a.pullStrength / r));
        // nudge toward circular orbit — damp excess radial, boost tangential
        const nudge = (vCirc - vTan) * 0.055;
        pv[b]   += tx * nudge;
        pv[b+1] += ty * nudge;
        // flatten the disc: damp z strongly so the disc stays planar
        pv[b+2] *= 0.88;
      }

      if (dist < a.radius * 5.0 && a.notifyStreamParticle) {
        a.notifyStreamParticle(pp[b], pp[b+1], pp[b+2] || 0);
      }
      if (dist < a.consumeRadius) { spawn(i); return true; }

    } else {
      // Neutron star particle interaction
      const influenceR = a.influenceR || 4.0;
      if (dist > influenceR) continue;

      const proximityBoost = dist < 1.5 ? (1.5 / (dist + 0.12)) * 2.8 : 1.0;
      const nsParticleMult = 1.8 * proximityBoost;
      const f = a.pullStrength * nsParticleMult * dt / (dist2 + 0.05);
      pv[b]   += dx / dist * f;
      pv[b+1] += dy / dist * f;
      pv[b+2] += dz / dist * f;

      // Orbital circularization for NS — level 4 only; level 5 is jet collimation
      const orbitThresh = lvl === 4 ? influenceR * 0.85 : influenceR * 0.55;
      if (dist < orbitThresh) {
        if (lvl === 4) {
          const rx2 = pp[b] - a.pos.x, ry2 = pp[b+1] - a.pos.y;
          const r2 = Math.sqrt(rx2*rx2 + ry2*ry2) + 0.001;
          const tx2 = -ry2 / r2, ty2 = rx2 / r2;
          const vTan2 = pv[b] * tx2 + pv[b+1] * ty2;
          const vCircNS = Math.sqrt(Math.max(0, a.pullStrength * 0.06 / r2));
          const bleed = (vCircNS - vTan2) * 0.045;
          pv[b]   += tx2 * bleed;
          pv[b+1] += ty2 * bleed;
          pv[b+2] *= 0.75;
        } else {
          // ── Quasar jet collimation ─────────────────────────────────────────
          // Compute jet axis: vector between all NS on this level.
          // With 2 NS the axis is the line between them; with 1 fall back to their
          // velocity direction. Alignment between NS tightens the beam.
          const nsAll = attractors.filter(x => x.type === 'neutronstar');
          let jx = 0, jy = 1; // default jet axis: straight down
          let alignment = 0;  // 0 = scattered, 1 = perfectly collinear

          if (nsAll.length >= 2) {
            // Find the NS pair with the greatest separation — that's the primary axis
            let bestDist = 0, bx2 = 0, by2 = 1;
            for (let pi = 0; pi < nsAll.length; pi++) {
              for (let qi = pi + 1; qi < nsAll.length; qi++) {
                const ddx = nsAll[qi].pos.x - nsAll[pi].pos.x;
                const ddy = nsAll[qi].pos.y - nsAll[pi].pos.y;
                const dd = Math.sqrt(ddx*ddx + ddy*ddy);
                if (dd > bestDist) { bestDist = dd; bx2 = ddx/dd; by2 = ddy/dd; }
              }
            }
            jx = bx2; jy = by2;
            // Alignment score: how collinear are all the NS?
            // Check how tightly packed they are perpendicular to the axis
            let maxLateral = 0;
            for (const ns2 of nsAll) {
              const relx = ns2.pos.x - a.pos.x, rely = ns2.pos.y - a.pos.y;
              const lat = Math.abs(relx * (-jy) + rely * jx); // perp component
              if (lat > maxLateral) maxLateral = lat;
            }
            // Tight alignment = small lateral spread relative to length
            alignment = Math.max(0, 1.0 - maxLateral / Math.max(bestDist, 0.1));
          } else {
            // Solo NS: jet axis follows its velocity direction
            const spd = Math.sqrt(a.vel.x**2 + a.vel.y**2);
            if (spd > 0.1) { jx = a.vel.x / spd; jy = a.vel.y / spd; }
            alignment = 0.4; // solo always has moderate collimation
          }

          // Decompose particle velocity into jet-axis and lateral components
          const rx2 = pp[b] - a.pos.x, ry2 = pp[b+1] - a.pos.y;
          const r2 = Math.sqrt(rx2*rx2 + ry2*ry2) + 0.001;

          // Jet component (along axis)
          const vJet = pv[b] * jx + pv[b+1] * jy;
          // Lateral component (perpendicular to axis, in XY)
          const latX = pv[b] - vJet * jx;
          const latY = pv[b+1] - vJet * jy;

          // Collimation strength: stronger closer to NS, stronger with better alignment
          const proximity = 1.0 - dist / orbitThresh;
          const colStrength = proximity * proximity * (0.35 + alignment * 0.65);

          // Squeeze lateral velocity toward zero (beam narrowing)
          const LATERAL_DAMP = colStrength * 0.22;
          pv[b]   -= latX * LATERAL_DAMP;
          pv[b+1] -= latY * LATERAL_DAMP;

          // Boost along jet axis — particles get accelerated into the beam
          // Direction of boost: away from NS along jet (bipolar jets)
          const jetDot = rx2 * jx + ry2 * jy; // which side of NS the particle is on
          const jetDir = jetDot >= 0 ? 1 : -1;
          const JET_BOOST = colStrength * 0.18 * a.pullStrength * dt;
          pv[b]   += jx * jetDir * JET_BOOST;
          pv[b+1] += jy * jetDir * JET_BOOST;

          // Flatten Z — jet stays planar
          pv[b+2] *= (1.0 - colStrength * 0.35);
        }
      }

      if (dist < a.consumeRadius) { spawn(i); return true; }
    }
  }
  return false;
}

function drawBlackHoleOverlay() {
  const t = Date.now() * 0.001;

  // ── BH shadow casting onto shapes ───────────────────────────────────────────
  // For each black hole, project a soft shadow ellipse onto each shape below it
  attractors.forEach(bh => {
    if (bh.type !== 'blackhole') return;
    const bhC = bh.pos.clone().project(camera);
    const bhSX = (bhC.x + 1) / 2 * W, bhSY = (-bhC.y + 1) / 2 * H;
    const basePullBH = 57.0;
    const scaleBH = Math.sqrt(bh.pullStrength / basePullBH);
    const bhEdge = new THREE.Vector3(bh.pos.x + bh.radius * scaleBH, bh.pos.y, 0).project(camera);
    const bhCoreR = Math.abs((bhEdge.x + 1) / 2 * W - bhSX);

    // Shadow over each shape — proximity-weighted dark blob
    shapes.forEach(sh => {
      const shC = sh.pos.clone().project(camera);
      const shSX = (shC.x + 1) / 2 * W, shSY = (-shC.y + 1) / 2 * H;
      const shEdge = new THREE.Vector3(sh.pos.x + sh.radius, sh.pos.y, 0).project(camera);
      const shR = Math.abs((shEdge.x + 1) / 2 * W - shSX) * 1.6;

      // World-space distance BH → shape
      const wdx = bh.pos.x - sh.pos.x, wdy = bh.pos.y - sh.pos.y;
      const wdist = Math.sqrt(wdx*wdx + wdy*wdy);
      const shadowStrength = Math.max(0, 1.0 - wdist / 14.0); // falls off over 14 world units
      if (shadowStrength < 0.02) return;

      // Shadow offset: BH casts shadow on far side of shape from emitter (top)
      // Direction: from BH toward shape, continued past shape
      const sOff = wdist > 0.1 ? { x: (sh.pos.x - bh.pos.x) / wdist, y: (sh.pos.y - bh.pos.y) / wdist } : { x: 0, y: -1 };
      const shadowOffsetPx = shR * 0.4;

      const shadowX = shSX + sOff.x * shadowOffsetPx * 0.5;
      const shadowY = shSY + sOff.y * shadowOffsetPx * 0.5;
      const shadowR = shR * (1.2 + shadowStrength * 0.6);
      const alpha = shadowStrength * 0.72;

      ovCtx.save();
      const sg = ovCtx.createRadialGradient(shadowX, shadowY, 0, shadowX, shadowY, shadowR);
      sg.addColorStop(0, `rgba(0,0,0,${alpha})`);
      sg.addColorStop(0.55, `rgba(0,0,0,${alpha * 0.45})`);
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ovCtx.beginPath(); ovCtx.arc(shadowX, shadowY, shadowR, 0, Math.PI * 2);
      ovCtx.fillStyle = sg; ovCtx.fill();
      ovCtx.restore();
    });
  });

  attractors.forEach(bh => {
    const c = bh.pos.clone().project(camera);
    const sx = (c.x + 1) / 2 * W, sy = (-c.y + 1) / 2 * H;
    // Smaller dotted rings — use actual influenceR for NS, tighter formula for BH
    const pullRadiusWorld = bh.type === 'neutronstar'
      ? (bh.influenceR || 4.0)   // NS: show actual area of influence
      : Math.sqrt(bh.pullStrength / 3.5); // BH: significantly smaller ring
    const edge = new THREE.Vector3(bh.pos.x + pullRadiusWorld, bh.pos.y, 0).project(camera);
    const pullR = Math.abs((edge.x + 1) / 2 * W - sx);

    ovCtx.save();
    ovCtx.setLineDash([2, 5]); ovCtx.lineDashOffset = -t * 8;
    ovCtx.beginPath(); ovCtx.arc(sx, sy, pullR, 0, Math.PI * 2);
    ovCtx.strokeStyle = bh.type === 'neutronstar' ? 'rgba(100,200,255,0.30)' : 'rgba(80,50,200,0.22)';
    ovCtx.lineWidth = 1; ovCtx.stroke();
    ovCtx.setLineDash([]);

    // Glow halos
    const basePull = bh.type === 'neutronstar' ? 38.0 : 57.0;
    const scale = Math.sqrt(bh.pullStrength / basePull);
    const bhEdge = new THREE.Vector3(bh.pos.x + bh.radius * scale, bh.pos.y, 0).project(camera);
    const coreR = Math.abs((bhEdge.x + 1) / 2 * W - sx);

    if (bh.type === 'blackhole') {
      [
        { r: coreR * 2.8, a: 0.10, col: '80,50,220' },
        { r: coreR * 1.8, a: 0.18, col: '60,30,180' },
        { r: coreR * 1.2, a: 0.28, col: '30,10,100' }
      ].forEach(({ r, a, col }) => {
        const g = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, r);
        g.addColorStop(0, `rgba(${col},${a})`);
        g.addColorStop(1, `rgba(${col},0)`);
        ovCtx.beginPath(); ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
        ovCtx.fillStyle = g; ovCtx.fill();
      });
    } else {
      // NS hit by BH: shift glow to warm amber to indicate it's been caught
      const captured = (lvl === 4 && bh._bhHitCount > 0);
      const nsColA = captured ? '220,120,80' : '100,200,255';
      const nsColB = captured ? '255,180,120' : '200,255,255';
      [
        { r: coreR * 3.0, a: captured ? 0.28 : 0.15, col: nsColA },
        { r: coreR * 1.5, a: captured ? 0.5 : 0.3, col: nsColB }
      ].forEach(({ r, a, col }) => {
        const g = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, r);
        g.addColorStop(0, `rgba(${col},${a})`);
        g.addColorStop(1, `rgba(${col},0)`);
        ovCtx.beginPath(); ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
        ovCtx.fillStyle = g; ovCtx.fill();
      });
    }

    if (bh.type !== 'neutronstar') {
      ovCtx.font = '8px Courier New';
      ovCtx.fillStyle = 'rgba(110,80,220,0.38)';
      ovCtx.textAlign = 'center';
      ovCtx.fillText('SINGULARITY', sx, sy + coreR + 14);
    }

    // Nova shockwave flare — expanding ring when hit by a supernova click
    if (bh._novaHitT && bh._novaHitT > 0) {
      const ft = bh._novaHitT;
      const flareR = coreR * (1.8 + (1 - ft) * 6.0);
      const flareCol = bh.type === 'blackhole' ? '255,160,60' : '180,240,255';
      ovCtx.beginPath();
      ovCtx.arc(sx, sy, flareR, 0, Math.PI * 2);
      ovCtx.strokeStyle = `rgba(${flareCol},${ft * 0.8})`;
      ovCtx.lineWidth = 2.5 * ft;
      ovCtx.stroke();
      const fg = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, flareR * 0.8);
      fg.addColorStop(0, `rgba(${flareCol},${ft * 0.25})`);
      fg.addColorStop(1, `rgba(${flareCol},0)`);
      ovCtx.beginPath(); ovCtx.arc(sx, sy, flareR * 0.8, 0, Math.PI * 2);
      ovCtx.fillStyle = fg; ovCtx.fill();
    }

    ovCtx.restore();
  });
}

function initLevel(n){
  lvl=n;lvlDone=false;tCounts=[];spillCount=0;spillSmooth=0;lastSpillMsg=-1;
  spillHistory.length=0;

// ── SHAPE DEFS ────────────────────────────────────────────────────────────────
// Orient philosophy: clockwise compass cycle — 8 stops at 45° increments.
// Z-rotation drives flow direction; Y-rotation adds subtle depth without disrupting.
// Flow always enters from top; each stop redirects it along the compass bearing.
const _D=Math.PI,_H=Math.PI/2,_Q=Math.PI/4,_E=Math.PI/6,_T=Math.PI/3;
const _CW = (deg) => -deg * Math.PI / 180; // clockwise = negative Z in Three.js
const SDEFS={
  cube:{baseR:1.55,springK:6.0,damping:8.0,color:0xffffff,rough:0.55,
    makeGeo:s=>new THREE.BoxGeometry(2.6*s,2.6*s,2.6*s),
    orients:[
      // N  — flat top: even split, flow exits both sides equally
      new THREE.Euler(0, 0, 0),
      // NE — 45° ramp right: strong rightward redirect
      new THREE.Euler(0, 0, _CW(45)),
      // E  — 90° on edge: corner up, splits to steep diagonals
      new THREE.Euler(0, 0, _CW(90)),
      // SE — 135°: base faces upper-right, flow pours left off underside
      new THREE.Euler(0, 0, _CW(135)),
      // S  — upside-down flat: base up, flow cascades off either edge
      new THREE.Euler(0, 0, _CW(180)),
      // SW — 225° (= -135°): mirror of SE, flow pours right
      new THREE.Euler(0, 0, _CW(225)),
      // W  — 270°: corner up left side, splits to steep diagonals (mirror of E)
      new THREE.Euler(0, 0, _CW(270)),
      // NW — 315°: gentle ramp left, 45° mirror of NE
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  sphere:{baseR:1.4,springK:6.0,damping:7.0,color:0xdddddd,rough:0.15,
    makeGeo:s=>new THREE.SphereGeometry(1.4*s,32,20),
    orients:[
      // Sphere reads through surface tilt — compass steps give clear visual intent.
      // N  — crown neutral: even scatter
      new THREE.Euler(0, 0, 0),
      // NE — lean right 45°: surface bias pushes flow right
      new THREE.Euler(0, 0, _CW(45)),
      // E  — lean right 90°: equator up, flow sheds downward on both sides
      new THREE.Euler(0, 0, _CW(90)),
      // SE — lean right 135°: underside up, deflects upward-left
      new THREE.Euler(0, 0, _CW(135)),
      // W  — lean left 90°: mirror of E
      new THREE.Euler(0, 0, _CW(270)),
      // NW — lean left 45°: surface bias pushes flow left
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  pyramid:{baseR:1.45,springK:5.5,damping:8.0,color:0xffffff,rough:0.8,
    makeGeo:s=>new THREE.ConeGeometry(1.5*s,2.8*s,4),
    orients:[
      // N  — apex up, face forward: clean bilateral split
      new THREE.Euler(0, 0, 0),
      // NE — apex up, leaned right 45°: flow sheds strongly right
      new THREE.Euler(0, 0, _CW(45)),
      // E  — apex right, horizontal: flow splits above/below apex
      new THREE.Euler(0, 0, _CW(90)),
      // SE — leaned right 135°: base up-right, concentrated pour left
      new THREE.Euler(0, 0, _CW(135)),
      // S  — inverted apex-down: concentrator, draws flow to a point
      new THREE.Euler(0, 0, _CW(180)),
      // SW — inverted leaned left 135°: concentrated pour right
      new THREE.Euler(0, 0, _CW(225)),
      // W  — apex left: flow splits above/below (mirror of E)
      new THREE.Euler(0, 0, _CW(270)),
      // NW — apex up, leaned left 45°: flow sheds strongly left
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  panelstack:{baseR:0.85,springK:5.0,damping:9.0,color:0xffffff,rough:0.55,
    // panels:14, panelH:0.18, gap:0.06, baseSize:3.0 — built procedurally in Shape._build
    makeGeo:s=>new THREE.BoxGeometry(3.0*s,3.0*s*1.2,3.0*s), // bounding proxy for raycasting only
    orients:[new THREE.Euler(0,0,0)], // emitter has one orientation: apex down
  },

function resolveCollisions(){
  for(let a=0;a<shapes.length;a++)for(let b=a+1;b<shapes.length;b++){
    const sa=shapes[a],sb=shapes[b];
    const dx=sb.pos.x-sa.pos.x,dy=sb.pos.y-sa.pos.y,dist=Math.sqrt(dx*dx+dy*dy),minD=sa.radius+sb.radius;
    if(dist>0.001&&dist<minD){
      const pen=minD-dist,nx=dx/dist,ny=dy/dist,wa=sa.dragging?0:0.5,wb=sb.dragging?0:0.5;
      sa.pos.x-=nx*pen*wa;sa.pos.y-=ny*pen*wa;sb.pos.x+=nx*pen*wb;sb.pos.y+=ny*pen*wb;
      const dvx=sb.vel.x-sa.vel.x,dvy=sb.vel.y-sa.vel.y,dot=dvx*nx+dvy*ny;
      if(dot<0){const j=(1+0.5)*dot*0.5;if(!sa.dragging){sa.vel.x+=j*nx;sa.vel.y+=j*ny;}if(!sb.dragging){sb.vel.x-=j*nx;sb.vel.y-=j*ny;}}
    }
  }
  
  for(let a of attractors) {
    for(let sh of shapes) {
      const basePull = a.type === 'neutronstar' ? 38.0 : 28.0;
      const scale = Math.sqrt(a.pullStrength / basePull);
      const rScaled = a.radius * scale;

      const dx=sh.pos.x-a.pos.x,dy=sh.pos.y-a.pos.y;
      const dist=Math.sqrt(dx*dx+dy*dy),minD=rScaled+sh.radius;
      if(dist>0.001&&dist<minD){
        const pen=minD-dist,nx=dx/dist,ny=dy/dist;
        const wa=a.dragging?0:0.5,wb=sh.dragging?0:0.5;
        a.pos.x-=nx*pen*wa;a.pos.y-=ny*pen*wa;
        sh.pos.x+=nx*pen*wb;sh.pos.y+=ny*pen*wb;
        const dvx=sh.vel.x-a.vel.x,dvy=sh.vel.y-a.vel.y,dot=dvx*nx+dvy*ny;
        if(dot<0){const j=(1+0.5)*dot*0.5;if(!a.dragging){a.vel.x+=j*nx;a.vel.y+=j*ny;}if(!sh.dragging){sh.vel.x-=j*nx;sh.vel.y-=j*ny;}}
      }
    }
  }

  // ── NS-NS mutual gravity: strong pull — neutron stars strongly attract each other ─
  if (lvl === 4) {
  const NS_MUTUAL_G = 0.065;   // strong — NS want to clump and orbit each other
  const NS_MUTUAL_MAX_DIST = 30.0; // very wide — they feel each other from across the screen
  const nsArr = attractors.filter(a => a.type === 'neutronstar' && !a.dragging);
  for (let i = 0; i < nsArr.length; i++) {
    for (let j = i + 1; j < nsArr.length; j++) {
      const a = nsArr[i], b = nsArr[j];
      const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.001 || dist > NS_MUTUAL_MAX_DIST) continue;
      // Inverse-square but capped so they never slam into each other
      const f = NS_MUTUAL_G / Math.max(dist * dist, 2.5);
      const nx = dx / dist, ny = dy / dist;
      // Add tangential component to encourage co-orbiting rather than straight-line collapse
      const tx = -ny, ty = nx; // perpendicular
      const tanBias = 0.45;
      a.vel.x += (nx + tx * tanBias) * f;
      a.vel.y += (ny + ty * tanBias) * f;
      b.vel.x -= (nx - tx * tanBias) * f;
      b.vel.y -= (ny - ty * tanBias) * f;
    }
  }
  } // end lvl === 4 NS-NS gravity

  // ── BH-NS collision: bounce + temporary capture + release ────────────────────
  // Level 6 only — on level 5, NS are spring-anchored and BH doesn't affect their position
  if (lvl === 4) {
    const bhArr = attractors.filter(a => a.type === 'blackhole');
    const nsArr2 = attractors.filter(a => a.type === 'neutronstar');
    for (const bh of bhArr) {
      const bhScale = Math.sqrt(bh.pullStrength / 57.0);
      const bhR = bh.radius * bhScale * 1.4; // collision radius with some margin
      for (const ns of nsArr2) {
        if (ns.dragging || bh.dragging) continue;
        const nsScale = Math.sqrt(ns.pullStrength / 38.0);
        const nsR = ns.radius * nsScale;
        const dx = ns.pos.x - bh.pos.x, dy = ns.pos.y - bh.pos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = bhR + nsR;

        // ── Approach zone: BH gravity snatches NS into orbit ─────────────────
        const captureZone = bhR * 5.5;
        if (!ns._bhCapture && dist < captureZone && dist > minDist) {
          // Pull NS toward BH with circular-orbit tangential bias
          const pullF = 0.18 / Math.max(dist * dist * 0.08, 0.5);
          const nx = dx / dist, ny = dy / dist;
          const tx = -ny, ty = nx; // tangent for orbit
          ns.vel.x -= (nx * 0.7 - tx * 0.8) * pullF;
          ns.vel.y -= (ny * 0.7 - ty * 0.8) * pullF;
        }

        // ── Hard collision: bounce + enter capture state ──────────────────────
        if (dist < minDist && dist > 0.001) {
          const nx = dx / dist, ny = dy / dist;
          // Separate
          const pen = minDist - dist;
          ns.pos.x += nx * pen * 0.8;
          ns.pos.y += ny * pen * 0.8;
          bh.pos.x -= nx * pen * 0.2;
          bh.pos.y -= ny * pen * 0.2;

          // Elastic-ish bounce
          const relVx = ns.vel.x - bh.vel.x, relVy = ns.vel.y - bh.vel.y;
          const dot = relVx * nx + relVy * ny;
          const RESTITUTION = 0.62;
          if (dot < 0) {
            const j = -(1 + RESTITUTION) * dot * 0.5;
            ns.vel.x += j * nx;
            ns.vel.y += j * ny;
            bh.vel.x -= j * nx * 0.15; // BH barely moves — it's massive
            bh.vel.y -= j * ny * 0.15;
          }

          // Begin capture: BH grabs the NS into a temporary orbit
          if (!ns._bhCapture) {
            ns._bhCapture = bh;
            ns._bhCaptureTimer = 2.2 + Math.random() * 1.8; // hold 2–4 sec
            // Give NS a tangential nudge to kick off the orbit arc
            const targetOrbitSpd = Math.sqrt(bh.pullStrength * 0.12 / Math.max(dist, bhR * 1.5));
            ns.vel.x = -ny * targetOrbitSpd * (Math.random() < 0.5 ? 1 : -1);
            ns.vel.y =  nx * targetOrbitSpd * (Math.random() < 0.5 ? 1 : -1);
            // Count as hit for win condition
            ns._bhHitCount = (ns._bhHitCount || 0) + 1;
          }
        }

        // ── While captured: steer NS into orbit around BH ────────────────────
        if (ns._bhCapture === bh && !ns.dragging) {
          ns._bhCaptureTimer -= 1/60; // approx dt
          const rx = ns.pos.x - bh.pos.x, ry = ns.pos.y - bh.pos.y;
          const r = Math.sqrt(rx*rx + ry*ry) + 0.001;
          const txO = -ry / r, tyO = rx / r;
          const vTan = ns.vel.x * txO + ns.vel.y * tyO;
          const vCirc = Math.sqrt(bh.pullStrength * 0.12 / r);
          const nudge = (vCirc - vTan) * 0.08;
          ns.vel.x += txO * nudge;
          ns.vel.y += tyO * nudge;
          // Slight pull inward to maintain orbit altitude
          const radialPull = 0.04;
          ns.vel.x -= (rx / r) * radialPull;
          ns.vel.y -= (ry / r) * radialPull;

          // Release: timer expired or NS dragged away
          if (ns._bhCaptureTimer <= 0) {
            ns._bhCapture = null;
            ns._bhCaptureTimer = 0;
            // Fling tangentially on release — exits on a clean arc
            const exitSpd = Math.sqrt(ns.vel.x**2 + ns.vel.y**2) * 1.3;
            ns.vel.x = txO * exitSpd;
            ns.vel.y = tyO * exitSpd;
          }
        }
        // Clear capture if NS was dragged
        if (ns._bhCapture === bh && ns.dragging) {
          ns._bhCapture = null;
          ns._bhCaptureTimer = 0;
        }
      }
    }
  }
}

// ── Throw velocity tracking for bouncing BH ───────────────────────────────────
// Ring buffer of recent world-space attractor positions while dragging
const _throwBuf = [];

function _recordThrowPos(a) {
  if (!a || !a._bouncingBH) return;
  _throwBuf.push({ x: a.pos.x, y: a.pos.y, t: performance.now() });
  if (_throwBuf.length > _THROW_BUF_LEN) _throwBuf.shift();
}
function _applyThrow(a) {
  if (!a || !a._bouncingBH || _throwBuf.length < 2) return;
  // Weighted average of recent deltas — more weight to the most recent
  let vx = 0, vy = 0, totalW = 0;
  for (let i = 1; i < _throwBuf.length; i++) {
    const dt = (_throwBuf[i].t - _throwBuf[i-1].t) / 1000;
    if (dt < 0.001) continue;
    const w = i; // linear recency weight
    vx += ((_throwBuf[i].x - _throwBuf[i-1].x) / dt) * w;
    vy += ((_throwBuf[i].y - _throwBuf[i-1].y) / dt) * w;
    totalW += w;
  }
  if (totalW > 0) {
    const THROW_SCALE = 0.72; // tune feel: 1.0 = physically exact, >1 = exaggerated
    const MAX_THROW = 28;
    vx = Math.max(-MAX_THROW, Math.min(MAX_THROW, (vx / totalW) * THROW_SCALE));
    vy = Math.max(-MAX_THROW, Math.min(MAX_THROW, (vy / totalW) * THROW_SCALE));

    a.vel.y = vy;
  }
  _throwBuf.length = 0;
}

});

// ── SUPERNOVA IMPULSE ─────────────────────────────────────────────────────────
const SUPERNOVA_R = 7.0;
const SUPERNOVA_F = 18.0;
const SUPERNOVA_LIFT = 4.0;
function supernovaImpulse(wx, wy) {
  const N = Math.min(P.count, MP);
  for (let i = 0; i < N; i++) {
    if (!pal[i]) continue;
    const b = i * 3;
    const dx = pp[b] - wx, dy = pp[b+1] - wy, dz = pp[b+2];
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.001;
    if (dist > SUPERNOVA_R) continue;
    const t = 1 - dist / SUPERNOVA_R;
    const f = SUPERNOVA_F * t * t;
    pv[b]   += (dx / dist) * f;
    pv[b+1] += (dy / dist) * f + SUPERNOVA_LIFT * t;
    pv[b+2] += (dz / dist) * f;
  }

  // ── Level 5: supernova shockwave blasts attractors (BH + NS) ──────────────
  if (lvl === 4) {
    const NOVA_ATTRACTOR_R = 14.0;  // shockwave reach in world units
    const NOVA_BH_F        = 10.0;  // kick on black hole (massive — resists but recoils)
    const NOVA_NS_F        = 24.0;  // kick on neutron star (lighter — flung hard)
    for (const a of attractors) {
      if (a.dragging) continue;
      const adx = a.pos.x - wx, ady = a.pos.y - wy;
      const adist = Math.sqrt(adx*adx + ady*ady) || 0.001;
      if (adist > NOVA_ATTRACTOR_R) continue;
      const tA = 1 - adist / NOVA_ATTRACTOR_R;
      const isBH = a.type === 'blackhole';
      const force = (isBH ? NOVA_BH_F : NOVA_NS_F) * tA * tA;
      // Radial blast away from epicentre
      a.vel.x += (adx / adist) * force;
      a.vel.y += (ady / adist) * force + (isBH ? 1.5 : 4.0) * tA;
      // NS: add a random tangential spin kick for extra chaos
      if (!isBH) {
        const tx = -ady / adist, ty = adx / adist;
        const spinDir = Math.random() < 0.5 ? 1 : -1;
        a.vel.x += tx * force * 0.35 * spinDir;
        a.vel.y += ty * force * 0.35 * spinDir;
        // Break active BH capture so it flies free
        a._bhCapture = null;
        a._bhCaptureTimer = 0;
      }
      // Mark for glow flare (drawn in overlay, decayed each frame)
      a._novaHitT = 0.6;
    }
  }

  flashEl('flash-complete');
}

renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button!==0||dDrag)return;

  // Portal pair drag hit-test (Level 6)
  if(lvl === 4 && portalPairs.length > 0) {
    const hit = hitTestPortal(e.clientX, e.clientY);
    if(hit) {
      _draggingPortal = { pair: hit.pair, which: hit.which };
      hit.pair.dragging = hit.which;
      return;
    }
  }

  // Wormhole exit drag — hit test against screen-space circle
  if(wormhole.active && wormhole._screenX != null) {
    const dx=e.clientX-wormhole._screenX, dy=e.clientY-wormhole._screenY;
    if(Math.sqrt(dx*dx+dy*dy) < (wormhole._screenR||40)) {
      wormhole.dragging=true; return;
    }
  }

  ndc.set((e.clientX/W)*2-1,-(e.clientY/H)*2+1);
  ray.setFromCamera(ndc,camera);
  
  // Screen-space hit test for attractors — 28px min touch target (desktop), larger for NS
  const MIN_CLICK_R = 14;
  let hitAttractor = null, hitDist = Infinity;
  for(let a of attractors) {
    const sc2d = a.pos.clone().project(camera);
    const sx = (sc2d.x + 1) / 2 * W, sy = (-sc2d.y + 1) / 2 * H;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    const screenDist = Math.sqrt(dx*dx + dy*dy);
    const edge = new THREE.Vector3(a.pos.x + a.radius, a.pos.y, a.pos.z).project(camera);
    const visualR = Math.abs((edge.x + 1) / 2 * W - sx);
    const clickR = Math.max(MIN_CLICK_R, visualR);
    if(screenDist < clickR && screenDist < hitDist) { hitDist = screenDist; hitAttractor = a; }
  }
  if(hitAttractor) {
    tAttractor = hitAttractor;
    hitAttractor.dragging = true;
    hitAttractor.vel.set(0,0,0);
    _throwBuf.length = 0; // fresh buffer for this drag
    const wp = s2w(e.clientX, e.clientY);
    aDragOff.set(wp.x - hitAttractor.pos.x, wp.y - hitAttractor.pos.y, 0);
    showShapeText(hitAttractor.type, hitAttractor);
    return;
  }
  
  const allMeshes=shapes.map(s=>s.mesh);
  if(emitterShape)allMeshes.push(emitterShape.mesh);
  const hits=ray.intersectObjects(allMeshes,true);
  if(hits.length){
    const allShapes=[...shapes,...(emitterShape?[emitterShape]:[])];
    const sh=allShapes.find(s=>{
      if(s.type==='panelstack'){
        return s.mesh===hits[0].object||s.mesh.getObjectById(hits[0].object.id)!==undefined;
      }
      return s.mesh===hits[0].object||s.mesh.children.includes(hits[0].object);
    });
    if(sh){dTime=Date.now();dMov=false;dShape=sh;sh.dragging=true;sh.vel.set(0,0,0);const wp=s2w(e.clientX,e.clientY);dOff.set(wp.x-sh.pos.x,wp.y-sh.pos.y,0);prevWP=wp.clone();rotPrevX=e.clientX;rotPrevY=e.clientY;
      showShapeText(sh.type, sh);
    }
  }
  // Empty-space click — supernova blast
  else { const wp=s2w(e.clientX,e.clientY); supernovaImpulse(wp.x, wp.y); }
});

// Keyed by spill ratio bands. Each fires once per level crossing.
// ── SPILL GRAPH ───────────────────────────────────────────────────────────────
const SPILL_HISTORY_MAX = 180; // ~3s of history at 60fps (sampled every frame)
const spillHistory = [];
let _spillGraphFrame = 0;

function pushSpillHistory(v) {
  spillHistory.push(v);
  if (spillHistory.length > SPILL_HISTORY_MAX) spillHistory.shift();
}

function drawSpillGraph() {
  const canvas = document.getElementById('spill-graph-canvas');
  if (!canvas) return;
  const W2 = canvas.offsetWidth || 200;
  canvas.width = W2 * (window.devicePixelRatio || 1);
  canvas.height = 64 * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  const pct = spillSmooth;
  // Color: green → amber → red by spill level
  const r = pct < 0.4 ? Math.round(pct / 0.4 * 255) : 255;
  const g = pct < 0.4 ? 120 : Math.round(Math.max(0, 120 * (1 - (pct - 0.4) / 0.6)));
  const col = `rgb(${r},${g},60)`;

  if (spillHistory.length > 1) {
    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    [0.25, 0.5, 0.75].forEach(v => {
      const y = (1 - v) * (ch - 4 * dpr) + 2 * dpr;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
    });

    // Threshold lines
    [[0.75, 'rgba(255,180,60,0.18)'], [0.9, 'rgba(255,60,60,0.18)']].forEach(([v, c]) => {
      const y = (1 - v) * (ch - 4 * dpr) + 2 * dpr;
      ctx.strokeStyle = c; ctx.lineWidth = dpr;
      ctx.setLineDash([3 * dpr, 3 * dpr]); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
      ctx.setLineDash([]);
    });

    // Fill area under curve
    const grad = ctx.createLinearGradient(0, 0, 0, ch);
    grad.addColorStop(0, `rgba(${r},${g},60,0.18)`);
    grad.addColorStop(1, `rgba(${r},${g},60,0.02)`);
    ctx.beginPath();
    spillHistory.forEach((v, i) => {
      const x = (i / (SPILL_HISTORY_MAX - 1)) * cw;
      const y = (1 - v) * (ch - 4 * dpr) + 2 * dpr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(cw, ch); ctx.lineTo(0, ch); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5 * dpr; ctx.lineJoin = 'round';
    spillHistory.forEach((v, i) => {
      const x = (i / (SPILL_HISTORY_MAX - 1)) * cw;
      const y = (1 - v) * (ch - 4 * dpr) + 2 * dpr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Live dot
    const lastV = spillHistory[spillHistory.length - 1];
    const lx = ((spillHistory.length - 1) / (SPILL_HISTORY_MAX - 1)) * cw;
    const ly = (1 - lastV) * (ch - 4 * dpr) + 2 * dpr;
    ctx.beginPath(); ctx.arc(lx, ly, 2.5 * dpr, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
    // glow
    ctx.beginPath(); ctx.arc(lx, ly, 5 * dpr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},60,0.22)`; ctx.fill();
  }

  // Update readout
  const pctEl = document.getElementById('spill-graph-pct');
  const statusEl = document.getElementById('spill-graph-status');
  const labelEl = document.getElementById('spill-graph-label');
  if (pctEl) pctEl.textContent = Math.round(pct * 100) + '%';
  if (pctEl) pctEl.style.color = col;
  if (statusEl) {
    if (pct < 0.35) { statusEl.textContent = 'NOMINAL'; statusEl.style.color = 'rgba(100,255,140,0.45)'; }
    else if (pct < 0.75) { statusEl.textContent = 'DRIFTING'; statusEl.style.color = 'rgba(255,200,80,0.5)'; }
    else if (pct < 0.90) { statusEl.textContent = 'ESCAPING'; statusEl.style.color = 'rgba(255,120,60,0.65)'; }
    else { statusEl.textContent = 'LOST'; statusEl.style.color = 'rgba(255,60,60,0.75)'; }
  }
  if (labelEl) {
    const labels = pct < 0.2 ? 'well-directed' : pct < 0.5 ? 'escaping' : pct < 0.8 ? 'spilling' : 'unconstrained';
    labelEl.textContent = labels;
  }
}

function updateSpillGraph() {
  _spillGraphFrame++;
  pushSpillHistory(spillSmooth);
  if (_spillGraphFrame % 2 === 0) drawSpillGraph(); // every other frame
}
