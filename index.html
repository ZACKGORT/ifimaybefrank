<title>zack.cx</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='13' height='13' fill='none' stroke='%23ffffff' stroke-width='1.5'/%3E%3Ccircle cx='24' cy='8' r='6.5' fill='none' stroke='%23ffffff' stroke-width='1.5'/%3E%3Cpolygon points='16,32 32,32 24,18' fill='none' stroke='%23ffffff' stroke-width='1.5'/%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
body{background:#0a0a0a;overflow:hidden;font-family:'Courier New',monospace;cursor:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;}
#cursor{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;width:18px;height:11px;border-radius:50%;background:rgba(255,255,248,0.92);will-change:transform;}
#snap-hint{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);pointer-events:none;z-index:299;opacity:0;transition:opacity 0.3s;}
#snap-hint.visible{opacity:1;}
/* text cursor canvas */
#text-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}

#dispenser{position:fixed;z-index:300;top:18px;left:50%;transform:translateX(-50%);user-select:none;touch-action:none;}
#cta-btn{display:flex;align-items:center;justify-content:center;gap:9px;background:#ffffff;color:#0a0a0a;border:none;padding:0 20px 0 18px;height:38px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:none;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,0.4);transition:box-shadow 0.15s,background 0.12s;white-space:nowrap;min-width:100px;}
#cta-btn:hover{opacity:0.92;}
#cta-btn.paused{background:#0a0a0a;color:#ffffff;}

/* Fix #1: removed backdrop-filter from .widget — was compositing 10+ layers separately on Chrome */
.widget{position:fixed;z-index:100;background:rgba(8,8,8,0.94);border:1px solid rgba(255,255,255,0.07);border-radius:6px;user-select:none;}
.widget-header{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:grab;}
.widget-title{font-size:9px;letter-spacing:0.3em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
.widget-sub{font-size:8px;color:rgba(255,255,255,0.1);letter-spacing:0.1em;}

/* ── UNIFORM WIDGET WIDTH ── */
.widget{width:260px!important;}

.ins-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:8px 0 7px;cursor:none;color:#fff;flex:1;transition:background 0.12s;}
.ins-btn:hover{background:rgba(255,255,255,0.09);}
.ins-btn svg{width:22px;height:22px;}
.ins-btn-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.32); text-align:center;}
.ins-div{height:1px;background:rgba(255,255,255,0.04);}
.ins-clear{width:100%;background:transparent;border:1px solid rgba(255,60,60,0.15);color:rgba(255,80,80,0.38);font-family:'Courier New',monospace;font-size:8px;letter-spacing:0.1em;padding:5px 4px;cursor:none;text-transform:uppercase;border-radius:3px;transition:all 0.15s;}
.ins-clear:hover{border-color:rgba(255,60,60,0.4);color:rgba(255,80,80,0.75);}

#game-hud{right:16px;top:16px;left:auto;bottom:auto;}
#hud-inner{padding:10px 11px;display:flex;flex-direction:column;gap:0;}
.target-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tbar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.tbar-fill{height:100%;border-radius:2px;transition:width 0.15s;}
.tpct{font-size:8px;color:rgba(255,255,255,0.22);min-width:24px;text-align:right;}
.tchk{font-size:9px;opacity:0;transition:opacity 0.3s;}
.tchk.done{opacity:1;}

#panel{right:16px;top:90px;left:auto;bottom:auto;}
#panel-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:grab;}
#panel-title{font-size:9px;letter-spacing:0.3em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
#btn-pp{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.38);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;padding:3px 7px;cursor:none;text-transform:uppercase;transition:all 0.15s;border-radius:3px;}
#btn-pp:hover{color:#fff;}
#btn-pp.paused{color:rgba(255,180,80,0.85);}
#panel-body{padding:11px;display:flex;flex-direction:column;gap:9px;}
.ctrl-row{display:flex;flex-direction:column;gap:4px;}
.ctrl-lbl{display:flex;justify-content:space-between;align-items:baseline;}
.ctrl-nm{font-size:9px;letter-spacing:0.18em;color:rgba(255,255,255,0.18);text-transform:uppercase;}
.ctrl-vl{font-size:9px;color:rgba(255,255,255,0.32);min-width:30px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:100%;height:1px;background:rgba(255,255,255,0.08);outline:none;cursor:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.55);cursor:none;}
.div{height:1px;background:rgba(255,255,255,0.04);margin:1px 0;}
.tog{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.22);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;padding:2px 7px;cursor:none;text-transform:uppercase;transition:all 0.15s;border-radius:3px;}
.tog.on{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.35);}
.chk-row{display:flex;align-items:center;justify-content:space-between;}

#flash-complete,#flash-delete{position:fixed;inset:0;pointer-events:none;z-index:600;background:transparent;}
#flash-complete.on{background:rgba(255,255,255,0.01);}
#flash-delete.on{background:rgba(255,40,40,0.07);}

#screenshot-btn {
  position: fixed;
  bottom: 24px;
  left: 16px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 10, 10, 0.88);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 6px;
  color: rgba(255, 255, 255, 0.4);
  cursor: none;
  z-index: 500;
  transition: all 0.2s;
}
#screenshot-btn:hover {
  color: rgba(255, 255, 255, 0.9);
  border-color: rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 24px rgba(255, 255, 255, 0.1);
}

#next-btn{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:rgba(10,10,10,0.85);color:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.08);padding:0;border-radius:4px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:none;z-index:500;opacity:1;pointer-events:auto;transition:border-color 0.3s,box-shadow 0.3s;overflow:hidden;}
#next-btn-fill{position:absolute;inset:0;background:rgba(255,255,255,0.88);width:0%;transition:width 0.25s ease;border-radius:4px;pointer-events:none;}
#next-btn-label{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:7px 20px;transition:color 0.25s;}
#next-btn.visible{border-color:rgba(255,255,255,0.55);box-shadow:0 0 18px rgba(255,255,255,0.2);}
#next-btn.visible:hover{box-shadow:0 0 32px rgba(255,255,255,0.55),0 0 8px rgba(255,255,255,0.9);}
#next-btn:not(.visible):hover{border-color:rgba(255,255,255,0.2);}

#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.22em;color:rgba(255,255,255,0.1);text-transform:uppercase;pointer-events:none;transition:opacity 1s;white-space:nowrap;z-index:10;}
#shape-count{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.12);text-transform:uppercase;pointer-events:none;}


/* ── SCORE TRACKER ── */
#bb-score-tracker{
  position:fixed;bottom:22px;right:22px;z-index:400;
  font-family:'Helvetica Neue',Arial,sans-serif;font-weight:900;
  font-size:64px;line-height:1;letter-spacing:-0.04em;
  color:rgba(255,255,255,0.88);
  pointer-events:none;
  text-shadow:0 0 40px rgba(255,200,80,0.28);
  transition:color 0.15s;
  user-select:none;
}
#bb-score-tracker.flash{color:#ffd060;}
/* ── MOBILE SCORE OVERRIDE ── */
@media(max-width:600px){
  #bb-score-tracker{
    bottom:auto;right:auto;
    top:56px;left:50%;transform:translateX(-50%);
    font-size:44px;
    text-align:center;
    pointer-events:none;
  }
}

/* ── ORB RAIL ── */
#orb-rail{
  position:fixed;top:0;right:0;bottom:0;width:276px;
  z-index:490;pointer-events:none;
  display:flex;flex-direction:column;justify-content:center;
  gap:10px;padding:24px 16px;
  overflow:hidden;
  transform:translateX(100%);
  transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);
}
#orb-rail.visible{transform:translateX(0);}
#orb-rail.hidden{display:none;}
#orb-rail .orb-widget{
  position:static!important;left:auto!important;top:auto!important;
  right:auto!important;bottom:auto!important;
  pointer-events:auto;width:100%!important;
  min-width:0!important;max-width:none!important;
  flex-shrink:0;
  transition:opacity 0.25s,transform 0.38s cubic-bezier(0.22,1,0.36,1);
}

/* ── ORB RAIL TOGGLE ── */
#orb-rail-toggle{
  position:fixed;top:16px;right:16px;z-index:500;
  background:rgba(10,10,10,0.88);border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(255,255,255,0.38);
  padding:0 11px;height:30px;cursor:none;
  transition:color 0.15s,border-color 0.15s;
  display:flex;align-items:center;gap:6px;
}
#orb-rail-toggle:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.28);}
#orb-rail-toggle .ort-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transition:background 0.15s;
}
#orb-rail-toggle.active{opacity:0.35;}
#orb-rail-toggle.active .ort-dot{background:rgba(255,255,255,0.4);}
#orb-rail-toggle.active:hover{opacity:0.7;}

@media(max-width:600px){
  #bb-score-tracker{font-size:44px;bottom:14px;right:14px;}
  #orb-rail{width:100%;flex-direction:row;flex-wrap:wrap;
    top:auto;bottom:8px;right:0;left:0;
    justify-content:center;align-items:flex-end;padding:0 8px 8px;gap:8px;}
  #orb-rail .orb-widget{width:calc(50% - 4px)!important;flex:none;}
  #orb-rail-toggle{top:8px;right:8px;font-size:8px;}
}

#level-nav{display:none!important;}
#game-hud{display:none!important;}
#next-btn{display:none!important;}
#mb-lvl-nav{display:none!important;}
#bball-hud{display:none!important;}
#hint{display:none!important;}
#panel{display:none!important;}
#shape-count{display:none!important;}
#dispenser{display:none!important;}



.widget:hover{
  background:rgba(22,20,18,0.94)!important;
  border-color:rgba(255,255,255,0.13)!important;
  box-shadow:0 4px 32px rgba(0,0,0,0.35);
}


/* ── LEVEL NAVIGATOR WIDGET ── */
#level-nav{
  position:fixed;left:16px;bottom:80px;z-index:300;
  background:rgba(10,10,10,0.88);border:1px solid rgba(255,255,255,0.07);border-radius:6px;
  padding:9px 10px 10px;user-select:none;width:260px;
}
#level-nav-title{font-size:8px;letter-spacing:0.3em;color:rgba(255,255,255,0.16);text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
#level-nav-sub{font-size:8px;color:rgba(255,255,255,0.1);letter-spacing:0.1em;}
#level-nav-btns{display:flex;gap:5px;}
.lvl-nav-btn{
  flex:1;height:28px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);border-radius:4px;
  color:rgba(255,255,255,0.28);font-family:'Courier New',monospace;
  font-size:9px;letter-spacing:0.1em;cursor:none;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.lvl-nav-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);}
.lvl-nav-btn.active{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.28);color:rgba(255,255,255,0.85);}
.lvl-nav-btn.done{border-color:rgba(100,255,140,0.22);color:rgba(100,255,140,0.55);}
.lvl-nav-btn.done.active{border-color:rgba(100,255,140,0.5);background:rgba(100,255,140,0.06);}
#level-nav-desc{margin-top:6px;font-size:7.5px;line-height:1.6;color:rgba(255,255,255,0.18);letter-spacing:0.04em;min-height:22px;}
@media(max-width:600px){#level-nav{display:none!important;}}


/* ── FRANK LOGO ── */
#zckgrt-logo{
  position:fixed;left:16px;top:16px;z-index:300;
  pointer-events:none;
}
#zckgrt-logo span{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-weight:900;
  font-size:13px;
  letter-spacing:0.18em;
  color:rgba(255,255,255,1.0);
  text-transform:uppercase;
  display:inline-block;
  transition:color 0.3s;
  will-change:transform;
}
@media (max-width:600px){#zckgrt-logo{display:none!important;}}

@media (max-width:600px){
  /* hide desktop widgets */
  #shape-inserter,#game-hud,#panel,#hint,#shape-count{display:none!important;}
  /* suppress custom cursor on touch */
  #cursor{display:none!important;}
  body{cursor:auto;}

  /* ── MOBILE LEVEL NAV: hidden on basketball standalone ── */
  #mb-lvl-nav{display:none!important;}

  /* ── TOP BAR: brand label only ── */
  #mobile-bar{
    position:fixed;top:0;left:0;right:0;height:48px;
    display:flex;align-items:stretch;
    background:rgba(10,10,10,0.92);
    border-bottom:1px solid rgba(255,255,255,0.07);
    z-index:400;
  }
  .mb-btn{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-family:'Courier New',monospace;
    font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(255,255,255,0.45);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    border-right:1px solid rgba(255,255,255,0.06);
    transition:background 0.15s,color 0.15s;
  }
  .mb-btn:last-child{border-right:none;}
  .mb-btn:active,.mb-btn.open{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85);}
  #mb-add-btn{display:none!important;}

  /* Panels drop down from top bar (note only) */
  .mb-panel{
    position:fixed;top:48px;left:0;right:0;
    background:rgba(10,10,10,0.94);
    border-bottom:1px solid rgba(255,255,255,0.07);
    z-index:399;
    display:none;
    max-height:55vh;
    overflow-y:auto;
  }
  .mb-panel.open{display:block;}
  #mb-flow-panel,#mb-ctrl-panel{
    top:auto!important;bottom:0!important;
    border-bottom:none!important;
    border-top:1px solid rgba(255,255,255,0.07)!important;
    max-height:60vh;
  }

  .mb-ctrl-row{
    display:flex;align-items:center;gap:8px;
    padding:12px 20px;
    border-top:1px solid rgba(255,255,255,0.04);
  }
  .mb-ctrl-row:first-child{border-top:none;}
  .mb-ctrl-lbl{
    font-family:'Courier New',monospace;
    font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(255,255,255,0.3);flex:1;
  }
  .mb-ctrl-btn{
    background:transparent;border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.5);
    font-family:'Courier New',monospace;font-size:11px;
    padding:7px 14px;cursor:pointer;border-radius:3px;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.15s;
  }
  .mb-ctrl-btn:active{background:rgba(255,255,255,0.08);color:#fff;}
  .mb-lvl-sel-btn.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.9);}
  .mb-ctrl-val{
    font-family:'Courier New',monospace;font-size:9px;
    color:rgba(255,255,255,0.35);min-width:28px;text-align:center;
  }
  .mb-tog-btn{
    background:transparent;border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.3);
    font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.1em;
    padding:6px 10px;cursor:pointer;border-radius:3px;text-transform:uppercase;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.15s;
  }
  .mb-tog-btn.on{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.35);}
  .mb-range{-webkit-appearance:none;flex:1;height:2px;background:rgba(255,255,255,0.1);outline:none;border-radius:1px;}
  .mb-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.6);cursor:pointer;}

  /* ── HIDE bottom rail and shape HUD (basketball standalone) ── */
  #mobile-bottom-rail{display:none!important;}
  #mb-shape-hud{display:none!important;}

  /* ── BOTTOM RAIL: Add shapes (hidden but keep styles for reference) ── */
  #mobile-bottom-rail{
    position:fixed;bottom:0;left:0;right:0;height:44px;
    display:flex;align-items:stretch;
    background:rgba(10,10,10,0.92);
    border-top:1px solid rgba(255,255,255,0.07);
    z-index:400;
  }
  .mb-rail-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
    font-family:'Courier New',monospace;
    font-size:8px;letter-spacing:0.15em;text-transform:uppercase;
    color:rgba(255,255,255,0.4);
    border:none;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    border-right:1px solid rgba(255,255,255,0.06);
    transition:background 0.15s,color 0.15s;
  }
  .mb-rail-btn:last-child{border-right:none;}
  .mb-rail-btn:active,.mb-rail-btn.open{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.9);}
  .mb-rail-btn svg{width:14px;height:14px;flex-shrink:0;}

  /* dispenser shifts down, clears top bar */
  #dispenser{top:58px!important;}
  /* text, screenshot, next-btn — safe middle position to avoid overlapping UI */
  #screenshot-btn{bottom:60px!important;top:auto!important;left:12px!important;cursor:pointer;z-index:398!important; transition: transform 0.25s ease, bottom 0.25s ease;}
  #next-btn{bottom:56px!important;top:auto!important;cursor:pointer;}
  #shape-count{display:none!important;}

  /* ── SHAPE HUD: floating draggable widget ── */
  #mb-shape-hud{
    position:fixed;
    bottom:60px;left:50%;transform:translateX(-50%);
    width:auto;
    max-width: 96vw;
    display:flex;align-items:stretch;
    justify-content: flex-start;
    background:rgba(10,10,10,0.88);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;
    z-index:398;
    touch-action:none;
    user-select:none;
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    transition:transform 0.25s ease, bottom 0.25s ease;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mb-shape-btn{
    width:72px;height:64px;
    flex-shrink: 0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    font-family:'Courier New',monospace;
    font-size:8px;letter-spacing:0.14em;text-transform:uppercase;

/* ── SINGULARITY COLLAPSE INDICATOR ── */
#collapse-ring{
  position:fixed;pointer-events:none;z-index:9998;
  width:0;height:0;border-radius:50%;
  border:2px solid rgba(255,80,80,0.0);
  transform:translate(-50%,-50%);
  transition:border-color 0.1s;
  display:none;
}
#collapse-ring.active{display:block;border-color:rgba(255,80,80,0.6);}

#thank-you-toast{
  position:fixed;
  /* Desktop: bottom center */
  bottom:24px;left:50%;right:auto;top:auto;
  transform:translateX(-50%) scale(0.88);
  background:rgba(10,10,10,0.94);border:1px solid rgba(255,255,255,0.14);
  border-radius:8px;padding:18px 20px 16px;
  text-align:center;z-index:2000;pointer-events:none;
  opacity:0;transition:opacity 0.4s,transform 0.4s;
  box-shadow:0 8px 48px rgba(0,0,0,0.7);
  cursor:grab;min-width:180px;max-width:240px;
  user-select:none;-webkit-user-select:none;
}
#thank-you-toast.visible{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto;}
#thank-you-toast.dragging{cursor:grabbing;transition:none;}
#thank-you-toast .tyt-title{font-family:'Instrument Serif',Georgia,serif;font-size:20px;color:rgba(255,255,248,0.92);margin-bottom:6px;letter-spacing:0.02em;}
#thank-you-toast .tyt-body{font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.22em;color:rgba(255,255,255,0.35);text-transform:uppercase;}
#thank-you-toast .tyt-email{font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.08em;color:rgba(255,255,255,0.6);margin-top:5px;display:block;}
#thank-you-toast .tyt-links{display:flex;gap:14px;justify-content:center;margin-top:10px;}
#thank-you-toast .tyt-links a{font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.14em;color:rgba(255,255,255,0.3);text-decoration:none;text-transform:uppercase;transition:color 0.15s;}
#thank-you-toast .tyt-links a:hover{color:rgba(255,255,255,0.75);}
/* Mobile: bottom-clamped, NOT full-width, tap to dismiss */
@media(max-width:600px){
  #thank-you-toast{
    right:16px;bottom:60px;left:16px;width:auto;border-radius:12px;
    padding:18px 24px 22px;text-align:center;cursor:pointer;
    transform:translateY(12px) scale(0.96);
    border-bottom:1px solid rgba(255,255,255,0.14);
  }
  #thank-you-toast.visible{transform:translateY(0) scale(1);}
  #thank-you-toast::after{
    content:'tap to dismiss';display:block;margin-top:12px;
    font-family:'Courier New',monospace;font-size:8px;letter-spacing:0.22em;
    color:rgba(255,255,255,0.18);text-transform:uppercase;
  }
}

/* ── PROJECT CARD ── */
#project-card {
  position: fixed;
  display: none;
  flex-direction: column;
  gap: 10px;
  background: rgba(8,6,4,0.92);

}
#project-card-link {

}
#project-card-link:hover { background: rgba(255,200,80,0.14); border-color: rgba(255,200,80,0.35); }
#project-card-close {

function rectsOverlap(a,b){return a.x<b.x+b.w+PAD&&a.x+a.w+PAD>b.x&&a.y<b.y+b.h+PAD&&a.y+a.h+PAD>b.y;}
function resolveWidgetOverlaps(movedId){
  for(let pass=0;pass<8;pass++){
    let moved=false;
    const rects=WIDGETS.map(getRect);
    for(let i=0;i<rects.length;i++)for(let j=i+1;j<rects.length;j++){
      const a=rects[i],b=rects[j];
      if(!rectsOverlap(a,b))continue;
      const pushB=(a.id===movedId);
      const target=pushB?b:a,fixed=pushB?a:b;
      const ox=(fixed.x+fixed.w/2)-(target.x+target.w/2),oy=(fixed.y+fixed.h/2)-(target.y+target.h/2);
      const overlapX=(fixed.w/2+target.w/2+PAD)-Math.abs(ox),overlapY=(fixed.h/2+target.h/2+PAD)-Math.abs(oy);
      let nx=target.x,ny=target.y;
      if(overlapX<overlapY)nx+=ox>0?-overlapX:overlapX;else ny+=oy>0?-overlapY:overlapY;

      target.el.style.left=nx+'px';target.el.style.top=ny+'px';target.x=nx;target.y=ny;

  _initAccretionDisc() {

    this._adFlare = new Float32Array(N);
    this._adBand = new Uint8Array(N);

      this._adBand[i] = i < N * 0.6 ? 0 : 1;

    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this._adPos, 3));
    const colors = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const t = i / N;
      colors[i*3] = 0.55 + t * 0.25; colors[i*3+1] = 0.35 + t * 0.10; colors[i*3+2] = 1.0;
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      size: 0.055, vertexColors: true, transparent: true, opacity: 0.82,
      depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,

  _adSeed(i) {
    const b = i * 3;
    const isInner = this._adBand ? this._adBand[i] === 0 : true;
    const rMin = isInner ? this.radius * 1.1 : this.radius * 2.2;
    const rMax = isInner ? this.radius * 2.2 : this.radius * 4.0;
    const r = rMin + Math.pow(Math.random(), isInner ? 1.8 : 1.2) * (rMax - rMin);
    const angle = Math.random() * Math.PI * 2;
    const discZ = (Math.random() - 0.5) * (isInner ? 0.06 : 0.15) * r;
    this._adPos[b]   = this.pos.x + Math.cos(angle) * r;
    this._adPos[b+1] = this.pos.y + Math.sin(angle) * r * 0.28;
    this._adPos[b+2] = this.pos.z + discZ;
    const vOrbit = Math.sqrt(this.pullStrength / r) * (isInner ? 0.88 : 0.75);
    this._adVel[b]   = -Math.sin(angle) * vOrbit;
    this._adVel[b+1] =  Math.cos(angle) * vOrbit * 0.28;
    this._adVel[b+2] =  (Math.random() - 0.5) * 0.02;
    this._adLife[i] = Math.random();
    if (this._adFlare) this._adFlare[i] = 0;
  }

  _updateAccretionDisc(dt) {
    const geo = this._adPoints.geometry;
    const posAttr = geo.getAttribute('position');
    const colorAttr = geo.getAttribute('color');
    this._adStreamHits = Math.max(0, (this._adStreamHits || 0) - dt * 3.5);
    const globalFlare = Math.min(1, this._adStreamHits * 0.4);
    for (let i = 0; i < this._adN; i++) {
      const b = i * 3;
      const isInner = this._adBand ? this._adBand[i] === 0 : true;
      this._adLife[i] += dt * (isInner ? 0.025 : 0.018);
      if (this._adLife[i] > 1.0) { this._adSeed(i); this._adLife[i] = 0; continue; }
      const dx = this.pos.x - this._adPos[b];
      const dy = (this.pos.y - this._adPos[b+1]) / 0.28;
      const dz = this.pos.z - this._adPos[b+2];
      const dist = Math.sqrt(dx*dx + dy*dy*0.28*0.28 + dz*dz) + 0.001;
      const f = this.pullStrength * 1.8 * dt / (dist * dist + 0.08);
      this._adVel[b]   += dx / dist * f;
      this._adVel[b+1] += (this.pos.y - this._adPos[b+1]) / dist * f;
      this._adVel[b+2] += dz / dist * f;
      const rx = this._adPos[b] - this.pos.x;
      const ry = (this._adPos[b+1] - this.pos.y) / 0.28;
      const rDist = Math.sqrt(rx*rx + ry*ry) + 0.001;
      const vOrbit = Math.sqrt(this.pullStrength / rDist) * (isInner ? 0.88 : 0.75);
      const tx = -ry / rDist, ty = rx / rDist;
      const vTan = this._adVel[b] * tx + this._adVel[b+1] * ty * 0.28;
      const dv = (vOrbit - vTan) * (isInner ? 0.14 : 0.09);
      this._adVel[b]   += tx * dv;
      this._adVel[b+1] += ty * 0.28 * dv;
      const spd = Math.sqrt(this._adVel[b]**2 + this._adVel[b+1]**2);
      if (spd > vOrbit * 2.2) { this._adVel[b] *= vOrbit * 2.2 / spd; this._adVel[b+1] *= vOrbit * 2.2 / spd; }
      this._adPos[b]   += this._adVel[b]   * dt;
      this._adPos[b+1] += this._adVel[b+1] * dt;
      this._adPos[b+2] += this._adVel[b+2] * dt;
      const rdx = this._adPos[b] - this.pos.x, rdy = this._adPos[b+1] - this.pos.y;
      const rdist = Math.sqrt(rdx*rdx + rdy*rdy);
      const maxR = isInner ? this.radius * 4.2 : this.radius * 7.0;
      if (rdist < this.radius * 0.9 || rdist > maxR) { this._adSeed(i); this._adLife[i] = 0; continue; }
      if (this._adFlare) this._adFlare[i] = Math.max(0, this._adFlare[i] - dt * 4.0);
      const flare = (this._adFlare ? this._adFlare[i] : 0) + globalFlare * (isInner ? 0.9 : 0.5);
      const normR = Math.min(1, (rdist - this.radius) / (this.radius * (isInner ? 1.2 : 3.0)));
      const lifeFade = Math.sin(this._adLife[i] * Math.PI);
      const br = lifeFade * (1.0 - normR * (isInner ? 0.35 : 0.6)) * (1.0 + flare * 1.8);
      if (isInner) {
        colorAttr.array[b]   = (0.65 + normR * 0.25 + flare * 0.4) * br;
        colorAttr.array[b+1] = (0.5  - normR * 0.3  + flare * 0.2) * br;
        colorAttr.array[b+2] = br;
      } else {
        colorAttr.array[b]   = (0.35 + normR * 0.15 + flare * 0.35) * br * 0.7;
        colorAttr.array[b+1] = (0.15 + flare * 0.15) * br * 0.7;
        colorAttr.array[b+2] = (0.85 - normR * 0.3) * br * 0.7;
      }
      posAttr.array[b]   = this._adPos[b];
      posAttr.array[b+1] = this._adPos[b+1];
      posAttr.array[b+2] = this._adPos[b+2];
    }
    posAttr.needsUpdate = true;
    colorAttr.needsUpdate = true;
    this._adPoints.position.set(0, 0, 0);
  }

  notifyStreamParticle(px, py, pz) {

    const dx = px - this.pos.x, dy = py - this.pos.y;
    const dist2d = Math.sqrt(dx*dx + dy*dy);
    if (dist2d > discR || Math.abs(pz) > 0.8) return;
    this._adStreamHits = Math.min(4, (this._adStreamHits || 0) + 0.18);
    for (let i = 0; i < this._adN; i++) {
      const b = i * 3;
      const ddx = this._adPos[b] - px, ddy = this._adPos[b+1] - py;
      const proximity = 1.0 - Math.min(1, Math.sqrt(ddx*ddx+ddy*ddy) / (this.radius * 1.5));
      if (proximity > 0.2 && this._adFlare) this._adFlare[i] = Math.min(1.0, this._adFlare[i] + proximity * 0.65);
    }
  }

  update(dt) {
    this._pulseT += dt;
    // Tick portal cooldowns
    for (const pp of portalPairs) { if (pp.cooldown > 0) pp.cooldown -= dt; }

    if (this.type === 'blackhole') {
      if (this._zenOrb) {
        // Gentle breathing pulse for zen orb
        const pulse = 0.5 + Math.sin(this._pulseT * 0.9) * 0.5;
        const pulse2 = 0.5 + Math.sin(this._pulseT * 1.4 + 1.2) * 0.5;
        this.glowMeshes[0].material.opacity = 0.04 + pulse * 0.025;
        this.glowMeshes[1].material.opacity = 0.02 + pulse2 * 0.012;
        this.glowMeshes[2].material.opacity = 0.008 + pulse * 0.007;
        this.glowMeshes[3].material.opacity = 0.003 + pulse2 * 0.003;
        if (this._zenLight) {
          this._zenLight.intensity = 4.5 + pulse * 2.0;
        }
        if (this.core && this.core.material) {
          this.core.material.emissiveIntensity = 3.0 + pulse * 1.0;
        }
      } else {
      const pulse = 0.5 + Math.sin(this._pulseT * 2.2) * 0.5;
      this.glowMeshes[0].material.opacity = 0.14 + pulse * 0.08;
      this.glowMeshes[1].material.opacity = 0.07 + pulse * 0.04;
      this.glowMeshes[2].material.opacity = 0.03 + pulse * 0.025;
      if (this._adPoints) this._updateAccretionDisc(dt);
      }
    } else {
      const pulse = 0.5 + Math.sin(this._pulseT * 8.0) * 0.5;
      this.glowMeshes[0].material.opacity = 0.28 + pulse * 0.14;
      this.glowMeshes[1].material.opacity = 0.12 + pulse * 0.07;
      this.glowMeshes[2].material.opacity = 0.04 + pulse * 0.03;
    }

    // Dynamic Scale Based on Pull Strength
    const basePull = this.type === 'neutronstar' ? 38.0 : 57.0;
    const scale = Math.sqrt(this.pullStrength / basePull);
    this.mesh.scale.set(scale, scale, scale);

    if (!this.dragging) {
      if (this._bouncingBH) {
        // ── Rubber-ball bouncing black hole physics ──────────────────────────
        const BH_GRAV = 0.55; // near-zero — floats in perpetual motion
        this.vel.y -= BH_GRAV * dt;
        this.pos.x += this.vel.x * dt;
        this.pos.y += this.vel.y * dt;

        const basePullBH = 57.0;
        const scaleBH = Math.sqrt(this.pullStrength / basePullBH);
        const rEff = this.radius * scaleBH * 1.2;

        const RESTITUTION = 0.78;
        const FRICTION = 0.985;

        // Use actual viewport edges in world space for horizontal bounds
        const edgeLW = s2w(0, H / 2).x;
        const edgeRW = s2w(W, H / 2).x;
        const BY_FLOOR = -7.5, BY_CEIL = 12;

        // ── BH Wormhole teleportation — checked BEFORE wall bounce ───────────────
        let teleported = false;
        for (const pp of portalPairs) {
          if (pp.cooldown > 0) continue;
          const r = pp.r;

          // Distance from BH to portal A and B
          const dxA = this.pos.x - pp.a.x, dyA = this.pos.y - pp.a.y;
          const dxB = this.pos.x - pp.b.x, dyB = this.pos.y - pp.b.y;
          const distA = Math.sqrt(dxA*dxA + dyA*dyA);
          const distB = Math.sqrt(dxB*dxB + dyB*dyB);

          if (distA < r * 1.1 && !teleported) {
            // Enter A → exit B
            this.pos.x = pp.b.x; this.pos.y = pp.b.y;
            // Preserve speed, flip direction to exit away from B
            const spd2 = Math.sqrt(this.vel.x**2 + this.vel.y**2);
            const ex = dxA / (distA || 1), ey = dyA / (distA || 1);
            this.vel.x = ex * spd2 * 0.92; this.vel.y = ey * spd2 * 0.92;
            pp.cooldown = 0.8; teleported = true; break;
          }
          if (distB < r * 1.1 && !teleported) {
            // Enter B → exit A
            this.pos.x = pp.a.x; this.pos.y = pp.a.y;
            const spd2 = Math.sqrt(this.vel.x**2 + this.vel.y**2);
            const ex = dxB / (distB || 1), ey = dyB / (distB || 1);
            this.vel.x = ex * spd2 * 0.92; this.vel.y = ey * spd2 * 0.92;
            pp.cooldown = 0.8; teleported = true; break;
          }
        }

        // Wall bounces — only apply horizontal bounce if no wormhole teleport
        // Soft energy boost on collision: gentle persistent kick so BH never fully loses momentum
        const BH_WALL_BOOST = 0.18; // lateral nudge on side hits
        const BH_FLOOR_BOOST = 0.22; // vertical nudge on floor hit
        if (this.pos.y - rEff < BY_FLOOR) {
          this.pos.y = BY_FLOOR + rEff;
          if (this.vel.y < 0) {
            this.vel.y = -this.vel.y * RESTITUTION + BH_FLOOR_BOOST;
            this.vel.x *= FRICTION;
          }
        }
        if (this.pos.y + rEff > BY_CEIL) {
          this.pos.y = BY_CEIL - rEff;
          if (this.vel.y > 0) this.vel.y = -this.vel.y * RESTITUTION;
        }
        if (!teleported) {
          if (this.pos.x + rEff > edgeRW) {
            this.pos.x = edgeRW - rEff;
            if (this.vel.x > 0) this.vel.x = -this.vel.x * RESTITUTION - BH_WALL_BOOST;
          }
          if (this.pos.x - rEff < edgeLW) {
            this.pos.x = edgeLW + rEff;
            if (this.vel.x < 0) this.vel.x = -this.vel.x * RESTITUTION + BH_WALL_BOOST;
          }
        }

        const spd = Math.sqrt(this.vel.x**2 + this.vel.y**2);
        const MAX_SPD = 22;
        if (spd > MAX_SPD) { this.vel.x *= MAX_SPD / spd; this.vel.y *= MAX_SPD / spd; }

      } else if (this._bouncingNS) {
        // ── Neutron star: same bounce as BH, near-zero gravity — floats in perpetual motion
        // Skip normal physics if currently captured by a BH (BH-NS orbit managed in resolveCollisions)
        if (this._bhCapture && !this._bhCapture.dragging) {
          // Minimal gravity only — orbit steering handled elsewhere
          this.vel.y -= 0.05 * dt;
          this.pos.x += this.vel.x * dt;
          this.pos.y += this.vel.y * dt;
        } else {
          this._bhCapture = null; // ensure clean state if BH gone
          const NS_GRAV = 0.18; // almost nothing — stays in motion
        this.vel.y -= NS_GRAV * dt;
        this.pos.x += this.vel.x * dt;
        this.pos.y += this.vel.y * dt;

        const basePullNS = 57.0;
        const scaleNS = Math.sqrt(this.pullStrength / basePullNS);
        const rEffNS = this.radius * scaleNS * 1.2;

        const RESTITUTION = 0.78; // same as BH
        const FRICTION = 0.985;   // same as BH

        const edgeLW2 = s2w(0, H / 2).x;
        const edgeRW2 = s2w(W, H / 2).x;
        const BY_FLOOR = -7.5, BY_CEIL = 12;

        if (this.pos.y - rEffNS < BY_FLOOR) {
          this.pos.y = BY_FLOOR + rEffNS;
          if (this.vel.y < 0) { this.vel.y = -this.vel.y * RESTITUTION; this.vel.x *= FRICTION; }
        }
        if (this.pos.y + rEffNS > BY_CEIL) {
          this.pos.y = BY_CEIL - rEffNS;
          if (this.vel.y > 0) this.vel.y = -this.vel.y * RESTITUTION;
        }
        if (this.pos.x + rEffNS > edgeRW2) {
          this.pos.x = edgeRW2 - rEffNS;
          if (this.vel.x > 0) this.vel.x = -this.vel.x * RESTITUTION;
        }
        if (this.pos.x - rEffNS < edgeLW2) {
          this.pos.x = edgeLW2 + rEffNS;
          if (this.vel.x < 0) this.vel.x = -this.vel.x * RESTITUTION;
        }

        const nsSpd = Math.sqrt(this.vel.x**2 + this.vel.y**2);
        const NS_MAX_SPD = 22;
        if (nsSpd > NS_MAX_SPD) { this.vel.x *= NS_MAX_SPD / nsSpd; this.vel.y *= NS_MAX_SPD / nsSpd; }
        // Minimum drift — NS never truly stops
        if (nsSpd < 0.8 && !this.dragging) {
          const ang = Math.random() * Math.PI * 2;
          this.vel.x += Math.cos(ang) * 0.6; this.vel.y += Math.sin(ang) * 0.6;
        }
        } // end else (not captured)

      } else {
        const xe = this.pos.x - this.rest.x, ye = this.pos.y - this.rest.y;
        const dist = Math.sqrt(xe * xe + ye * ye);
        const magFactor = dist > 0.001 ? (1.0 + 0.8 / (dist + 0.3)) : 1.0;
        this.vel.x -= xe * BH_SPRING_K * magFactor * dt;
        this.vel.y -= ye * BH_SPRING_K * magFactor * dt;
        this.vel.x -= this.vel.x * BH_DAMPING * dt;
        this.vel.y -= this.vel.y * BH_DAMPING * dt;
        if (dist < 0.008 && Math.sqrt(this.vel.x ** 2 + this.vel.y ** 2) < 0.015) {
          this.pos.x = this.rest.x; this.pos.y = this.rest.y; this.vel.set(0, 0, 0);
        } else {
          this.pos.x += this.vel.x * dt * 60; this.pos.y += this.vel.y * dt * 60;
        }

        const rScaled2 = this.radius * scale;
        const BX = 13, BBY = -8.5 + rScaled2, BTY = 14;
        if (this.pos.x > BX) { this.pos.x = BX; this.vel.x *= -0.4; }
        if (this.pos.x < -BX) { this.pos.x = -BX; this.vel.x *= -0.4; }
        if (this.pos.y < BBY) { this.pos.y = BBY; this.vel.y *= -0.35; }
        if (this.pos.y > BTY) { this.pos.y = BTY; this.vel.y *= -0.3; }
      }
    }



    this.mesh.position.set(this.pos.x, this.pos.y, 0);
    this.mesh.updateMatrixWorld(true);
  }

  sdf(px, py, pz) {
    const basePull = this.type === 'neutronstar' ? 38.0 : 28.0;
    const scale = Math.sqrt(this.pullStrength / basePull);
    const rScaled = this.radius * scale;
    const dx = px - this.pos.x, dy = py - this.pos.y, dz = pz - this.pos.z;
    return Math.sqrt(dx * dx + dy * dy + dz * dz) - rScaled;
  }

  dispose() {
    scene.remove(this.mesh);
    this.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    if (this._adPoints) {
      scene.remove(this._adPoints);
      this._adPoints.geometry.dispose();
      this._adMat.dispose();
    }
  }
}

function destroyAttractors() {
  attractors.forEach(a => a.dispose());
  attractors = [];
}

function applyAttractorForces(i, b, dt) {
  for (let a of attractors) {
    const dx = a.pos.x - pp[b], dy = a.pos.y - pp[b+1], dz = (a.pos.z || 0) - (pp[b+2] || 0);
    const dist2 = dx*dx + dy*dy + dz*dz;
    const dist = Math.sqrt(dist2);
    if (dist < 0.001) continue;

    if (a.type === 'blackhole') {
      // Inverse-square pull — strong enough to capture and hold orbital paths
      const f = a.pullStrength * 2.8 * dt / (dist2 + 0.15);
      pv[b]   += dx / dist * f;
      pv[b+1] += dy / dist * f;
      pv[b+2] += dz / dist * f;

      // Orbital circularization: bleed off radial velocity, preserve tangential
      // This is what makes an accretion disc — particles settle into rings
      if (dist < a.radius * 12.0) {
        const rx = pp[b] - a.pos.x, ry = pp[b+1] - a.pos.y;
        const r = Math.sqrt(rx*rx + ry*ry) + 0.001;
        // tangent unit vector (perpendicular to radial, in orbital direction)
        const tx = -ry / r, ty = rx / r;
        // current tangential speed
        const vTan = pv[b] * tx + pv[b+1] * ty;
        // target circular orbital speed at this radius
        const vCirc = Math.sqrt(Math.max(0, a.pullStrength / r));
        // nudge toward circular orbit — damp excess radial, boost tangential
        const nudge = (vCirc - vTan) * 0.055;
        pv[b]   += tx * nudge;
        pv[b+1] += ty * nudge;
        // flatten the disc: damp z strongly so the disc stays planar
        pv[b+2] *= 0.88;
      }

      if (dist < a.radius * 5.0 && a.notifyStreamParticle) {
        a.notifyStreamParticle(pp[b], pp[b+1], pp[b+2] || 0);
      }
      if (dist < a.consumeRadius) { spawn(i); return true; }

    } else {
      // Neutron star particle interaction
      const influenceR = a.influenceR || 4.0;
      if (dist > influenceR) continue;

      const proximityBoost = dist < 1.5 ? (1.5 / (dist + 0.12)) * 2.8 : 1.0;
      const nsParticleMult = 1.8 * proximityBoost;
      const f = a.pullStrength * nsParticleMult * dt / (dist2 + 0.05);
      pv[b]   += dx / dist * f;
      pv[b+1] += dy / dist * f;
      pv[b+2] += dz / dist * f;

      // ── Gentle consumption: NS quietly absorbs nearby particles ─────────────
      // Inner core: high absorption probability. Mid zone: sparse. Outer: just drag.
      const innerR = influenceR * 0.35;
      const midR   = influenceR * 0.65;
      if (dist < innerR) {
        if (Math.random() < 0.18) { spawn(i); return true; }
      } else if (dist < midR) {
        const t2 = 1.0 - (dist - innerR) / (midR - innerR);
        if (Math.random() < 0.03 * t2 * t2) { spawn(i); return true; }
      }
      // Gentle drag — slows particles so they linger and eventually get consumed
      const dragFade = Math.max(0, 1.0 - dist / influenceR);
      const DRAG = dragFade * dragFade * dt * 4.5;
      pv[b]   *= Math.max(0, 1.0 - DRAG);
      pv[b+1] *= Math.max(0, 1.0 - DRAG);
      pv[b+2] *= Math.max(0, 1.0 - DRAG * 0.5);

      // Orbital circularization for NS — level 4 only; level 5 is jet collimation
      const orbitThresh = lvl === 4 ? influenceR * 0.85 : influenceR * 0.55;
      if (dist < orbitThresh) {
        if (lvl === 4) {
          const rx2 = pp[b] - a.pos.x, ry2 = pp[b+1] - a.pos.y;
          const r2 = Math.sqrt(rx2*rx2 + ry2*ry2) + 0.001;
          const tx2 = -ry2 / r2, ty2 = rx2 / r2;
          const vTan2 = pv[b] * tx2 + pv[b+1] * ty2;
          const vCircNS = Math.sqrt(Math.max(0, a.pullStrength * 0.06 / r2));
          const bleed = (vCircNS - vTan2) * 0.045;
          pv[b]   += tx2 * bleed;
          pv[b+1] += ty2 * bleed;
          pv[b+2] *= 0.75;
        } else {
          // ── Quasar jet collimation ─────────────────────────────────────────
          // Compute jet axis: vector between all NS on this level.
          // With 2 NS the axis is the line between them; with 1 fall back to their
          // velocity direction. Alignment between NS tightens the beam.
          const nsAll = attractors.filter(x => x.type === 'neutronstar');
          let jx = 0, jy = 1; // default jet axis: straight down
          let alignment = 0;  // 0 = scattered, 1 = perfectly collinear

          if (nsAll.length >= 2) {
            // Find the NS pair with the greatest separation — that's the primary axis
            let bestDist = 0, bx2 = 0, by2 = 1;
            for (let pi = 0; pi < nsAll.length; pi++) {
              for (let qi = pi + 1; qi < nsAll.length; qi++) {
                const ddx = nsAll[qi].pos.x - nsAll[pi].pos.x;
                const ddy = nsAll[qi].pos.y - nsAll[pi].pos.y;
                const dd = Math.sqrt(ddx*ddx + ddy*ddy);
                if (dd > bestDist) { bestDist = dd; bx2 = ddx/dd; by2 = ddy/dd; }
              }
            }
            jx = bx2; jy = by2;
            // Alignment score: how collinear are all the NS?
            // Check how tightly packed they are perpendicular to the axis
            let maxLateral = 0;
            for (const ns2 of nsAll) {
              const relx = ns2.pos.x - a.pos.x, rely = ns2.pos.y - a.pos.y;
              const lat = Math.abs(relx * (-jy) + rely * jx); // perp component
              if (lat > maxLateral) maxLateral = lat;
            }
            // Tight alignment = small lateral spread relative to length
            alignment = Math.max(0, 1.0 - maxLateral / Math.max(bestDist, 0.1));
          } else {
            // Solo NS: jet axis follows its velocity direction
            const spd = Math.sqrt(a.vel.x**2 + a.vel.y**2);
            if (spd > 0.1) { jx = a.vel.x / spd; jy = a.vel.y / spd; }
            alignment = 0.4; // solo always has moderate collimation
          }

          // Decompose particle velocity into jet-axis and lateral components
          const rx2 = pp[b] - a.pos.x, ry2 = pp[b+1] - a.pos.y;
          const r2 = Math.sqrt(rx2*rx2 + ry2*ry2) + 0.001;

          // Jet component (along axis)
          const vJet = pv[b] * jx + pv[b+1] * jy;
          // Lateral component (perpendicular to axis, in XY)
          const latX = pv[b] - vJet * jx;
          const latY = pv[b+1] - vJet * jy;

          // Collimation strength: stronger closer to NS, stronger with better alignment
          const proximity = 1.0 - dist / orbitThresh;
          const colStrength = proximity * proximity * (0.35 + alignment * 0.65);

          // Squeeze lateral velocity toward zero (beam narrowing)
          const LATERAL_DAMP = colStrength * 0.22;
          pv[b]   -= latX * LATERAL_DAMP;
          pv[b+1] -= latY * LATERAL_DAMP;

          // Boost along jet axis — particles get accelerated into the beam
          // Direction of boost: away from NS along jet (bipolar jets)
          const jetDot = rx2 * jx + ry2 * jy; // which side of NS the particle is on
          const jetDir = jetDot >= 0 ? 1 : -1;
          const JET_BOOST = colStrength * 0.18 * a.pullStrength * dt;
          pv[b]   += jx * jetDir * JET_BOOST;
          pv[b+1] += jy * jetDir * JET_BOOST;

          // Flatten Z — jet stays planar
          pv[b+2] *= (1.0 - colStrength * 0.35);
        }
      }

      if (dist < a.consumeRadius) { spawn(i); return true; }
    }
  }
  return false;
}

function drawBlackHoleOverlay() {
  const t = Date.now() * 0.001;

  // Fix #6: BH shadow-casting pass removed — O(BH×shapes) radialGradients every 2 frames

  attractors.forEach(bh => {
    // When project orbs are railed, skip drawing their rings/halos entirely
    if (_orbRailActive && bh._isProjectOrb) return;

    _ovV3.copy(bh.pos).setZ(bh.pos.z||0).project(camera);
    const sx = (_ovV3.x + 1) / 2 * W, sy = (-_ovV3.y + 1) / 2 * H;
    // Smaller dotted rings — use actual influenceR for NS, tighter formula for BH
    const pullRadiusWorld = bh.type === 'neutronstar'
      ? (bh.influenceR || 4.0)   // NS: show actual area of influence
      : Math.sqrt(bh.pullStrength / 3.5); // BH: significantly smaller ring
    _ovV3.set(bh.pos.x + pullRadiusWorld, bh.pos.y, 0).project(camera);
    const pullR = Math.abs((_ovV3.x + 1) / 2 * W - sx);

    ovCtx.save();
    ovCtx.setLineDash([2, 5]); ovCtx.lineDashOffset = -t * 8;
    ovCtx.beginPath(); ovCtx.arc(sx, sy, pullR, 0, Math.PI * 2);
    ovCtx.strokeStyle = bh.type === 'neutronstar' ? 'rgba(100,200,255,0.30)' : (bh._isProjectOrb ? 'rgba(255,255,255,0.04)' : 'rgba(255,220,100,0.18)');
    ovCtx.lineWidth = 1; ovCtx.stroke();
    ovCtx.setLineDash([]);

    // Glow halos
    const basePull = bh.type === 'neutronstar' ? 38.0 : 57.0;
    const scale = Math.sqrt(bh.pullStrength / basePull);
    _ovV3.set(bh.pos.x + bh.radius * scale, bh.pos.y, 0).project(camera);
    const coreR = Math.abs((_ovV3.x + 1) / 2 * W - sx);
    if(coreR < 1) { ovCtx.restore(); return; } // skip if off-screen or degenerate

    if (bh.type === 'blackhole') {
      if (bh._zenOrb) {
        // Warm luminous glow halos — golden star
        [
          { r: coreR * 4.5, a: 0.02, col: '255,200,80' },
          { r: coreR * 2.8, a: 0.04, col: '255,240,140' },
          { r: coreR * 1.4, a: 0.08, col: '255,255,220' },
        ].forEach(({ r, a, col }) => {
          const g = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, r);
          g.addColorStop(0, `rgba(${col},${a})`);
          g.addColorStop(1, `rgba(${col},0)`);
          ovCtx.beginPath(); ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
          ovCtx.fillStyle = g; ovCtx.fill();
        });
        // Animated shimmer ring
        ovCtx.setLineDash([3, 7]); ovCtx.lineDashOffset = -t * 5;
        ovCtx.beginPath(); ovCtx.arc(sx, sy, coreR * 1.7, 0, Math.PI * 2);
        ovCtx.strokeStyle = `rgba(255,240,180,0.18)`;
        ovCtx.lineWidth = 1; ovCtx.stroke();
        ovCtx.setLineDash([]);
        ovCtx.font = '8px Courier New';
        ovCtx.fillStyle = 'rgba(255,220,100,0.28)';
        ovCtx.textAlign = 'center';
        ovCtx.fillText('ZEN ORB', sx, sy + coreR + 14);
      } else {
        // Sun-style warm golden halos (same as zen orb)
        [
          { r: coreR * 4.5, a: 0.02, col: '255,200,80' },
          { r: coreR * 2.8, a: 0.04, col: '255,240,140' },
          { r: coreR * 1.4, a: 0.08, col: '255,255,220' },
        ].forEach(({ r, a, col }) => {
          const g = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, r);
          g.addColorStop(0, `rgba(${col},${a})`);
          g.addColorStop(1, `rgba(${col},0)`);
          ovCtx.beginPath(); ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
          ovCtx.fillStyle = g; ovCtx.fill();
        });
        // Animated shimmer ring
        ovCtx.setLineDash([3, 7]); ovCtx.lineDashOffset = -t * 5;
        ovCtx.beginPath(); ovCtx.arc(sx, sy, coreR * 1.7, 0, Math.PI * 2);
        ovCtx.strokeStyle = `rgba(255,240,180,0.18)`;
        ovCtx.lineWidth = 1; ovCtx.stroke();
        ovCtx.setLineDash([]);
        ovCtx.font = '8px Courier New';
        ovCtx.fillStyle = 'rgba(255,220,100,0.28)';
        ovCtx.textAlign = 'center';
        if (!bh._isBBall) ovCtx.fillText('SINGULARITY', sx, sy + coreR + 14);
      }
    } else {
      // NS: cosmic blue glow, no amber shift
      [
        { r: coreR * 3.5, a: 0.13, col: '80,180,255' },
        { r: coreR * 1.8, a: 0.35, col: '160,220,255' },
      ].forEach(({ r, a, col }) => {
        const g = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, r);
        g.addColorStop(0, `rgba(${col},${a})`);
        g.addColorStop(1, `rgba(${col},0)`);
        ovCtx.beginPath(); ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
        ovCtx.fillStyle = g; ovCtx.fill();
      });
    }

    // Nova shockwave flare — expanding ring when hit by a supernova click
    if (bh._novaHitT && bh._novaHitT > 0) {
      const ft = bh._novaHitT;
      const flareR = coreR * (1.8 + (1 - ft) * 6.0);
      const flareCol = bh.type === 'blackhole' ? '255,160,60' : '180,240,255';
      ovCtx.beginPath();
      ovCtx.arc(sx, sy, flareR, 0, Math.PI * 2);
      ovCtx.strokeStyle = `rgba(${flareCol},${ft * 0.8})`;
      ovCtx.lineWidth = 2.5 * ft;
      ovCtx.stroke();
      const fg = ovCtx.createRadialGradient(sx, sy, 0, sx, sy, flareR * 0.8);
      fg.addColorStop(0, `rgba(${flareCol},${ft * 0.25})`);
      fg.addColorStop(1, `rgba(${flareCol},0)`);
      ovCtx.beginPath(); ovCtx.arc(sx, sy, flareR * 0.8, 0, Math.PI * 2);
      ovCtx.fillStyle = fg; ovCtx.fill();
    }

    ovCtx.restore();
  });
}

// ── SHAPE DEFS ────────────────────────────────────────────────────────────────
// Orient philosophy: clockwise compass cycle — 8 stops at 45° increments.
// Z-rotation drives flow direction; Y-rotation adds subtle depth without disrupting.
// Flow always enters from top; each stop redirects it along the compass bearing.
const _D=Math.PI,_H=Math.PI/2,_Q=Math.PI/4,_E=Math.PI/6,_T=Math.PI/3;
const _CW = (deg) => -deg * Math.PI / 180; // clockwise = negative Z in Three.js
const SDEFS={
  cube:{baseR:1.55,springK:6.0,damping:8.0,color:0xffffff,rough:0.55,
    makeGeo:s=>new THREE.BoxGeometry(2.6*s,2.6*s,2.6*s),
    orients:[
      // N  — flat top: even split, flow exits both sides equally
      new THREE.Euler(0, 0, 0),
      // NE — 45° ramp right: strong rightward redirect
      new THREE.Euler(0, 0, _CW(45)),
      // E  — 90° on edge: corner up, splits to steep diagonals
      new THREE.Euler(0, 0, _CW(90)),
      // SE — 135°: base faces upper-right, flow pours left off underside
      new THREE.Euler(0, 0, _CW(135)),
      // S  — upside-down flat: base up, flow cascades off either edge
      new THREE.Euler(0, 0, _CW(180)),
      // SW — 225° (= -135°): mirror of SE, flow pours right
      new THREE.Euler(0, 0, _CW(225)),
      // W  — 270°: corner up left side, splits to steep diagonals (mirror of E)
      new THREE.Euler(0, 0, _CW(270)),
      // NW — 315°: gentle ramp left, 45° mirror of NE
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  sphere:{baseR:1.4,springK:6.0,damping:7.0,color:0xdddddd,rough:0.15,
    makeGeo:s=>new THREE.SphereGeometry(1.4*s,32,20),
    orients:[
      // Sphere reads through surface tilt — compass steps give clear visual intent.
      // N  — crown neutral: even scatter
      new THREE.Euler(0, 0, 0),
      // NE — lean right 45°: surface bias pushes flow right
      new THREE.Euler(0, 0, _CW(45)),
      // E  — lean right 90°: equator up, flow sheds downward on both sides
      new THREE.Euler(0, 0, _CW(90)),
      // SE — lean right 135°: underside up, deflects upward-left
      new THREE.Euler(0, 0, _CW(135)),
      // W  — lean left 90°: mirror of E
      new THREE.Euler(0, 0, _CW(270)),
      // NW — lean left 45°: surface bias pushes flow left
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  pyramid:{baseR:1.45,springK:5.5,damping:8.0,color:0xffffff,rough:0.8,
    makeGeo:s=>new THREE.ConeGeometry(1.5*s,2.8*s,4),
    orients:[
      // N  — apex up, face forward: clean bilateral split
      new THREE.Euler(0, 0, 0),
      // NE — apex up, leaned right 45°: flow sheds strongly right
      new THREE.Euler(0, 0, _CW(45)),
      // E  — apex right, horizontal: flow splits above/below apex
      new THREE.Euler(0, 0, _CW(90)),
      // SE — leaned right 135°: base up-right, concentrated pour left
      new THREE.Euler(0, 0, _CW(135)),
      // S  — inverted apex-down: concentrator, draws flow to a point
      new THREE.Euler(0, 0, _CW(180)),
      // SW — inverted leaned left 135°: concentrated pour right
      new THREE.Euler(0, 0, _CW(225)),
      // W  — apex left: flow splits above/below (mirror of E)
      new THREE.Euler(0, 0, _CW(270)),
      // NW — apex up, leaned left 45°: flow sheds strongly left
      new THREE.Euler(0, 0, _CW(315)),
    ]},
  panelstack:{baseR:0.85,springK:5.0,damping:9.0,color:0xffffff,rough:0.55,
    // panels:14, panelH:0.18, gap:0.06, baseSize:3.0 — built procedurally in Shape._build
    makeGeo:s=>new THREE.BoxGeometry(3.0*s,3.0*s*1.2,3.0*s), // bounding proxy for raycasting only
    orients:[new THREE.Euler(0,0,0)], // emitter has one orientation: apex down
  },
};

// ── SHAPE CLASS ───────────────────────────────────────────────────────────────
class Shape{
  constructor(type,pos,rot,sc){
    this.type=type;this.def=SDEFS[type];this.sc=sc||1.0;
    this.radius=this.def.baseR*this.sc;
    this.pos=pos.clone();this.rest=pos.clone();
    this.vel=new THREE.Vector3();this.dragging=false;this.oi=0;
    this.tEul=rot?rot.clone():new THREE.Euler();this.cEul=this.tEul.clone();
    this._build();
  }
  _build(){
    const d=this.def,s=this.sc;
    if(this.type==='panelstack'){
      // Procedural inverted pyramid panel stack — point down, wide top
      // 4 thick panels, compact scale
      this.mesh=new THREE.Group();
      this.mesh.rotation.copy(this.cEul);
      this.mesh.position.copy(this.pos);
      const PANELS=4,PANEL_H=0.22*s,GAP=0.07*s,BASE_W=1.4*s;
      const totalH=PANELS*(PANEL_H+GAP);
      this._panelMorphVal=this._panelMorphVal||0;
      this._panels=[];
      for(let i=0;i<PANELS;i++){
        // i=0 is TOP (widest), i=PANELS-1 is BOTTOM (apex, narrowest)
        const t=i/(PANELS-1); // 0=top 1=bottom
        const yOff=totalH/2 - i*(PANEL_H+GAP) - PANEL_H/2;
        const sc=Math.max(0.01,1.0-this._panelMorphVal*(t));
        const geo=new THREE.BoxGeometry(BASE_W*sc,PANEL_H,BASE_W*sc);
        const mat=new THREE.MeshPhysicalMaterial({color:0xffffff,roughness:0.55,metalness:0.02,emissive:new THREE.Color(0xffffff),emissiveIntensity:0.55,clearcoat:0.4,clearcoatRoughness:0.2});
        const mesh=new THREE.Mesh(geo,mat);
        mesh.position.y=yOff;
        const eg=new THREE.EdgesGeometry(new THREE.BoxGeometry(BASE_W*sc,PANEL_H,BASE_W*sc),22);
        mesh.add(new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:0x888888,transparent:true,opacity:0.22})));
        this.mesh.add(mesh);
        this._panels.push({mesh,t,yOff,BASE_W,PANEL_H,s});
      }
      this._totalH=totalH;
      this._panelTargetRots=new Array(PANELS).fill(0);
      this._panelCurRots=new Array(PANELS).fill(0);
      scene.add(this.mesh);
      return;
    }
    const mat=new THREE.MeshPhysicalMaterial({
      color:d.color, roughness:0.0, metalness:1.0,
      emissive:new THREE.Color(d.color), emissiveIntensity:3.5,
      reflectivity:1.0, clearcoat:1.0, clearcoatRoughness:0.0,
      transparent:true, opacity:0.97,
    });
    const geo=d.makeGeo(s);
    this.mesh=new THREE.Mesh(geo,mat);
    this.mesh.rotation.copy(this.cEul);this.mesh.position.copy(this.pos);
    const eg=new THREE.EdgesGeometry(d.makeGeo(s),22);
    this.mesh.add(new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.18})));
    // ── Sun-style PointLight + glow corona ──
    if (!isChrome) {
      const shapeLight = new THREE.PointLight(0xfff8e8, 4.0, 20);
      this.mesh.add(shapeLight);
    }
    const baseR = this.def.baseR * s;
    const glowDefs = [
      { r: baseR * 1.3,  color: 0xffffff,  opacity: 0.06 },
      { r: baseR * 1.8,  color: 0xfff0d0,  opacity: 0.03 },
      { r: baseR * 2.6,  color: 0xffe090,  opacity: 0.012 },
      { r: baseR * 4.0,  color: 0xffcc60,  opacity: 0.005 },
    ];
    glowDefs.forEach(({ r, color, opacity }) => {
      const g = new THREE.Mesh(
        new THREE.SphereGeometry(r, 16, 10),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide, depthWrite: false })
      );
      this.mesh.add(g);
    });
    scene.add(this.mesh);
  }
  resize(sc){
    if(this.type==='panelstack'){
      // panelstack: scroll while held = morph not scale
      return;
    }
    scene.remove(this.mesh);this.mesh.geometry.dispose();this.mesh.material.dispose();
    this.mesh.children.forEach(c=>{c.geometry&&c.geometry.dispose();c.material&&c.material.dispose();});
    this.sc=sc;this.radius=this.def.baseR*sc;this._build();
    this.mesh.rotation.copy(this.cEul);this.mesh.position.copy(this.pos);this.mesh.updateMatrixWorld(true);
  }
  cycle(){const p=this.def.orients;this.oi=(this.oi+1)%p.length;this.tEul=p[this.oi].clone();}
  setMorph(m){
    if(this.type!=='panelstack')return;
    this._panelMorphVal=Math.max(0,Math.min(1,m));
    if(!this._panels)return;
    const mv=this._panelMorphVal;
    const PANELS=this._panels.length;
    if(!this._panelTargetRots)this._panelTargetRots=new Array(PANELS).fill(0);
    this._panels.forEach(({mesh,t},i)=>{
      // XZ scale only: top stays full, bottom collapses — no tilt ever
      const sc=Math.max(0.01,1.0-mv*t);
      mesh.scale.set(sc,1,sc);
      // panels never rotate — zero out target rotation
      this._panelTargetRots[i]=0;
    });
    // drive particles
    P.spread=isMobile?(0.65-mv*0.62):(1.25-mv*1.22);
    P.count=Math.round(isMobile?(8000-mv*4000):(8000-mv*5000));
    P.gravity=isMobile?(3.3+mv*1.2):(4.2+mv*2.0);
    syncBounce();
  }
  // Animated morph — sets a target and lets update() interpolate with a twist
  animateMorph(target){
    if(this.type!=='panelstack')return;
    this._morphTarget=Math.max(0,Math.min(1,target));
    if(this._morphTarget===undefined)this._morphTarget=target;
    // inject a twist: full rotation over the transition
    this._twistTarget=Math.PI*(target>0.5?1:-1);
    this._twistCur=this.tEul.y||0;
  }
  update(dt){
    if(this.type==='panelstack'&&this._panels&&this._panelTargetRots){
      if(!this._panelCurRots)this._panelCurRots=new Array(this._panels.length).fill(0);

      // Animated morph interpolation
      if(this._morphTarget!==undefined&&Math.abs(this._panelMorphVal-this._morphTarget)>0.001){
        const MORPH_SPEED=4.5; // units/sec — full 0→1 in ~0.22s
        const dir=this._morphTarget>this._panelMorphVal?1:-1;
        const step=MORPH_SPEED*dt;
        const newM=dir>0
          ?Math.min(this._morphTarget,this._panelMorphVal+step)
          :Math.max(this._morphTarget,this._panelMorphVal-step);
        this.setMorph(newM);
      } else if(this._morphTarget!==undefined){
        this.setMorph(this._morphTarget);
        this._morphTarget=undefined;
        this._twistTarget=0; // unwind after arriving
      }

      // Twist animation — Y rotation springs in and back out
      if(this._twistTarget!==undefined){
        if(this._twistCur===undefined)this._twistCur=0;
        this._twistCur+=(this._twistTarget-this._twistCur)*Math.min(1,dt*6.0);
        // Once morphTarget resolved, unwind
        if(this._morphTarget===undefined){
          this._twistTarget=0;
          this._twistCur+=(0-this._twistCur)*Math.min(1,dt*5.0);
          if(Math.abs(this._twistCur)<0.005)this._twistCur=0;
        }
        this.tEul.y=this._twistCur;
      }

      this._panels.forEach(({mesh},i)=>{
        const target=this._panelTargetRots[i]||0;
        const lerpK=0.10-i*0.015;
        this._panelCurRots[i]+=(target-this._panelCurRots[i])*Math.max(0.03,lerpK);
        mesh.rotation.x=this._panelCurRots[i];
      });
    }
    // panelstack never tilts — lock group rotation to identity
    if(this.type==='panelstack'){this.tEul.set(0,0,0);this.cEul.set(0,0,0);}
    this.cEul.x+=(this.tEul.x-this.cEul.x)*0.12;
    this.cEul.y+=(this.tEul.y-this.cEul.y)*0.12;
    this.cEul.z+=(this.tEul.z-this.cEul.z)*0.12;
    this.mesh.rotation.copy(this.cEul);
    if(!this.dragging){
      const xe=this.pos.x-this.rest.x,ye=this.pos.y-this.rest.y;
      const dist=Math.sqrt(xe*xe+ye*ye);
      // Magnetic lerp: spring force strengthens non-linearly near rest (snappy close-in pull)
      const magFactor=dist>0.001?(1.0+0.8/(dist+0.3)):1.0;
      this.vel.x-=xe*this.def.springK*magFactor*dt;
      this.vel.y-=ye*this.def.springK*magFactor*dt;
      this.vel.x-=this.vel.x*this.def.damping*dt;
      this.vel.y-=this.vel.y*this.def.damping*dt;
      // Snap to rest when very close (magnetic lock-in)
      if(dist<0.008&&Math.sqrt(this.vel.x**2+this.vel.y**2)<0.015){
        this.pos.x=this.rest.x;this.pos.y=this.rest.y;this.vel.set(0,0,0);
      } else {
        this.pos.x+=this.vel.x*dt*60;this.pos.y+=this.vel.y*dt*60;
      }
    }
    this.pos.z=0;
    const BX=13,BBY=-8.5+this.radius,BTY=14;
    if(this.pos.x>BX){this.pos.x=BX;this.vel.x*=-0.4;}if(this.pos.x<-BX){this.pos.x=-BX;this.vel.x*=-0.4;}
    if(this.pos.y<BBY){this.pos.y=BBY;this.vel.y*=-0.35;}if(this.pos.y>BTY){this.pos.y=BTY;this.vel.y*=-0.3;}
    this.mesh.position.copy(this.pos);this.mesh.updateMatrixWorld(true);
  }
  sdf(px,py,pz){
    const l=this.mesh.worldToLocal(new THREE.Vector3(px,py,pz));
    const x=l.x,y=l.y,z=l.z,s=this.sc;
    if(this.type==='cube'){const h=1.3*s,qx=Math.abs(x)-h,qy=Math.abs(y)-h,qz=Math.abs(z)-h;return Math.sqrt(Math.max(qx,0)**2+Math.max(qy,0)**2+Math.max(qz,0)**2)+Math.min(Math.max(qx,qy,qz),0);}
    if(this.type==='sphere')return Math.sqrt(x*x+y*y+z*z)-this.radius;
    if(this.type==='pyramid'){const H=1.4*s,bR=1.5*s,sl=Math.sqrt(bR*bR+4*H*H),nx=2*H/sl,ny=bR/sl,r2=Math.abs(x)+Math.abs(z),dS=r2*nx+y*ny-H*ny,dCy=-(y+H),dCr=r2-bR,dC=dCr>0&&dCy>0?Math.sqrt(dCr*dCr+dCy*dCy):Math.max(dCr,dCy);if(dS<=0&&dC<=0)return Math.max(dS,dC);if(dS<=0)return dC;if(dC<=0)return dS;return Math.sqrt(dS*dS+dC*dC);}
    if(this.type==='panelstack'){
      // SDF: axis-aligned box bounding the full stack
      const hw=0.7*s,hh=(this._totalH||1.4*s)*0.5;
      const qx=Math.abs(x)-hw,qy=Math.abs(y)-hh,qz=Math.abs(z)-hw;
      return Math.sqrt(Math.max(qx,0)**2+Math.max(qy,0)**2+Math.max(qz,0)**2)+Math.min(Math.max(qx,qy,qz),0);
    }
    return Math.sqrt(x*x+y*y+z*z)-this.radius;
  }
  dispose(){
    if(this.type==='panelstack'){
      scene.remove(this.mesh);
      this.mesh.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
      return;
    }
    scene.remove(this.mesh);this.mesh.geometry.dispose();this.mesh.material.dispose();
    this.mesh.children.forEach(c=>{c.geometry&&c.geometry.dispose();c.material&&c.material.dispose();});
  }
}

// ── SHAPES ────────────────────────────────────────────────────────────────────
// Size variance bands per type: [min, max] — biased toward the lower end
const SIZE_VARIANCE={cube:[0.55,1.05],sphere:[0.5,0.95],pyramid:[0.55,1.0]};
// sqrt bias: Math.random() skews toward 0, so most results land in the lower half of the range
function randSc(type){const r=SIZE_VARIANCE[type]||[0.55,1.0];return r[0]+Math.sqrt(Math.random())*(r[1]-r[0])*0.65;}

// Fixed vertical slots — shapes always cascade top→mid→low so the puzzle is readable.
// Type and orientation are randomized each call so every layout is a fresh puzzle.
const SLOTS=[
  {pos:new THREE.Vector3(0.4, 6.2,0)},   // high
  {pos:new THREE.Vector3(-0.3, 2.4,0)},  // mid
  {pos:new THREE.Vector3(0.3,-1.6,0)},   // low
];
const TYPES=['cube','sphere','pyramid'];
let shapes=[];

// ── PROJECT ORBS (Level 6) ────────────────────────────────────────────────────
const PROJECT_DATA = [
  { name: 'wolfie.love',    url: 'https://www.wolfie.love',    desc: 'a love letter in motion',    color: '#ff7eb3', colorHex: 0xff7eb3 },
  { name: 'zackgort.com',   url: 'https://www.zackgort.com',   desc: 'portfolio & work',            color: '#7eb3ff', colorHex: 0x7eb3ff },
  { name: 'neverever.land', url: 'https://www.neverever.land', desc: 'a place for lost things',    color: '#b3ff7e', colorHex: 0xb3ff7e },
  { name: 'reasonably.cc',  url: 'https://www.reasonably.cc',  desc: 'calm tools for clear minds', color: '#ffb37e', colorHex: 0xffb37e },
];

let _projectOrbs = [];
let _orbRailActive = true; // default: railed

// ── ORB RAIL TOGGLE ───────────────────────────────────────────────────────────
(function _initOrbRailToggle(){
  const btn = document.getElementById('orb-rail-toggle');
  if (!btn) return;
  function _applyRailState() {
    const rail = document.getElementById('orb-rail');
    if (!rail) return;
    if (_orbRailActive) {
      btn.classList.add('active');
      // Move widgets into rail first (off-screen), then slide in
      for (const orb of _projectOrbs) {
        const el = document.getElementById(`orb-widget-${orb.index}`);
        if (el && el.parentNode !== rail) rail.appendChild(el);
        if (el) { el.style.position = 'static'; el.style.left = el.style.top = el.style.right = el.style.bottom = ''; }
        if (orb._attractor && orb._attractor.mesh) orb._attractor.mesh.visible = false;
      }
      rail.classList.remove('hidden');
      // Force reflow then slide in
      rail.getBoundingClientRect();
      rail.classList.add('visible');
    } else {
      btn.classList.remove('active');
      // Slide rail out, then move widgets back to body
      rail.classList.remove('visible');
      const duration = 400;
      setTimeout(() => {
        rail.classList.add('hidden');
        for (const orb of _projectOrbs) {
          const el = document.getElementById(`orb-widget-${orb.index}`);
          if (el && el.parentNode !== document.body) document.body.appendChild(el);
          if (el) { el.style.position = 'fixed'; el._userAnchored = false; }
          if (orb._attractor && orb._attractor.mesh) orb._attractor.mesh.visible = true;
        }
      }, duration);
    }
  }
  btn.addEventListener('click', () => {
    _orbRailActive = !_orbRailActive;
    _applyRailState();
  });
  // Expose so _spawnProjectOrbs can apply rail state after spawning
  window._applyOrbRailState = _applyRailState;
})();

class ProjectOrb {
  // Wraps a real neutron-star Attractor — gets all NS physics, drag & BH collision for free.
  constructor(data, pos, index) {
    this.data = data;
    this.index = index;
    this._attractor = new Attractor('neutronstar', pos.clone());
    this._attractor._isProjectOrb = true;
    this._attractor._orbData = data;
    this._attractor._orbIndex = index;
    this._attractor._bouncingNS = true;
    const ang = Math.random() * Math.PI * 2;
    this._attractor.vel.x = Math.cos(ang) * (1.5 + Math.random() * 1.5);
    this._attractor.vel.y = Math.sin(ang) * (1.0 + Math.random() * 1.0);
    // Apply unique color to NS core, light, and glow layers
    const col = data.colorHex || 0xffffff;
    if (this._attractor.core && this._attractor.core.material) {
      this._attractor.core.material.color.setHex(col);
      this._attractor.core.material.emissive.setHex(col);
    }
    if (this._attractor.light) this._attractor.light.color.setHex(col);
    if (this._attractor.glowMeshes) this._attractor.glowMeshes.forEach(g => g.material.color.setHex(col));
    // Proxy references so existing _projectOrbs code still works
    this.pos    = this._attractor.pos;
    this.vel    = this._attractor.vel;
    this.radius = this._attractor.radius;
    // Floating label sprite (no longer attached to mesh — widget replaces it)
    // Keep a minimal billboard for orientation cue
    const lc = document.createElement('canvas'); lc.width=256; lc.height=48;
    const lctx = lc.getContext('2d');
    lctx.font = 'bold 11px Courier New'; lctx.fillStyle = data.color || '#ffffff'; lctx.textAlign = 'center';
    lctx.globalAlpha = 0.7;
    lctx.fillText(data.name, 128, 30);
    const lt = new THREE.CanvasTexture(lc);
    const lm = new THREE.Mesh(new THREE.PlaneGeometry(2.2,0.42), new THREE.MeshBasicMaterial({map:lt,transparent:true,depthWrite:false}));
    lm.position.y = -this._attractor.radius * 1.8 - 0.45;
    this._attractor.mesh.add(lm); this._labelMesh = lm;
  }
  update(dt) {
    // Physics handled by Attractor.update(); just billboard label
    this._labelMesh.quaternion.copy(camera.quaternion);
    // Sync floating widget position to orb screen coords
    _syncOrbWidget(this);
  }
  hitTest(clientX,clientY) {
    const ndc2=new THREE.Vector2((clientX/W)*2-1,-(clientY/H)*2+1);
    const ray2=new THREE.Raycaster();ray2.setFromCamera(ndc2,camera);
    return ray2.ray.intersectsSphere(new THREE.Sphere(this.pos,this.radius*3.5));
  }
  dispose() {
    const idx = attractors.indexOf(this._attractor);
    if (idx !== -1) attractors.splice(idx, 1);
    this._attractor.dispose();
    _removeOrbWidget(this.index);
  }
}

function _spawnProjectOrbs() {
  _destroyProjectOrbs();
  const eL=s2w(0,H/2).x,eR=s2w(W,H/2).x,eT=s2w(W/2,0).y,eB=s2w(W/2,H).y;
  const sX=eR-eL,sY=eT-eB;
  PROJECT_DATA.forEach((data,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const x=eL+sX*(0.25+col*0.5)+(Math.random()-0.5)*sX*0.12;
    const y=eB+sY*(0.65+row*-0.3)+(Math.random()-0.5)*sY*0.08;
    const orb = new ProjectOrb(data,new THREE.Vector3(x,y,0),i);
    _projectOrbs.push(orb);
    attractors.push(orb._attractor);
    _createOrbWidget(orb);
  });
  // Apply current rail state to newly spawned orbs
  if (window._applyOrbRailState) {
    // On first spawn, set visible immediately without animation
    const rail = document.getElementById('orb-rail');
    if (rail && _orbRailActive) { rail.classList.remove('hidden'); rail.classList.add('visible'); }
    window._applyOrbRailState();
  }
}

function _destroyProjectOrbs() {
  _projectOrbs.forEach(o=>o.dispose()); _projectOrbs=[];
  // Remove all orb widgets
  document.querySelectorAll('.orb-widget').forEach(el=>el.remove());
}

// ── ORB FLOATING WIDGETS ──────────────────────────────────────────────────────
// Each orb gets a persistent movable widget. It tracks the orb in screen space
// until the user drags it, then it stays put (user-anchored).

function _createOrbWidget(orb) {
  const d = orb.data, idx = orb.index;
  const c = d.color || '#ffffff';
  const cAlpha = c + '28';

  const el = document.createElement('div');
  el.id = `orb-widget-${idx}`;

  el.style.cssText = `
    position:fixed;z-index:500;width:260px;
    background:rgba(6,4,2,0.88);
    border:1px solid ${c}44;
    border-left:2px solid ${c}bb;
    border-radius:6px;
    padding:10px 13px 11px;cursor:grab;
    pointer-events:auto;user-select:none;touch-action:none;
    box-shadow:0 0 18px ${c}18, 0 2px 12px rgba(0,0,0,0.5);
    transition:box-shadow 0.2s,border-color 0.2s;
  `;

  el.innerHTML = `
    <div class="orb-widget-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
      <div class="orb-widget-name" style="font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:${c}99;font-family:'Courier New',monospace;">${d.name}</div>
      <button class="orb-widget-preview-btn" title="Preview" style="background:none;border:none;padding:0 0 0 8px;cursor:pointer;color:rgba(255,255,255,0.22);font-size:10px;line-height:1;font-family:monospace;flex-shrink:0;letter-spacing:0.05em;transition:color 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.6)'" onmouseout="this.style.color='rgba(255,255,255,0.22)'">⤢</button>
    </div>
    <div class="orb-widget-body">
      <div style="font-size:9px;line-height:1.6;color:rgba(255,255,255,0.38);font-family:'Courier New',monospace;letter-spacing:0.04em;margin-bottom:8px;">${d.desc || ''}</div>
      <a href="${d.url}" target="_blank" rel="noopener"
         style="display:block;font-family:'Courier New',monospace;font-size:${isMobile?'11':'9'}px;letter-spacing:0.08em;
                color:${c}cc;border:1px solid ${c}44;border-radius:3px;padding:${isMobile?'10px 9px':'5px 9px'};
                text-decoration:none;text-align:center;transition:background 0.12s,border-color 0.12s;
                -webkit-tap-highlight-color:transparent;"
         onmouseover="this.style.background='${cAlpha}';this.style.borderColor='${c}99';"
         onmouseout="this.style.background='transparent';this.style.borderColor='${c}44';">
        ↗ visit
      </a>
    </div>
    <div class="orb-widget-iframe-wrap" style="display:none;margin-top:8px;border-radius:3px;overflow:hidden;border:1px solid ${c}33;height:175px;position:relative;">
      <iframe class="orb-widget-iframe" src="" loading="lazy"
        style="width:936px;height:702px;border:none;display:block;background:#080808;transform:scale(0.25);transform-origin:top left;"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
  `;

  // On mobile: anchor immediately in a grid layout, don't track the orb
  el._userAnchored = isMobile;
  el._previewing = false;

  // Place initially off-screen; will be positioned on first _syncOrbWidget call
  el.style.left = '-9999px'; el.style.top = '-9999px';

  // Inject into the right rail (not body) — CSS handles layout when rail is active
  document.body.appendChild(el);

  // Preview toggle button
  const previewBtn = el.querySelector('.orb-widget-preview-btn');
  previewBtn.addEventListener('pointerdown', e=>{ e.stopPropagation(); });
  previewBtn.addEventListener('click', e=>{
    e.stopPropagation();
    _toggleOrbPreview(idx, d.url);
  });

  // Dragging — once user moves it, stop auto-tracking the orb
  let wDrag=false, wOX=0, wOY=0, wMoved=false;

function _syncOrbWidget(orb) {
  const el = document.getElementById(`orb-widget-${orb.index}`);
  if(!el) return;

  // When railed, layout is handled by CSS flexbox — don't move the widget
  if(_orbRailActive) return;

  // Mobile: place in a stable grid on first call, then never move again
  if(isMobile) {
    if(el.style.left === '-9999px') {
      // Grid: up to 2 columns, stacked from top with spacing
      const cols = 2;
      const col = orb.index % cols;
      const row = Math.floor(orb.index / cols);
      const ww = Math.min(160, (W - 12) / cols - 8);
      const wx = 6 + col * (ww + 8);
      const wy = 58 + row * 110; // below mobile top bar
      el.style.width = ww + 'px';
      el.style.minWidth = 'unset';
      el.style.maxWidth = 'unset';
      el.style.left = wx + 'px';
      el.style.top = wy + 'px';
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }
    return;
  }

  // Desktop: track the orb unless user has anchored it.
  const sc = orb.pos.clone().project(camera);
  const sx = (sc.x+1)/2*W;
  const sy = (-sc.y+1)/2*H;
  if(el._userAnchored) {
    const wl = parseFloat(el.style.left) || 0;
    const wt = parseFloat(el.style.top)  || 0;
    const ww2 = (el.offsetWidth  || 170) / 2;
    const wh2 = (el.offsetHeight ||  90) / 2;
    const wcx = wl + ww2, wcy = wt + wh2;
    const dist = Math.sqrt((sx - wcx) ** 2 + (sy - wcy) ** 2);
    if(dist < 120) el._userAnchored = false;
    else return;
  }
  const ww = el.offsetWidth || 170;
  const wh = el.offsetHeight || 90;
  let wx = sx + 28;
  let wy = sy - wh/2;
  wx = Math.max(4, Math.min(W-ww-4, wx));
  wy = Math.max(4, Math.min(H-wh-4, wy));
  el.style.left = wx+'px'; el.style.top = wy+'px';
  el.style.right='auto'; el.style.bottom='auto';
}

function _wiggleAttractor(a){
