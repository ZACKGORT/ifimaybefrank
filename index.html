function countTgts(){
  const N=Math.min(P.count,MP),raw=tgts.map(()=>0);let tot=0,inTarget=0;
  for(let i=0;i<N;i++){if(!pal[i])continue;const b=i*3;if(pp[b+1]>-7.5)continue;tot++;let hit=false;for(let t=0;t<tgts.length;t++){const tg=tgts[t],dx=pp[b]-tg.x,dz=pp[b+2];if(dx*dx+dz*dz<tg.r*tg.r){raw[t]++;hit=true;}}if(hit)inTarget++;}
  if(tCounts.length!==tgts.length)tCounts=tgts.map(()=>0);
  for(let t=0;t<tgts.length;t++){tCounts[t]+=(raw[t]-tCounts[t])*FILL_A;const sh=tot>0?tCounts[t]/tot:0;tgts[t].fill=Math.min(sh/(1/Math.max(tgts.length,1))*0.7,1);tgts[t].met=tgts[t].fill>=lvlThresh();}
  // Spillage: particles on floor outside any target
  const rawSpill=tot>0?Math.max(0,tot-inTarget):0;
  spillCount+=(rawSpill-spillCount)*FILL_A;
  spillSmooth=tot>0?spillCount/tot:0;
  updateSpillGraph();
}

  if (lvl === 4) {

function checkDone(){

    if(met){ovCtx.save();ovCtx.translate(cx,cy);ovCtx.scale(1,ry/rx);const g=ovCtx.createRadialGradient(0,0,0,0,0,rx*0.84);g.addColorStop(0,rgba(col,0.1+Math.sin(t*3)*0.04));g.addColorStop(1,rgba(col,0));ovCtx.beginPath();ovCtx.arc(0,0,rx*0.84,0,Math.PI*2);ovCtx.fillStyle=g;ovCtx.fill();ovCtx.restore();}
    ovCtx.font='10px Courier New';ovCtx.textAlign='center';ovCtx.fillStyle=met?col:`rgba(${rgb(col)},${0.28+fill*0.4})`;ovCtx.shadowColor=col;ovCtx.shadowBlur=met?8:2;ovCtx.fillText(met?'✓ FILLED':`TARGET ${String.fromCharCode(65+tg.idx)}`,cx,cy+ry+15);ovCtx.shadowBlur=0;
  });

    const eF = projW(new THREE.Vector3(wormhole.entranceX,FLR,wormhole.entranceR*0.55));
    const erx=(eR2.x-eL.x)/2, ery=Math.abs(eF.y-eC.y)*1.1;
    const ecx=(eR2.x+eL.x)/2, ecy=eC.y;
    ovCtx.save(); ovCtx.translate(ecx,ecy); ovCtx.scale(1,ery/erx); ovCtx.beginPath(); ovCtx.arc(0,0,erx,0,Math.PI*2); ovCtx.restore();
    ovCtx.setLineDash([8,5]); ovCtx.lineDashOffset=-tw*22;
    ovCtx.strokeStyle=`rgba(0,220,200,${0.55+Math.sin(tw*2.5)*0.18})`; ovCtx.lineWidth=2.0;
    ovCtx.shadowColor='rgba(0,220,200,0.8)'; ovCtx.shadowBlur=10; ovCtx.stroke();
    ovCtx.setLineDash([]); ovCtx.shadowBlur=0;
    ovCtx.font='9px Courier New'; ovCtx.textAlign='center';
    ovCtx.fillStyle='rgba(0,220,200,0.5)'; ovCtx.fillText('WORMHOLE ENTRANCE',ecx,ecy+ery+14);

    // EXIT — ceiling portal, draggable
    const xC = projW(new THREE.Vector3(wormhole.exitX,wormhole.exitY,0));
    const xL = projW(new THREE.Vector3(wormhole.exitX-wormhole.exitR,wormhole.exitY,0));
    const xR2= projW(new THREE.Vector3(wormhole.exitX+wormhole.exitR,wormhole.exitY,0));
    const xF = projW(new THREE.Vector3(wormhole.exitX,wormhole.exitY,wormhole.exitR*0.55));
    const xrx=(xR2.x-xL.x)/2, xry=Math.abs(xF.y-xC.y)*1.1+4;
    const xcx=(xR2.x+xL.x)/2, xcy=xC.y;
    wormhole._screenX=xcx; wormhole._screenY=xcy; wormhole._screenR=xrx+10;
    ovCtx.save(); ovCtx.translate(xcx,xcy); ovCtx.scale(1,xry/xrx);
    const exitG=ovCtx.createRadialGradient(0,0,0,0,0,xrx);
    exitG.addColorStop(0,`rgba(180,100,255,${0.14+Math.sin(tw*3)*0.06})`); exitG.addColorStop(1,'rgba(100,50,200,0)');
    ovCtx.beginPath(); ovCtx.arc(0,0,xrx,0,Math.PI*2); ovCtx.fillStyle=exitG; ovCtx.fill(); ovCtx.restore();
    ovCtx.save(); ovCtx.translate(xcx,xcy); ovCtx.scale(1,xry/xrx); ovCtx.beginPath(); ovCtx.arc(0,0,xrx,0,Math.PI*2); ovCtx.restore();
    ovCtx.setLineDash([6,4]); ovCtx.lineDashOffset=tw*18;
    ovCtx.strokeStyle=`rgba(180,100,255,${0.62+Math.sin(tw*2.1)*0.18})`; ovCtx.lineWidth=1.8;
    ovCtx.shadowColor='rgba(160,80,255,0.7)'; ovCtx.shadowBlur=12; ovCtx.stroke();
    ovCtx.setLineDash([]); ovCtx.shadowBlur=0;
    ovCtx.font='9px Courier New'; ovCtx.textAlign='center';
    ovCtx.fillStyle=`rgba(180,100,255,${wormhole.dragging?0.9:0.55})`;
    ovCtx.fillText(wormhole.dragging?'EXIT ✦':'EXIT (drag)', xcx, xcy-xry-6);
  }

  // ── Free-placement portal pairs (Level 6) — perspective 3D portals ──────────
  if (portalPairs.length > 0) {
    _portalPhase += 0.018;
    const tw = _portalPhase;

    function projP(v){const c=v.clone().project(camera);return{x:(c.x+1)/2*W,y:(-c.y+1)/2*H};}

    // Find bouncing BH for ingestion animation
    const bouncingBH = attractors.find(a => a._bouncingBH);

    portalPairs.forEach((pp, pi) => {
      const col = pp.color;
      // Parse color components for use in rgba
      const [cr,cg,cb] = col.split(',').map(Number);

      // Initialize per-portal animation state
      if (!pp._partA) {
        pp._partA = Array.from({length:18}, (_,i) => ({
          t: Math.random(), angle: (i/18)*Math.PI*2, speed: 0.3+Math.random()*0.4, r: 0.4+Math.random()*0.5
        }));
        pp._partB = Array.from({length:18}, (_,i) => ({
          t: Math.random(), angle: (i/18)*Math.PI*2, speed: 0.3+Math.random()*0.4, r: 0.4+Math.random()*0.5
        }));
        pp._ingestT = -1;    // -1 = idle, 0..1 = ingesting into A or B
        pp._ingestSide = null; // 'a' or 'b'
        pp._emergeT = -1;
        pp._emergeSide = null;
      }

      // Advance particle stream phase
      pp._partA.forEach(p => { p.t = (p.t + pp.cooldown > 0 ? 0.008 : 0.018) % 1; });
      pp._partB.forEach(p => { p.t = (p.t + pp.cooldown > 0 ? 0.008 : 0.018) % 1; });

      // Detect BH proximity to trigger ingestion animation
      if (bouncingBH && pp._ingestT < 0 && pp._emergeT < 0 && pp.cooldown <= 0) {
        const dA = Math.hypot(bouncingBH.pos.x - pp.a.x, bouncingBH.pos.y - pp.a.y);
        const dB = Math.hypot(bouncingBH.pos.x - pp.b.x, bouncingBH.pos.y - pp.b.y);
        if (dA < pp.r * 1.5) { pp._ingestT = 0; pp._ingestSide = 'a'; pp._emergeSide = 'b'; }
        else if (dB < pp.r * 1.5) { pp._ingestT = 0; pp._ingestSide = 'b'; pp._emergeSide = 'a'; }
      }
      if (pp._ingestT >= 0) {
        pp._ingestT = Math.min(1, pp._ingestT + 0.04);
        if (pp._ingestT >= 1 && pp._emergeT < 0) { pp._emergeT = 0; }
      }
      if (pp._emergeT >= 0) {
        pp._emergeT = Math.min(1, pp._emergeT + 0.035);
        if (pp._emergeT >= 1) { pp._ingestT = -1; pp._emergeT = -1; pp._ingestSide = null; }
      }

      // ── Draw one perspective portal disc ──────────────────────────────────
      function drawPerspectivePortal(worldX, worldY, label, screenCache, parts, side) {
        const ctr = projP(new THREE.Vector3(worldX, worldY, 0));
        const edgePt = projP(new THREE.Vector3(worldX + pp.r, worldY, 0));
        const sr = Math.max(28, Math.abs(edgePt.x - ctr.x));
        const cx = ctr.x, cy = ctr.y;
        screenCache.x = cx; screenCache.y = cy; screenCache.r = sr;

        // Perspective tilt: portal is a vertical ring in 3D — project as tall ellipse
        const ry = sr * 1.55; // tall (vertical portal face)
        const rx = sr * 0.38; // narrow (foreshortened depth)

        // Is BH being ingested/emerged through this portal?
        const isIngesting = pp._ingestSide === side && pp._ingestT >= 0;
        const isEmerging  = pp._emergeSide === side && pp._emergeT >= 0;
        const animT = isIngesting ? pp._ingestT : (isEmerging ? pp._emergeT : 0);
        const excited = (isIngesting || isEmerging) ? animT : 0;

        // ── Tunnel depth rings (perspective illusion) ─────────────────────────
        const tunnelDepth = 5;
        for (let d = tunnelDepth; d >= 1; d--) {
          const dFrac = d / tunnelDepth;
          const trx = rx * (1 - dFrac * 0.82);
          const try2 = ry * (1 - dFrac * 0.78);
          const alpha = (1 - dFrac) * (0.18 + excited * 0.25);
          if (alpha < 0.01) continue;
          ovCtx.save();
          ovCtx.translate(cx, cy);
          ovCtx.scale(trx / try2, 1);
          ovCtx.beginPath(); ovCtx.ellipse(0, 0, try2, try2, 0, 0, Math.PI*2);
          ovCtx.restore();
          ovCtx.strokeStyle = `rgba(${col},${alpha})`;
          ovCtx.lineWidth = 0.8;
          // draw via save/scale/restore then stroke
          ovCtx.save();
          ovCtx.translate(cx, cy);
          ovCtx.scale(trx / try2, 1);
          ovCtx.beginPath(); ovCtx.ellipse(0, 0, try2, try2, 0, 0, Math.PI*2);
          ovCtx.restore();
          ovCtx.stroke();
        }

        // ── Singularity point at tunnel center ───────────────────────────────
        const singPulse = 0.5 + Math.sin(tw * 4 + pi) * 0.5;
        const singR = 3.5 + singPulse * 2.0 + excited * 6;
        const singGrd = ovCtx.createRadialGradient(cx, cy, 0, cx, cy, singR * 2.5);
        singGrd.addColorStop(0, `rgba(255,255,255,${0.85 + excited * 0.15})`);
        singGrd.addColorStop(0.3, `rgba(${col},${0.6 + excited * 0.3})`);
        singGrd.addColorStop(1, `rgba(${col},0)`);
        ovCtx.beginPath(); ovCtx.arc(cx, cy, singR * 2.5, 0, Math.PI*2);
        ovCtx.fillStyle = singGrd; ovCtx.fill();
        // hard bright dot
        ovCtx.beginPath(); ovCtx.arc(cx, cy, singR * 0.55, 0, Math.PI*2);
        ovCtx.fillStyle = `rgba(255,255,255,${0.9 + excited * 0.1})`;
        ovCtx.fill();

        // ── BH ingestion animation ───────────────────────────────────────────
        if (isIngesting && pp._ingestT >= 0) {
          const t = pp._ingestT;
          // BH shrinks and spirals into singularity
          const bhScale = 1.0 - t * t;
          const spiralR = sr * (1 - t) * 0.7;
          const spiralAng = t * Math.PI * 4;
          const bhX = cx + Math.cos(spiralAng) * spiralR * (rx/ry);
          const bhY = cy + Math.sin(spiralAng) * spiralR;
          const bhDrawR = Math.max(2, (bhScale * sr * 0.45));
          // BH glow
          const bhGrd = ovCtx.createRadialGradient(bhX, bhY, 0, bhX, bhY, bhDrawR * 2.2);
          bhGrd.addColorStop(0, `rgba(80,40,200,${0.8 * bhScale})`);
          bhGrd.addColorStop(0.5, `rgba(40,20,120,${0.4 * bhScale})`);
          bhGrd.addColorStop(1, `rgba(0,0,0,0)`);
          ovCtx.beginPath(); ovCtx.arc(bhX, bhY, bhDrawR * 2.2, 0, Math.PI*2);
          ovCtx.fillStyle = bhGrd; ovCtx.fill();
          // BH core
          ovCtx.beginPath(); ovCtx.arc(bhX, bhY, bhDrawR, 0, Math.PI*2);
          ovCtx.fillStyle = `rgba(0,0,0,${0.9 * bhScale + 0.1})`;
          ovCtx.fill();
          // Accretion disc streaks
          for (let s = 0; s < 6; s++) {
            const sa = s * Math.PI/3 + tw * 3;
            const sx1 = bhX + Math.cos(sa) * bhDrawR * 1.3;
            const sy1 = bhY + Math.sin(sa) * bhDrawR * 0.38;
            const sx2 = bhX + Math.cos(sa) * bhDrawR * 2.4;
            const sy2 = bhY + Math.sin(sa) * bhDrawR * 0.72;
            ovCtx.beginPath(); ovCtx.moveTo(sx1, sy1); ovCtx.lineTo(sx2, sy2);
            ovCtx.strokeStyle = `rgba(${100+s*20},${50+s*10},255,${0.35 * bhScale})`;
            ovCtx.lineWidth = 1; ovCtx.stroke();
          }
        }

        // ── BH emergence animation ───────────────────────────────────────────
        if (isEmerging && pp._emergeT >= 0) {
          const t = pp._emergeT;
          // BH grows from singularity and expands outward
          const bhScale = t * t;
          const spiralR = sr * t * 0.6;
          const spiralAng = (1-t) * Math.PI * 3.5;
          const bhX = cx + Math.cos(spiralAng) * spiralR * (rx/ry);
          const bhY = cy + Math.sin(spiralAng) * spiralR;
          const bhDrawR = Math.max(2, bhScale * sr * 0.5);
          // Emergence flash
          if (t < 0.25) {
            const flashR = sr * (1 - t * 3) * 0.9;
            const flashGrd = ovCtx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
            flashGrd.addColorStop(0, `rgba(255,255,255,${(0.25 - t) * 3.2})`);
            flashGrd.addColorStop(1, `rgba(${col},0)`);
            ovCtx.beginPath(); ovCtx.arc(cx, cy, flashR, 0, Math.PI*2);
            ovCtx.fillStyle = flashGrd; ovCtx.fill();
          }
          // BH glow
          const bhGrd = ovCtx.createRadialGradient(bhX, bhY, 0, bhX, bhY, bhDrawR * 2.5);
          bhGrd.addColorStop(0, `rgba(80,40,200,${0.85 * bhScale})`);
          bhGrd.addColorStop(0.5, `rgba(40,20,120,${0.4 * bhScale})`);
          bhGrd.addColorStop(1, `rgba(0,0,0,0)`);
          ovCtx.beginPath(); ovCtx.arc(bhX, bhY, bhDrawR * 2.5, 0, Math.PI*2);
          ovCtx.fillStyle = bhGrd; ovCtx.fill();
          ovCtx.beginPath(); ovCtx.arc(bhX, bhY, bhDrawR, 0, Math.PI*2);
          ovCtx.fillStyle = `rgba(0,0,0,${0.9 * bhScale})`;
          ovCtx.fill();
        }

        // ── Particle stream: dots spiraling into singularity ─────────────────
        parts.forEach((p, i) => {
          // Each particle spirals from portal edge inward as t progresses
          const inwardT = (p.t + tw * p.speed * 0.4) % 1;
          const particleR = (1 - inwardT * inwardT) * sr * 0.92; // quadratic inward
          // In perspective: x compressed, y normal
          const px2 = cx + Math.cos(p.angle + tw * p.speed * 0.8) * particleR * (rx / ry) * 0.9;
          const py2 = cy + Math.sin(p.angle + tw * p.speed * 0.8) * particleR;
          const alpha = (1 - inwardT) * (0.55 + excited * 0.3);
          const sz = (1 - inwardT * 0.7) * (1.8 + Math.sin(tw * 3 + i) * 0.5);
          ovCtx.beginPath(); ovCtx.arc(px2, py2, sz, 0, Math.PI*2);
          ovCtx.fillStyle = `rgba(${col},${alpha})`;
          ovCtx.fill();
        });

        // Also draw outward-streaming particles (emerging from other side feel)
        parts.forEach((p, i) => {
          const outwardT = ((p.t * 0.7 + tw * p.speed * 0.25 + 0.5) % 1);
          const particleR2 = outwardT * outwardT * sr * 0.88;
          const px3 = cx + Math.cos(p.angle - tw * p.speed * 0.6 + Math.PI) * particleR2 * (rx/ry) * 0.9;
          const py3 = cy + Math.sin(p.angle - tw * p.speed * 0.6 + Math.PI) * particleR2;
          const alpha2 = outwardT * (0.3 + excited * 0.2);
          const sz2 = outwardT * 1.6 + 0.5;
          ovCtx.beginPath(); ovCtx.arc(px3, py3, sz2, 0, Math.PI*2);
          ovCtx.fillStyle = `rgba(${col},${alpha2})`;
          ovCtx.fill();
        });

        // ── Outer ring — main perspective ellipse ────────────────────────────
        ovCtx.save();
        ovCtx.translate(cx, cy);
        ovCtx.scale(rx / ry, 1);
        ovCtx.beginPath(); ovCtx.ellipse(0, 0, ry, ry, 0, 0, Math.PI*2);
        ovCtx.restore();
        ovCtx.setLineDash([5, 3]);
        ovCtx.lineDashOffset = (pi % 2 === 0 ? 1 : -1) * tw * 28;
        ovCtx.strokeStyle = `rgba(${col},${0.72 + Math.sin(tw*2.2+pi)*0.18 + excited*0.2})`;
        ovCtx.lineWidth = 2.0 + excited * 1.2;
        ovCtx.shadowColor = `rgba(${col},${0.6 + excited*0.35})`;
        ovCtx.shadowBlur = 14 + excited * 18;
        // re-draw path after state changes
        ovCtx.save();
        ovCtx.translate(cx, cy);
        ovCtx.scale(rx / ry, 1);
        ovCtx.beginPath(); ovCtx.ellipse(0, 0, ry, ry, 0, 0, Math.PI*2);
        ovCtx.restore();
        ovCtx.stroke();
        ovCtx.setLineDash([]); ovCtx.shadowBlur = 0;

        // ── Inner rim highlight ───────────────────────────────────────────────
        ovCtx.save();
        ovCtx.translate(cx, cy);
        ovCtx.scale(rx / ry * 0.72, 1);
        ovCtx.beginPath(); ovCtx.ellipse(0, 0, ry * 0.72, ry * 0.72, 0, 0, Math.PI*2);
        ovCtx.restore();
        ovCtx.strokeStyle = `rgba(${col},${0.22 + excited * 0.18})`;
        ovCtx.lineWidth = 0.8;
        ovCtx.save();
        ovCtx.translate(cx, cy);
        ovCtx.scale(rx / ry * 0.72, 1);
        ovCtx.beginPath(); ovCtx.ellipse(0, 0, ry * 0.72, ry * 0.72, 0, 0, Math.PI*2);
        ovCtx.restore();
        ovCtx.stroke();

        // ── Label ─────────────────────────────────────────────────────────────
        ovCtx.font = '8px Courier New';
        ovCtx.textAlign = 'center';
        ovCtx.fillStyle = `rgba(${col},0.48)`;
        ovCtx.fillText(label, cx, cy - ry - 8);
      }

      // Tiny faint connector line between the two portals
      const cA = projP(new THREE.Vector3(pp.a.x, pp.a.y, 0));
      const cB = projP(new THREE.Vector3(pp.b.x, pp.b.y, 0));
      ovCtx.setLineDash([2, 8]);
      ovCtx.lineDashOffset = tw * 14;
      ovCtx.beginPath(); ovCtx.moveTo(cA.x, cA.y); ovCtx.lineTo(cB.x, cB.y);
      ovCtx.strokeStyle = `rgba(${col},0.10)`;
      ovCtx.lineWidth = 1; ovCtx.stroke();
      ovCtx.setLineDash([]);

      const cacheA = {}, cacheB = {};
      drawPerspectivePortal(pp.a.x, pp.a.y, `${String.fromCharCode(65+pi*2)} (drag)`, cacheA, pp._partA, 'a');
      drawPerspectivePortal(pp.b.x, pp.b.y, `${String.fromCharCode(66+pi*2)} (drag)`, cacheB, pp._partB, 'b');
      pp._sAx = cacheA.x; pp._sAy = cacheA.y; pp._sAr = cacheA.r;
      pp._sBx = cacheB.x; pp._sBy = cacheB.y; pp._sBr = cacheB.r;
    });
  }
}

// ── TEXT CURSOR LAYER DRAW (cx.html port) ─────────────────────────────────────
function drawTextLayer(){
  tctx.clearRect(0,0,W,H);

  // fade alpha
  lvlTextAlpha+=(lvlTextAlphaTgt-lvlTextAlpha)*0.04;

  if(textChars.length===0&&lvlTextAlpha<0.01)return;

  // blob cursor follow (smooth like cx.html)
  bX+=(mX-bX)*BLOB_LERP;bY+=(mY-bY)*BLOB_LERP;

  tctx.textBaseline='top';

  const globalAlpha=Math.min(1,lvlTextAlpha);
  if(globalAlpha<0.01)return;

  for(const p of textChars){
    // physics — repel from cursor blob (same as cx.html)
    const dx=p.x-bX,dy=p.y-bY,d=Math.sqrt(dx*dx+dy*dy);
    // spring home
    p.vx+=(p.restX-p.x)*TETHER_K;
    p.vy+=(p.restY-p.y)*TETHER_K;
    // repel
    if(d<REPEL_R&&d>0.5){
      const f=(1-d/REPEL_R);
      p.vx+=(dx/d)*f*f*14;
      p.vy+=(dy/d)*f*f*14;
    }
    p.vx*=DAMP;p.vy*=DAMP;
    p.x+=p.vx;p.y+=p.vy;

    // fade near cursor — keep a floor so text stays readable everywhere
    const fadeS=12,fadeE=38;
    const proximity=Math.min(1,Math.max(0,(d-fadeS)/(fadeE-fadeS)));
    const alpha=p.baseOp*globalAlpha*(0.35+proximity*0.65);
    if(alpha>0.01){
      const r=p.role==='headline'?TYPO.headline:TYPO.body;
      tctx.font=`${r.weight} ${r.size}px ${r.family}`;
      tctx.fillStyle=`rgba(255,255,248,${alpha.toFixed(3)})`;
      tctx.fillText(p.ch,p.x,p.y);
    }
  }

  // bloom circle under cursor (cx.html glow)
  const grad=tctx.createRadialGradient(bX,bY,0,bX,bY,BLOOM_R);
  grad.addColorStop(0,'rgba(255,255,248,0.04)');
  grad.addColorStop(0.4,'rgba(255,255,248,0.015)');
  grad.addColorStop(1,'rgba(255,255,248,0)');
  tctx.fillStyle=grad;
  tctx.beginPath();tctx.arc(bX,bY,BLOOM_R,0,Math.PI*2);tctx.fill();

  // precise cursor dot (cx.html style)
  tctx.fillStyle='rgba(255,255,248,0.35)';
  tctx.beginPath();tctx.arc(eX,eY,4,0,Math.PI*2);tctx.fill();
  tctx.fillStyle='rgba(255,255,248,0.9)';
  tctx.beginPath();tctx.arc(mX,mY,1.5,0,Math.PI*2);tctx.fill();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
initLevel(0);

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clk.getDelta(),0.033);

  // cx.html cursor blob
  eVX=(mX-eX)*0.1;eVY=(mY-eY)*0.1;eX+=eVX;eY+=eVY;eVX*=0.68;eVY*=0.68;
  mVX*=0.6;mVY*=0.6;

  // shape cursor (original)
  cvx+=(mX-cX)*0.18;cvy+=(mY-cY)*0.18;cvx*=0.62;cvy*=0.62;cX+=cvx;cY+=cvy;
  const spd=Math.sqrt(cvx*cvx+cvy*cvy),ang=spd>0.5?Math.atan2(cvy,cvx)*180/Math.PI:0;
  const str=Math.min(spd*0.55,13),cw=18+str,ch=Math.max(6,11-str*0.28);
  curEl.style.transform=`translate(${cX-cw/2}px,${cY-ch/2}px) rotate(${ang}deg)`;
  curEl.style.width=cw+'px';curEl.style.height=ch+'px';

  if(paused){
    drawTextLayer();
    drawOverlay();
    drawBlackHoleOverlay();
    ovTex.needsUpdate = true;
    renderer.clear();
    renderer.render(scene,camera);
    renderer.render(particleScene,camera);
    renderer.render(orthoScene,orthoCam);
    return;
  }

  resolveCollisions();
  shapes.forEach(s=>s.update(dt));
  if(emitterShape)emitterShape.update(dt);
  attractors.forEach(a=>a.update(dt));
  // Decay supernova hit flare
  if (lvl === 4) attractors.forEach(a=>{ if(a._novaHitT>0) a._novaHitT=Math.max(0,a._novaHitT-dt*1.8); });

  // Advance waterfall wave phase — one full cycle every ~3.5s
  if(P.waterfall) _wfPhase += dt * (Math.PI * 2 / 3.5);

  pMat.uniforms.uSz.value=P.size;
  const N=Math.min(P.count,MP);

  // Compute world-space viewport edges at z=0 for edge repulsion
  const edgeL=s2w(0,H/2).x,edgeR=s2w(W,H/2).x;
  const edgeT=s2w(W/2,0).y,edgeB=s2w(W/2,H).y;
  const EDGE_ZONE=1.8,EDGE_F=18.0; // repulsion band width & force strength

  for(let i=0;i<N;i++){
    const b=i*3;
    if(!pal[i]){spawn(i);continue;}
    pa[i]+=dt;if(pa[i]>pl[i]){
      if(P.waterfall){
        // Asymmetric wave: fast attack to max, long slow decay to near-zero, repeat
        // t = 0→1 over one cycle
        const pOffset = (i / N) * 0.18; // small phase spread for texture
        const t = ((_wfPhase + pOffset) % (Math.PI * 2)) / (Math.PI * 2); // 0→1
        // Shape: pow curve gives slow decay; the (1-t)^3 drops steeply near end
        // then wraps instantly back to 1 — fast attack, long tail
        const wave = Math.pow(1 - t, 2.2);
        const spawnThreshold = 0.04 + wave * 0.96;
        if(Math.random() < spawnThreshold){ spawn(i); } else { pa[i]=0; }
        continue;
      }
      spawn(i);continue;
    }
    
    if(applyAttractorForces(i,b,dt)) continue;
    
    // Waterfall: each tier has its own gravity multiplier so layers fall at different speeds
    const gravMult = P.waterfall ? (0.45 + pGravTier[i] * 0.55) : 1.0;
    pv[b+1]-=P.gravity*gravMult*dt;
    if(P.rain){pv[b]-=pp[b]*0.4*dt;pv[b+2]-=pp[b+2]*0.3*dt;}

    // ── Freefall XY bias: damp z toward 0 while particle is airborne ──
    // In waterfall mode suppress z damping so the depth layers stay spread
    const airborne=pp[b+1]>-8.0;
    if(airborne && !P.waterfall){
      pp[b+2]*=0.88;
      pv[b+2]*=0.80;
    }

    pp[b]+=pv[b]*dt;pp[b+1]+=pv[b+1]*dt;pp[b+2]+=pv[b+2]*dt;

    // ── Viewport edge soft repulsion ──
    const dL=pp[b]-edgeL,dR=edgeR-pp[b];
    const dTop=edgeT-pp[b+1],dBot=pp[b+1]-edgeB;
    if(dL<EDGE_ZONE&&dL>-1.0){const t=1-(dL/EDGE_ZONE);pv[b]+=t*t*EDGE_F*dt;}
    if(dR<EDGE_ZONE&&dR>-1.0){const t=1-(dR/EDGE_ZONE);pv[b]-=t*t*EDGE_F*dt;}
    if(dTop<EDGE_ZONE&&dTop>-1.0){const t=1-(dTop/EDGE_ZONE);pv[b+1]-=t*t*EDGE_F*dt;}
    if(dBot<EDGE_ZONE&&dBot>-1.0){const t=1-(dBot/EDGE_ZONE);pv[b+1]+=t*t*EDGE_F*dt;}

    // ── Non-airborne (settled on ground): rolling resistance ──
    if(!airborne){
      // Rolling friction: stronger deceleration than air drag, mimics granular settling
      pv[b]*=0.91;pv[b+2]*=0.88;
      pp[b+2]*=0.97;
    }

    for(let s=0;s<shapes.length;s++){
      const sh=shapes[s],d=sh.sdf(pp[b],pp[b+1],pp[b+2]);
      if(d<PR){sdfN(sh,pp[b],pp[b+1],pp[b+2]);const pen=PR-d;pp[b]+=_n.x*pen;pp[b+1]+=_n.y*pen;pp[b+2]+=_n.z*pen;const dot=pv[b]*_n.x+pv[b+1]*_n.y+pv[b+2]*_n.z;if(dot<0){pv[b]-=dot*_n.x*0.08;pv[b+1]-=dot*_n.y*0.08;pv[b+2]-=dot*_n.z*0.08;pv[b]+=(Math.random()-0.5)*0.18;pv[b+2]+=(Math.random()-0.5)*0.07;}}
    }
    
    // ── Attractor Collision (Bounce) ──
    for (let a of attractors) {
      const bhd = a.sdf(pp[b], pp[b+1], pp[b+2]);
      if(bhd < PR) {
        const dx=pp[b]-a.pos.x,dy=pp[b+1]-a.pos.y,dz=pp[b+2]-(a.pos.z||0);
        const dn=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
        const nx=dx/dn,ny=dy/dn,nz=dz/dn;
        const pen=PR-bhd;
        pp[b]+=nx*pen;pp[b+1]+=ny*pen;pp[b+2]+=nz*pen;
        const dot=pv[b]*nx+pv[b+1]*ny+pv[b+2]*nz;
        if(dot<0){
          pv[b]-=dot*nx*0.06;pv[b+1]-=dot*ny*0.06;pv[b+2]-=dot*nz*0.06;
          pv[b]+=(Math.random()-0.5)*0.14;pv[b+2]+=(Math.random()-0.5)*0.06;
        }
      }
    }
    
    // ── Ground impact: realistic granular splash ──
    if(pp[b+1]<-8.9){
      pp[b+1]=-8.9;
      const vy=pv[b+1]; // negative (downward)
      const impactSpd=Math.abs(vy);
      const vx=pv[b], vz=pv[b+2];
      const lateralSpd=Math.sqrt(vx*vx+vz*vz);

      // Coefficient of restitution drops with impact speed (high-speed = more energy absorbed)
      // Real granulars: COR ~0.4 slow, ~0.15 fast, ~0 at terminal
      const COR=P.bounce*Math.max(0.05,1.0-impactSpd*0.09);
      pv[b+1]=impactSpd*COR; // rebound — always upward

      // Splash ejecta: particles spray at shallow angles (15°–40° from floor)
      // Energy available for lateral splash = incoming KE minus rebound KE
      const reboundFrac=COR*COR;
      const splatPool=impactSpd*(1.0-reboundFrac)*0.55;

      if(splatPool>0.05){
        // Preserve incoming horizontal momentum (inertia carries forward)
        const momentumBias=0.45; // fraction of lateral velocity that persists
        pv[b]  = vx*momentumBias;
        pv[b+2]= vz*momentumBias;

        // Add radial ejecta — biased in direction of travel, shallow angle
        // Ejecta angle from horizontal: 15°–38° (real wet/dry granulars)
        const ejectAng=(0.26+Math.random()*0.38); // radians from floor plane
        const ejectSpd=splatPool*(0.6+Math.random()*0.65);
        const ejectYaw=Math.random()*Math.PI*2; // random azimuth
        // Bias azimuth toward existing lateral travel direction
        const travelYaw=(lateralSpd>0.1)?Math.atan2(vz,vx):ejectYaw;
        const biasedYaw=travelYaw+( (Math.random()-0.5)*Math.PI*1.2 );
        pv[b]  +=Math.cos(biasedYaw)*Math.cos(ejectAng)*ejectSpd;
        pv[b+2]+=Math.sin(biasedYaw)*Math.cos(ejectAng)*ejectSpd;
        pv[b+1]+=Math.sin(ejectAng)*ejectSpd; // small upward component from ejecta

        // Rolling friction on lateral velocity after impact
        const rollingFriction=0.62+Math.random()*0.1;
        pv[b]*=rollingFriction;pv[b+2]*=rollingFriction;
      } else {
        // Very slow impact: just stop laterally (settle / stack)
        pv[b]*=0.28;pv[b+2]*=0.28;
      }
    }
    if(pp[b]<edgeL-1||pp[b]>edgeR+1)spawn(i);

    // ── Wormhole entrance: teleport to exit, unimpeded ──
    if(wormhole.active && pp[b+1] < -8.5) {
      const wdx = pp[b] - wormhole.entranceX, wdz = pp[b+2];
      if(wdx*wdx + wdz*wdz < wormhole.entranceR * wormhole.entranceR * 0.85) {
        // Preserve relative position within entrance, mapped 1:1 to exit
        const entryFracX = wdx / wormhole.entranceR;
        const entryFracZ = pp[b+2] / (wormhole.entranceR * 0.5);
        pp[b]   = wormhole.exitX + entryFracX * wormhole.exitR;
        pp[b+1] = wormhole.exitY;
        pp[b+2] = entryFracZ * wormhole.exitR * 0.5;
        // Exit at free-fall speed matching primary stream at this height
        // v = sqrt(2 * g * drop) where drop = emitter height - exitY
        const emitterY = emitterShape ? emitterShape.pos.y - (emitterShape._totalH||3.5)*0.5 : 10;
        const drop = Math.max(0, emitterY - wormhole.exitY);
        const exitSpd = Math.sqrt(2 * P.gravity * drop) + 0.5;
        pv[b]   = (Math.random()-0.5)*P.spread*0.3;
        pv[b+1] = -exitSpd;
        pv[b+2] = (Math.random()-0.5)*P.spread*0.3;
        pal[i] = 1;
      }
    }
    pv[b]*=0.997;
  }
  for(let i=N;i<MP;i++){if(pal[i]){pal[i]=0;pp[i*3+1]=-9999;}}
  pGeo.attributes.position.needsUpdate=true;

  countTgts();updateHUD();checkDone();
  _ovFrame++;if(_ovFrame%2===0){ drawOverlay(); drawBlackHoleOverlay(); ovTex.needsUpdate = true; }

  // text cursor layer drawn every frame (above 3js, below widgets)
  drawTextLayer();

  renderer.clear();
  renderer.render(scene,camera);
  renderer.render(particleScene,camera);
  renderer.render(orthoScene,orthoCam);
}

// ── FRANK PHYSICS LOGO ───────────────────────────────────────────────────────
(function(){
  if(window.innerWidth<=600)return;
  const ids=['zl-z','zl-c','zl-k','zl-g','zl-k2','zl-g2','zl-g3'];
  const spans = ids.map(id=>document.getElementById(id)).filter(Boolean);
  if(!spans[0])return;

  // Each letter has rest position + physics state
  const letters = spans.map((el,i) => ({
    el,
    vx:0, vy:0,
    ox:0, oy:0, // offset from rest
  }));

  const K = 0.08;   // spring stiffness
  const DAMP = 0.72; // damping
  const REPEL = 60;  // repel radius
  const REPEL_STR = 2.2;

  function tickLogo(){
    const mx = mX, my = mY; // reuse main cursor coords
    // Get logo container position
    const container = document.getElementById('zckgrt-logo');
    if(!container) return;
    const cr = container.getBoundingClientRect();

    letters.forEach((lt,i) => {
      const el = lt.el;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top + r.height/2;

      // repel from cursor
      const dx = cx - mx, dy = cy - my;
      const dist = Math.sqrt(dx*dx+dy*dy);
      let fx=0, fy=0;
      if(dist < REPEL && dist > 0.5){
        const str = REPEL_STR * (1 - dist/REPEL);
        fx += (dx/dist)*str;
        fy += (dy/dist)*str;
      }

      // spring back to rest
      fx -= lt.ox * K;
      fy -= lt.oy * K;

      lt.vx = (lt.vx + fx) * DAMP;
      lt.vy = (lt.vy + fy) * DAMP;
      lt.ox += lt.vx;
      lt.oy += lt.vy;

      // clamp
      lt.ox = Math.max(-18, Math.min(18, lt.ox));
      lt.oy = Math.max(-18, Math.min(18, lt.oy));

      el.style.transform = `translate(${lt.ox.toFixed(2)}px,${lt.oy.toFixed(2)}px)`;
    });
    requestAnimationFrame(tickLogo);
  }
  tickLogo();
})();

// ── PAPER THEME ───────────────────────────────────────────────────────────────
let isPaper = false;

// White shape material settings for paper theme
const PAPER_SHAPE = { color: 0xffffff, roughness: 0.55, metalness: 0.02 };
const PAPER_SHAPE_SPHERE  = { color: 0xffffff, roughness: 0.15, metalness: 0.02 };
const PAPER_SHAPE_PYRAMID = { color: 0xffffff, roughness: 0.8, metalness: 0.02 };
const DARK_SHAPE  = { color: 0xffffff, roughness: 0.55, metalness: 0.02 };

function applyTheme(paper) {
  isPaper = paper;
  const body = document.body;
  body.classList.toggle('paper', paper);

  // Scene background + fog
  const bg = paper ? 0xf0ece4 : 0x0a0a0a;
  renderer.setClearColor(bg);
  scene.fog.color.setHex(bg);
  // Particle scene shares fog

  // Floor
  floorM.material.color.setHex(paper ? 0xece8df : 0x050505);

  // Lighting — brighten for paper, keep original for dark
  if (paper) {
    scene.children.filter(c=>c.isAmbientLight).forEach(l=>{ l.intensity=0.55; });
    mainL.intensity = 2.2; mainL.color.setHex(0xfff8f0);
    rimL.intensity  = 0.6; rimL.color.setHex(0xc8d4e0);
    fillL.intensity = 0.2;
  } else {
    scene.children.filter(c=>c.isAmbientLight).forEach(l=>{ l.intensity=0.07; });
    mainL.intensity = 3.8; mainL.color.setHex(0xfff5ee);
    rimL.intensity  = 1.1; rimL.color.setHex(0x9aaabb);
    fillL.intensity = 0.35;
  }

  // Shape materials
  shapes.forEach(sh => _applyShapeMat(sh, paper));

  // Particle color — dark on paper, light on dark
  // Swap blending and fragment shader color
  if (paper) {
    pMat.blending = THREE.NormalBlending;
    pMat.fragmentShader = `varying float vF;void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float c=exp(-d*10.0);float s=smoothstep(0.5,0.0,d)*0.5;float a=(c+s)*(1.0-vF*0.55);gl_FragColor=vec4(0.04,0.03,0.03,a*0.72);}`;
  } else {
    pMat.blending = THREE.AdditiveBlending;
    pMat.fragmentShader = `varying float vF;void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float c=exp(-d*10.0);float s=smoothstep(0.5,0.0,d)*0.5;float a=(c+s)*(1.0-vF*0.75);gl_FragColor=vec4(1.0,0.99,0.97,a*0.82);}`;
  }
  pMat.needsUpdate = true;

  // Text color
  _paperTextColor = paper ? 'rgba(10,8,6,' : 'rgba(255,255,248,';

  // Theme button label
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = paper ? 'DARK' : 'PAPER';
}

function _applyShapeMat(sh, paper) {
  const def = sh.def;
  let p;
  if (paper) {
    p = sh.type==='sphere' ? PAPER_SHAPE_SPHERE : sh.type==='pyramid' ? PAPER_SHAPE_PYRAMID : PAPER_SHAPE;
  } else {
    p = { color: def.color, roughness: def.rough, metalness: 0.02 };
  }
  sh.mesh.material.color.setHex(p.color);
  sh.mesh.material.roughness = p.roughness;
  sh.mesh.material.metalness = p.metalness;
  sh.mesh.material.needsUpdate = true;
  // Edge color
  sh.mesh.children.forEach(c => {
    if (c.material && c.material.isLineBasicMaterial) {
      c.material.color.setHex(paper ? 0x444444 : 0x888888);
      c.material.opacity = paper ? 0.35 : 0.22;
      c.material.needsUpdate = true;
    }
  });
}

// Intercept addShape to apply paper theme to new shapes
const _origAddShape = addShape;
addShape = function(t){
  _origAddShape(t);
  if(isPaper && shapes.length > 0) _applyShapeMat(shapes[shapes.length-1], true);
}

// Text color variable
let _paperTextColor = 'rgba(255,255,248,';

// Patch drawTextLayer to use theme-aware text color
const _origDrawTextLayer = drawTextLayer;
drawTextLayer = function(){
  tctx.clearRect(0,0,W,H);
  lvlTextAlpha+=(lvlTextAlphaTgt-lvlTextAlpha)*0.04;
  if(textChars.length===0&&lvlTextAlpha<0.01)return;
  bX+=(mX-bX)*BLOB_LERP;bY+=(mY-bY)*BLOB_LERP;
  tctx.textBaseline='top';
  const globalAlpha=Math.min(1,lvlTextAlpha);
  if(globalAlpha<0.01)return;
  for(const p of textChars){
    const dx=p.x-bX,dy=p.y-bY,d=Math.sqrt(dx*dx+dy*dy);
    p.vx+=(p.restX-p.x)*TETHER_K;
    p.vy+=(p.restY-p.y)*TETHER_K;
    if(d<REPEL_R&&d>0.5){const f=(1-d/REPEL_R);p.vx+=(dx/d)*f*f*14;p.vy+=(dy/d)*f*f*14;}
    p.vx*=DAMP;p.vy*=DAMP;
    p.x+=p.vx;p.y+=p.vy;
    const fadeS=12,fadeE=38;
    const proximity=Math.min(1,Math.max(0,(d-fadeS)/(fadeE-fadeS)));
    const alpha=p.baseOp*globalAlpha*(0.35+proximity*0.65);
    if(alpha>0.01){
      const r=p.role==='headline'?TYPO.headline:TYPO.body;
      tctx.font=`${r.weight} ${r.size}px ${r.family}`;
      tctx.fillStyle=_paperTextColor+alpha.toFixed(3)+')';
      tctx.fillText(p.ch,p.x,p.y);
    }
  }
  const grad=tctx.createRadialGradient(bX,bY,0,bX,bY,BLOOM_R);
  const bc=isPaper?'10,8,6':'255,255,248';
  grad.addColorStop(0,`rgba(${bc},0.04)`);
  grad.addColorStop(0.4,`rgba(${bc},0.015)`);
  grad.addColorStop(1,`rgba(${bc},0)`);
  tctx.fillStyle=grad;
  tctx.beginPath();tctx.arc(bX,bY,BLOOM_R,0,Math.PI*2);tctx.fill();
  tctx.fillStyle=`rgba(${bc},0.35)`;
  tctx.beginPath();tctx.arc(eX,eY,4,0,Math.PI*2);tctx.fill();
  tctx.fillStyle=`rgba(${bc},0.9)`;
  tctx.beginPath();tctx.arc(mX,mY,1.5,0,Math.PI*2);tctx.fill();
};
