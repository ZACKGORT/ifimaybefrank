// ── ZENORB TWIRL: ball-on-a-string / fidget-spinner physics ──────────────────
// The finger IS the pivot. The ball hangs on a loose tether and accumulates
// angular momentum as you sweep your finger in circles — like twirling keys.
// Physics model: polar coordinates around the moving pivot.
//   - Tether acts as a spring (loose — not rigid): ball can lag behind, dangle
//   - Angular momentum accumulates from the torque your circular finger motion
//     imparts through the string tension (Coriolis / centripetal coupling)
//   - No direct control of spin rate — you build it like a real fidget spinner

function _zenorbOuterScreenR(){
  if(!_bbBall) return{bsx:W/2,bsy:H/2,r:40};
  _ovV3.copy(_bbBall.pos).project(camera);
  const bsx=(_ovV3.x+1)/2*W, bsy=(-_ovV3.y+1)/2*H;
  const outerGlowR3d=_bbBall.radius*3.60;
  _ovV3.set(_bbBall.pos.x+outerGlowR3d,_bbBall.pos.y,_bbBall.pos.z||0).project(camera);
  return{bsx,bsy,r:Math.max(16,Math.abs((_ovV3.x+1)/2*W - bsx))};
}
function _zenorbHaloHit(sx,sy){
  if(!_bbBall) return false;
  const{bsx,bsy,r}=_zenorbOuterScreenR();
  const d=Math.sqrt((sx-bsx)**2+(sy-bsy)**2);
  return d>=r*0.4 && d<=r*2.2; // generous grab zone
}

function _startZenorbTwirl(sx,sy){
  if(!_bbBall) return;
  _twirlActive=true;
  _twirlFxScreen=sx; _twirlFyScreen=sy;
  const fw=s2w(sx,sy);
  _twirlFx=fw.x; _twirlFy=fw.y;
  _twirlFxPrev=fw.x; _twirlFyPrev=fw.y;
  _twirlLastT=performance.now();
  // Initial polar coords: ball relative to pivot
  const dx=_bbBall.pos.x-fw.x, dy=_bbBall.pos.y-fw.y;
  _twirlBallAngle=Math.atan2(dy,dx);
  _twirlBallDist=Math.max(0.8,Math.sqrt(dx*dx+dy*dy));
  _twirlRadVel=0;
  // Seed angular velocity from ball's existing velocity (smooth handoff)
  const tx=-Math.sin(_twirlBallAngle), ty=Math.cos(_twirlBallAngle);
  const tang=_bbBall.vel.x*tx+_bbBall.vel.y*ty;
  _twirlAngVel=_twirlBallDist>0.1 ? tang/_twirlBallDist : 0;
  _bbBall.vel.set(0,0,0);
}

function _updateZenorbTwirl(sx,sy){
  if(!_twirlActive) return;
  _twirlFxScreen=sx; _twirlFyScreen=sy;
  const fw=s2w(sx,sy);
  _twirlFxPrev=_twirlFx; _twirlFyPrev=_twirlFy;
  _twirlFx=fw.x; _twirlFy=fw.y;
}

function _tickZenorbTwirl(dt){
  if(!_twirlActive||!_bbBall) return;
  const TETHER_REST=_twirlBallDist; // rest length = current (loose tether doesn't pull inward)
  const TETHER_K=18.0;   // spring stiffness (resists stretching beyond rest)
  const TETHER_DAMP=0.65; // radial damping
  const ANG_DRAG=0.995;  // angular drag per second — very low so spin persists
  const GRAVITY=_bbBall._bbGravity||17.0;

  // ── Pivot velocity this frame ─────────────────────────────────────────────
  const pvx=(_twirlFx-_twirlFxPrev)/(dt||0.016);
  const pvy=(_twirlFy-_twirlFyPrev)/(dt||0.016);

  // ── Ball absolute velocity from polar state ───────────────────────────────
  // v_ball = v_pivot + d/dt(r*e_r)
  //        = v_pivot + (rdot * e_r) + (r * angVel * e_theta)
  const er_x=Math.cos(_twirlBallAngle), er_y=Math.sin(_twirlBallAngle);
  const et_x=-er_y, et_y=er_x; // tangent (perp to radial, in spin direction)

  // ── Tether force: loose spring — only pulls when stretched beyond rest, never pushes
  // This lets the ball dangle and lag behind naturally
  // Rest length adapts slowly to keep the tether "loose not taut"
  const stretch=_twirlBallDist; // current length
  // Soft tether: spring force only when significantly stretched
  // Gives the "loose chain / dangling key" feel — ball swings freely at short distances
  const SLACK=0.1; // fraction of rest below which tether is fully slack
  const stretchRatio=stretch/Math.max(0.5,_twirlBallDist);
  // Centripetal acceleration from orbit: ω²r — this is the real string tension in circular motion
  const centripetalA=_twirlAngVel*_twirlAngVel*_twirlBallDist;

  // ── Pivot acceleration (how fast the finger is changing velocity) ──────────
  // This torque is what ACTUALLY drives the spin — when you sweep your finger
  // in a circle, the offset from ball-to-pivot creates a torque on the angular momentum.
  // Torque = r × F_pivot (cross product in 2D = scalar)
  const pivAccX=(pvx-0)/(dt||0.016)*dt*0; // we'll use pivot displacement directly
  // The key physics: moving the pivot creates a force on the ball via the tether.
  // Force = -k*(r - r0)*e_r (spring) — projection onto tangent gives angular impulse.
  // Simpler: compute the angle from pivot to ball, and how the pivot motion
  // rotates that angle. That's the most intuitive fidget-spinner feel.

  // ── Core fidget-spinner: pivot moves, string pulls ball ──────────────────
  // New pivot position
  const newPivX=_twirlFx, newPivY=_twirlFy;
  // Vector from new pivot to current ball position
  const toBallX=_bbBall.pos.x-newPivX, toBallY=_bbBall.pos.y-newPivY;
  const toBallDist=Math.sqrt(toBallX*toBallX+toBallY*toBallY)||0.001;
  const newAngle=Math.atan2(toBallY,toBallX);

  // Angular impulse from pivot movement:
  // When the pivot moves, the ball's angle relative to pivot changes.
  // This is the PRIMARY driver of spin — sweeping your finger in a circle
  // constantly repositions the pivot, which winds up the angular momentum.
  let angleDelta=newAngle-_twirlBallAngle;
  // Normalize to [-π, π]
  angleDelta=angleDelta-Math.round(angleDelta/(Math.PI*2))*Math.PI*2;
  // Angular velocity gets an impulse from how much the angle changed due to pivot motion.
  // This feels like the "string going taut then loose" — pivot displacement tangentially
  // drives spin. Scale by a coupling factor: how taut the tether is.
  const tautness=Math.min(1.0,toBallDist/Math.max(0.5,_twirlBallDist));
  // The angular impulse is strongest when the string is taut and pivot sweeps tangentially.
  // Use angleDelta/dt as the "forced angular velocity" and blend it in with coupling:
  const forcedAngV=angleDelta/(dt||0.016);
  // Coupling: how much pivot-induced angle change feeds into accumulated spin
  // High tautness + large pivot sweep = strong spin transfer (like whipping a chain)
  const COUPLING=0.38;
  _twirlAngVel+=forcedAngV*COUPLING*(0.4+tautness*0.6);

  // ── Gravity acts on the ball in polar coords ──────────────────────────────
  // Gravity tangential component: -g * cos(angle) where angle measured from downward
  // In our coord system: downward is -y, angle=0 is rightward
  // Gravity torque = -g * cos(angle - π) = g * cos(angle) ... no:
  // Tangential gravity = -GRAVITY * (horizontal component of e_r) ?
  // Simpler: gravity accelerates the ball in -y. Project onto tangent:
  // a_tangential = -g * (e_y · e_theta) = -g * cos(angle)  [since e_theta.y = cos(angle)]
  // This gives pendulum-like swinging when stationary, blending into orbital when spinning
  const gravTangential=-GRAVITY*Math.cos(_twirlBallAngle); // pendulum restoring force
  _twirlAngVel+=(gravTangential/_twirlBallDist)*dt*0.6; // scale down — don't overpower spin

  // ── Angular drag (air resistance, very gentle) ────────────────────────────
  _twirlAngVel*=Math.pow(ANG_DRAG, dt*60);
  // Clamp
  _twirlAngVel=Math.max(-22,Math.min(22,_twirlAngVel));

  // ── Update angle from accumulated angular velocity ────────────────────────
  _twirlBallAngle=newAngle + _twirlAngVel*dt*(1.0-COUPLING*0.5);
  // ^ blend: the new angle from pivot motion + the accumulated spin advance

  // ── Radial dynamics: loose tether spring ─────────────────────────────────
  // Tether only resists when ball tries to fly FURTHER than tether length.
  // Below that: ball swings freely (slack string).
  const TARGET_DIST=_twirlBallDist; // tether doesn't change length (inextensible ideal)
  // Centrifugal "force" in rotating frame pushes outward: ω²r
  const centrifugal=_twirlAngVel*_twirlAngVel*_twirlBallDist;
  // Radial gravity: -g * sin(angle) (radial component, can stretch tether)
  const gravRadial=-GRAVITY*Math.sin(_twirlBallAngle);
  // For inextensible tether: clamp distance, derive radial vel from it
  // For loose/stretchy feel: let it breathe a bit
  _twirlRadVel+=(gravRadial-centrifugal*0.05)*dt; // gentle breathing
  _twirlRadVel*=Math.pow(TETHER_DAMP,dt*60);
  _twirlBallDist=Math.max(0.5,Math.min(6.0,toBallDist)); // stay at physical distance

  // ── Set ball world position ───────────────────────────────────────────────
  _bbBall.pos.x=newPivX+Math.cos(_twirlBallAngle)*_twirlBallDist;
  _bbBall.pos.y=newPivY+Math.sin(_twirlBallAngle)*_twirlBallDist;
  _bbBall.vel.set(0,0,0);
  _bbBall.mesh.position.set(_bbBall.pos.x,_bbBall.pos.y,_bbBall.pos.z||0);
  _bbBall.mesh.updateMatrixWorld(true);
}

function _releaseZenorbTwirl(){
  if(!_twirlActive||!_bbBall) return;
  _twirlActive=false;
  // Release velocity = pivot velocity + tangential orbital velocity
  // tangential v = ω × r (in the direction perpendicular to ball-pivot vector)
  const tx=-Math.sin(_twirlBallAngle), ty=Math.cos(_twirlBallAngle);
  // Pivot velocity at release (last frame)
  const c=s2w(W/2,H/2), cr=s2w(W/2+1,H/2);
  const pivVx=(_twirlFx-_twirlFxPrev)/(0.016); // approx
  const pivVy=(_twirlFy-_twirlFyPrev)/(0.016);
  // Orbital velocity from accumulated spin
  const orbV=_twirlAngVel*_twirlBallDist;
  let worldVx=tx*orbV + pivVx*0.4;
  let worldVy=ty*orbV + pivVy*0.4;
  // Clamp
  const maxSpd=_bbBall._bbMaxSpd||36;
  const spd=Math.sqrt(worldVx*worldVx+worldVy*worldVy);
  if(spd>maxSpd){ worldVx*=maxSpd/spd; worldVy*=maxSpd/spd; }
  _bbBall.vel.x=worldVx;
  _bbBall.vel.y=worldVy;
  _bbBall._wasThrown=true;
  HOOP.streak=0;
  _twirlAngVel*=0.7; // bleed off remaining spin
}

// ── HOOP DRAG ─────────────────────────────────────────────────────────────────
// _hoopDragging vars hoisted at top


function _hoopScreenPos(){ const sc=new THREE.Vector3(HOOP.x,HOOP.y,HOOP.z).project(camera); return{sx:(sc.x+1)/2*W,sy:(-sc.y+1)/2*H}; }
function _hoopHitTest(cx,cy){
  const{sx,sy}=_hoopScreenPos();
  const edgeW=new THREE.Vector3(HOOP.x+HOOP.boardW*0.55,HOOP.y,HOOP.z).project(camera);
  const edgeH=new THREE.Vector3(HOOP.x,HOOP.y+HOOP.boardH*0.55,HOOP.z).project(camera);
  const screenHW=Math.abs((edgeW.x+1)/2*W-sx);
  const screenHH=Math.abs((-edgeH.y+1)/2*H-sy);
  return Math.abs(cx-sx)<Math.max(screenHW,40)&&Math.abs(cy-sy)<Math.max(screenHH,40);
}
renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button!==0||!_hoopGroup||_aimDrag) return;
  if(_hoopHitTest(e.clientX,e.clientY)){
    _hoopDragging=true; const wp=s2w(e.clientX,e.clientY);
    _hoopDragOffX=wp.x-HOOP.x; _hoopDragOffY=wp.y-HOOP.y;
    _hoopVelX=_hoopVelY=0; _prevHoopX=HOOP.x; _prevHoopY=HOOP.y;
    _hoopDragStartT=performance.now(); e.stopImmediatePropagation();
  }
},{capture:true});
window.addEventListener('pointermove',e=>{
  if(!_hoopDragging||!_hoopGroup) return;
  const wp=s2w(e.clientX,e.clientY);
  const nx=wp.x-_hoopDragOffX, ny=wp.y-_hoopDragOffY;
  const dt2=Math.max(0.001,(performance.now()-_hoopDragStartT)/1000);
  _hoopVelX=(nx-_prevHoopX)/dt2; _hoopVelY=(ny-_prevHoopY)/dt2;
  _prevHoopX=HOOP.x; _prevHoopY=HOOP.y; _hoopDragStartT=performance.now();
  HOOP.x=nx; HOOP.y=ny; _hoopGroup.position.set(HOOP.x,HOOP.y,HOOP.z);
});
window.addEventListener('pointerup',e=>{ if(!_hoopDragging) return; _hoopDragging=false; });
renderer.domElement.addEventListener('touchstart',e=>{
  if(!_hoopGroup||_aimDrag) return;
  const t=e.touches[0];
  if(_hoopHitTest(t.clientX,t.clientY)){
    _hoopDragging=true; const wp=s2w(t.clientX,t.clientY);
    _hoopDragOffX=wp.x-HOOP.x; _hoopDragOffY=wp.y-HOOP.y;
    _hoopVelX=_hoopVelY=0; _prevHoopX=HOOP.x; _prevHoopY=HOOP.y;
    _hoopDragStartT=performance.now(); e.stopImmediatePropagation();
  }
},{capture:true,passive:false});
renderer.domElement.addEventListener('touchmove',e=>{
  if(!_hoopDragging) return;
  const t=e.touches[0], wp=s2w(t.clientX,t.clientY);
  _prevHoopX=HOOP.x; _prevHoopY=HOOP.y;
  HOOP.x=wp.x-_hoopDragOffX; HOOP.y=wp.y-_hoopDragOffY;
  _hoopGroup.position.set(HOOP.x,HOOP.y,HOOP.z); e.preventDefault();
},{capture:true,passive:false});
renderer.domElement.addEventListener('touchend',e=>{ if(_hoopDragging){_hoopDragging=false;e.stopImmediatePropagation();} },{capture:true,passive:false});

// ── TICK HOOK: run basketball systems each frame via emitter update ────────────
setTimeout(()=>{
  if(emitterShape){
    const _prevBBUpdate=emitterShape.update.bind(emitterShape);
    emitterShape.update=function(dt){
      _prevBBUpdate(dt);
      if(LEVELS[6]&&LEVELS[6].basketball&&lvl===6){
        const targetScale=_bulletTime?0.08:1.0;
        _bulletTimeScale+=( targetScale-_bulletTimeScale)*Math.min(1.0,dt*6.0);
        const scaledDt=dt*Math.max(0.07,_bulletTimeScale);
        if(_bbBall&&!_bbBall.dragging) _tickBBall(scaledDt, dt);
        _tickZenorbTwirl(dt);
        _tickRimRing(scaledDt);
        _bbHaloDt=dt; // feed real dt to halo animator
        // Fix perf: throttle aim/score canvas redraws on mobile (every 2nd frame)
        if(!isMobile||Math.floor(Date.now()/16)%2===0){
          if(_bulletTime){ _drawBulletTimeOverlay(); _drawScoreFlash(); }
          else { _drawAim(); _drawScoreFlash(); }
        }
      }
    };
  }
},400); // runs after emitter patch (200ms) so we wrap it cleanly

// ── ZACK.CX STANDALONE: post-init cleanup ────────────────────────────────────
// Clear the basketball tutorial hint, then set the portfolio opening statement
setTimeout(() => {
  // Also spawn project orbs on the basketball level
  // (orbs normally spawn on zen-mode lvl=5; we're on lvl=6 so spawn them here)
  _spawnProjectOrbs();
  _buildFloatText([
    'cx = craft experience',
  ], true);
}, 900);
