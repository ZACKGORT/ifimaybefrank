<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Letter — weighted writing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --ink:#111111;
  --ink-rgb:17,17,17;
  --rule:#e6e6e4;
  --rule-soft:#f0f0ee;
  --muted:#8a8a86;
  --chrome-font:'Plus Jakarta Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--chrome-font);-webkit-font-smoothing:antialiased}

/* ── TOP NAV ── */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:28px;
  height:60px;padding:0 28px;
  background:var(--ink);color:#fff;
}
.brand{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:19px;letter-spacing:-.01em;white-space:nowrap}
.tabs{display:flex;gap:4px}
.tab{
  font-family:var(--chrome-font);font-size:13px;font-weight:600;letter-spacing:.03em;
  color:rgba(255,255,255,.55);background:transparent;border:none;cursor:pointer;
  padding:8px 14px;border-radius:20px;transition:background .15s,color .15s;
}
.tab:hover{color:#fff}
.tab.active{background:rgba(255,255,255,.14);color:#fff}
.tb-spacer{flex:1}
.save-status{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap}
.tb-btn{
  font-family:var(--chrome-font);font-size:13px;font-weight:600;
  color:#fff;background:transparent;border:1px solid rgba(255,255,255,.25);
  padding:8px 16px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;
}
.tb-btn:hover{background:rgba(255,255,255,.1)}
.tb-btn.primary{background:#fff;color:var(--ink);border-color:#fff}
.tb-btn.primary:hover{background:#eee}
.tb-btn:disabled{opacity:.3;cursor:default;pointer-events:none}

@media(max-width:760px){
  .topbar{padding:0 16px;gap:14px}
  .brand{font-size:16px}
  .tb-btn{padding:7px 12px;font-size:12px}
}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════════════
   COMPOSE
══════════════════════════════════════════ */
.compose-wrap{max-width:900px;margin:0 auto;padding:56px 32px 160px}
.compose-tagline{
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  margin-bottom:40px;max-width:52ch;
}

.stack{display:flex;flex-direction:column}
.block{padding:28px 0;border-bottom:1px solid var(--rule)}
.block:first-child{padding-top:0}

.block-editable{
  display:block;width:100%;border:none;outline:none;resize:none;overflow:hidden;
  background:transparent;color:var(--ink);
  min-height:1.2em;
}
.block-editable::placeholder{color:#c7c7c3}

/* ── control row (mirrors the Fort-style spec bar) ──
   Collapsed by default; blooms open only while this block is the
   active one (focus is somewhere inside it), so a page of several
   passages doesn't show every control row at once. */
.block-controls{
  display:flex;align-items:center;flex-wrap:wrap;gap:22px;
  margin-top:0;padding-top:0;max-height:0;opacity:0;overflow:hidden;
  transform:translateY(-6px) scaleY(.94);transform-origin:top left;
  pointer-events:none;
  transition:max-height .38s cubic-bezier(.22,1,.36,1), opacity .22s ease,
             transform .3s cubic-bezier(.22,1,.36,1), margin-top .3s ease, padding-top .3s ease;
}
.block.active .block-controls{
  margin-top:22px;padding-top:14px;max-height:120px;opacity:1;
  transform:translateY(0) scaleY(1);pointer-events:auto;
}
.block{transition:border-color .25s ease}
.block.active{border-color:#d5d5d1}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:12.5px;color:var(--muted);white-space:nowrap}

.select-wrap{position:relative;display:inline-flex;align-items:center}
.select-wrap::after{
  content:'⌄';position:absolute;right:-2px;top:50%;transform:translateY(-52%);
  font-size:13px;color:var(--muted);pointer-events:none;
}
.ctrl-select{
  appearance:none;-webkit-appearance:none;background:transparent;border:none;outline:none;
  font-family:var(--chrome-font);font-size:13px;font-weight:600;color:var(--ink);
  padding-right:16px;cursor:pointer;
}

.italic-toggle{
  font-family:'Fraunces',serif;font-style:italic;font-size:13px;font-weight:600;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--rule);border-radius:4px;cursor:pointer;color:var(--muted);
}
.italic-toggle.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.range-track{position:relative;width:110px;height:16px;display:flex;align-items:center}
.range-track input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:16px;background:transparent;margin:0;cursor:pointer;
}
.range-track input[type=range]::-webkit-slider-runnable-track{height:1px;background:var(--rule)}
.range-track input[type=range]::-moz-range-track{height:1px;background:var(--rule)}
.range-track input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:#fff;border:1.5px solid var(--ink);margin-top:-6px;
}
.range-track input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;background:#fff;border:1.5px solid var(--ink);
}
.ctrl-value{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:34px}

.align-group{display:flex;gap:2px;margin-left:auto}
.align-btn{
  width:26px;height:22px;display:flex;flex-direction:column;justify-content:center;gap:2px;
  background:transparent;border:none;cursor:pointer;padding:0 4px;
}
.align-btn span{height:2px;background:var(--rule);border-radius:1px}
.align-btn[data-align="left"]{align-items:flex-start}
.align-btn[data-align="center"]{align-items:center}
.align-btn[data-align="right"]{align-items:flex-end}
.align-btn span:nth-child(1){width:100%}
.align-btn span:nth-child(2){width:72%}
.align-btn span:nth-child(3){width:50%}
.align-btn.active span{background:var(--ink)}

.block-remove{
  font-family:var(--chrome-font);font-size:16px;color:var(--muted);background:transparent;border:none;
  cursor:pointer;line-height:1;padding:2px 4px;margin-left:6px;
}
.block-remove:hover{color:var(--ink)}

.add-block-row{margin-top:8px}
.add-block-btn{
  font-family:var(--chrome-font);font-size:14px;font-weight:600;color:var(--muted);
  background:transparent;border:1px dashed var(--rule);border-radius:6px;
  padding:14px 20px;width:100%;text-align:left;cursor:pointer;transition:color .15s,border-color .15s;
}
.add-block-btn:hover{color:var(--ink);border-color:#c7c7c3}

@media(max-width:640px){
  .compose-wrap{padding:36px 18px 200px}
  .block-controls{gap:14px}
  .range-track{width:88px}
  .align-group{margin-left:0;order:99;width:100%}
}

/* ══════════════════════════════════════════
   ARCHIVE
══════════════════════════════════════════ */
.archive-wrap{max-width:1040px;margin:0 auto;padding:56px 32px 100px}
.archive-title{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin-bottom:6px}
.archive-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:40px}
.archive-empty{border:1px dashed var(--rule);padding:60px 24px;text-align:center;color:var(--muted);font-size:15px}
.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule)}
.letter-card{background:#fff;padding:26px 24px;cursor:pointer;display:flex;flex-direction:column;min-height:200px;transition:background .15s}
.letter-card:hover{background:#fafafa}
.lc-head{color:var(--ink);line-height:1.05;margin-bottom:14px;word-break:break-word;overflow:hidden;max-height:2.3em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lc-snip{font-size:13px;color:#555;line-height:1.5;margin-top:auto;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lc-date{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:14px}

.skip-link{position:fixed;top:-100px;left:12px;z-index:999;background:var(--ink);color:#fff;padding:10px 16px;font-size:13px;text-decoration:none;transition:top .15s}
.skip-link:focus-visible{top:12px}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
</style>
</head>
<body>

<a class="skip-link" href="#blockStack">Skip to writing surface</a>

<div class="topbar">
  <div class="brand">Open Letter</div>
  <div class="tabs">
    <button class="tab active" data-view="compose">Write</button>
    <button class="tab" data-view="archive">Archive</button>
  </div>
  <div class="tb-spacer"></div>
  <span class="save-status" id="saveStatus"></span>
  <button class="tb-btn" id="btnNew">New letter</button>
  <button class="tb-btn primary" id="btnSeal" disabled>Seal &amp; file</button>
</div>

<!-- ══════════════════ COMPOSE ══════════════════ -->
<main class="view active" id="view-compose">
  <div class="compose-wrap">
    <p class="compose-tagline">Give each passage the weight it deserves — set its size, weight, spacing, and rhythm as you write it.</p>
    <div class="stack" id="blockStack"></div>
    <div class="add-block-row">
      <button class="add-block-btn" id="addBlockBtn">+ Start a new passage, with its own weight</button>
    </div>
  </div>
</main>

<!-- ══════════════════ ARCHIVE ══════════════════ -->
<section class="view" id="view-archive">
  <div class="archive-wrap">
    <div class="archive-title">The archive</div>
    <div class="archive-sub">Every letter, filed as it was weighted</div>
    <div class="archive-empty" id="archiveEmpty" style="display:none">No letters filed yet. Whatever you write first will start the shelf.</div>
    <div class="shelf" id="shelf"></div>
  </div>
</section>

<script>
(function(){
  'use strict';

  const FONTS = [
    { id:'jakarta', label:'Jakarta Sans', family:"'Plus Jakarta Sans', sans-serif" },
    { id:'fraunces', label:'Fraunces',    family:"'Fraunces', serif" },
    { id:'mono',     label:'Plex Mono',   family:"'IBM Plex Mono', monospace" }
  ];
  const WEIGHTS = [
    { v:200, label:'Thin' },
    { v:300, label:'Light' },
    { v:400, label:'Regular' },
    { v:500, label:'Medium' },
    { v:600, label:'Semibold' },
    { v:700, label:'Bold' },
    { v:800, label:'Black' }
  ];

  function defaultBlock(overrides){
    return Object.assign({
      text:'', font:'jakarta', weight:400, italic:false,
      size:20, tracking:0, leading:130, align:'left'
    }, overrides || {});
  }
  function openingBlock(){
    // the first passage of a fresh letter starts heavy and large by
    // default — the writer's opening thought gets top billing until
    // they decide otherwise.
    return defaultBlock({ weight:800, size:52, leading:105 });
  }

  let blocks = [ openingBlock() ];

  const blockStack   = document.getElementById('blockStack');
  const addBlockBtn  = document.getElementById('addBlockBtn');
  const btnSeal      = document.getElementById('btnSeal');
  const btnNew       = document.getElementById('btnNew');
  const tabs         = document.querySelectorAll('.tab');
  const viewCompose  = document.getElementById('view-compose');
  const viewArchive  = document.getElementById('view-archive');
  const shelf        = document.getElementById('shelf');
  const archiveEmpty = document.getElementById('archiveEmpty');
  const saveStatusEl = document.getElementById('saveStatus');

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fontFamilyFor(id){
    const f = FONTS.find(x => x.id === id);
    return f ? f.family : FONTS[0].family;
  }

  function applyStyle(el, b){
    el.style.fontFamily     = fontFamilyFor(b.font);
    el.style.fontWeight     = b.weight;
    el.style.fontStyle      = b.italic ? 'italic' : 'normal';
    el.style.fontSize       = b.size + 'px';
    el.style.letterSpacing  = (b.tracking/1000) + 'em';
    el.style.lineHeight     = (b.leading/100);
    el.style.textAlign      = b.align;
  }

  function autoGrow(el){
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function updateSealEnabled(){
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    btnSeal.disabled = !hasContent;
  }

  function renderStack(){
    blockStack.innerHTML = '';
    blocks.forEach((b, i) => {
      const block = document.createElement('div');
      block.className = 'block';

      const textarea = document.createElement('textarea');
      textarea.className = 'block-editable';
      textarea.rows = 1;
      textarea.placeholder = i === 0 ? 'Start with the thought that matters most…' : 'Keep going — a new weight for a new turn…';
      textarea.value = b.text;
      applyStyle(textarea, b);
      textarea.addEventListener('input', () => {
        b.text = textarea.value;
        autoGrow(textarea);
        updateSealEnabled();
        saveDraft();
      });

      // control row
      const controls = document.createElement('div');
      controls.className = 'block-controls';

      // font select
      const fontWrap = document.createElement('div');
      fontWrap.className = 'ctrl select-wrap';
      const fontSel = document.createElement('select');
      fontSel.className = 'ctrl-select';
      FONTS.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id; opt.textContent = f.label;
        if (f.id === b.font) opt.selected = true;
        fontSel.appendChild(opt);
      });
      fontSel.addEventListener('change', () => { b.font = fontSel.value; applyStyle(textarea,b); saveDraft(); });
      fontWrap.appendChild(fontSel);

      // weight select
      const weightWrap = document.createElement('div');
      weightWrap.className = 'ctrl select-wrap';
      const weightSel = document.createElement('select');
      weightSel.className = 'ctrl-select';
      WEIGHTS.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.v; opt.textContent = w.label;
        if (w.v === b.weight) opt.selected = true;
        weightSel.appendChild(opt);
      });
      weightSel.addEventListener('change', () => { b.weight = parseInt(weightSel.value,10); applyStyle(textarea,b); saveDraft(); });
      weightWrap.appendChild(weightSel);

      // italic toggle
      const italicBtn = document.createElement('button');
      italicBtn.type = 'button';
      italicBtn.className = 'ctrl italic-toggle' + (b.italic ? ' active' : '');
      italicBtn.textContent = 'i';
      italicBtn.setAttribute('aria-pressed', b.italic ? 'true' : 'false');
      italicBtn.addEventListener('click', () => {
        b.italic = !b.italic;
        italicBtn.classList.toggle('active', b.italic);
        italicBtn.setAttribute('aria-pressed', b.italic ? 'true' : 'false');
        applyStyle(textarea,b); saveDraft();
      });

      // size slider
      const sizeCtrl = document.createElement('div');
      sizeCtrl.className = 'ctrl';
      const sizeLabel = document.createElement('span'); sizeLabel.className='ctrl-label'; sizeLabel.textContent='Size';
      const sizeTrack = document.createElement('div'); sizeTrack.className='range-track';
      const sizeRange = document.createElement('input');
      sizeRange.type='range'; sizeRange.min=10; sizeRange.max=96; sizeRange.value=b.size;
      const sizeVal = document.createElement('span'); sizeVal.className='ctrl-value'; sizeVal.textContent = b.size+'px';
      sizeRange.addEventListener('input', () => {
        b.size = parseInt(sizeRange.value,10);
        sizeVal.textContent = b.size+'px';
        applyStyle(textarea,b); autoGrow(textarea); saveDraft();
      });
      sizeTrack.appendChild(sizeRange);
      sizeCtrl.append(sizeLabel, sizeTrack, sizeVal);

      // letter spacing slider
      const trackCtrl = document.createElement('div');
      trackCtrl.className = 'ctrl';
      const trackLabel = document.createElement('span'); trackLabel.className='ctrl-label'; trackLabel.textContent='Letter spacing';
      const trackTrack = document.createElement('div'); trackTrack.className='range-track';
      const trackRange = document.createElement('input');
      trackRange.type='range'; trackRange.min=-30; trackRange.max=150; trackRange.value=b.tracking;
      trackRange.addEventListener('input', () => {
        b.tracking = parseInt(trackRange.value,10);
        applyStyle(textarea,b); saveDraft();
      });
      trackTrack.appendChild(trackRange);
      trackCtrl.append(trackLabel, trackTrack);

      // line height slider
      const leadCtrl = document.createElement('div');
      leadCtrl.className = 'ctrl';
      const leadLabel = document.createElement('span'); leadLabel.className='ctrl-label'; leadLabel.textContent='Line height';
      const leadTrack = document.createElement('div'); leadTrack.className='range-track';
      const leadRange = document.createElement('input');
      leadRange.type='range'; leadRange.min=95; leadRange.max=190; leadRange.value=b.leading;
      leadRange.addEventListener('input', () => {
        b.leading = parseInt(leadRange.value,10);
        applyStyle(textarea,b); autoGrow(textarea); saveDraft();
      });
      leadTrack.appendChild(leadRange);
      leadCtrl.append(leadLabel, leadTrack);

      // alignment
      const alignGroup = document.createElement('div');
      alignGroup.className = 'align-group';
      ['left','center','right'].forEach(a => {
        const btn = document.createElement('button');
        btn.type='button'; btn.className='align-btn'+(b.align===a?' active':''); btn.dataset.align=a;
        btn.setAttribute('aria-label', a+' align');
        btn.innerHTML = '<span></span><span></span><span></span>';
        btn.addEventListener('click', () => {
          b.align = a;
          alignGroup.querySelectorAll('.align-btn').forEach(x => x.classList.toggle('active', x===btn));
          applyStyle(textarea,b); saveDraft();
        });
        alignGroup.appendChild(btn);
      });

      // remove
      const removeBtn = document.createElement('button');
      removeBtn.type='button'; removeBtn.className='block-remove'; removeBtn.title='Remove this passage';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => {
        if (blocks.length <= 1) return;
        blocks.splice(i,1);
        renderStack();
        updateSealEnabled();
        saveDraft();
      });

      controls.append(fontWrap, weightWrap, italicBtn, sizeCtrl, trackCtrl, leadCtrl, alignGroup, removeBtn);
      block.append(textarea, controls);
      blockStack.appendChild(block);
      autoGrow(textarea);

      // bloom the control row in only while focus is somewhere inside
      // this block (the textarea itself, or one of its own controls);
      // collapse it the moment focus moves elsewhere.
      block.addEventListener('focusin', () => block.classList.add('active'));
      block.addEventListener('focusout', () => {
        requestAnimationFrame(() => {
          if (!block.contains(document.activeElement)) block.classList.remove('active');
        });
      });
    });
  }

  addBlockBtn.addEventListener('click', () => {
    blocks.push(defaultBlock());
    renderStack();
    const last = blockStack.querySelector('.block:last-child .block-editable');
    if (last) last.focus();
    saveDraft();
  });

  // ── VIEW SWITCHING ──
  tabs.forEach(t => t.addEventListener('click', () => showView(t.dataset.view)));
  function showView(name){
    tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
    viewCompose.classList.toggle('active', name === 'compose');
    viewArchive.classList.toggle('active', name === 'archive');
    if (name === 'archive') renderArchive();
  }

  // ── RESILIENT STORAGE (best-effort persistence; never load-bearing) ──
  const persist = {
    failCount:0, disabled:false, limit:3,
    async trySet(key, value){
      if (this.disabled || !window.storage) return false;
      try{
        await window.storage.set(key, value, false);
        this.failCount = 0; setSaveStatus('saved'); return true;
      }catch(err){
        this.failCount++;
        if (this.failCount >= this.limit){ this.disabled = true; setSaveStatus('local-only'); }
        else setSaveStatus('retry');
        return false;
      }
    },
    async tryGet(key){
      if (!window.storage) return null;
      try{ return await window.storage.get(key,false); }catch(e){ return null; }
    },
    async tryList(prefix){
      if (!window.storage) return [];
      try{ const r = await window.storage.list(prefix,false); return (r&&r.keys)?r.keys:[]; }catch(e){ return []; }
    },
    tryDelete(key){
      if (!window.storage || this.disabled) return;
      window.storage.delete(key,false).catch(()=>{});
    }
  };
  function setSaveStatus(state){
    const labels = { saved:'Saved', saving:'Saving…', retry:'Retrying…', 'local-only':'Saved on this page only' };
    saveStatusEl.textContent = labels[state] || '';
  }

  let draftTimer = null;
  function saveDraft(){
    clearTimeout(draftTimer);
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    if (!hasContent){ setSaveStatus(''); return; }
    setSaveStatus('saving');
    draftTimer = setTimeout(() => {
      persist.trySet('draft:current', JSON.stringify(blocks));
    }, 900);
  }

  async function loadDraft(){
    const res = await persist.tryGet('draft:current');
    if (res && res.value){
      try{
        const parsed = JSON.parse(res.value);
        if (Array.isArray(parsed) && parsed.length) blocks = parsed;
      }catch(e){ /* ignore corrupt draft */ }
    }
    renderStack();
    updateSealEnabled();
  }

  function resetCompose(){
    blocks = [ openingBlock() ];
    renderStack();
    updateSealEnabled();
    setSaveStatus('');
  }

  // ── ARCHIVE ──
  const entriesCache = [];

  async function sealCurrentLetter(){
    const hasContent = blocks.some(b => b.text.trim().length > 0);
    if (!hasContent) return;
    const entry = {
      id:'entry_' + Date.now(),
      blocks: JSON.parse(JSON.stringify(blocks)),
      createdAt: new Date().toISOString()
    };
    entriesCache.unshift(entry);
    persist.trySet('entries:' + entry.id, JSON.stringify(entry));
    persist.tryDelete('draft:current');
    resetCompose();
    showView('archive');
    tabs.forEach(t => t.classList.toggle('active', t.dataset.view === 'archive'));
  }
  btnSeal.addEventListener('click', sealCurrentLetter);
  btnNew.addEventListener('click', () => { resetCompose(); showView('compose'); });

  function fmtDate(iso){
    try{ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
    catch(e){ return ''; }
  }

  async function loadEntriesFromStorage(){
    const keys = await persist.tryList('entries:');
    for (const k of keys){
      const res = await persist.tryGet(k);
      if (res && res.value){
        try{ entriesCache.push(JSON.parse(res.value)); }catch(e){ /* skip corrupt entry */ }
      }
    }
    entriesCache.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  function renderArchive(){
    if (entriesCache.length === 0){
      shelf.innerHTML = '';
      archiveEmpty.style.display = 'block';
      return;
    }
    archiveEmpty.style.display = 'none';
    shelf.innerHTML = '';
    entriesCache.forEach(entry => {
      const firstWithText = entry.blocks.find(b => b.text.trim().length > 0) || entry.blocks[0];
      const restText = entry.blocks
        .filter(b => b !== firstWithText)
        .map(b => b.text.trim()).filter(Boolean).join(' ');

      const card = document.createElement('div');
      card.className = 'letter-card';

      const head = document.createElement('div');
      head.className = 'lc-head';
      const cappedSize = Math.min(firstWithText.size, 42);
      head.style.fontFamily = fontFamilyFor(firstWithText.font);
      head.style.fontWeight = firstWithText.weight;
      head.style.fontStyle = firstWithText.italic ? 'italic' : 'normal';
      head.style.fontSize = cappedSize + 'px';
      head.style.lineHeight = (firstWithText.leading/100);
      head.textContent = firstWithText.text.trim() || '(untitled)';

      const snip = document.createElement('div');
      snip.className = 'lc-snip';
      snip.textContent = restText || 'No further passages.';

      const date = document.createElement('div');
      date.className = 'lc-date';
      date.textContent = fmtDate(entry.createdAt);

      card.append(head, snip, date);
      shelf.appendChild(card);
    });
  }

  // ── INIT ──
  loadDraft();
  loadEntriesFromStorage();
})();
</script>
</body>
</html>
